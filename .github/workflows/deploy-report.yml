name: Deploy Report

on:
  push:
    branches: [main, master]
    paths:
      - 'generated-apps/**'
      - 'scripts/**'
      - '.arkpilot/reports/comparison-images/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Generate report (HAP-filtered)
        run: npm run report

      - name: Prepare docs for GitHub Pages
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r .arkpilot/reports/. docs/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
