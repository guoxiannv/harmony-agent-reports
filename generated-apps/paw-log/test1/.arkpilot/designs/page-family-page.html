<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 · PawLog — 家庭成员</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 12% 0%, #F0FDF9 0%, #F8FAFC 40%, #FFF6F7 100%);
      color: #0F172A;
      min-height: 100vh;
      padding-bottom: 40px;
    }
    .container { max-width: 390px; margin: 0 auto; padding: 0 20px; position: relative; }
    header { padding-top: 28px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 40px; height: 40px; border-radius: 50%; background: #FFFFFF; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(15,23,42,0.06); }
    header h1 { font-size: 22px; font-weight: 700; line-height: 1.24; }
    .group-card {
      background: linear-gradient(160deg, #FFF1F2 0%, #FFFFFF 100%);
      border: 1px solid rgba(251,113,133,0.10);
      border-radius: 22px; padding: 20px;
      box-shadow: 0 8px 28px rgba(251,113,133,0.10);
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .group-icon { width: 48px; height: 48px; border-radius: 14px; background: #FFFFFF; display: flex; align-items: center; justify-content: center; }
    .group-info { flex: 1; }
    .group-name { font-size: 18px; font-weight: 700; }
    .group-meta { font-size: 13px; color: #64748B; margin-top: 2px; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; margin-top: 8px; }
    .member-card { background: #FFFFFF; border-radius: 20px; padding: 14px 16px; box-shadow: 0 4px 16px rgba(15,23,42,0.04); margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .member-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #CCFBEF 0%, #FFE4E6 100%); display: flex; align-items: center; justify-content: center; }
    .member-info { flex: 1; }
    .member-name { font-size: 15px; font-weight: 600; }
    .member-role { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: #F0FDF9; color: #0F766E; }
    .invite-btn {
      width: 100%; height: 50px; border-radius: 25px; border: none;
      background: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%);
      color: #FFFFFF; font-size: 16px; font-weight: 600;
      box-shadow: 0 10px 24px rgba(20,184,166,0.28);
      margin-top: 20px;
    }
  </style>
</head>
<body data-page-id="family-page">
  <div class="container">
    <header>
      <button class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>返回</title>
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <h1>家庭成员</h1>
    </header>

    <div class="group-card">
      <div class="group-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#FB7185" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>家庭组</title>
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
      </div>
      <div class="group-info">
        <div class="group-name" data-ui-id="family-group-name">豆豆和奶茶的家</div>
        <div class="group-meta">3 位成员 · 共同管理</div>
      </div>
    </div>

    <div class="section-title">成员列表</div>
    <div class="member-list" data-ui-id="family-member-list">
      <div class="member-card" data-ui-id="family-member-1">
        <div class="member-avatar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>成员头像</title>
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <div class="member-info">
          <div class="member-name">铲屎官</div>
        </div>
        <span class="member-role">创建者</span>
      </div>
      <div class="member-card" data-ui-id="family-member-2">
        <div class="member-avatar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FB7185" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>成员头像</title>
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <div class="member-info">
          <div class="member-name">猫爸</div>
        </div>
        <span class="member-role">成员</span>
      </div>
    </div>

    <button class="invite-btn" data-ui-id="family-invite-button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-4px; margin-right:6px;">
        <title>邀请家庭成员</title>
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="8.5" cy="7" r="4"></circle>
        <line x1="20" y1="8" x2="20" y2="14"></line>
        <line x1="23" y1="11" x2="17" y2="11"></line>
      </svg>
      邀请家庭成员
    </button>
  </div>
</body>
</html>
