<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 · PawLog — 趋势</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 12% 0%, #F0FDF9 0%, #F8FAFC 40%, #FFF6F7 100%);
      color: #0F172A;
      min-height: 100vh;
      padding-bottom: 100px;
    }
    .container { max-width: 390px; margin: 0 auto; padding: 0 20px; position: relative; }
    header { padding-top: 28px; margin-bottom: 16px; }
    header h1 { font-size: 22px; font-weight: 700; line-height: 1.24; }
    .pet-select {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
      background: #FFFFFF; border-radius: 16px; padding: 10px 14px;
      box-shadow: 0 4px 16px rgba(15,23,42,0.04);
    }
    .pet-select .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #CCFBEF 0%, #FFE4E6 100%);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #FB7185;
    }
    .pet-select .name { font-size: 15px; font-weight: 600; flex: 1; }
    .metric-tabs {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .metric-tab {
      flex: 1; padding: 10px 0; border-radius: 14px; border: none;
      background: #F1F5F9; color: #64748B; font-size: 13px; font-weight: 500;
    }
    .metric-tab.active {
      background: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%); color: #FFFFFF;
      box-shadow: 0 6px 16px rgba(20,184,166,0.25);
    }
    .period-switch {
      display: flex; justify-content: center; gap: 8px; margin-bottom: 16px;
    }
    .period-btn {
      padding: 8px 20px; border-radius: 20px; border: none;
      background: #F1F5F9; color: #64748B; font-size: 13px; font-weight: 500;
    }
    .period-btn.active {
      background: #FFFFFF; color: #14B8A6; border: 1px solid #14B8A6;
    }
    .chart-card {
      background: #FFFFFF; border-radius: 22px; padding: 18px;
      box-shadow: 0 8px 28px rgba(15,23,42,0.06); margin-bottom: 16px;
    }
    .chart-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
    .chart-value { font-size: 34px; font-weight: 700; line-height: 1.08; }
    .chart-unit { font-size: 15px; color: #64748B; margin-left: 4px; }
    .chart-change { font-size: 13px; color: #14B8A6; font-weight: 600; }
    .chart-area { position: relative; height: 180px; }
    .chart-svg { width: 100%; height: 100%; }
    .insight-card {
      background: linear-gradient(160deg, #FFFFFF 0%, #F0FDF9 100%);
      border: 1px solid rgba(20,184,166,0.10);
      border-radius: 22px; padding: 18px;
      box-shadow: 0 8px 28px rgba(20,184,166,0.10);
    }
    .insight-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .insight-text { font-size: 14px; color: #64748B; line-height: 1.5; }
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto;
      max-width: 390px; height: 72px;
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(24px) saturate(180%);
      border-top: 0.5px solid rgba(0,0,0,0.04);
      box-shadow: 0 -4px 20px rgba(15,23,42,0.04);
      display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94A3B8; font-size: 11px; margin-top: 4px; }
    .tab-item.active { color: #14B8A6; }
    .fab-wrap { position: relative; top: -18px; }
    .fab-tab {
      width: 60px; height: 60px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #14B8A6 0%, #FB7185 100%);
      box-shadow: 0 10px 28px rgba(20,184,166,0.32), 0 4px 12px rgba(251,113,133,0.18);
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body data-page-id="charts-page" data-tab-id="tab-charts">
  <div class="container">
    <header>
      <h1>健康趋势</h1>
    </header>

    <div class="pet-select" data-ui-id="charts-pet-switcher">
      <div class="avatar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>当前选中宠物</title>
          <path d="M12 5c.67 0 1.35.09 2 .26 1.78-2 5.03-2.84 6.42-2.26 1.4.58-.42 7-.42 7 .57 1.07 1 2.24 1 3.44C21 17.9 16.97 21 12 21s-9-3.1-9-7.56c0-1.25.5-2.4 1-3.44 0 0-1.82-6.42-.42-7 1.39-.58 4.64.26 6.42 2.26.65-.17 1.33-.26 2-.26z"></path>
        </svg>
      </div>
      <span class="name">豆豆 · 体重趋势</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>切换宠物</title>
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>

    <div class="metric-tabs" data-ui-id="charts-metric-tabs">
      <button class="metric-tab active" data-ui-id="charts-metric-weight">体重</button>
      <button class="metric-tab" data-ui-id="charts-metric-food">饮食</button>
      <button class="metric-tab" data-ui-id="charts-metric-waste">排泄</button>
      <button class="metric-tab" data-ui-id="charts-metric-medicine">用药</button>
    </div>

    <div class="period-switch">
      <button class="period-btn active" data-ui-id="charts-period-week">周</button>
      <button class="period-btn" data-ui-id="charts-period-month">月</button>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <div>
          <span class="chart-value">4.8</span>
          <span class="chart-unit">kg</span>
        </div>
        <span class="chart-change">↗ 较上周 +0.1kg</span>
      </div>
      <div class="chart-area" data-ui-id="charts-canvas">
        <svg class="chart-svg" viewBox="0 0 320 180" preserveAspectRatio="none">
          <title>豆豆体重趋势折线图</title>
          <defs>
            <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(20,184,166,0.30)" />
              <stop offset="100%" stop-color="rgba(20,184,166,0)" />
            </linearGradient>
          </defs>
          <g stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 4">
            <line x1="0" y1="45" x2="320" y2="45" />
            <line x1="0" y1="90" x2="320" y2="90" />
            <line x1="0" y1="135" x2="320" y2="135" />
          </g>
          <path d="M0,120 L53,110 L106,100 L160,95 L213,90 L266,85 L320,80 L320,180 L0,180 Z" fill="url(#areaFill)" />
          <path d="M0,120 L53,110 L106,100 L160,95 L213,90 L266,85 L320,80" fill="none" stroke="#14B8A6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="0" cy="120" r="4" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2" />
          <circle cx="53" cy="110" r="4" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2" />
          <circle cx="106" cy="100" r="4" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2" />
          <circle cx="160" cy="95" r="4" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2" />
          <circle cx="213" cy="90" r="4" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2" />
          <circle cx="266" cy="85" r="4" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2" />
          <circle cx="320" cy="80" r="6" fill="#FFFFFF" stroke="#14B8A6" stroke-width="3" />
          <g fill="#94A3B8" font-size="11" text-anchor="middle">
            <text x="0" y="175">周一</text>
            <text x="53" y="175">周二</text>
            <text x="106" y="175">周三</text>
            <text x="160" y="175">周四</text>
            <text x="213" y="175">周五</text>
            <text x="266" y="175">周六</text>
            <text x="320" y="175">周日</text>
          </g>
        </svg>
      </div>
    </div>

    <div class="insight-card" data-ui-id="charts-insight-card">
      <div class="insight-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px; margin-right:6px;">
          <title>健康洞察</title>
          <path d="M12 2a10 10 0 1 0 10 10 4 4 0 0 1-5-5 4 4 0 0 1-5-5"></path>
          <path d="M8.5 8.5v.01"></path>
          <path d="M16 15.5v.01"></path>
          <path d="M12 12v.01"></path>
        </svg>
        健康洞察
      </div>
      <div class="insight-text">豆豆本周体重小幅上升，食欲稳定。建议继续保持当前喂食量，并关注下周体重变化趋势。</div>
    </div>
  </div>

  <nav class="tab-bar" data-ui-id="charts-tab-bar">
    <button class="tab-item" data-ui-id="charts-tab-home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>今日首页</title>
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      今日
    </button>
    <button class="tab-item" data-ui-id="charts-tab-records">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>查看记录</title>
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <polyline points="10 9 9 9 8 9"></polyline>
      </svg>
      记录
    </button>
    <div class="fab-wrap">
      <button class="fab-tab" data-ui-id="charts-fab-add" aria-label="添加记录">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <title>添加新记录</title>
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>
    <button class="tab-item active" data-ui-id="charts-tab-charts">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>查看趋势</title>
        <line x1="18" y1="20" x2="18" y2="10"></line>
        <line x1="12" y1="20" x2="12" y2="4"></line>
        <line x1="6" y1="20" x2="6" y2="14"></line>
      </svg>
      趋势
    </button>
    <button class="tab-item" data-ui-id="charts-tab-profile">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>我的</title>
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      我的
    </button>
  </nav>
</body>
</html>
