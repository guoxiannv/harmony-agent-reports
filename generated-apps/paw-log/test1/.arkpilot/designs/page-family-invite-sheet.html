<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 · PawLog — 邀请成员</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: rgba(15,23,42,0.25);
      min-height: 100vh;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .sheet {
      width: 100%; max-width: 390px;
      background: #FFFFFF;
      border-radius: 28px 28px 0 0;
      padding: 16px 20px 28px;
      text-align: center;
    }
    .drag-handle { width: 40px; height: 4px; border-radius: 2px; background: #E2E8F0; margin: 0 auto 16px; }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .sheet-title { font-size: 20px; font-weight: 700; }
    .close-btn { width: 32px; height: 32px; border-radius: 50%; background: #F1F5F9; border: none; display: flex; align-items: center; justify-content: center; }
    .code-card {
      background: linear-gradient(160deg, #F0FDF9 0%, #FFFFFF 100%);
      border: 1px solid rgba(20,184,166,0.10);
      border-radius: 22px; padding: 24px 20px; margin-bottom: 20px;
    }
    .code-label { font-size: 13px; color: #64748B; margin-bottom: 8px; }
    .code-value { font-size: 32px; font-weight: 700; letter-spacing: 4px; color: #14B8A6; }
    .qr-placeholder {
      width: 140px; height: 140px; border-radius: 18px;
      background: #F8FAFC; margin: 16px auto 0;
      display: flex; align-items: center; justify-content: center; color: #94A3B8; font-size: 13px;
    }
    .action-btn {
      width: 100%; height: 50px; border-radius: 25px; border: none;
      background: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%);
      color: #FFFFFF; font-size: 16px; font-weight: 600;
      box-shadow: 0 10px 24px rgba(20,184,166,0.28);
      margin-bottom: 10px;
    }
    .secondary-btn {
      width: 100%; height: 44px; border-radius: 22px; border: 1px solid #E2E8F0;
      background: #FFFFFF; color: #334155; font-size: 15px; font-weight: 500;
    }
  </style>
</head>
<body data-page-id="family-invite-sheet">
  <div class="sheet">
    <div class="drag-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">邀请家庭成员</span>
      <button class="close-btn" data-ui-id="family-invite-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>关闭邀请</title>
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <p style="font-size:14px;color:#64748B;margin-bottom:18px;">让对方扫描下方二维码，或输入邀请码即可加入家庭组</p>

    <div class="code-card">
      <div class="code-label">邀请码</div>
      <div class="code-value" data-ui-id="family-invite-code">PAW 8866</div>
      <div class="qr-placeholder">二维码</div>
    </div>

    <button class="action-btn" data-ui-id="family-invite-copy">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px; margin-right:6px;">
        <title>复制邀请码</title>
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
      复制邀请码
    </button>
    <button class="secondary-btn" data-ui-id="family-invite-share">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px; margin-right:6px;">
        <title>分享邀请</title>
        <circle cx="18" cy="5" r="3"></circle>
        <circle cx="6" cy="12" r="3"></circle>
        <circle cx="18" cy="19" r="3"></circle>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
      </svg>
      分享邀请
    </button>
  </div>
</body>
</html>
