<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 · PawLog — 病历归档</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 12% 0%, #F0FDF9 0%, #F8FAFC 40%, #FFF6F7 100%);
      color: #0F172A;
      min-height: 100vh;
      padding-bottom: 120px;
    }
    .container { max-width: 390px; margin: 0 auto; padding: 0 20px; position: relative; }
    header { padding-top: 28px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 40px; height: 40px; border-radius: 50%; background: #FFFFFF; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(15,23,42,0.06); }
    header h1 { font-size: 22px; font-weight: 700; line-height: 1.24; }
    .filter-row { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; }
    .filter-chip { flex-shrink: 0; padding: 8px 14px; border-radius: 20px; background: #F1F5F9; color: #64748B; font-size: 13px; border: none; }
    .filter-chip.active { background: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%); color: #FFFFFF; }
    .medical-card { background: #FFFFFF; border-radius: 22px; padding: 16px; box-shadow: 0 8px 28px rgba(15,23,42,0.06); margin-bottom: 14px; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .card-title { font-size: 16px; font-weight: 700; }
    .card-date { font-size: 12px; color: #94A3B8; }
    .card-body { font-size: 14px; color: #64748B; line-height: 1.5; }
    .card-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .tag { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px; background: #F0FDF9; color: #0F766E; }
    .image-grid { display: flex; gap: 8px; margin-top: 12px; }
    .image-thumb {
      width: 70px; height: 70px; border-radius: 12px;
      background: linear-gradient(135deg, #F0FDF9 0%, #FFF1F2 100%);
      display: flex; align-items: center; justify-content: center;
      color: #94A3B8; font-size: 11px;
    }
    .more-images { background: #F1F5F9; color: #64748B; }
    .fab {
      position: fixed; bottom: 30px; right: calc(50% - 175px);
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #14B8A6 0%, #FB7185 100%);
      box-shadow: 0 10px 28px rgba(20,184,166,0.32), 0 4px 12px rgba(251,113,133,0.18);
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body data-page-id="medical-page">
  <div class="container">
    <header>
      <button class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>返回</title>
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <h1>病历归档</h1>
    </header>

    <div class="filter-row" data-ui-id="medical-filter-pet">
      <button class="filter-chip active">全部宠物</button>
      <button class="filter-chip">豆豆</button>
      <button class="filter-chip">奶茶</button>
    </div>

    <div class="medical-card" data-ui-id="medical-card-1">
      <div class="card-header">
        <span class="card-title">宠爱动物医院 · 常规体检</span>
        <span class="card-date">2026-05-10</span>
      </div>
      <div class="card-body">
        医生：李医生<br />
        诊断：健康，建议维持当前饮食<br />
        用药：无
      </div>
      <div class="card-tags">
        <span class="tag">豆豆</span>
        <span class="tag">体检</span>
      </div>
      <div class="image-grid" data-ui-id="medical-card-1-images">
        <div class="image-thumb" data-ui-id="medical-card-1-image-0">化验单</div>
        <div class="image-thumb" data-ui-id="medical-card-1-image-1">病历</div>
        <div class="image-thumb more-images">+2</div>
      </div>
    </div>
  </div>

  <button class="fab" data-ui-id="medical-add-button" aria-label="添加病历">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <title>添加新病历</title>
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
  </button>
</body>
</html>
