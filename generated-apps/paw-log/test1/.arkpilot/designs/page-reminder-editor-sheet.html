<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 · PawLog — 提醒编辑</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: rgba(15,23,42,0.25);
      min-height: 100vh;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .sheet {
      width: 100%; max-width: 390px;
      background: #FFFFFF;
      border-radius: 28px 28px 0 0;
      padding: 16px 20px 28px;
    }
    .drag-handle { width: 40px; height: 4px; border-radius: 2px; background: #E2E8F0; margin: 0 auto 16px; }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .sheet-title { font-size: 20px; font-weight: 700; }
    .close-btn { width: 32px; height: 32px; border-radius: 50%; background: #F1F5F9; border: none; display: flex; align-items: center; justify-content: center; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 600; color: #64748B; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; height: 50px; border-radius: 14px; border: 1px solid transparent; background: #F8FAFC; padding: 0 16px; font-size: 15px; }
    .form-input:focus { outline: none; background: #F6FEFC; border-color: #14B8A6; box-shadow: 0 0 0 4px rgba(20,184,166,0.12); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .save-btn { width: 100%; height: 50px; border-radius: 25px; border: none; background: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%); color: #FFFFFF; font-size: 16px; font-weight: 600; box-shadow: 0 10px 24px rgba(20,184,166,0.28); margin-top: 8px; }
    .delete-btn { width: 100%; height: 44px; border-radius: 22px; border: none; background: #FFF1F2; color: #BE123C; font-size: 15px; font-weight: 600; margin-top: 10px; }
  </style>
</head>
<body data-page-id="reminder-editor-sheet">
  <div class="sheet">
    <div class="drag-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">编辑提醒</span>
      <button class="close-btn" data-ui-id="reminder-editor-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>关闭编辑</title>
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">选择宠物</label>
      <select class="form-input" data-ui-id="reminder-editor-pet-picker">
        <option>豆豆</option>
        <option>奶茶</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">提醒标题</label>
      <input type="text" class="form-input" value="狂犬疫苗加强针" data-ui-id="reminder-editor-title" />
    </div>

    <div class="form-group">
      <label class="form-label">分类</label>
      <select class="form-input" data-ui-id="reminder-editor-category">
        <option>疫苗</option>
        <option>驱虫</option>
        <option>体检</option>
        <option>其他</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">到期日</label>
        <input type="date" class="form-input" data-ui-id="reminder-editor-due-date" />
      </div>
      <div class="form-group">
        <label class="form-label">提前提醒（天）</label>
        <input type="number" class="form-input" value="3" data-ui-id="reminder-editor-advance-days" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">是否重复</label>
      <select class="form-input" data-ui-id="reminder-editor-repeat">
        <option>不重复</option>
        <option>每年</option>
        <option>每月</option>
        <option>每周</option>
      </select>
    </div>

    <button class="save-btn" data-ui-id="reminder-editor-save">保存</button>
    <button class="delete-btn" data-ui-id="reminder-editor-delete">删除提醒</button>
  </div>
</body>
</html>
