<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 · PawLog — 我的</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 12% 0%, #F0FDF9 0%, #F8FAFC 40%, #FFF6F7 100%);
      color: #0F172A;
      min-height: 100vh;
      padding-bottom: 100px;
    }
    .container { max-width: 390px; margin: 0 auto; padding: 0 20px; position: relative; }
    header { padding-top: 28px; margin-bottom: 20px; }
    header h1 { font-size: 22px; font-weight: 700; line-height: 1.24; }
    .profile-card {
      background: linear-gradient(160deg, #FFF1F2 0%, #FFFFFF 100%);
      border: 1px solid rgba(251,113,133,0.10);
      border-radius: 22px; padding: 22px;
      box-shadow: 0 8px 28px rgba(251,113,133,0.10);
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .profile-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #CCFBEF 0%, #FFE4E6 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(251,113,133,0.20);
    }
    .profile-info { flex: 1; }
    .profile-name { font-size: 20px; font-weight: 700; }
    .profile-meta { font-size: 13px; color: #64748B; margin-top: 4px; }
    .menu-card {
      background: #FFFFFF; border-radius: 22px; padding: 10px;
      box-shadow: 0 8px 28px rgba(15,23,42,0.06);
    }
    .menu-item {
      display: flex; align-items: center; gap: 14px; padding: 14px;
      border-radius: 16px;
    }
    .menu-item:not(:last-child) { border-bottom: 1px solid #F1F5F9; }
    .menu-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-mint { background: #F0FDF9; color: #14B8A6; }
    .icon-pink { background: #FFF1F2; color: #FB7185; }
    .icon-blue { background: #EFF6FF; color: #2563EB; }
    .icon-purple { background: #F3E8FF; color: #7C3AED; }
    .icon-gray { background: #F8FAFC; color: #64748B; }
    .menu-label { flex: 1; font-size: 15px; font-weight: 500; }
    .menu-arrow { color: #94A3B8; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; margin-top: 24px; }
    .summary-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .summary-card {
      background: #FFFFFF; border-radius: 20px; padding: 16px;
      box-shadow: 0 4px 16px rgba(15,23,42,0.04);
      text-align: center;
    }
    .summary-value { font-size: 24px; font-weight: 700; color: #14B8A6; }
    .summary-label { font-size: 12px; color: #64748B; margin-top: 4px; }
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto;
      max-width: 390px; height: 72px;
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(24px) saturate(180%);
      border-top: 0.5px solid rgba(0,0,0,0.04);
      box-shadow: 0 -4px 20px rgba(15,23,42,0.04);
      display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94A3B8; font-size: 11px; margin-top: 4px; }
    .tab-item.active { color: #14B8A6; }
    .fab-wrap { position: relative; top: -18px; }
    .fab-tab {
      width: 60px; height: 60px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #14B8A6 0%, #FB7185 100%);
      box-shadow: 0 10px 28px rgba(20,184,166,0.32), 0 4px 12px rgba(251,113,133,0.18);
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body data-page-id="profile-page" data-tab-id="tab-profile">
  <div class="container">
    <header>
      <h1>我的</h1>
    </header>

    <div class="profile-card">
      <div class="profile-avatar">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#FB7185" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>用户头像占位</title>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <div class="profile-info">
        <div class="profile-name">铲屎官</div>
        <div class="profile-meta">2 只毛孩子 · 家庭组成员</div>
      </div>
    </div>

    <div class="section-title">数据概览</div>
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-value">128</div>
        <div class="summary-label">总记录数</div>
      </div>
      <div class="summary-card">
        <div class="summary-value">5</div>
        <div class="summary-label">待办提醒</div>
      </div>
    </div>

    <div class="section-title">功能入口</div>
    <div class="menu-card">
      <div class="menu-item" data-ui-id="profile-pets-row">
        <div class="menu-icon icon-mint">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>宠物档案</title>
            <path d="M12 5c.67 0 1.35.09 2 .26 1.78-2 5.03-2.84 6.42-2.26 1.4.58-.42 7-.42 7 .57 1.07 1 2.24 1 3.44C21 17.9 16.97 21 12 21s-9-3.1-9-7.56c0-1.25.5-2.4 1-3.44 0 0-1.82-6.42-.42-7 1.39-.58 4.64.26 6.42 2.26.65-.17 1.33-.26 2-.26z"></path>
          </svg>
        </div>
        <span class="menu-label">宠物档案</span>
        <svg class="menu-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>进入宠物档案</title>
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
      <div class="menu-item" data-ui-id="profile-reminders-row">
        <div class="menu-icon icon-pink">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>提醒管理</title>
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
        </div>
        <span class="menu-label">提醒管理</span>
        <svg class="menu-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>进入提醒管理</title>
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
      <div class="menu-item" data-ui-id="profile-medical-row">
        <div class="menu-icon icon-blue">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>病历归档</title>
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="12" y1="18" x2="12" y2="12"></line>
            <line x1="9" y1="15" x2="15" y2="15"></line>
          </svg>
        </div>
        <span class="menu-label">病历归档</span>
        <svg class="menu-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>进入病历归档</title>
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
      <div class="menu-item" data-ui-id="profile-family-row">
        <div class="menu-icon icon-purple">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>家庭成员</title>
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
        </div>
        <span class="menu-label">家庭成员</span>
        <svg class="menu-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>进入家庭成员</title>
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
      <div class="menu-item" data-ui-id="profile-settings-row">
        <div class="menu-icon icon-gray">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>设置</title>
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </div>
        <span class="menu-label">设置</span>
        <svg class="menu-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>进入设置</title>
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
    </div>
  </div>

  <nav class="tab-bar" data-ui-id="profile-tab-bar">
    <button class="tab-item" data-ui-id="profile-tab-home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>今日首页</title>
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      今日
    </button>
    <button class="tab-item" data-ui-id="profile-tab-records">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>查看记录</title>
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <polyline points="10 9 9 9 8 9"></polyline>
      </svg>
      记录
    </button>
    <div class="fab-wrap">
      <button class="fab-tab" data-ui-id="profile-fab-add" aria-label="添加记录">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <title>添加新记录</title>
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>
    <button class="tab-item" data-ui-id="profile-tab-charts">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>查看趋势</title>
        <line x1="18" y1="20" x2="18" y2="10"></line>
        <line x1="12" y1="20" x2="12" y2="4"></line>
        <line x1="6" y1="20" x2="6" y2="14"></line>
      </svg>
      趋势
    </button>
    <button class="tab-item active" data-ui-id="profile-tab-profile">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>我的</title>
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      我的
    </button>
  </nav>
</body>
</html>
