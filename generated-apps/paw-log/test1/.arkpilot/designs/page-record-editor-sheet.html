<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 · PawLog — 记录编辑</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: rgba(15,23,42,0.25);
      min-height: 100vh;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .sheet {
      width: 100%; max-width: 390px;
      background: #FFFFFF;
      border-radius: 28px 28px 0 0;
      padding: 16px 20px 28px;
    }
    .drag-handle {
      width: 40px; height: 4px; border-radius: 2px; background: #E2E8F0; margin: 0 auto 16px;
    }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .sheet-title { font-size: 20px; font-weight: 700; }
    .close-btn { width: 32px; height: 32px; border-radius: 50%; background: #F1F5F9; border: none; display: flex; align-items: center; justify-content: center; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 13px; font-weight: 600; color: #64748B; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; height: 52px; border-radius: 14px; border: 1px solid transparent;
      background: #F8FAFC; padding: 0 16px; font-size: 15px; color: #334155;
    }
    .form-input:focus { outline: none; background: #F6FEFC; border-color: #14B8A6; box-shadow: 0 0 0 4px rgba(20,184,166,0.12); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .type-btn { padding: 12px 0; border-radius: 14px; border: none; background: #F1F5F9; color: #64748B; font-size: 13px; }
    .type-btn.active { background: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%); color: #FFFFFF; }
    .save-btn {
      width: 100%; height: 50px; border-radius: 25px; border: none;
      background: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%);
      color: #FFFFFF; font-size: 16px; font-weight: 600;
      box-shadow: 0 10px 24px rgba(20,184,166,0.28);
      margin-top: 8px;
    }
    .delete-btn {
      width: 100%; height: 44px; border-radius: 22px; border: none;
      background: #FFF1F2; color: #BE123C; font-size: 15px; font-weight: 600;
      margin-top: 10px;
    }
  </style>
</head>
<body data-page-id="record-editor-sheet">
  <div class="sheet">
    <div class="drag-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">添加记录</span>
      <button class="close-btn" data-ui-id="record-editor-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>关闭编辑</title>
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">记录类型</label>
      <div class="type-grid" data-ui-id="record-editor-type-picker">
        <button class="type-btn active">饮食</button>
        <button class="type-btn">排泄</button>
        <button class="type-btn">体重</button>
        <button class="type-btn">用药</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">选择宠物</label>
      <select class="form-input" data-ui-id="record-editor-pet-picker">
        <option>豆豆</option>
        <option>奶茶</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">时间</label>
      <input type="datetime-local" class="form-input" data-ui-id="record-editor-datetime" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">食量（g）</label>
        <input type="number" class="form-input" placeholder="80" data-ui-id="record-editor-food-amount" />
      </div>
      <div class="form-group">
        <label class="form-label">食物类型</label>
        <input type="text" class="form-input" placeholder="猫粮" data-ui-id="record-editor-food-type" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">备注</label>
      <input type="text" class="form-input" placeholder="补充说明..." data-ui-id="record-editor-note" />
    </div>

    <button class="save-btn" data-ui-id="record-editor-save">保存</button>
    <button class="delete-btn" data-ui-id="record-editor-delete">删除</button>
  </div>
</body>
</html>
