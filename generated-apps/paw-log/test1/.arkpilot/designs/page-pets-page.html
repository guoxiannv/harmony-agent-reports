<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 · PawLog — 宠物档案</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 12% 0%, #F0FDF9 0%, #F8FAFC 40%, #FFF6F7 100%);
      color: #0F172A;
      min-height: 100vh;
      padding-bottom: 120px;
    }
    .container { max-width: 390px; margin: 0 auto; padding: 0 20px; position: relative; }
    header { padding-top: 28px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 40px; height: 40px; border-radius: 50%; background: #FFFFFF; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(15,23,42,0.06); }
    header h1 { font-size: 22px; font-weight: 700; line-height: 1.24; }
    .pet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .pet-card {
      background: #FFFFFF; border-radius: 22px; padding: 16px;
      box-shadow: 0 8px 28px rgba(15,23,42,0.06); text-align: center;
    }
    .pet-avatar {
      width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 12px;
      background: linear-gradient(135deg, #CCFBEF 0%, #FFE4E6 100%);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #FFE4E6; box-shadow: 0 4px 12px rgba(251,113,133,0.20);
    }
    .pet-name { font-size: 17px; font-weight: 700; }
    .pet-breed { font-size: 12px; color: #64748B; margin-top: 2px; }
    .pet-meta { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
    .pet-meta-item { font-size: 11px; color: #64748B; background: #F8FAFC; padding: 4px 8px; border-radius: 8px; }
    .fab {
      position: fixed; bottom: 30px; right: calc(50% - 175px);
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #14B8A6 0%, #FB7185 100%);
      box-shadow: 0 10px 28px rgba(20,184,166,0.32), 0 4px 12px rgba(251,113,133,0.18);
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body data-page-id="pets-page">
  <div class="container">
    <header>
      <button class="back-btn" data-ui-id="pets-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>返回</title>
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <h1>宠物档案</h1>
    </header>

    <div class="pet-grid" data-ui-id="pets-list">
      <div class="pet-card" data-ui-id="pets-card-1">
        <div class="pet-avatar">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#14B8A6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>宠物豆豆</title>
            <path d="M12 5c.67 0 1.35.09 2 .26 1.78-2 5.03-2.84 6.42-2.26 1.4.58-.42 7-.42 7 .57 1.07 1 2.24 1 3.44C21 17.9 16.97 21 12 21s-9-3.1-9-7.56c0-1.25.5-2.4 1-3.44 0 0-1.82-6.42-.42-7 1.39-.58 4.64.26 6.42 2.26.65-.17 1.33-.26 2-.26z"></path>
          </svg>
        </div>
        <div class="pet-name">豆豆</div>
        <div class="pet-breed">英短 · 3 岁</div>
        <div class="pet-meta">
          <span class="pet-meta-item">4.8kg</span>
          <span class="pet-meta-item">已绝育</span>
        </div>
      </div>
      <div class="pet-card" data-ui-id="pets-card-2">
        <div class="pet-avatar">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#FB7185" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>宠物奶茶</title>
            <path d="M12 5c.67 0 1.35.09 2 .26 1.78-2 5.03-2.84 6.42-2.26 1.4.58-.42 7-.42 7 .57 1.07 1 2.24 1 3.44C21 17.9 16.97 21 12 21s-9-3.1-9-7.56c0-1.25.5-2.4 1-3.44 0 0-1.82-6.42-.42-7 1.39-.58 4.64.26 6.42 2.26.65-.17 1.33-.26 2-.26z"></path>
          </svg>
        </div>
        <div class="pet-name">奶茶</div>
        <div class="pet-breed">布偶 · 2 岁</div>
        <div class="pet-meta">
          <span class="pet-meta-item">5.2kg</span>
          <span class="pet-meta-item">未绝育</span>
        </div>
      </div>
    </div>
  </div>

  <button class="fab" data-ui-id="pets-add-button" aria-label="添加宠物">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <title>添加新宠物</title>
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
  </button>
</body>
</html>
