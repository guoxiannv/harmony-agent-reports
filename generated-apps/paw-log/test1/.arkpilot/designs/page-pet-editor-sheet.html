<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 · PawLog — 宠物编辑</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: rgba(15,23,42,0.25);
      min-height: 100vh;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .sheet {
      width: 100%; max-width: 390px;
      background: #FFFFFF;
      border-radius: 28px 28px 0 0;
      padding: 16px 20px 28px;
    }
    .drag-handle { width: 40px; height: 4px; border-radius: 2px; background: #E2E8F0; margin: 0 auto 16px; }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .sheet-title { font-size: 20px; font-weight: 700; }
    .close-btn { width: 32px; height: 32px; border-radius: 50%; background: #F1F5F9; border: none; display: flex; align-items: center; justify-content: center; }
    .avatar-picker {
      width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 20px;
      background: linear-gradient(135deg, #CCFBEF 0%, #FFE4E6 100%);
      border: 2px dashed #CBD5E1; display: flex; align-items: center; justify-content: center;
    }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 600; color: #64748B; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; height: 50px; border-radius: 14px; border: 1px solid transparent; background: #F8FAFC; padding: 0 16px; font-size: 15px; }
    .form-input:focus { outline: none; background: #F6FEFC; border-color: #14B8A6; box-shadow: 0 0 0 4px rgba(20,184,166,0.12); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .save-btn {
      width: 100%; height: 50px; border-radius: 25px; border: none;
      background: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%);
      color: #FFFFFF; font-size: 16px; font-weight: 600;
      box-shadow: 0 10px 24px rgba(20,184,166,0.28);
      margin-top: 8px;
    }
    .delete-btn { width: 100%; height: 44px; border-radius: 22px; border: none; background: #FFF1F2; color: #BE123C; font-size: 15px; font-weight: 600; margin-top: 10px; }
  </style>
</head>
<body data-page-id="pet-editor-sheet">
  <div class="sheet">
    <div class="drag-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">编辑宠物档案</span>
      <button class="close-btn" data-ui-id="pet-editor-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>关闭编辑</title>
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="avatar-picker" data-ui-id="pet-editor-avatar-picker">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>选择宠物头像</title>
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="13" r="4"></circle>
      </svg>
    </div>

    <div class="form-group">
      <label class="form-label">名字</label>
      <input type="text" class="form-input" value="豆豆" data-ui-id="pet-editor-name" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">物种</label>
        <select class="form-input" data-ui-id="pet-editor-species">
          <option>猫</option>
          <option>狗</option>
          <option>其他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">品种</label>
        <input type="text" class="form-input" value="英国短毛猫" data-ui-id="pet-editor-breed" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">生日</label>
        <input type="date" class="form-input" data-ui-id="pet-editor-birthday" />
      </div>
      <div class="form-group">
        <label class="form-label">性别</label>
        <select class="form-input" data-ui-id="pet-editor-gender">
          <option>公</option>
          <option>母</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">当前体重（kg）</label>
      <input type="number" class="form-input" value="4.8" data-ui-id="pet-editor-weight" />
    </div>

    <div class="form-group">
      <label class="form-label">是否绝育</label>
      <select class="form-input" data-ui-id="pet-editor-neutered">
        <option>已绝育</option>
        <option>未绝育</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">基础病史/过敏</label>
      <input type="text" class="form-input" placeholder="无" data-ui-id="pet-editor-medical-history" />
    </div>

    <button class="save-btn" data-ui-id="pet-editor-save">保存</button>
    <button class="delete-btn" data-ui-id="pet-editor-delete">删除档案</button>
  </div>
</body>
</html>
