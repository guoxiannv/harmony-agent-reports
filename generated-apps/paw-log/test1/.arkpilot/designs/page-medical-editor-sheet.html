<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 · PawLog — 病历编辑</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: rgba(15,23,42,0.25);
      min-height: 100vh;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .sheet {
      width: 100%; max-width: 390px;
      background: #FFFFFF;
      border-radius: 28px 28px 0 0;
      padding: 16px 20px 28px;
    }
    .drag-handle { width: 40px; height: 4px; border-radius: 2px; background: #E2E8F0; margin: 0 auto 16px; }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .sheet-title { font-size: 20px; font-weight: 700; }
    .close-btn { width: 32px; height: 32px; border-radius: 50%; background: #F1F5F9; border: none; display: flex; align-items: center; justify-content: center; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 600; color: #64748B; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; height: 50px; border-radius: 14px; border: 1px solid transparent; background: #F8FAFC; padding: 0 16px; font-size: 15px; }
    .form-input:focus { outline: none; background: #F6FEFC; border-color: #14B8A6; box-shadow: 0 0 0 4px rgba(20,184,166,0.12); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .image-picker {
      width: 100%; height: 70px; border-radius: 14px; border: 2px dashed #CBD5E1;
      background: #F8FAFC; display: flex; align-items: center; justify-content: center; gap: 6px;
      color: #64748B; font-size: 14px;
    }
    .image-list { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .image-thumb { width: 70px; height: 70px; border-radius: 12px; background: linear-gradient(135deg, #F0FDF9 0%, #FFF1F2 100%); display: flex; align-items: center; justify-content: center; color: #94A3B8; font-size: 11px; }
    .save-btn { width: 100%; height: 50px; border-radius: 25px; border: none; background: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%); color: #FFFFFF; font-size: 16px; font-weight: 600; box-shadow: 0 10px 24px rgba(20,184,166,0.28); margin-top: 8px; }
    .delete-btn { width: 100%; height: 44px; border-radius: 22px; border: none; background: #FFF1F2; color: #BE123C; font-size: 15px; font-weight: 600; margin-top: 10px; }
  </style>
</head>
<body data-page-id="medical-editor-sheet">
  <div class="sheet">
    <div class="drag-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">编辑病历</span>
      <button class="close-btn" data-ui-id="medical-editor-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>关闭编辑</title>
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">选择宠物</label>
      <select class="form-input" data-ui-id="medical-editor-pet-picker">
        <option>豆豆</option>
        <option>奶茶</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">就诊日期</label>
        <input type="date" class="form-input" data-ui-id="medical-editor-date" />
      </div>
      <div class="form-group">
        <label class="form-label">医院</label>
        <input type="text" class="form-input" value="宠爱动物医院" data-ui-id="medical-editor-hospital" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">医生</label>
      <input type="text" class="form-input" value="李医生" data-ui-id="medical-editor-doctor" />
    </div>

    <div class="form-group">
      <label class="form-label">症状</label>
      <input type="text" class="form-input" placeholder="描述症状..." data-ui-id="medical-editor-symptom" />
    </div>

    <div class="form-group">
      <label class="form-label">诊断</label>
      <input type="text" class="form-input" value="健康，建议维持当前饮食" data-ui-id="medical-editor-diagnosis" />
    </div>

    <div class="form-group">
      <label class="form-label">处方/用药</label>
      <input type="text" class="form-input" placeholder="无" data-ui-id="medical-editor-prescription" />
    </div>

    <div class="form-group">
      <label class="form-label">图片</label>
      <button class="image-picker" data-ui-id="medical-editor-image-picker">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>上传病历图片</title>
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
        上传图片
      </button>
      <div class="image-list" data-ui-id="medical-editor-image-list">
        <div class="image-thumb" data-ui-id="medical-editor-image-0">化验单</div>
        <div class="image-thumb" data-ui-id="medical-editor-image-1">病历</div>
      </div>
    </div>

    <button class="save-btn" data-ui-id="medical-editor-save">保存</button>
    <button class="delete-btn" data-ui-id="medical-editor-delete">删除病历</button>
  </div>
</body>
</html>
