<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 · PawLog — 记录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 12% 0%, #F0FDF9 0%, #F8FAFC 40%, #FFF6F7 100%);
      color: #0F172A;
      min-height: 100vh;
      padding-bottom: 100px;
    }
    .container { max-width: 390px; margin: 0 auto; padding: 0 20px; position: relative; }
    header { padding-top: 28px; margin-bottom: 16px; }
    header h1 { font-size: 22px; font-weight: 700; line-height: 1.24; }
    .filter-bar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(255,255,255,0.74);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 18px; padding: 12px; margin-bottom: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .filter-row { display: flex; gap: 8px; overflow-x: auto; }
    .filter-chip {
      flex-shrink: 0; padding: 8px 14px; border-radius: 20px;
      background: #F1F5F9; color: #64748B; font-size: 13px; border: none;
    }
    .filter-chip.active { background: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%); color: #FFFFFF; }
    .clear-btn { font-size: 12px; color: #14B8A6; background: transparent; border: none; align-self: flex-end; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; margin-top: 8px; }
    .timeline { display: flex; flex-direction: column; gap: 14px; }
    .timeline-item { display: flex; gap: 12px; }
    .timeline-left { display: flex; flex-direction: column; align-items: center; width: 32px; }
    .timeline-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .timeline-dot.food { background: #F0FDF9; color: #14B8A6; }
    .timeline-dot.waste { background: #FFEDD5; color: #C2410C; }
    .timeline-dot.weight { background: #EFF6FF; color: #2563EB; }
    .timeline-dot.medicine { background: #F3E8FF; color: #7C3AED; }
    .timeline-line { flex: 1; width: 2px; background: #E2E8F0; margin-top: 6px; }
    .timeline-card {
      flex: 1; background: #FFFFFF; border-radius: 18px; padding: 14px;
      box-shadow: 0 4px 16px rgba(15,23,42,0.04);
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-time { font-size: 12px; color: #94A3B8; }
    .card-body { font-size: 13px; color: #64748B; }
    .card-tags { display: flex; gap: 6px; margin-top: 8px; }
    .tag { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 8px; }
    .tag-food { background: #F0FDF9; color: #0F766E; }
    .tag-waste { background: #FFEDD5; color: #9A3412; }
    .tag-weight { background: #EFF6FF; color: #1E40AF; }
    .tag-medicine { background: #F3E8FF; color: #6B21A8; }
    .fab {
      position: fixed; bottom: 90px; right: calc(50% - 175px);
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #14B8A6 0%, #FB7185 100%);
      box-shadow: 0 10px 28px rgba(20,184,166,0.32), 0 4px 12px rgba(251,113,133,0.18);
      display: flex; align-items: center; justify-content: center;
    }
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto;
      max-width: 390px; height: 72px;
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(24px) saturate(180%);
      border-top: 0.5px solid rgba(0,0,0,0.04);
      box-shadow: 0 -4px 20px rgba(15,23,42,0.04);
      display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94A3B8; font-size: 11px; margin-top: 4px; }
    .tab-item.active { color: #14B8A6; }
    .fab-wrap { position: relative; top: -18px; }
    .fab-tab {
      width: 60px; height: 60px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #14B8A6 0%, #FB7185 100%);
      box-shadow: 0 10px 28px rgba(20,184,166,0.32), 0 4px 12px rgba(251,113,133,0.18);
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body data-page-id="records-page" data-tab-id="tab-records">
  <div class="container">
    <header>
      <h1>记录</h1>
    </header>

    <div class="filter-bar">
      <div class="filter-row" data-ui-id="records-filter-pet">
        <button class="filter-chip active">全部宠物</button>
        <button class="filter-chip">豆豆</button>
        <button class="filter-chip">奶茶</button>
      </div>
      <div class="filter-row" data-ui-id="records-filter-type">
        <button class="filter-chip active">全部</button>
        <button class="filter-chip">饮食</button>
        <button class="filter-chip">排泄</button>
        <button class="filter-chip">体重</button>
        <button class="filter-chip">用药</button>
      </div>
      <div class="filter-row" data-ui-id="records-filter-date-range">
        <button class="filter-chip active">最近 7 天</button>
        <button class="filter-chip">最近 30 天>/button>
        <button class="filter-chip">自定义</button>
      </div>
      <button class="clear-btn" data-ui-id="records-clear-filters">清空筛选</button>
    </div>

    <div class="section-title">今天</div>
    <div class="timeline" data-ui-id="records-list">
      <div class="timeline-item" data-ui-id="records-item-1">
        <div class="timeline-left">
          <div class="timeline-dot food">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>饮食记录</title>
              <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
              <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
              <line x1="6" y1="2" x2="6" y2="4"></line>
              <line x1="10" y1="2" x2="10" y2="4"></line>
              <line x1="14" y1="2" x2="14" y2="4"></line>
            </svg>
          </div>
          <div class="timeline-line"></div>
        </div>
        <div class="timeline-card">
          <div class="card-header">
            <span class="card-title">豆豆吃了 80g 猫粮</span>
            <span class="card-time">08:30</span>
          </div>
          <div class="card-body">早餐，胃口不错，全部吃完</div>
          <div class="card-tags">
            <span class="tag tag-food">饮食</span>
            <span class="tag">80g</span>
          </div>
        </div>
      </div>

      <div class="timeline-item" data-ui-id="records-item-2">
        <div class="timeline-left">
          <div class="timeline-dot waste">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>排泄记录</title>
              <path d="M12 22c4.97 0 9-3.1 9-7.56 0-1.25-.5-2.4-1-3.44 0 0 1.82-6.42.42-7C19.03 3.42 15.78 4.26 14 6.26c-.65-.17-1.33-.26-2-.26s-1.35.09-2 .26C8.22 4.26 4.97 3.42 3.58 4 2.18 4.58 4 11 4 11c-.5 1.04-1 2.19-1 3.44C3 18.9 7.03 22 12 22z"></path>
            </svg>
          </div>
          <div class="timeline-line"></div>
        </div>
        <div class="timeline-card">
          <div class="card-header">
            <span class="card-title">奶茶排泄正常</span>
            <span class="card-time">07:45</span>
          </div>
          <div class="card-body">小便 1 次，猫砂盆已清理</div>
          <div class="card-tags">
            <span class="tag tag-waste">排泄</span>
          </div>
        </div>
      </div>

      <div class="timeline-item" data-ui-id="records-item-3">
        <div class="timeline-left">
          <div class="timeline-dot weight">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>体重记录</title>
              <path d="M12 22c4.97 0 9-3.1 9-7.56 0-1.25-.5-2.4-1-3.44 0 0 1.82-6.42.42-7C19.03 3.42 15.78 4.26 14 6.26c-.65-.17-1.33-.26-2-.26s-1.35.09-2 .26C8.22 4.26 4.97 3.42 3.58 4 2.18 4.58 4 11 4 11c-.5 1.04-1 2.19-1 3.44C3 18.9 7.03 22 12 22z"></path>
              <path d="M12 14v-4"></path>
              <path d="M8 14v-2"></path>
              <path d="M16 14v-2"></path>
            </svg>
          </div>
          <div class="timeline-line"></div>
        </div>
        <div class="timeline-card">
          <div class="card-header">
            <span class="card-title">豆豆体重 4.8kg</span>
            <span class="card-time">昨天</span>
          </div>
          <div class="card-body">比上周减少 0.1kg，保持稳定</div>
          <div class="card-tags">
            <span class="tag tag-weight">体重</span>
            <span class="tag">4.8kg</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button class="fab" data-ui-id="records-add-button" aria-label="添加记录">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <title>添加新记录</title>
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
  </button>

  <nav class="tab-bar" data-ui-id="records-tab-bar">
    <button class="tab-item" data-ui-id="records-tab-home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>今日首页</title>
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      今日
    </button>
    <button class="tab-item active" data-ui-id="records-tab-records">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>查看记录</title>
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <polyline points="10 9 9 9 8 9"></polyline>
      </svg>
      记录
    </button>
    <div class="fab-wrap">
      <button class="fab-tab" data-ui-id="records-fab-add" aria-label="添加记录">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <title>添加新记录</title>
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>
    <button class="tab-item" data-ui-id="records-tab-charts">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>查看趋势</title>
        <line x1="18" y1="20" x2="18" y2="10"></line>
        <line x1="12" y1="20" x2="12" y2="4"></line>
        <line x1="6" y1="20" x2="6" y2="14"></line>
      </svg>
      趋势
    </button>
    <button class="tab-item" data-ui-id="records-tab-profile">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>我的</title>
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      我的
    </button>
  </nav>
</body>
</html>
