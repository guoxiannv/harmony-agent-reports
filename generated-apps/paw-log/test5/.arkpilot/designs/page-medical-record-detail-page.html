<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PawLog 宠迹 - 病历详情</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: #FFFBF6;
      color: #3A3630;
      min-height: 100vh;
    }
    .phone-frame {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: #FFFBF6;
      overflow-x: hidden;
      padding-bottom: 24px;
    }
    .header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid rgba(126,215,194,0.12);
    }
    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: #E8FAF5;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
    }
    .back-btn svg { width: 20px; height: 20px; color: #4CB5A0; }
    .header-title { font-size: 18px; font-weight: 700; color: #3A3630; }
    .edit-btn {
      padding: 8px 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #FFB8C9, #F48FB1);
      color: white;
      font-size: 14px;
      font-weight: 700;
      border: none;
      box-shadow: 0 4px 10px rgba(244,143,177,0.24);
    }
    .content { padding: 20px 16px; }
    .detail-card {
      background: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(126,215,194,0.14);
    }
    .detail-title {
      font-size: 20px;
      font-weight: 700;
      color: #3A3630;
      margin-bottom: 4px;
    }
    .detail-meta {
      font-size: 13px;
      color: #5C5750;
      margin-bottom: 16px;
    }
    .detail-section { margin-bottom: 16px; }
    .detail-section:last-child { margin-bottom: 0; }
    .detail-label {
      font-size: 12px;
      font-weight: 700;
      color: #C4BEB4;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .detail-value {
      font-size: 15px;
      color: #3A3630;
      line-height: 1.5;
    }
    .detail-tags { display: flex; gap: 8px; margin-top: 8px; }
    .tag {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 10px;
      background: #E8FAF5;
      color: #4CB5A0;
      font-weight: 600;
    }
    .attachment-list {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .attachment-thumb {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      background: #FFF8F0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .attachment-thumb svg { width: 28px; height: 28px; color: #C4BEB4; }
  </style>
</head>
<body>
  <div class="phone-frame" data-page-id="medical-record-detail-page">
    <header class="header">
      <button class="back-btn" data-ui-id="medical-detail-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Back to Previous Page</title>
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <span class="header-title">病历详情</span>
      <button class="edit-btn" data-ui-id="medical-detail-edit">编辑</button>
    </header>

    <main class="content">
      <div class="detail-card">
        <div class="detail-title" data-ui-id="medical-detail-title">年度体检</div>
        <div class="detail-meta" data-ui-id="medical-detail-date">宠康动物医院 · 王医生 · 2026.03.08 · ¥380.00</div>

        <div class="detail-section">
          <div class="detail-label">诊断</div>
          <div class="detail-value" data-ui-id="medical-detail-diagnosis">年度体检，血常规、生化指标均正常。牙齿健康良好，建议继续保持每年一次体检频率。</div>
        </div>

        <div class="detail-section">
          <div class="detail-label">处方/用药</div>
          <div class="detail-value" data-ui-id="medical-detail-prescription">无需用药，建议继续保持现有饮食与运动习惯。</div>
        </div>

        <div class="detail-section">
          <div class="detail-label">费用</div>
          <div class="detail-value" data-ui-id="medical-detail-cost">¥380.00</div>
        </div>

        <div class="detail-section">
          <div class="detail-label">标签</div>
          <div class="detail-tags">
            <span class="tag">体检</span>
            <span class="tag">血常规正常</span>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">附件照片</div>
          <div class="attachment-list" data-ui-id="medical-detail-attachments">
            <div class="attachment-thumb">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <title>Medical Attachment Thumbnail</title>
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
