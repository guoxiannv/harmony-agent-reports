<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PawLog 宠迹 - 家庭成员邀请</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: #FFFBF6;
      color: #3A3630;
      min-height: 100vh;
    }
    .phone-frame {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: #FFFBF6;
      overflow-x: hidden;
      padding-bottom: 24px;
    }
    .header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid rgba(126,215,194,0.12);
    }
    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: #E8FAF5;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
    }
    .back-btn svg { width: 20px; height: 20px; color: #4CB5A0; }
    .header-title { font-size: 18px; font-weight: 700; color: #3A3630; }
    .save-btn {
      padding: 8px 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7ED7C2, #5EC9B3);
      color: white;
      font-size: 14px;
      font-weight: 700;
      border: none;
      box-shadow: 0 4px 10px rgba(76,181,160,0.24);
    }
    .content { padding: 20px 16px; }
    .invite-card {
      background: linear-gradient(135deg, #E8FAF5, #FFF0F3);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(126,215,194,0.14);
    }
    .invite-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 4px 12px rgba(126,215,194,0.16);
    }
    .invite-icon svg { width: 32px; height: 32px; color: #4CB5A0; }
    .invite-title { font-size: 18px; font-weight: 700; color: #3A3630; margin-bottom: 6px; }
    .invite-desc { font-size: 13px; color: #5C5750; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #5C5750;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 15px 17px;
      border-radius: 16px;
      border: 1px solid rgba(126,215,194,0.15);
      background: #FFF8F0;
      font-size: 15px;
      color: #3A3630;
      outline: none;
    }
    .form-input:focus { border-color: #7ED7C2; }
    .radio-group {
      display: flex;
      gap: 10px;
    }
    .radio-chip {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      border-radius: 14px;
      background: #FFF8F0;
      border: 1px solid rgba(126,215,194,0.15);
      font-size: 14px;
      font-weight: 600;
      color: #5C5750;
    }
    .radio-chip.active {
      background: linear-gradient(135deg, #7ED7C2, #5EC9B3);
      color: white;
      border-color: transparent;
    }
    .code-box {
      background: white;
      border-radius: 18px;
      padding: 18px;
      text-align: center;
      margin-top: 8px;
      box-shadow: 0 4px 14px rgba(126,215,194,0.10);
    }
    .code-label { font-size: 12px; color: #5C5750; margin-bottom: 8px; }
    .code-value {
      font-size: 28px;
      font-weight: 700;
      color: #4CB5A0;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    .code-actions {
      display: flex;
      gap: 10px;
    }
    .code-btn {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      border: none;
    }
    .code-btn.primary {
      background: linear-gradient(135deg, #7ED7C2, #5EC9B3);
      color: white;
    }
    .code-btn.secondary {
      background: #FFF8F0;
      color: #5C5750;
    }
  </style>
</head>
<body>
  <div class="phone-frame" data-page-id="member-invite-page">
    <header class="header">
      <button class="back-btn" data-ui-id="member-invite-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Back to Previous Page</title>
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <span class="header-title">邀请家庭成员</span>
      <button class="save-btn" data-ui-id="member-invite-save">保存</button>
    </header>

    <main class="content">
      <div class="invite-card">
        <div class="invite-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>Invite Family Member Illustration</title>
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="invite-title">一起记录毛孩子的成长</div>
        <div class="invite-desc">邀请家人加入后，所有人都可以查看和添加记录</div>
      </div>

      <div class="form-group">
        <label class="form-label">成员昵称</label>
        <input class="form-input" type="text" placeholder="例如：妈妈、室友" data-ui-id="member-invite-name" />
      </div>

      <div class="form-group">
        <label class="form-label">角色权限</label>
        <div class="radio-group" data-ui-id="member-invite-role">
          <button class="radio-chip active">协作者</button>
          <button class="radio-chip">管理员</button>
        </div>
      </div>

      <div class="code-box">
        <div class="code-label">邀请码</div>
        <div class="code-value" data-ui-id="member-invite-code">PAW-8876</div>
        <div class="code-actions">
          <button class="code-btn primary" data-ui-id="member-invite-generate">重新生成</button>
          <button class="code-btn secondary" data-ui-id="member-invite-copy">复制</button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
