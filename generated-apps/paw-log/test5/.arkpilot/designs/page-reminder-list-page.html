<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PawLog 宠迹 - 全部提醒</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: #FFFBF6;
      color: #3A3630;
      min-height: 100vh;
    }
    .phone-frame {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: #FFFBF6;
      overflow-x: hidden;
      padding-bottom: 24px;
    }
    .header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid rgba(126,215,194,0.12);
    }
    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: #E8FAF5;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
    }
    .back-btn svg { width: 20px; height: 20px; color: #4CB5A0; }
    .header-title { font-size: 18px; font-weight: 700; color: #3A3630; }
    .content { padding: 16px; }
    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: #5C5750;
      margin: 8px 0 12px;
    }
    .reminder-card {
      background: white;
      border-radius: 20px;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: 0 6px 18px rgba(126,215,194,0.10);
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 4px solid #FFB8C9;
    }
    .reminder-card.warning { border-left-color: #F5D485; }
    .reminder-card.danger { border-left-color: #E88C8C; }
    .reminder-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #FFB8C9, #F48FB1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .reminder-icon.warning { background: linear-gradient(135deg, #F5D485, #E8C468); }
    .reminder-icon.danger { background: linear-gradient(135deg, #E88C8C, #D97373); }
    .reminder-icon svg { width: 22px; height: 22px; color: white; }
    .reminder-main { flex: 1; }
    .reminder-title { font-size: 15px; font-weight: 700; color: #3A3630; }
    .reminder-meta { font-size: 12px; color: #5C5750; margin-top: 2px; }
    .reminder-action {
      padding: 8px 14px;
      border-radius: 12px;
      background: #E8FAF5;
      color: #4CB5A0;
      font-size: 12px;
      font-weight: 700;
      border: none;
      white-space: nowrap;
    }
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: #C4BEB4;
    }
    .empty-state svg { width: 72px; height: 72px; margin-bottom: 14px; opacity: 0.5; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>
  <div class="phone-frame" data-page-id="reminder-list-page">
    <header class="header">
      <button class="back-btn" data-ui-id="reminder-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Back to Previous Page</title>
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <span class="header-title">全部提醒</span>
      <div style="width:40px"></div>
    </header>

    <main class="content">
      <div class="section-title">即将到期</div>
      <div class="reminder-list" data-ui-id="reminder-list">
        <div class="reminder-card" id="reminder-item-1">
          <div class="reminder-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Vaccination Reminder Icon</title>
              <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
              <path d="M12 6v6l4 2"/>
            </svg>
          </div>
          <div class="reminder-main">
            <div class="reminder-title">猫三联疫苗</div>
            <div class="reminder-meta">豆包 · 06/27 到期 · 宠康动物医院</div>
          </div>
          <button class="reminder-action" data-ui-id="reminder-mark-done">完成</button>
        </div>

        <div class="reminder-card warning" id="reminder-item-2">
          <div class="reminder-icon warning">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Deworm Reminder Icon</title>
              <path d="M12 2a5 5 0 0 0-5 5v2H5v2h14V9h-2V7a5 5 0 0 0-5-5z"/>
              <path d="M8 13v7a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-7"/>
            </svg>
          </div>
          <div class="reminder-main">
            <div class="reminder-title">体内外驱虫</div>
            <div class="reminder-meta">豆包 · 07/10 到期 · 大宠爱</div>
          </div>
          <button class="reminder-action" data-ui-id="reminder-mark-done">完成</button>
        </div>
      </div>

      <div class="empty-state" id="reminder-empty" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C4BEB4" stroke-width="1.5">
          <title>No Reminders Placeholder</title>
          <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <p>暂无提醒，毛孩子很健康 🎉</p>
      </div>
    </main>
  </div>
</body>
</html>
