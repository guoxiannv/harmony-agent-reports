<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PawLog 宠迹 - 记录编辑</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: #FFFBF6;
      color: #3A3630;
      min-height: 100vh;
    }
    .phone-frame {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: #FFFBF6;
      overflow-x: hidden;
      padding-bottom: 24px;
    }
    .header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid rgba(126,215,194,0.12);
    }
    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: #E8FAF5;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
    }
    .back-btn svg { width: 20px; height: 20px; color: #4CB5A0; }
    .header-title { font-size: 18px; font-weight: 700; color: #3A3630; }
    .save-btn {
      padding: 8px 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7ED7C2, #5EC9B3);
      color: white;
      font-size: 14px;
      font-weight: 700;
      border: none;
      box-shadow: 0 4px 10px rgba(76,181,160,0.24);
    }
    .content { padding: 20px 16px; }
    .category-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .category-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 16px;
      background: white;
      border: 1px solid rgba(126,215,194,0.15);
      font-size: 13px;
      font-weight: 700;
      color: #5C5750;
      white-space: nowrap;
    }
    .category-tab.active {
      background: linear-gradient(135deg, #7ED7C2, #5EC9B3);
      color: white;
      border-color: transparent;
    }
    .category-tab svg { width: 16px; height: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #5C5750;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 15px 17px;
      border-radius: 16px;
      border: 1px solid rgba(126,215,194,0.15);
      background: #FFF8F0;
      font-size: 15px;
      color: #3A3630;
      outline: none;
    }
    .form-input:focus { border-color: #7ED7C2; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .radio-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .radio-chip {
      padding: 10px 16px;
      border-radius: 14px;
      background: #FFF8F0;
      border: 1px solid rgba(126,215,194,0.15);
      font-size: 14px;
      font-weight: 600;
      color: #5C5750;
    }
    .radio-chip.active {
      background: linear-gradient(135deg, #7ED7C2, #5EC9B3);
      color: white;
      border-color: transparent;
    }
    textarea.form-input {
      min-height: 100px;
      resize: none;
    }
    .delete-btn {
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      border-radius: 18px;
      background: #FFF0F3;
      color: #F48FB1;
      font-size: 15px;
      font-weight: 700;
      border: none;
    }
  </style>
</head>
<body>
  <div class="phone-frame" data-page-id="record-editor-page">
    <header class="header">
      <button class="back-btn" data-ui-id="record-editor-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Back to Previous Page</title>
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <span class="header-title">添加记录</span>
      <button class="save-btn" data-ui-id="record-editor-save">保存</button>
    </header>

    <main class="content">
      <div class="category-tabs" data-ui-id="record-editor-category">
        <button class="category-tab active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>Food Category</title>
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          </svg>
          饮食
        </button>
        <button class="category-tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>Toilet Category</title>
            <path d="M12 2a5 5 0 0 0-5 5v2H5v2h14V9h-2V7a5 5 0 0 0-5-5z"/>
            <path d="M8 13v7a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-7"/>
          </svg>
          排泄
        </button>
        <button class="category-tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>Weight Category</title>
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
          体重
        </button>
        <button class="category-tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>Medicine Category</title>
            <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          </svg>
          用药
        </button>
      </div>

      <div class="form-group">
        <label class="form-label">选择宠物</label>
        <select class="form-input" data-ui-id="record-editor-pet">
          <option>豆包</option>
          <option>汤圆</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">时间</label>
        <input class="form-input" type="datetime-local" data-ui-id="record-editor-time" />
      </div>

      <div class="form-group">
        <label class="form-label">食物类型</label>
        <input class="form-input" type="text" placeholder="例如：猫粮、罐头" value="猫粮" data-ui-id="record-editor-food-type" />
      </div>

      <div class="form-group">
        <label class="form-label">分量</label>
        <input class="form-input" type="text" placeholder="例如：80g、1罐" value="80g" data-ui-id="record-editor-food-amount" />
      </div>

      <div class="form-group">
        <label class="form-label">备注</label>
        <textarea class="form-input" placeholder="补充信息..." data-ui-id="record-editor-notes"></textarea>
      </div>

      <button class="delete-btn" data-ui-id="record-editor-delete">删除此记录</button>
    </main>
  </div>
</body>
</html>
