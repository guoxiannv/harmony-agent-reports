<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PawLog 宠迹 - 首页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: #FFFBF6;
      color: #3A3630;
      min-height: 100vh;
    }
    .phone-frame {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: linear-gradient(160deg, #E8FAF5 0%, #FFF0F3 45%, #FFFBF6 100%);
      overflow-x: hidden;
      padding-bottom: 92px;
    }
    .header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid rgba(126,215,194,0.12);
    }
    .pet-switcher {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.9);
      padding: 6px 14px 6px 6px;
      border-radius: 24px;
      box-shadow: 0 4px 12px rgba(126,215,194,0.14);
      border: 1px solid rgba(126,215,194,0.15);
    }
    .pet-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E8FAF5, #FFF0F3);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(126,215,194,0.18);
    }
    .pet-avatar svg { width: 22px; height: 22px; }
    .pet-info { display: flex; flex-direction: column; }
    .pet-name { font-size: 15px; font-weight: 700; color: #3A3630; }
    .pet-breed { font-size: 11px; color: #5C5750; }
    .chevron { width: 16px; height: 16px; color: #4CB5A0; }
    .header-action {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(126,215,194,0.12);
      position: relative;
    }
    .badge {
      position: absolute;
      top: 6px;
      right: 6px;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      background: linear-gradient(135deg, #FFB8C9, #F48FB1);
      color: white;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      box-shadow: 0 2px 6px rgba(244,143,177,0.28);
    }
    .content { padding: 16px; }
    .greeting {
      font-size: 22px;
      font-weight: 700;
      color: #3A3630;
      margin-bottom: 4px;
    }
    .sub-greeting {
      font-size: 14px;
      color: #5C5750;
      margin-bottom: 16px;
    }
    .reminder-banner {
      background: linear-gradient(135deg, #FFF0F3 0%, #FFFFFF 100%);
      border-radius: 20px;
      padding: 14px 16px;
      margin-bottom: 16px;
      border-left: 4px solid #FFB8C9;
      box-shadow: 0 8px 22px rgba(255,184,201,0.18);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .reminder-left { display: flex; align-items: center; gap: 12px; }
    .reminder-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #FFB8C9, #F48FB1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(244,143,177,0.24);
    }
    .reminder-icon svg { width: 24px; height: 24px; color: white; }
    .reminder-title { font-size: 15px; font-weight: 700; color: #3A3630; }
    .reminder-sub { font-size: 12px; color: #5C5750; margin-top: 2px; }
    .reminder-arrow { width: 20px; height: 20px; color: #F48FB1; }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #3A3630;
      margin: 20px 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-link { font-size: 13px; color: #4CB5A0; font-weight: 600; }
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .quick-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .quick-icon {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 22px rgba(126,215,194,0.16);
      border: 1px solid rgba(126,215,194,0.10);
    }
    .quick-icon svg { width: 32px; height: 32px; }
    .quick-icon.pink { box-shadow: 0 8px 22px rgba(255,184,201,0.16); border-color: rgba(255,184,201,0.10); }
    .quick-icon.mint svg { color: #4CB5A0; }
    .quick-icon.pink svg { color: #F48FB1; }
    .quick-icon.yellow svg { color: #D4A843; }
    .quick-icon.blue svg { color: #5AA7C9; }
    .quick-label { font-size: 11px; color: #5C5750; font-weight: 600; }
    .summary-card {
      background: #FFF8F0;
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 6px 18px rgba(126,215,194,0.10);
    }
    .summary-title { font-size: 15px; font-weight: 700; color: #3A3630; margin-bottom: 12px; }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .summary-item {
      background: white;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .summary-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #7ED7C2;
    }
    .summary-dot.pink { background: #FFB8C9; }
    .summary-dot.yellow { background: #F5D485; }
    .summary-dot.blue { background: #8AC4E6; }
    .summary-label { font-size: 12px; color: #5C5750; }
    .summary-value { font-size: 18px; font-weight: 700; color: #3A3630; }
    .record-card {
      background: white;
      border-radius: 20px;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: 0 6px 18px rgba(126,215,194,0.10);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .record-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: #E8FAF5;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .record-icon svg { width: 22px; height: 22px; color: #4CB5A0; }
    .record-main { flex: 1; }
    .record-title { font-size: 15px; font-weight: 700; color: #3A3630; }
    .record-meta { font-size: 12px; color: #5C5750; margin-top: 2px; }
    .record-time { font-size: 12px; color: #C4BEB4; }
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #C4BEB4;
    }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state p { font-size: 14px; }
    .tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      margin: 0 auto;
      max-width: 390px;
      height: 76px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(24px) saturate(160%);
      border-radius: 28px 28px 0 0;
      border-top: 1px solid rgba(126,215,194,0.12);
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding-top: 10px;
      z-index: 20;
      box-shadow: 0 -6px 20px rgba(126,215,194,0.10);
    }
    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding-top: 4px;
      flex: 1;
      position: relative;
    }
    .tab svg { width: 24px; height: 24px; color: #C4BEB4; }
    .tab.active svg { color: #4CB5A0; }
    .tab-label { font-size: 11px; font-weight: 600; color: #C4BEB4; }
    .tab.active .tab-label { color: #4CB5A0; }
    .tab-dot {
      position: absolute;
      top: 0;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #4CB5A0;
    }
  </style>
</head>
<body>
  <div class="phone-frame" data-page-id="home-page" data-tab-id="tab-home">
    <header class="header">
      <button class="pet-switcher" data-ui-id="home-pet-switcher">
        <div class="pet-avatar" data-ui-id="home-current-pet-avatar">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <title>Current Pet Avatar Placeholder</title>
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-2h2v2zm0-4h-2V7h2v6zm4 4h-2v-2h2v2zm0-4h-2V7h2v6z" opacity="0"/>
            <circle cx="9" cy="10" r="2.5" fill="#4CB5A0"/>
            <circle cx="15" cy="10" r="2.5" fill="#4CB5A0"/>
            <ellipse cx="12" cy="16.5" rx="4" ry="2.5" fill="#FFB8C9"/>
          </svg>
        </div>
        <div class="pet-info">
          <span class="pet-name" data-ui-id="home-current-pet-name">豆包</span>
          <span class="pet-breed">英短猫 · 2岁</span>
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Open Pet Switcher</title>
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </button>
      <button class="header-action" data-ui-id="home-add-reminder-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="#4CB5A0">
          <title>View All Reminders</title>
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="badge" data-ui-id="home-reminder-count">2</span>
      </button>
    </header>

    <main class="content">
      <h1 class="greeting">早上好，铲屎官 👋</h1>
      <p class="sub-greeting">今天豆包的状态看起来不错</p>

      <div class="reminder-banner" data-ui-id="home-add-reminder-banner">
        <div class="reminder-left">
          <div class="reminder-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Upcoming Vaccination Reminder</title>
              <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
              <path d="M12 6v6l4 2"/>
            </svg>
          </div>
          <div>
            <div class="reminder-title">疫苗即将到期</div>
            <div class="reminder-sub">猫三联 · 还有 5 天</div>
          </div>
        </div>
        <svg class="reminder-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Go to Reminder List</title>
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </div>

      <h2 class="section-title">一键记录 <span class="section-link" data-ui-id="home-go-trends">看趋势</span></h2>
      <div class="quick-actions">
        <button class="quick-btn" data-ui-id="home-quick-food">
          <div class="quick-icon mint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Quick Add Food Record</title>
              <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
              <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
              <line x1="6" y1="1" x2="6" y2="4"/>
              <line x1="10" y1="1" x2="10" y2="4"/>
              <line x1="14" y1="1" x2="14" y2="4"/>
            </svg>
          </div>
          <span class="quick-label">饮食</span>
        </button>
        <button class="quick-btn" data-ui-id="home-quick-toilet">
          <div class="quick-icon pink">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Quick Add Toilet Record</title>
              <path d="M12 2a5 5 0 0 0-5 5v2H5v2h14V9h-2V7a5 5 0 0 0-5-5z"/>
              <path d="M8 13v7a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-7"/>
            </svg>
          </div>
          <span class="quick-label">排泄</span>
        </button>
        <button class="quick-btn" data-ui-id="home-quick-weight">
          <div class="quick-icon yellow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Quick Add Weight Record</title>
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
          </div>
          <span class="quick-label">体重</span>
        </button>
        <button class="quick-btn" data-ui-id="home-quick-medicine">
          <div class="quick-icon blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Quick Add Medicine Record</title>
              <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
            </svg>
          </div>
          <span class="quick-label">用药</span>
        </button>
      </div>

      <div class="summary-card" data-ui-id="home-today-summary">
        <div class="summary-title">今日概览</div>
        <div class="summary-grid">
          <div class="summary-item"><div class="summary-dot"></div><div><div class="summary-label">饮食</div><div class="summary-value">2 次</div></div></div>
          <div class="summary-item"><div class="summary-dot pink"></div><div><div class="summary-label">排泄</div><div class="summary-value">1 次</div></div></div>
          <div class="summary-item"><div class="summary-dot yellow"></div><div><div class="summary-label">体重</div><div class="summary-value">4.8 kg</div></div></div>
          <div class="summary-item"><div class="summary-dot blue"></div><div><div class="summary-label">用药</div><div class="summary-value">0 次</div></div></div>
        </div>
      </div>

      <h2 class="section-title">最近记录 <span class="section-link" data-ui-id="home-go-health">健康</span></h2>
      <div class="recent-records" data-ui-id="home-recent-records-list">
        <div class="record-card" id="home-recent-record-1">
          <div class="record-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Food Record Icon</title>
              <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
              <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
            </svg>
          </div>
          <div class="record-main">
            <div class="record-title">早餐 · 猫粮 80g</div>
            <div class="record-meta">豆包 · 07:30</div>
          </div>
          <span class="record-time">2h 前</span>
        </div>
        <div class="record-card" id="home-recent-record-2">
          <div class="record-icon" style="background:#FFF0F3">
            <svg viewBox="0 0 24 24" fill="none" stroke="#F48FB1" stroke-width="2">
              <title>Toilet Record Icon</title>
              <path d="M12 2a5 5 0 0 0-5 5v2H5v2h14V9h-2V7a5 5 0 0 0-5-5z"/>
              <path d="M8 13v7a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-7"/>
            </svg>
          </div>
          <div class="record-main">
            <div class="record-title">排尿 · 正常</div>
            <div class="record-meta">豆包 · 昨天 22:00</div>
          </div>
          <span class="record-time">10h 前</span>
        </div>
      </div>

      <div class="empty-state" id="home-recent-empty" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C4BEB4" stroke-width="1.5">
          <title>No Recent Records Placeholder</title>
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
        <p>还没有记录，快来记一笔吧</p>
      </div>
    </main>

    <nav class="tabbar">
      <button class="tab active" data-tab-id="tab-home">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <title>Home Tab</title>
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span class="tab-label">首页</span>
        <span class="tab-dot"></span>
      </button>
      <button class="tab" data-tab-id="tab-records">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Records Tab</title>
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span class="tab-label">记录</span>
      </button>
      <button class="tab" data-tab-id="tab-trends">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Trends Tab</title>
          <path d="M3 3v18h18"/>
          <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/>
        </svg>
        <span class="tab-label">趋势</span>
      </button>
      <button class="tab" data-tab-id="tab-health">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Health Tab</title>
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span class="tab-label">健康</span>
      </button>
      <button class="tab" data-tab-id="tab-profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Profile Tab</title>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="tab-label">我的</span>
      </button>
    </nav>
  </div>
</body>
</html>
