<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PawLog 宠迹 - 宠物编辑</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: #FFFBF6;
      color: #3A3630;
      min-height: 100vh;
    }
    .phone-frame {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: #FFFBF6;
      overflow-x: hidden;
      padding-bottom: 24px;
    }
    .header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid rgba(126,215,194,0.12);
    }
    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: #E8FAF5;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
    }
    .back-btn svg { width: 20px; height: 20px; color: #4CB5A0; }
    .header-title { font-size: 18px; font-weight: 700; color: #3A3630; }
    .save-btn {
      padding: 8px 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7ED7C2, #5EC9B3);
      color: white;
      font-size: 14px;
      font-weight: 700;
      border: none;
      box-shadow: 0 4px 10px rgba(76,181,160,0.24);
    }
    .content { padding: 20px 16px; }
    .avatar-picker {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #E8FAF5, #FFF0F3);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 18px rgba(126,215,194,0.18);
      border: 3px solid white;
    }
    .avatar-picker svg { width: 44px; height: 44px; color: #4CB5A0; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #5C5750;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 15px 17px;
      border-radius: 16px;
      border: 1px solid rgba(126,215,194,0.15);
      background: #FFF8F0;
      font-size: 15px;
      color: #3A3630;
      outline: none;
    }
    .form-input:focus { border-color: #7ED7C2; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .radio-group {
      display: flex;
      gap: 10px;
    }
    .radio-chip {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      border-radius: 14px;
      background: #FFF8F0;
      border: 1px solid rgba(126,215,194,0.15);
      font-size: 14px;
      font-weight: 600;
      color: #5C5750;
    }
    .radio-chip.active {
      background: linear-gradient(135deg, #7ED7C2, #5EC9B3);
      color: white;
      border-color: transparent;
    }
    .delete-btn {
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      border-radius: 18px;
      background: #FFF0F3;
      color: #F48FB1;
      font-size: 15px;
      font-weight: 700;
      border: none;
    }
  </style>
</head>
<body>
  <div class="phone-frame" data-page-id="pet-editor-page">
    <header class="header">
      <button class="back-btn" data-ui-id="pet-editor-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Back to Previous Page</title>
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <span class="header-title">编辑宠物档案</span>
      <button class="save-btn" data-ui-id="pet-editor-save">保存</button>
    </header>

    <main class="content">
      <button class="avatar-picker" data-ui-id="pet-editor-avatar">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <title>Upload Pet Avatar</title>
          <circle cx="9" cy="10" r="2.5" fill="#4CB5A0"/>
          <circle cx="15" cy="10" r="2.5" fill="#4CB5A0"/>
          <ellipse cx="12" cy="16.5" rx="4" ry="2.5" fill="#FFB8C9"/>
        </svg>
      </button>

      <div class="form-group">
        <label class="form-label">昵称</label>
        <input class="form-input" type="text" placeholder="请输入宠物昵称" value="豆包" data-ui-id="pet-editor-name" />
      </div>

      <div class="form-group">
        <label class="form-label">品种</label>
        <input class="form-input" type="text" placeholder="例如：英短、柯基" value="英国短毛猫" data-ui-id="pet-editor-breed" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">生日</label>
          <input class="form-input" type="date" value="2023-06-01" data-ui-id="pet-editor-birthday" />
        </div>
        <div class="form-group">
          <label class="form-label">性别</label>
          <div class="radio-group" data-ui-id="pet-editor-gender">
            <button class="radio-chip active">弟弟</button>
            <button class="radio-chip">妹妹</button>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">是否绝育</label>
        <div class="radio-group" data-ui-id="pet-editor-neutered">
          <button class="radio-chip active">已绝育</button>
          <button class="radio-chip">未绝育</button>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">基准体重 (kg)</label>
          <input class="form-input" type="number" placeholder="0.0" value="4.8" data-ui-id="pet-editor-weight" />
        </div>
        <div class="form-group">
          <label class="form-label">芯片/病历号</label>
          <input class="form-input" type="text" placeholder="选填" value="900115678901234" data-ui-id="pet-editor-chip" />
        </div>
      </div>

      <button class="delete-btn" data-ui-id="pet-editor-delete">删除宠物档案</button>
    </main>
  </div>
</body>
</html>
