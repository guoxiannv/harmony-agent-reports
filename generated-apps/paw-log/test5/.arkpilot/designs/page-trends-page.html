<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PawLog 宠迹 - 趋势</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: #FFFBF6;
      color: #3A3630;
      min-height: 100vh;
    }
    .phone-frame {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: #FFFBF6;
      overflow-x: hidden;
      padding-bottom: 92px;
    }
    .header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid rgba(126,215,194,0.12);
    }
    .header-title { font-size: 22px; font-weight: 700; color: #3A3630; }
    .pet-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.9);
      padding: 6px 12px 6px 6px;
      border-radius: 20px;
      border: 1px solid rgba(126,215,194,0.15);
    }
    .pet-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E8FAF5, #FFF0F3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pet-avatar svg { width: 16px; height: 16px; }
    .pet-name { font-size: 13px; font-weight: 700; color: #3A3630; }
    .content { padding: 16px; }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #3A3630;
      margin-bottom: 12px;
    }
    .metric-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .metric-chip {
      padding: 8px 16px;
      border-radius: 16px;
      background: white;
      border: 1px solid rgba(126,215,194,0.15);
      font-size: 13px;
      font-weight: 600;
      color: #5C5750;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(126,215,194,0.06);
    }
    .metric-chip.active {
      background: linear-gradient(135deg, #7ED7C2, #5EC9B3);
      color: white;
      border-color: transparent;
    }
    .time-range {
      display: flex;
      background: #FFF8F0;
      border-radius: 16px;
      padding: 4px;
      margin-bottom: 16px;
    }
    .time-chip {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #5C5750;
    }
    .time-chip.active {
      background: white;
      color: #4CB5A0;
      box-shadow: 0 2px 6px rgba(126,215,194,0.12);
    }
    .chart-card {
      background: white;
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 10px 28px rgba(126,215,194,0.18);
      position: relative;
      overflow: hidden;
    }
    .chart-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #7ED7C2, #5EC9B3);
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .chart-title { font-size: 15px; font-weight: 700; color: #3A3630; }
    .chart-value { font-size: 22px; font-weight: 700; color: #4CB5A0; }
    .chart-value span { font-size: 13px; color: #5C5750; margin-left: 2px; }
    .chart-area {
      height: 200px;
      position: relative;
    }
    .chart-svg { width: 100%; height: 100%; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .stat-card {
      background: white;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(126,215,194,0.10);
    }
    .stat-label { font-size: 12px; color: #5C5750; margin-bottom: 6px; }
    .stat-value { font-size: 20px; font-weight: 700; color: #3A3630; }
    .stat-value.positive { color: #4CB5A0; }
    .stat-value.negative { color: #F48FB1; }
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: #C4BEB4;
    }
    .empty-state svg { width: 72px; height: 72px; margin-bottom: 14px; opacity: 0.5; }
    .tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      margin: 0 auto;
      max-width: 390px;
      height: 76px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(24px) saturate(160%);
      border-radius: 28px 28px 0 0;
      border-top: 1px solid rgba(126,215,194,0.12);
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding-top: 10px;
      z-index: 20;
      box-shadow: 0 -6px 20px rgba(126,215,194,0.10);
    }
    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding-top: 4px;
      flex: 1;
      position: relative;
    }
    .tab svg { width: 24px; height: 24px; color: #C4BEB4; }
    .tab.active svg { color: #4CB5A0; }
    .tab-label { font-size: 11px; font-weight: 600; color: #C4BEB4; }
    .tab.active .tab-label { color: #4CB5A0; }
    .tab-dot {
      position: absolute;
      top: 0;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #4CB5A0;
    }
  </style>
</head>
<body>
  <div class="phone-frame" data-page-id="trends-page" data-tab-id="tab-trends">
    <header class="header">
      <span class="header-title">健康趋势</span>
      <button class="pet-switcher" data-ui-id="trends-pet-switcher">
        <div class="pet-avatar">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <title>Selected Pet Indicator</title>
            <circle cx="9" cy="10" r="2.5" fill="#4CB5A0"/>
            <circle cx="15" cy="10" r="2.5" fill="#4CB5A0"/>
            <ellipse cx="12" cy="16.5" rx="4" ry="2.5" fill="#FFB8C9"/>
          </svg>
        </div>
        <span class="pet-name">豆包</span>
      </button>
    </header>

    <main class="content">
      <div class="metric-selector" data-ui-id="trends-metric-selector">
        <button class="metric-chip active">体重</button>
        <button class="metric-chip">饮食</button>
        <button class="metric-chip">排泄</button>
        <button class="metric-chip">用药</button>
      </div>

      <div class="time-range" data-ui-id="trends-time-range">
        <button class="time-chip">周</button>
        <button class="time-chip active">月</button>
        <button class="time-chip">年</button>
      </div>

      <div class="chart-card" data-ui-id="trends-chart">
        <div class="chart-header">
          <span class="chart-title">体重变化</span>
          <span class="chart-value">4.8 <span>kg</span></span>
        </div>
        <div class="chart-area">
          <svg class="chart-svg" viewBox="0 0 320 200" preserveAspectRatio="none">
            <title>Weight Trend Chart</title>
            <defs>
              <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="rgba(126,215,194,0.35)"/>
                <stop offset="100%" stop-color="rgba(126,215,194,0.02)"/>
              </linearGradient>
            </defs>
            <g stroke="#F2F0EB" stroke-width="1">
              <line x1="0" y1="40" x2="320" y2="40"/>
              <line x1="0" y1="80" x2="320" y2="80"/>
              <line x1="0" y1="120" x2="320" y2="120"/>
              <line x1="0" y1="160" x2="320" y2="160"/>
            </g>
            <path d="M20 130 C60 120, 100 110, 140 115 S220 100, 260 90 S300 80, 300 80 L300 180 L20 180 Z" fill="url(#areaFill)" stroke="none"/>
            <path d="M20 130 C60 120, 100 110, 140 115 S220 100, 260 90 S300 80, 300 80" fill="none" stroke="#7ED7C2" stroke-width="3" stroke-linecap="round"/>
            <circle cx="20" cy="130" r="5" fill="#7ED7C2" stroke="white" stroke-width="2"/>
            <circle cx="140" cy="115" r="5" fill="#7ED7C2" stroke="white" stroke-width="2"/>
            <circle cx="260" cy="90" r="5" fill="#7ED7C2" stroke="white" stroke-width="2"/>
            <circle cx="300" cy="80" r="6" fill="#FFB8C9" stroke="white" stroke-width="3"/>
          </svg>
        </div>
      </div>

      <h2 class="section-title">关键指标</h2>
      <div class="stats-grid" data-ui-id="trends-stat-cards">
        <div class="stat-card">
          <div class="stat-label">平均体重</div>
          <div class="stat-value">4.72 kg</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">较上月</div>
          <div class="stat-value positive">+0.12 kg</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">最高体重</div>
          <div class="stat-value">4.85 kg</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">记录次数</div>
          <div class="stat-value">12 次</div>
        </div>
      </div>

      <div class="empty-state" id="trends-chart-empty" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C4BEB4" stroke-width="1.5">
          <title>No Trend Data Placeholder</title>
          <path d="M3 3v18h18"/>
          <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/>
        </svg>
        <p>暂无趋势数据，多记几笔再来查看吧</p>
      </div>
    </main>

    <nav class="tabbar">
      <button class="tab" data-tab-id="tab-home">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <title>Home Tab</title>
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span class="tab-label">首页</span>
      </button>
      <button class="tab" data-tab-id="tab-records">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Records Tab</title>
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span class="tab-label">记录</span>
      </button>
      <button class="tab active" data-tab-id="tab-trends">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Trends Tab</title>
          <path d="M3 3v18h18"/>
          <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/>
        </svg>
        <span class="tab-label">趋势</span>
        <span class="tab-dot"></span>
      </button>
      <button class="tab" data-tab-id="tab-health">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Health Tab</title>
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span class="tab-label">健康</span>
      </button>
      <button class="tab" data-tab-id="tab-profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Profile Tab</title>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="tab-label">我的</span>
      </button>
    </nav>
  </div>
</body>
</html>
