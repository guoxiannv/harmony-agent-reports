<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PawLog 宠迹 - 我的</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: #FFFBF6;
      color: #3A3630;
      min-height: 100vh;
    }
    .phone-frame {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: linear-gradient(160deg, #E8FAF5 0%, #FFF0F3 40%, #FFFBF6 100%);
      overflow-x: hidden;
      padding-bottom: 92px;
    }
    .header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid rgba(126,215,194,0.12);
    }
    .header-title { font-size: 22px; font-weight: 700; color: #3A3630; }
    .content { padding: 16px; }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .user-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 18px rgba(126,215,194,0.16);
      border: 2px solid rgba(255,255,255,0.8);
    }
    .user-avatar svg { width: 34px; height: 34px; color: #4CB5A0; }
    .user-info { flex: 1; }
    .user-name { font-size: 20px; font-weight: 700; color: #3A3630; }
    .user-role { font-size: 13px; color: #5C5750; margin-top: 4px; }
    .card {
      background: white;
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(126,215,194,0.14);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .card-title { font-size: 16px; font-weight: 700; color: #3A3630; }
    .card-add {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 12px;
      background: #E8FAF5;
      color: #4CB5A0;
      font-size: 12px;
      font-weight: 700;
      border: none;
    }
    .card-add svg { width: 14px; height: 14px; }
    .pet-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #F2F0EB;
    }
    .pet-row:last-child { border-bottom: none; }
    .pet-avatar-sm {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E8FAF5, #FFF0F3);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(126,215,194,0.14);
    }
    .pet-avatar-sm svg { width: 22px; height: 22px; color: #4CB5A0; }
    .pet-info { flex: 1; }
    .pet-name-sm { font-size: 15px; font-weight: 700; color: #3A3630; }
    .pet-breed-sm { font-size: 12px; color: #5C5750; margin-top: 2px; }
    .chevron { width: 18px; height: 18px; color: #C4BEB4; }
    .member-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
    }
    .member-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #FFF0F3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .member-avatar svg { width: 18px; height: 18px; color: #F48FB1; }
    .member-name { flex: 1; font-size: 14px; font-weight: 600; color: #3A3630; }
    .member-role {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 8px;
      background: #E8FAF5;
      color: #4CB5A0;
      font-weight: 600;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #F2F0EB;
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { display: flex; align-items: center; gap: 10px; }
    .setting-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: #E8FAF5;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .setting-icon svg { width: 16px; height: 16px; color: #4CB5A0; }
    .setting-text { font-size: 15px; font-weight: 600; color: #3A3630; }
    .unit-toggle {
      display: flex;
      background: #FFF8F0;
      border-radius: 12px;
      padding: 3px;
    }
    .unit-chip {
      padding: 5px 12px;
      border-radius: 9px;
      font-size: 12px;
      font-weight: 700;
      color: #5C5750;
    }
    .unit-chip.active {
      background: white;
      color: #4CB5A0;
      box-shadow: 0 1px 4px rgba(126,215,194,0.12);
    }
    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: #C4BEB4;
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 10px; opacity: 0.5; }
    .empty-state p { font-size: 13px; }
    .tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      margin: 0 auto;
      max-width: 390px;
      height: 76px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(24px) saturate(160%);
      border-radius: 28px 28px 0 0;
      border-top: 1px solid rgba(126,215,194,0.12);
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding-top: 10px;
      z-index: 20;
      box-shadow: 0 -6px 20px rgba(126,215,194,0.10);
    }
    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding-top: 4px;
      flex: 1;
      position: relative;
    }
    .tab svg { width: 24px; height: 24px; color: #C4BEB4; }
    .tab.active svg { color: #4CB5A0; }
    .tab-label { font-size: 11px; font-weight: 600; color: #C4BEB4; }
    .tab.active .tab-label { color: #4CB5A0; }
    .tab-dot {
      position: absolute;
      top: 0;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #4CB5A0;
    }
  </style>
</head>
<body>
  <div class="phone-frame" data-page-id="profile-page" data-tab-id="tab-profile">
    <header class="header">
      <span class="header-title">我的</span>
    </header>

    <main class="content">
      <div class="profile-header">
        <div class="user-avatar" data-ui-id="profile-user-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>Current User Avatar</title>
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="user-info">
          <div class="user-name" data-ui-id="profile-user-name">铲屎官小王</div>
          <div class="user-role">家庭管理员 · 2 只毛孩子</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">宠物档案</span>
          <button class="card-add" data-ui-id="profile-add-pet">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Add Pet Profile</title>
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            添加
          </button>
        </div>
        <div class="pet-list" data-ui-id="profile-pet-list">
          <div class="pet-row" id="profile-pet-1">
            <div class="pet-avatar-sm">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <title>Pet Avatar Placeholder</title>
                <circle cx="9" cy="10" r="2.5" fill="#4CB5A0"/>
                <circle cx="15" cy="10" r="2.5" fill="#4CB5A0"/>
                <ellipse cx="12" cy="16.5" rx="4" ry="2.5" fill="#FFB8C9"/>
              </svg>
            </div>
            <div class="pet-info">
              <div class="pet-name-sm">豆包</div>
              <div class="pet-breed-sm">英短猫 · 2岁 · 4.8 kg</div>
            </div>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Edit Pet Profile</title>
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </div>
          <div class="pet-row" id="profile-pet-2">
            <div class="pet-avatar-sm" style="background:#FFF0F3">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <title>Pet Avatar Placeholder</title>
                <circle cx="9" cy="10" r="2.5" fill="#F48FB1"/>
                <circle cx="15" cy="10" r="2.5" fill="#F48FB1"/>
                <ellipse cx="12" cy="16.5" rx="4" ry="2.5" fill="#7ED7C2"/>
              </svg>
            </div>
            <div class="pet-info">
              <div class="pet-name-sm">汤圆</div>
              <div class="pet-breed-sm">柯基 · 3岁 · 12.5 kg</div>
            </div>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Edit Pet Profile</title>
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </div>
        </div>
        <div class="empty-state" id="profile-pet-empty" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="#C4BEB4" stroke-width="1.5">
            <title>No Pets Placeholder</title>
            <circle cx="9" cy="10" r="2.5"/>
            <circle cx="15" cy="10" r="2.5"/>
            <ellipse cx="12" cy="16.5" rx="4" ry="2.5"/>
          </svg>
          <p>还没有宠物档案，点击添加</p>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">家庭成员</span>
          <button class="card-add" data-ui-id="profile-invite-member">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Invite Family Member</title>
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            邀请
          </button>
        </div>
        <div class="member-list" data-ui-id="profile-family-members">
          <div class="member-row" id="profile-member-1">
            <div class="member-avatar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <title>Family Member Avatar</title>
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <span class="member-name">铲屎官小王</span>
            <span class="member-role">管理员</span>
          </div>
          <div class="member-row" id="profile-member-2">
            <div class="member-avatar" style="background:#E8FAF5">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <title>Family Member Avatar</title>
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <span class="member-name">妈妈</span>
            <span class="member-role">协作者</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="setting-row">
          <div class="setting-label">
            <div class="setting-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <title>Weight Unit Setting</title>
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
              </svg>
            </div>
            <span class="setting-text">体重单位</span>
          </div>
          <div class="unit-toggle" data-ui-id="profile-settings-unit">
            <span class="unit-chip active">kg</span>
            <span class="unit-chip">lb</span>
          </div>
        </div>
        <div class="setting-row" data-ui-id="profile-settings-about">
          <div class="setting-label">
            <div class="setting-icon" style="background:#FFF0F3">
              <svg viewBox="0 0 24 24" fill="none" stroke="#F48FB1" stroke-width="2">
                <title>About App</title>
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="16" x2="12" y2="12"/>
                <line x1="12" y1="8" x2="12.01" y2="8"/>
              </svg>
            </div>
            <span class="setting-text">关于 PawLog</span>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>Open About Page</title>
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
      </div>
    </main>

    <nav class="tabbar">
      <button class="tab" data-tab-id="tab-home">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <title>Home Tab</title>
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span class="tab-label">首页</span>
      </button>
      <button class="tab" data-tab-id="tab-records">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Records Tab</title>
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span class="tab-label">记录</span>
      </button>
      <button class="tab" data-tab-id="tab-trends">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Trends Tab</title>
          <path d="M3 3v18h18"/>
          <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/>
        </svg>
        <span class="tab-label">趋势</span>
      </button>
      <button class="tab" data-tab-id="tab-health">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Health Tab</title>
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span class="tab-label">健康</span>
      </button>
      <button class="tab active" data-tab-id="tab-profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <title>Profile Tab</title>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="tab-label">我的</span>
        <span class="tab-dot"></span>
      </button>
    </nav>
  </div>
</body>
</html>
