<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 PawLog - 成员邀请</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #F3F4F6; color: #1F2937;
      max-width: 390px; margin: 0 auto; min-height: 100vh;
      position: relative; overflow-x: hidden;
    }
    .page { padding: 0 20px 120px; display: flex; flex-direction: column; align-items: center; }
    .header {
      position: sticky; top: 0; z-index: 50; align-self: stretch;
      background: rgba(255,255,255,0.8); backdrop-filter: blur(24px) saturate(150%);
      border-bottom: 1px solid rgba(255,255,255,0.65);
      margin: 0 -20px; padding: 52px 20px 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 14px; background: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(31,41,55,0.07); border: none; cursor: pointer;
    }
    .back-btn svg { width: 22px; height: 22px; color: #4B5563; }
    .page-title { font-size: 20px; font-weight: 700; flex: 1; }
    .invite-hero {
      width: 100%; text-align: center; margin-top: 36px;
    }
    .invite-hero svg { width: 96px; height: 96px; color: #5DD9C1; margin-bottom: 16px; }
    .invite-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .invite-desc { font-size: 14px; color: #4B5563; line-height: 1.5; }
    .code-card {
      width: 100%; background: #fff; border-radius: 24px; padding: 28px 20px;
      box-shadow: 0 12px 32px rgba(31,41,55,0.08); margin-top: 28px; text-align: center;
    }
    .code-label { font-size: 13px; color: #9CA3AF; margin-bottom: 10px; }
    .code-value {
      font-size: 32px; font-weight: 800; letter-spacing: 2px; color: #3CB5A0;
      margin-bottom: 20px;
    }
    .code-actions { display: flex; gap: 12px; }
    .code-btn {
      flex: 1; padding: 14px; border-radius: 999px; font-size: 14px; font-weight: 700;
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .code-btn.primary {
      background: linear-gradient(135deg, #8EEDDB 0%, #45C4AD 100%);
      color: #fff; box-shadow: 0 10px 22px rgba(69,196,173,0.28);
    }
    .code-btn.secondary { background: #F3F4F6; color: #4B5563; }
    .code-btn svg { width: 18px; height: 18px; }
    .share-card {
      width: 100%; background: #fff; border-radius: 24px; padding: 20px;
      box-shadow: 0 12px 32px rgba(31,41,55,0.08); margin-top: 16px;
    }
    .share-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    .share-options { display: flex; gap: 12px; }
    .share-option {
      flex: 1; padding: 14px; border-radius: 18px; background: #F9FAFB;
      text-align: center; font-size: 13px; font-weight: 600; color: #4B5563;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .share-option svg { width: 24px; height: 24px; color: #3CB5A0; }
    .hint {
      margin-top: 24px; font-size: 12px; color: #9CA3AF; text-align: center; line-height: 1.5;
    }
  </style>
</head>
<body data-page-id="member-invite-page">
  <div class="page">
    <header class="header">
      <button class="back-btn" data-ui-id="member-invite-back-button" aria-label="返回">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="page-title">邀请家庭成员</h1>
    </header>

    <div class="invite-hero">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <title>家庭成员邀请插图</title>
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <h2 class="invite-title">一起照顾毛孩子</h2>
      <p class="invite-desc">将邀请码分享给家人，他们即可加入这个家庭空间，共同记录和查看宠物动态。</p>
    </div>

    <div class="code-card">
      <div class="code-label">家庭邀请码</div>
      <div class="code-value" data-ui-id="member-invite-code-display">PAW-7X2K</div>
      <div class="code-actions">
        <button class="code-btn primary" data-ui-id="member-invite-copy-button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>复制邀请码</title><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          复制
        </button>
        <button class="code-btn secondary" data-ui-id="member-invite-share-button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>分享邀请码</title><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          分享
        </button>
      </div>
    </div>

    <div class="share-card">
      <div class="share-title">更多分享方式</div>
      <div class="share-options">
        <div class="share-option">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>通过链接邀请</title><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          复制链接
        </div>
        <div class="share-option">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>面对面扫码邀请</title><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><rect x="7" y="7" width="3" height="3"/><rect x="14" y="7" width="3" height="3"/><rect x="7" y="14" width="3" height="3"/><rect x="14" y="14" width="3" height="3"/></svg>
          二维码
        </div>
      </div>
    </div>

    <p class="hint">邀请码 24 小时内有效，过期后可重新生成。</p>
  </div>
</body>
</html>
