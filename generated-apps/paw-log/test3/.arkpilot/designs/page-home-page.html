<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 PawLog - 首页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #F3F4F6;
      color: #1F2937;
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    .hero-bg {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 320px;
      background: linear-gradient(180deg, #E6FAF6 0%, #F3F4F6 60%);
      z-index: 0;
      border-radius: 0 0 32px 32px;
    }
    .page { position: relative; z-index: 1; padding: 0 20px 120px; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 56px; margin-bottom: 20px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .pet-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, #FFDDE6 0%, #FF9DAF 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 16px rgba(31,41,55,0.1);
      border: 2px solid #fff;
    }
    .pet-avatar svg { width: 26px; height: 26px; color: #fff; }
    .pet-info { display: flex; flex-direction: column; }
    .pet-label { font-size: 12px; color: #9CA3AF; margin-bottom: 2px; }
    .pet-name { font-size: 16px; font-weight: 700; color: #1F2937; display: flex; align-items: center; gap: 4px; }
    .pet-name svg { width: 14px; height: 14px; color: #9CA3AF; }
    .header-right { display: flex; gap: 10px; }
    .icon-btn {
      width: 44px; height: 44px; border-radius: 14px; background: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(31,41,55,0.07);
      border: none; cursor: pointer;
    }
    .icon-btn svg { width: 22px; height: 22px; color: #4B5563; }
    .greeting-card {
      background: #fff; border-radius: 24px; padding: 22px 20px;
      box-shadow: 0 12px 32px rgba(31,41,55,0.08);
      margin-bottom: 18px;
    }
    .greeting-title { font-size: 26px; font-weight: 800; line-height: 1.18; margin-bottom: 8px; }
    .greeting-sub { font-size: 14px; color: #4B5563; }
    .quick-log-section { display: flex; justify-content: center; margin: 24px 0; }
    .quick-log-btn {
      width: 120px; height: 120px; border-radius: 50%;
      background: linear-gradient(135deg, #8EEDDB 0%, #45C4AD 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 18px 40px rgba(69,196,173,0.35);
      border: 4px solid #E6FAF6;
      cursor: pointer;
    }
    .quick-log-btn svg { width: 36px; height: 36px; color: #fff; margin-bottom: 6px; }
    .quick-log-text { color: #fff; font-size: 15px; font-weight: 700; }
    .section { margin-top: 28px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-size: 18px; font-weight: 700; }
    .section-link { font-size: 13px; color: #3CB5A0; font-weight: 600; text-decoration: none; }
    .reminder-list { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; }
    .reminder-card {
      min-width: 170px; background: #FFF8E6; border-radius: 18px; padding: 14px;
      box-shadow: 0 4px 12px rgba(31,41,55,0.05);
      border-left: 4px solid #FFD166;
    }
    .reminder-card.pink { background: #FFF0F3; border-left-color: #F28DA6; }
    .reminder-type { font-size: 11px; font-weight: 700; color: #C98A0A; margin-bottom: 6px; }
    .reminder-card.pink .reminder-type { color: #D96680; }
    .reminder-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .reminder-date { font-size: 12px; color: #9CA3AF; }
    .timeline { display: flex; flex-direction: column; gap: 14px; }
    .timeline-item { display: flex; align-items: flex-start; gap: 12px; }
    .timeline-dot {
      width: 16px; height: 16px; border-radius: 50%; border: 2px solid #fff;
      box-shadow: 0 2px 6px rgba(31,41,55,0.1); margin-top: 8px; flex-shrink: 0;
    }
    .timeline-dot.food { background: #5DD9C1; }
    .timeline-dot.toilet { background: #FFD166; }
    .timeline-dot.weight { background: #CAB8F0; }
    .timeline-dot.medicine { background: #A8DADC; }
    .timeline-line {
      position: absolute; left: 27px; top: 32px; bottom: -14px; width: 2px; background: #E5E7EB;
    }
    .timeline-content {
      flex: 1; background: #fff; border-radius: 20px; padding: 14px 16px;
      box-shadow: 0 10px 28px rgba(31,41,55,0.07);
    }
    .timeline-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .timeline-type-chip {
      font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 10px;
    }
    .chip-food { background: #E6FAF6; color: #3CB5A0; }
    .chip-toilet { background: #FFF8E6; color: #C98A0A; }
    .chip-weight { background: #F3EEFC; color: #8B6ACB; }
    .chip-medicine { background: #EDF7F7; color: #4A9B9E; }
    .timeline-time { font-size: 12px; color: #9CA3AF; }
    .timeline-text { font-size: 14px; color: #1F2937; font-weight: 600; }
    .timeline-detail { font-size: 12px; color: #4B5563; margin-top: 4px; }
    .empty-state {
      text-align: center; padding: 32px 20px; background: #fff; border-radius: 24px;
      box-shadow: 0 12px 32px rgba(31,41,55,0.06);
    }
    .empty-state svg { width: 64px; height: 64px; color: #FFB8C9; margin-bottom: 12px; }
    .empty-title { font-size: 15px; font-weight: 700; color: #1F2937; margin-bottom: 4px; }
    .empty-desc { font-size: 13px; color: #9CA3AF; }
    .health-summary-card {
      background: linear-gradient(135deg, #E6FAF6 0%, #F2FDFB 100%);
      border-radius: 24px; padding: 18px; margin-top: 28px;
      box-shadow: 0 10px 28px rgba(31,41,55,0.06);
    }
    .health-summary-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .health-summary-title { font-size: 16px; font-weight: 700; }
    .health-summary-arrow { color: #3CB5A0; }
    .health-metrics { display: flex; gap: 12px; }
    .metric-box {
      flex: 1; background: #fff; border-radius: 18px; padding: 14px; text-align: center;
      box-shadow: 0 4px 12px rgba(31,41,55,0.04);
    }
    .metric-value { font-size: 24px; font-weight: 800; color: #3CB5A0; }
    .metric-label { font-size: 12px; color: #9CA3AF; margin-top: 4px; }
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 390px; margin: 0 auto;
      height: 76px; background: rgba(255,255,255,0.82);
      backdrop-filter: blur(24px) saturate(150%);
      border-top: 1px solid rgba(255,255,255,0.65);
      box-shadow: 0 -4px 20px rgba(31,41,55,0.06);
      display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px;
      z-index: 100;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 56px; padding-top: 4px; color: #9CA3AF; text-decoration: none; }
    .tab-item.active { color: #5DD9C1; }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-label { font-size: 11px; font-weight: 700; }
    .fab-wrap { position: relative; top: -28px; }
    .fab {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #8EEDDB 0%, #45C4AD 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 14px 36px rgba(69,196,173,0.38);
      border: 3px solid #fff;
    }
    .fab svg { width: 26px; height: 26px; color: #fff; }
  </style>
</head>
<body data-page-id="home-page" data-tab-id="tab-home">
  <div class="hero-bg"></div>
  <div class="page">
    <header class="header">
      <div class="header-left" data-ui-id="home-pet-switcher">
        <div class="pet-avatar" data-ui-id="home-current-pet-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>当前选中宠物头像</title>
            <path d="M12 5c.5 0 1 .2 1.4.6.4.4.6.9.6 1.4 0 .5-.2 1-.6 1.4-.4.4-.9.6-1.4.6s-1-.2-1.4-.6c-.4-.4-.6-.9-.6-1.4 0-.5.2-1 .6-1.4.4-.4.9-.6 1.4-.6z"/>
            <path d="M6 9c.5 0 1 .2 1.4.6.4.4.6.9.6 1.4 0 .5-.2 1-.6 1.4-.4.4-.9.6-1.4.6s-1-.2-1.4-.6C4 12 3.8 11.5 3.8 11c0-.5.2-1 .6-1.4.4-.4.9-.6 1.4-.6z"/>
            <path d="M18 9c.5 0 1 .2 1.4.6.4.4.6.9.6 1.4 0 .5-.2 1-.6 1.4-.4.4-.9.6-1.4.6s-1-.2-1.4-.6c-.4-.4-.6-.9-.6-1.4 0-.5.2-1 .6-1.4.4-.4.9-.6 1.4-.6z"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          </svg>
        </div>
        <div class="pet-info">
          <span class="pet-label">正在关注</span>
          <span class="pet-name" data-ui-id="home-current-pet-name">豆豆 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>切换宠物展开按钮</title><polyline points="6 9 12 15 18 9"/></svg></span>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" data-ui-id="home-add-pet-button" aria-label="添加宠物">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>添加新宠物档案</title>
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
        <button class="icon-btn" data-ui-id="home-notification-button" aria-label="提醒">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>查看今日提醒</title>
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="greeting-card">
      <h1 class="greeting-title">早安，豆豆今天状态不错 ✨</h1>
      <p class="greeting-sub">已经记录了 2 项日常，还有 1 个提醒待处理</p>
    </section>

    <section class="quick-log-section">
      <button class="quick-log-btn" data-ui-id="home-quick-log-button" aria-label="一键记录">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <title>打开记录类型选择器</title>
          <path d="M12 5v14M5 12h14"/>
        </svg>
        <span class="quick-log-text">一键记录</span>
      </button>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">今日提醒</h2>
        <a href="#" class="section-link" data-ui-id="home-see-all-records-link">全部</a>
      </div>
      <div class="reminder-list" data-ui-id="home-reminder-list">
        <div class="reminder-card" data-ui-id="home-reminder-1">
          <div class="reminder-type">疫苗</div>
          <div class="reminder-title">狂犬疫苗加强针</div>
          <div class="reminder-date">今天 14:00</div>
        </div>
        <div class="reminder-card pink" data-ui-id="home-reminder-2">
          <div class="reminder-type">驱虫</div>
          <div class="reminder-title">体外驱虫滴剂</div>
          <div class="reminder-date">3 天后</div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">最近记录</h2>
        <a href="#" class="section-link" data-ui-id="home-see-all-records-link">查看全部</a>
      </div>
      <div class="timeline" data-ui-id="home-recent-record-list">
        <div class="timeline-item" data-ui-id="home-recent-record-101" style="position:relative;">
          <div class="timeline-line"></div>
          <div class="timeline-dot food"></div>
          <div class="timeline-content">
            <div class="timeline-top">
              <span class="timeline-type-chip chip-food">饮食</span>
              <span class="timeline-time">07:30</span>
            </div>
            <div class="timeline-text">早餐 45g 猫粮</div>
            <div class="timeline-detail">鸡肉口味 · 全部吃完</div>
          </div>
        </div>
        <div class="timeline-item" data-ui-id="home-recent-record-102" style="position:relative;">
          <div class="timeline-line"></div>
          <div class="timeline-dot toilet"></div>
          <div class="timeline-content">
            <div class="timeline-top">
              <span class="timeline-type-chip chip-toilet">排泄</span>
              <span class="timeline-time">06:50</span>
            </div>
            <div class="timeline-text">小便 1 次</div>
            <div class="timeline-detail">颜色正常 · 无异味</div>
          </div>
        </div>
        <div class="timeline-item" data-ui-id="home-recent-record-103">
          <div class="timeline-dot weight"></div>
          <div class="timeline-content">
            <div class="timeline-top">
              <span class="timeline-type-chip chip-weight">体重</span>
              <span class="timeline-time">昨天</span>
            </div>
            <div class="timeline-text">体重 4.6 kg</div>
            <div class="timeline-detail">较上周 -0.1 kg</div>
          </div>
        </div>
      </div>
    </section>

    <section class="health-summary-card" data-ui-id="home-health-summary-card">
      <div class="health-summary-header">
        <span class="health-summary-title">健康概览 · 近 7 天</span>
        <span class="health-summary-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><title>进入健康详情页</title><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
      <div class="health-metrics">
        <div class="metric-box"><div class="metric-value">28</div><div class="metric-label">饮食记录</div></div>
        <div class="metric-box"><div class="metric-value">4.6</div><div class="metric-label">体重 kg</div></div>
        <div class="metric-box"><div class="metric-value">2</div><div class="metric-label">待办提醒</div></div>
      </div>
    </section>
  </div>

  <nav class="tabbar">
    <a href="#" class="tab-item active" data-ui-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>首页标签</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="tab-label">首页</span>
    </a>
    <a href="#" class="tab-item" data-ui-id="tab-records">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>记录标签</title><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span class="tab-label">记录</span>
    </a>
    <div class="fab-wrap">
      <button class="fab" aria-label="添加记录">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><title>快捷添加新记录</title><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <a href="#" class="tab-item" data-ui-id="tab-health">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>健康标签</title><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      <span class="tab-label">健康</span>
    </a>
    <a href="#" class="tab-item" data-ui-id="tab-family">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>家庭标签</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="tab-label">家庭</span>
    </a>
  </nav>
</body>
</html>
