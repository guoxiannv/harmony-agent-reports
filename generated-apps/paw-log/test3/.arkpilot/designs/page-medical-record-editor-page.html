<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 PawLog - 病历编辑</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #F3F4F6; color: #1F2937;
      max-width: 390px; margin: 0 auto; min-height: 100vh;
      position: relative; overflow-x: hidden;
    }
    .page { padding: 0 20px 120px; }
    .header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.8); backdrop-filter: blur(24px) saturate(150%);
      border-bottom: 1px solid rgba(255,255,255,0.65);
      margin: 0 -20px; padding: 52px 20px 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 14px; background: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(31,41,55,0.07); border: none; cursor: pointer;
    }
    .back-btn svg { width: 22px; height: 22px; color: #4B5563; }
    .page-title { font-size: 20px; font-weight: 700; flex: 1; }
    .save-btn {
      padding: 10px 20px; border-radius: 999px;
      background: linear-gradient(135deg, #8EEDDB 0%, #45C4AD 100%);
      color: #fff; font-size: 14px; font-weight: 700;
      box-shadow: 0 10px 22px rgba(69,196,173,0.28);
      border: none; cursor: pointer;
    }
    .form-card {
      background: #fff; border-radius: 24px; padding: 20px;
      box-shadow: 0 12px 32px rgba(31,41,55,0.08);
      margin-top: 18px; margin-bottom: 16px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label { display: block; font-size: 13px; font-weight: 700; color: #4B5563; margin-bottom: 8px; }
    .form-input {
      width: 100%; height: 52px; border-radius: 16px; border: none;
      background: #F3F4F6; padding: 0 18px; font-size: 15px; color: #1F2937; outline: none;
    }
    .form-input:focus { background: #fff; box-shadow: 0 0 0 2px #5DD9C1, 0 0 0 5px #E6FAF6; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .photo-add, .photo-thumb {
      aspect-ratio: 1; border-radius: 18px; background: #F3F4F6;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .photo-add { border: 2px dashed #D1D5DB; color: #9CA3AF; flex-direction: column; gap: 6px; }
    .photo-add svg { width: 24px; height: 24px; }
    .photo-add span { font-size: 11px; font-weight: 600; }
    .photo-thumb { background: linear-gradient(135deg, #FFF0ED, #FFD6CE); position: relative; }
    .photo-thumb svg { width: 32px; height: 32px; color: #D96C5A; }
    .delete-btn {
      width: 100%; padding: 16px; border-radius: 24px;
      background: linear-gradient(135deg, #FFB8C9 0%, #F28DA6 100%);
      color: #fff; font-size: 15px; font-weight: 700;
      box-shadow: 0 10px 22px rgba(242,141,166,0.24);
      border: none; cursor: pointer;
    }
  </style>
</head>
<body data-page-id="medical-record-editor-page">
  <div class="page">
    <header class="header">
      <button class="back-btn" data-ui-id="medical-detail-back-button" aria-label="返回">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="page-title">病历编辑</h1>
      <button class="save-btn" data-ui-id="medical-editor-save-button">保存</button>
    </header>

    <div class="form-card">
      <div class="form-group">
        <label class="form-label">选择宠物</label>
        <select class="form-input" data-ui-id="medical-editor-pet-picker">
          <option>豆豆</option>
          <option>年糕</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">就诊日期</label>
          <input type="date" class="form-input" value="2026-05-12" data-ui-id="medical-editor-date-picker" />
        </div>
        <div class="form-group">
          <label class="form-label">费用 (元)</label>
          <input type="number" class="form-input" value="320" placeholder="0" data-ui-id="medical-editor-cost-input" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">医院 / 诊所</label>
        <input type="text" class="form-input" value="安心宠物医院" placeholder="医院名称" data-ui-id="medical-editor-clinic-input" />
      </div>

      <div class="form-group">
        <label class="form-label">医生</label>
        <input type="text" class="form-input" value="李医生" placeholder="医生姓名" data-ui-id="medical-editor-doctor-input" />
      </div>

      <div class="form-group">
        <label class="form-label">主诉</label>
        <textarea class="form-input" style="height:80px;padding:14px 18px;resize:none;" placeholder="宠物有哪些异常表现..." data-ui-id="medical-editor-complaint-input">年度例行体检</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">诊断</label>
        <textarea class="form-input" style="height:80px;padding:14px 18px;resize:none;" placeholder="医生诊断结果..." data-ui-id="medical-editor-diagnosis-input">健康状况良好，体重略轻</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">治疗方案</label>
        <textarea class="form-input" style="height:80px;padding:14px 18px;resize:none;" placeholder="用药、护理建议..." data-ui-id="medical-editor-treatment-input">建议增加 10% 食量，一个月后复查</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">图片附件</label>
        <div class="photo-grid" data-ui-id="medical-editor-photo-grid">
          <div class="photo-thumb">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>病历图片预览</title><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
          <div class="photo-add">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>添加病历图片</title><path d="M12 5v14M5 12h14"/></svg>
            <span>添加照片</span>
          </div>
        </div>
      </div>
    </div>

    <button class="delete-btn" data-ui-id="medical-editor-delete-button">删除病历</button>
  </div>
</body>
</html>
