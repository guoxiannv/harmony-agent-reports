<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹 PawLog - 宠物档案编辑</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #F3F4F6; color: #1F2937;
      max-width: 390px; margin: 0 auto; min-height: 100vh;
      position: relative; overflow-x: hidden;
    }
    .page { padding: 0 20px 120px; }
    .header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.8); backdrop-filter: blur(24px) saturate(150%);
      border-bottom: 1px solid rgba(255,255,255,0.65);
      margin: 0 -20px; padding: 52px 20px 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 14px; background: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(31,41,55,0.07); border: none; cursor: pointer;
    }
    .back-btn svg { width: 22px; height: 22px; color: #4B5563; }
    .page-title { font-size: 20px; font-weight: 700; flex: 1; }
    .save-btn {
      padding: 10px 20px; border-radius: 999px;
      background: linear-gradient(135deg, #8EEDDB 0%, #45C4AD 100%);
      color: #fff; font-size: 14px; font-weight: 700;
      box-shadow: 0 10px 22px rgba(69,196,173,0.28);
      border: none; cursor: pointer;
    }
    .avatar-section { display: flex; justify-content: center; margin: 24px 0; }
    .avatar-picker {
      width: 110px; height: 110px; border-radius: 50%;
      background: linear-gradient(135deg, #FFDDE6 0%, #FF9DAF 100%);
      display: flex; align-items: center; justify-content: center;
      border: 4px solid #fff; box-shadow: 0 8px 24px rgba(31,41,55,0.12);
      cursor: pointer; position: relative;
    }
    .avatar-picker svg { width: 48px; height: 48px; color: #fff; }
    .avatar-edit-badge {
      position: absolute; bottom: 4px; right: 4px;
      width: 32px; height: 32px; border-radius: 50%; background: #5DD9C1;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #fff;
    }
    .avatar-edit-badge svg { width: 16px; height: 16px; color: #fff; }
    .form-card {
      background: #fff; border-radius: 24px; padding: 20px;
      box-shadow: 0 12px 32px rgba(31,41,55,0.08);
      margin-bottom: 16px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label { display: block; font-size: 13px; font-weight: 700; color: #4B5563; margin-bottom: 8px; }
    .form-input {
      width: 100%; height: 52px; border-radius: 16px; border: none;
      background: #F3F4F6; padding: 0 18px; font-size: 15px; color: #1F2937; outline: none;
    }
    .form-input:focus { background: #fff; box-shadow: 0 0 0 2px #5DD9C1, 0 0 0 5px #E6FAF6; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .radio-group { display: flex; gap: 10px; }
    .radio-chip {
      flex: 1; padding: 12px; border-radius: 16px; background: #F3F4F6;
      text-align: center; font-size: 14px; font-weight: 600; color: #4B5563;
      border: 2px solid transparent; cursor: pointer;
    }
    .radio-chip.active { background: #E6FAF6; color: #3CB5A0; border-color: #5DD9C1; }
    .tags-input {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 10px;
      background: #F3F4F6; border-radius: 16px;
    }
    .tag {
      padding: 6px 12px; border-radius: 10px; background: #E6FAF6;
      color: #3CB5A0; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; gap: 4px;
    }
    .tag svg { width: 12px; height: 12px; }
    .tag-add { padding: 6px 12px; border-radius: 10px; background: #fff; color: #9CA3AF; font-size: 12px; font-weight: 700; }
    .delete-btn {
      width: 100%; padding: 16px; border-radius: 24px;
      background: linear-gradient(135deg, #FFB8C9 0%, #F28DA6 100%);
      color: #fff; font-size: 15px; font-weight: 700;
      box-shadow: 0 10px 22px rgba(242,141,166,0.24);
      border: none; cursor: pointer; margin-top: 8px;
    }
  </style>
</head>
<body data-page-id="pet-editor-page">
  <div class="page">
    <header class="header">
      <button class="back-btn" data-ui-id="record-detail-back-button" aria-label="返回">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="page-title">编辑宠物档案</h1>
      <button class="save-btn" data-ui-id="pet-editor-save-button">保存</button>
    </header>

    <div class="avatar-section">
      <div class="avatar-picker" data-ui-id="pet-editor-avatar-picker">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>宠物头像占位</title><path d="M12 5c.5 0 1 .2 1.4.6.4.4.6.9.6 1.4 0 .5-.2 1-.6 1.4-.4.4-.9.6-1.4.6s-1-.2-1.4-.6c-.4-.4-.6-.9-.6-1.4 0-.5.2-1 .6-1.4.4-.4.9-.6 1.4-.6z"/><path d="M6 9c.5 0 1 .2 1.4.6.4.4.6.9.6 1.4 0 .5-.2 1-.6 1.4-.4.4-.9.6-1.4.6s-1-.2-1.4-.6C4 12 3.8 11.5 3.8 11c0-.5.2-1 .6-1.4.4-.4.9-.6 1.4-.6z"/><path d="M18 9c.5 0 1 .2 1.4.6.4.4.6.9.6 1.4 0 .5-.2 1-.6 1.4-.4.4-.9.6-1.4.6s-1-.2-1.4-.6c-.4-.4-.6-.9-.6-1.4 0-.5.2-1 .6-1.4.4-.4.9-.6 1.4-.6z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/></svg>
        <div class="avatar-edit-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>更换头像</title><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-group">
        <label class="form-label">昵称</label>
        <input type="text" class="form-input" value="豆豆" placeholder="给它起个名字" data-ui-id="pet-editor-name-input" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">物种</label>
          <select class="form-input" data-ui-id="pet-editor-species-picker">
            <option>猫</option>
            <option>狗</option>
            <option>其他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">品种</label>
          <input type="text" class="form-input" value="英国短毛猫" placeholder="品种" data-ui-id="pet-editor-breed-input" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">性别</label>
        <div class="radio-group" data-ui-id="pet-editor-gender-picker">
          <div class="radio-chip active">弟弟</div>
          <div class="radio-chip">妹妹</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">生日</label>
          <input type="date" class="form-input" value="2024-06-15" data-ui-id="pet-editor-birthdate-picker" />
        </div>
        <div class="form-group">
          <label class="form-label">体重 (kg)</label>
          <input type="number" class="form-input" value="4.6" placeholder="0.0" data-ui-id="pet-editor-weight-input" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">性格标签</label>
        <div class="tags-input" data-ui-id="pet-editor-tags-input">
          <span class="tag">黏人 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>删除标签</title><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
          <span class="tag">挑食 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>删除标签</title><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
          <span class="tag-add">+ 添加</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">备注</label>
        <textarea class="form-input" style="height:100px;padding:14px 18px;resize:none;" placeholder="写下关于它的特别注意事项..." data-ui-id="pet-editor-notes-input"></textarea>
      </div>
    </div>

    <button class="delete-btn" data-ui-id="pet-editor-delete-button">删除宠物档案</button>
  </div>
</body>
</html>
