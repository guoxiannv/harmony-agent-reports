<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PawLog 新增记录</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'HarmonyOS Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #FFFBF7;
  color: #2E2B29;
  min-height: 100vh;
}
.app-shell { max-width: 390px; margin: 0 auto; position: relative; min-height: 100vh; padding-bottom: 110px; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 50px 16px 14px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 12px; background: #fff;
  border: none; display: grid; place-items: center; box-shadow: 0 2px 8px rgba(46,43,41,0.05); cursor: pointer;
}
.back-btn svg { width: 20px; height: 20px; color: #5C5856; }
.page-title { font-size: 24px; font-weight: 800; letter-spacing: -0.01em; }
.save-btn {
  background: linear-gradient(135deg, #9BE8CA 0%, #7FDEB8 100%);
  color: #fff; border: none; border-radius: 18px; padding: 9px 18px;
  font-size: 14px; font-weight: 700; box-shadow: 0 4px 12px rgba(127,222,184,0.28); cursor: pointer;
}
.content { padding: 0 16px; }
.form-group { margin-bottom: 20px; }
.form-label { font-size: 13px; font-weight: 700; color: #5C5856; margin-bottom: 8px; display: block; }
.type-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.type-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  background: #F7F5F3; border-radius: 18px; padding: 12px 0; border: 1.5px solid transparent; cursor: pointer;
}
.type-btn .icon-wrap {
  width: 44px; height: 44px; border-radius: 50%; background: #EEFCF6; display: grid; place-items: center;
}
.type-btn svg { width: 22px; height: 22px; color: #4BBF9A; }
.type-btn span { font-size: 11px; font-weight: 600; color: #5C5856; }
.type-btn.active { background: #EEFCF6; border-color: #7FDEB8; }
.type-btn.active .icon-wrap { background: linear-gradient(135deg, #7FDEB8 0%, #5DD3A8 100%); }
.type-btn.active svg { color: #fff; }
.type-btn.active span { color: #4BBF9A; }
.input-field {
  width: 100%; background: #F7F5F3; border: 1.5px solid #EDE9E5; border-radius: 16px;
  padding: 15px 17px; font-size: 15px; color: #2E2B29; outline: none;
}
.input-field:focus { border-color: #7FDEB8; box-shadow: 0 0 0 4px rgba(127,222,184,0.28); }
.input-field::placeholder { color: #A8A29C; }
.pet-selector {
  display: flex; align-items: center; justify-content: space-between;
  background: #F7F5F3; border: 1.5px solid #EDE9E5; border-radius: 16px; padding: 12px 14px; cursor: pointer;
}
.pet-selector-left { display: flex; align-items: center; gap: 10px; }
.pet-selector-avatar { width: 34px; height: 34px; border-radius: 50%; background: #EEFCF6; display: grid; place-items: center; }
.pet-selector-avatar svg { width: 18px; height: 18px; color: #4BBF9A; }
.pet-selector-name { font-size: 15px; font-weight: 700; color: #2E2B29; }
.pet-selector svg { width: 16px; height: 16px; color: #A8A29C; }
.textarea {
  min-height: 90px; resize: none;
}
.unit-hint { font-size: 12px; color: #8C8682; margin-top: 6px; }
.button-row { display: flex; gap: 12px; margin-top: 8px; }
.btn-secondary {
  flex: 1; background: #fff; border: 2px solid #EDE9E5; color: #5C5856;
  border-radius: 26px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer;
}
.btn-primary {
  flex: 2; background: linear-gradient(135deg, #9BE8CA 0%, #7FDEB8 50%, #5DD3A8 100%);
  color: #fff; border: none; border-radius: 26px; padding: 14px; font-size: 15px; font-weight: 700;
  box-shadow: 0 8px 22px rgba(75,191,154,0.38); cursor: pointer;
}
</style>
</head>
<body data-page-id="add-record-page">
<div class="app-shell">
  <header class="header">
    <button class="back-btn" data-ui-id="add-record-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1 class="page-title">新增记录</h1>
    <button class="save-btn" data-ui-id="add-record-save">保存</button>
  </header>

  <div class="content">
    <div class="form-group">
      <label class="form-label">选择宠物</label>
      <div class="pet-selector" data-ui-id="add-record-pet-picker">
        <div class="pet-selector-left">
          <div class="pet-selector-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>已选宠物头像</title><path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.4V10h4c2.2 0 4 1.8 4 4v2a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4v-2c0-2.2 1.8-4 4-4h4V9.4A4 4 0 0 1 8 6a4 4 0 0 1 4-4z"/></svg>
          </div>
          <span class="pet-selector-name">Mochi</span>
        </div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>展开宠物选择</title><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">记录类型</label>
      <div class="type-grid">
        <button class="type-btn active" data-ui-id="add-record-type-food">
          <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>选择饮食记录类型</title><path d="M4 10h16v6a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4z"/><path d="M6 10V7a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v3"/></svg></div>
          <span>饮食</span>
        </button>
        <button class="type-btn" data-ui-id="add-record-type-waste">
          <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>选择排泄记录类型</title><path d="M12 21c3.5 0 6-3 6-7 0-4-3-7-6-7s-6 3-6 7c0 4 2.5 7 6 7z"/><path d="M12 11v4"/><path d="M9 14h6"/></svg></div>
          <span>排泄</span>
        </button>
        <button class="type-btn" data-ui-id="add-record-type-weight">
          <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>选择体重记录类型</title><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M12 10v4"/><path d="M10 12h4"/></svg></div>
          <span>体重</span>
        </button>
        <button class="type-btn" data-ui-id="add-record-type-medicine">
          <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>选择用药记录类型</title><path d="M10.5 20.5 3.5 13.5a4.2 4.2 0 0 1 0-6l6-6a4.2 4.2 0 0 1 6 0l7 7a4.2 4.2 0 0 1 0 6l-6 6a4.2 4.2 0 0 1-6 0z"/><path d="m7 7 10 10"/></svg></div>
          <span>用药</span>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">数量 / 数值</label>
      <input type="text" class="input-field" placeholder="例如：35" data-ui-id="add-record-value" />
      <div class="unit-hint">当前单位为克（g）</div>
    </div>

    <div class="form-group">
      <label class="form-label">时间</label>
      <input type="text" class="input-field" placeholder="2026-06-22 08:30" data-ui-id="add-record-datetime" />
    </div>

    <div class="form-group">
      <label class="form-label">备注</label>
      <textarea class="input-field textarea" placeholder="写下更多细节..." data-ui-id="add-record-note"></textarea>
    </div>

    <div class="button-row">
      <button class="btn-secondary" data-ui-id="add-record-cancel">取消</button>
      <button class="btn-primary" data-ui-id="add-record-save">保存记录</button>
    </div>
  </div>
</div>
</body>
</html>
