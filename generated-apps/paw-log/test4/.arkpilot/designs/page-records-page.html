<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PawLog 记录</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'HarmonyOS Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #FFFBF7;
  color: #2E2B29;
  min-height: 100vh;
}
.app-shell { max-width: 390px; margin: 0 auto; position: relative; min-height: 100vh; padding-bottom: 130px; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 50px 16px 14px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 12px; background: #fff;
  border: none; display: grid; place-items: center; box-shadow: 0 2px 8px rgba(46,43,41,0.05);
}
.back-btn svg { width: 20px; height: 20px; color: #5C5856; }
.page-title { font-size: 24px; font-weight: 800; letter-spacing: -0.01em; }
.add-btn {
  width: 40px; height: 40px; border-radius: 14px; background: linear-gradient(135deg, #9BE8CA 0%, #7FDEB8 100%);
  border: none; display: grid; place-items: center; box-shadow: 0 4px 12px rgba(127,222,184,0.28); cursor: pointer;
}
.add-btn svg { width: 22px; height: 22px; color: #fff; }
.content { padding: 0 16px; }
.filter-bar {
  display: flex; gap: 10px; margin-bottom: 18px;
}
.filter-chip {
  display: flex; align-items: center; gap: 6px;
  background: #F7F5F3; border-radius: 18px; padding: 10px 16px;
  font-size: 13px; font-weight: 600; color: #5C5856; border: 1.5px solid transparent;
}
.filter-chip.active { background: #EEFCF6; border-color: #7FDEB8; color: #4BBF9A; }
.filter-chip svg { width: 14px; height: 14px; }
.timeline { display: flex; flex-direction: column; gap: 12px; }
.timeline-item { display: flex; gap: 12px; }
.timeline-dot {
  width: 12px; height: 12px; border-radius: 50%; margin-top: 14px; margin-left: 6px;
  flex-shrink: 0; position: relative;
}
.timeline-dot::after {
  content: ''; position: absolute; left: 5px; top: 12px; width: 2px; height: calc(100% + 12px);
  border-left: 2px dashed #EDE9E5;
}
.timeline-item:last-child .timeline-dot::after { display: none; }
.timeline-card {
  flex: 1; background: #fff; border-radius: 18px; padding: 14px 16px;
  box-shadow: 0 6px 18px rgba(46,43,41,0.06);
}
.timeline-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.timeline-title { font-size: 15px; font-weight: 700; color: #2E2B29; }
.timeline-time { font-size: 12px; font-weight: 500; color: #A8A29C; }
.timeline-pet { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8C8682; margin-bottom: 4px; }
.timeline-pet-avatar { width: 16px; height: 16px; border-radius: 50%; background: #EEFCF6; }
.timeline-note { font-size: 13px; color: #5C5856; }
.badge {
  display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; margin-left: 6px;
}
.badge-food { background: rgba(127,222,184,0.15); color: #4BBF9A; }
.badge-waste { background: rgba(232,134,148,0.15); color: #E88694; }
.badge-weight { background: rgba(93,185,240,0.15); color: #5DB9F0; }
.badge-medicine { background: rgba(184,169,232,0.15); color: #B8A9E8; }
.bottom-tab {
  position: fixed; left: 50%; bottom: 0; transform: translateX(-50%);
  width: 100%; max-width: 390px; height: 76px;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(24px) saturate(180%);
  box-shadow: 0 -6px 20px rgba(46,43,41,0.05);
  border-radius: 30px 30px 0 0;
  display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px;
  z-index: 99;
}
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding-top: 4px; color: #B8B2AE; text-decoration: none; }
.tab-item.active { color: #4BBF9A; }
.tab-item svg { width: 24px; height: 24px; }
.tab-item span { font-size: 11px; font-weight: 600; }
.tab-placeholder { width: 60px; }
.fab {
  width: 60px; height: 60px; border-radius: 50%;
  background: linear-gradient(135deg, #7FDEB8 0%, #4BBF9A 100%);
  box-shadow: 0 8px 24px rgba(75,191,154,0.42);
  display: grid; place-items: center; border: none; cursor: pointer;
  position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
  z-index: 100;
}
.fab svg { width: 28px; height: 28px; color: #fff; }
</style>
</head>
<body data-page-id="records-page" data-tab-id="tab-records">
<div class="app-shell">
  <header class="header">
    <button class="back-btn" data-ui-id="records-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1 class="page-title">记录中心</h1>
    <button class="add-btn" data-ui-id="records-add-button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><title>新增一条记录</title><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </header>

  <div class="content">
    <div class="filter-bar">
      <div class="filter-chip active" data-ui-id="records-filter-pet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>按宠物筛选</title><path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.4V10h4c2.2 0 4 1.8 4 4v2a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4v-2c0-2.2 1.8-4 4-4h4V9.4A4 4 0 0 1 8 6a4 4 0 0 1 4-4z"/></svg>
        <span>全部宠物</span>
      </div>
      <div class="filter-chip" data-ui-id="records-filter-type">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>按类型筛选</title><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        <span>全部类型</span>
      </div>
    </div>

    <div class="timeline" data-ui-id="records-list">
      <div class="timeline-item" id="records-item-1">
        <div class="timeline-dot" style="background:#7FDEB8;"></div>
        <div class="timeline-card">
          <div class="timeline-pet">
            <div class="timeline-pet-avatar"></div>
            <span>Mochi</span>
          </div>
          <div class="timeline-top">
            <div>
              <span class="timeline-title">早餐：猫粮 35g</span>
              <span class="badge badge-food">饮食</span>
            </div>
            <span class="timeline-time">今天 08:30</span>
          </div>
          <div class="timeline-note">吃得很快，光盘。</div>
        </div>
      </div>
      <div class="timeline-item" id="records-item-2">
        <div class="timeline-dot" style="background:#E88694;"></div>
        <div class="timeline-card">
          <div class="timeline-pet">
            <div class="timeline-pet-avatar" style="background:#FFF0F2;"></div>
            <span>Mochi</span>
          </div>
          <div class="timeline-top">
            <div>
              <span class="timeline-title">排便正常</span>
              <span class="badge badge-waste">排泄</span>
            </div>
            <span class="timeline-time">今天 07:15</span>
          </div>
          <div class="timeline-note">成型，无异味。</div>
        </div>
      </div>
      <div class="timeline-item" id="records-item-3">
        <div class="timeline-dot" style="background:#5DB9F0;"></div>
        <div class="timeline-card">
          <div class="timeline-pet">
            <div class="timeline-pet-avatar" style="background:#EEFCF6;"></div>
            <span>Bobo</span>
          </div>
          <div class="timeline-top">
            <div>
              <span class="timeline-title">体重 28.5kg</span>
              <span class="badge badge-weight">体重</span>
            </div>
            <span class="timeline-time">昨天 21:00</span>
          </div>
          <div class="timeline-note">比上周轻了 0.3kg。</div>
        </div>
      </div>
    </div>
  </div>

  <button class="fab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><title>打开新增记录</title><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <nav class="bottom-tab">
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>首页标签</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>爱宠标签</title><path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.4V10h4c2.2 0 4 1.8 4 4v2a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4v-2c0-2.2 1.8-4 4-4h4V9.4A4 4 0 0 1 8 6a4 4 0 0 1 4-4z"/></svg>
      <span>爱宠</span>
    </a>
    <div class="tab-placeholder"></div>
    <a href="#" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>健康标签</title><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1 7.8 7.8 7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      <span>健康</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>家人标签</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>家人</span>
    </a>
  </nav>
</div>
</body>
</html>
