<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PawLog 宠物详情</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'HarmonyOS Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(180deg, #EEFCF6 0%, #FFFBF7 40%);
  color: #2E2B29;
  min-height: 100vh;
}
.app-shell { max-width: 390px; margin: 0 auto; position: relative; min-height: 100vh; padding-bottom: 110px; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 50px 16px 14px;
}
.back-btn, .edit-btn {
  width: 36px; height: 36px; border-radius: 12px; background: #fff;
  border: none; display: grid; place-items: center; box-shadow: 0 2px 8px rgba(46,43,41,0.05); cursor: pointer;
}
.back-btn svg, .edit-btn svg { width: 20px; height: 20px; color: #5C5856; }
.page-title { font-size: 20px; font-weight: 800; letter-spacing: -0.01em; }
.profile {
  display: flex; flex-direction: column; align-items: center; padding: 10px 0 24px;
}
.profile-avatar {
  width: 100px; height: 100px; border-radius: 50%; background: #EEFCF6;
  display: grid; place-items: center; box-shadow: 0 8px 24px rgba(127,222,184,0.25);
}
.profile-avatar svg { width: 52px; height: 52px; color: #4BBF9A; }
.profile-name { font-size: 24px; font-weight: 800; margin-top: 14px; }
.profile-sub { font-size: 14px; color: #8C8682; margin-top: 4px; }
.info-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px 20px;
}
.info-card {
  background: #fff; border-radius: 18px; padding: 14px 8px; text-align: center;
  box-shadow: 0 6px 18px rgba(46,43,41,0.06);
}
.info-value { font-size: 16px; font-weight: 800; color: #2E2B29; }
.info-label { font-size: 11px; font-weight: 600; color: #8C8682; margin-top: 3px; }
.action-row {
  display: flex; gap: 12px; padding: 0 16px 24px;
}
.btn-add-record {
  flex: 1; background: linear-gradient(135deg, #9BE8CA 0%, #7FDEB8 50%, #5DD3A8 100%);
  color: #fff; border: none; border-radius: 26px; padding: 14px; font-size: 15px; font-weight: 700;
  box-shadow: 0 8px 22px rgba(75,191,154,0.38); cursor: pointer;
}
.btn-delete {
  width: 50px; background: linear-gradient(135deg, #FFB8C1 0%, #E88694 100%);
  border: none; border-radius: 18px; display: grid; place-items: center; cursor: pointer;
}
.btn-delete svg { width: 20px; height: 20px; color: #fff; }
.content { padding: 0 16px; }
.section-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
.timeline { display: flex; flex-direction: column; gap: 12px; }
.timeline-item { display: flex; gap: 12px; }
.timeline-dot {
  width: 12px; height: 12px; border-radius: 50%; margin-top: 14px; margin-left: 6px;
  flex-shrink: 0; position: relative;
}
.timeline-dot::after {
  content: ''; position: absolute; left: 5px; top: 12px; width: 2px; height: calc(100% + 12px);
  border-left: 2px dashed #EDE9E5;
}
.timeline-item:last-child .timeline-dot::after { display: none; }
.timeline-card {
  flex: 1; background: #fff; border-radius: 18px; padding: 14px 16px;
  box-shadow: 0 6px 18px rgba(46,43,41,0.06);
}
.timeline-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.timeline-title { font-size: 15px; font-weight: 700; color: #2E2B29; }
.timeline-time { font-size: 12px; font-weight: 500; color: #A8A29C; }
.timeline-note { font-size: 13px; color: #5C5856; }
.badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; margin-left: 6px; }
.badge-food { background: rgba(127,222,184,0.15); color: #4BBF9A; }
.badge-waste { background: rgba(232,134,148,0.15); color: #E88694; }
.badge-weight { background: rgba(93,185,240,0.15); color: #5DB9F0; }
.badge-medicine { background: rgba(184,169,232,0.15); color: #B8A9E8; }
</style>
</head>
<body data-page-id="pet-detail-page">
<div class="app-shell">
  <header class="header">
    <button class="back-btn" data-ui-id="pet-detail-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1 class="page-title">宠物档案</h1>
    <button class="edit-btn" data-ui-id="pet-detail-edit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>编辑宠物档案</title><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
  </header>

  <div class="profile">
    <div class="profile-avatar" data-ui-id="pet-detail-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Mochi 头像</title><path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.4V10h4c2.2 0 4 1.8 4 4v2a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4v-2c0-2.2 1.8-4 4-4h4V9.4A4 4 0 0 1 8 6a4 4 0 0 1 4-4z"/></svg>
    </div>
    <div class="profile-name" data-ui-id="pet-detail-name">Mochi</div>
    <div class="profile-sub">英国短毛猫 · 弟弟 · 已绝育</div>
  </div>

  <div class="info-grid">
    <div class="info-card" data-ui-id="pet-detail-info-breed">
      <div class="info-value">英短</div>
      <div class="info-label">品种</div>
    </div>
    <div class="info-card" data-ui-id="pet-detail-info-age">
      <div class="info-value">2岁3月</div>
      <div class="info-label">年龄</div>
    </div>
    <div class="info-card" data-ui-id="pet-detail-info-weight">
      <div class="info-value">4.6kg</div>
      <div class="info-label">体重</div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn-add-record" data-ui-id="pet-detail-add-record">+ 记一笔</button>
    <button class="btn-delete" data-ui-id="pet-detail-delete">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>删除宠物档案</title><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
  </div>

  <div class="content">
    <h2 class="section-title">近期记录</h2>
    <div class="timeline" data-ui-id="pet-detail-record-list">
      <div class="timeline-item" id="pet-detail-record-1">
        <div class="timeline-dot" style="background:#7FDEB8;"></div>
        <div class="timeline-card">
          <div class="timeline-top">
            <div>
              <span class="timeline-title">早餐：猫粮 35g</span>
              <span class="badge badge-food">饮食</span>
            </div>
            <span class="timeline-time">今天 08:30</span>
          </div>
          <div class="timeline-note">吃得很快，光盘。</div>
        </div>
      </div>
      <div class="timeline-item" id="pet-detail-record-2">
        <div class="timeline-dot" style="background:#E88694;"></div>
        <div class="timeline-card">
          <div class="timeline-top">
            <div>
              <span class="timeline-title">排便正常</span>
              <span class="badge badge-waste">排泄</span>
            </div>
            <span class="timeline-time">今天 07:15</span>
          </div>
          <div class="timeline-note">成型，无异味。</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
