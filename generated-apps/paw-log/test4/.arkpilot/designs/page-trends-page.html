<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PawLog 健康趋势</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'HarmonyOS Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #FFFBF7;
  color: #2E2B29;
  min-height: 100vh;
}
.app-shell { max-width: 390px; margin: 0 auto; position: relative; min-height: 100vh; padding-bottom: 130px; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 50px 16px 14px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 12px; background: #fff;
  border: none; display: grid; place-items: center; box-shadow: 0 2px 8px rgba(46,43,41,0.05);
}
.back-btn svg { width: 20px; height: 20px; color: #5C5856; }
.page-title { font-size: 24px; font-weight: 800; letter-spacing: -0.01em; }
.content { padding: 0 16px; }
.selector-row {
  display: flex; gap: 10px; margin-bottom: 14px;
}
.selector {
  flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 8px;
  background: #fff; border-radius: 16px; padding: 12px 14px;
  box-shadow: 0 2px 8px rgba(46,43,41,0.05); font-size: 14px; font-weight: 700; color: #2E2B29;
}
.selector svg { width: 16px; height: 16px; color: #A8A29C; }
.period-row {
  display: flex; gap: 8px; margin-bottom: 18px;
}
.period-btn {
  flex: 1; text-align: center; padding: 10px 0; border-radius: 14px;
  background: #F7F5F3; border: 1.5px solid transparent; font-size: 13px; font-weight: 700; color: #5C5856;
}
.period-btn.active { background: #EEFCF6; border-color: #7FDEB8; color: #4BBF9A; }
.chart-card {
  background: #fff; border-radius: 24px; padding: 18px;
  box-shadow: 0 8px 24px rgba(46,43,41,0.07); margin-bottom: 20px;
}
.chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.chart-title { font-size: 16px; font-weight: 700; }
.chart-value { font-size: 22px; font-weight: 800; color: #4BBF9A; }
.chart-sub { font-size: 12px; color: #8C8682; }
.chart-area {
  height: 180px; position: relative;
  background: linear-gradient(180deg, rgba(127,222,184,0.12) 0%, rgba(255,255,255,0) 70%);
  border-radius: 16px; overflow: hidden;
}
.chart-svg { width: 100%; height: 100%; }
.summary-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;
}
.summary-card {
  background: #fff; border-radius: 18px; padding: 14px 10px; text-align: center;
  box-shadow: 0 6px 18px rgba(46,43,41,0.05);
}
.summary-number { font-size: 18px; font-weight: 800; color: #2E2B29; }
.summary-label { font-size: 11px; font-weight: 600; color: #8C8682; margin-top: 3px; }
.insight-card {
  background: linear-gradient(135deg, #EEFCF6 0%, #D5F7E9 100%);
  border-radius: 20px; padding: 16px 18px;
  display: flex; align-items: flex-start; gap: 12px;
}
.insight-icon { width: 36px; height: 36px; border-radius: 12px; background: #fff; display: grid; place-items: center; flex-shrink: 0; }
.insight-icon svg { width: 20px; height: 20px; color: #4BBF9A; }
.insight-text { font-size: 14px; color: #5C5856; line-height: 1.55; }
.bottom-tab {
  position: fixed; left: 50%; bottom: 0; transform: translateX(-50%);
  width: 100%; max-width: 390px; height: 76px;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(24px) saturate(180%);
  box-shadow: 0 -6px 20px rgba(46,43,41,0.05);
  border-radius: 30px 30px 0 0;
  display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px;
  z-index: 99;
}
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding-top: 4px; color: #B8B2AE; text-decoration: none; }
.tab-item.active { color: #4BBF9A; }
.tab-item svg { width: 24px; height: 24px; }
.tab-item span { font-size: 11px; font-weight: 600; }
.tab-placeholder { width: 60px; }
.fab {
  width: 60px; height: 60px; border-radius: 50%;
  background: linear-gradient(135deg, #7FDEB8 0%, #4BBF9A 100%);
  box-shadow: 0 8px 24px rgba(75,191,154,0.42);
  display: grid; place-items: center; border: none; cursor: pointer;
  position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
  z-index: 100;
}
.fab svg { width: 28px; height: 28px; color: #fff; }
</style>
</head>
<body data-page-id="trends-page" data-tab-id="tab-trends">
<div class="app-shell">
  <header class="header">
    <button class="back-btn" data-ui-id="trends-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1 class="page-title">健康趋势</h1>
    <div style="width:36px;"></div>
  </header>

  <div class="content">
    <div class="selector-row">
      <div class="selector" data-ui-id="trends-pet-selector">
        <span>Mochi</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>选择宠物</title><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="selector" data-ui-id="trends-metric-selector">
        <span>体重</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>选择指标</title><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>

    <div class="period-row">
      <button class="period-btn" data-ui-id="trends-period-7d">7 天</button>
      <button class="period-btn active" data-ui-id="trends-period-30d">30 天</button>
      <button class="period-btn" data-ui-id="trends-period-90d">90 天</button>
    </div>

    <div class="chart-card" data-ui-id="trends-chart">
      <div class="chart-header">
        <div>
          <div class="chart-title">体重变化趋势</div>
          <div class="chart-sub">近 30 天 · kg</div>
        </div>
        <div class="chart-value" data-ui-id="trends-summary-value">4.6</div>
      </div>
      <div class="chart-area">
        <svg class="chart-svg" viewBox="0 0 320 160" preserveAspectRatio="none">
          <title>Mochi 近 30 天体重趋势图</title>
          <defs>
            <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#7FDEB8" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="#7FDEB8" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="M0 110 C30 105,60 100,90 95 S150 88,180 80 S240 72,320 60" fill="none" stroke="#4BBF9A" stroke-width="3" stroke-linecap="round"/>
          <path d="M0 110 C30 105,60 100,90 95 S150 88,180 80 S240 72,320 60 V160 H0 Z" fill="url(#lineGrad)"/>
          <circle cx="320" cy="60" r="5" fill="#fff" stroke="#4BBF9A" stroke-width="3"/>
          <line x1="0" y1="160" x2="320" y2="160" stroke="#EDE9E5" stroke-width="1"/>
        </svg>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-number">4.6kg</div>
        <div class="summary-label">当前体重</div>
      </div>
      <div class="summary-card">
        <div class="summary-number">-0.2kg</div>
        <div class="summary-label">30 天变化</div>
      </div>
      <div class="summary-card">
        <div class="summary-number">4.8kg</div>
        <div class="summary-label">最高体重</div>
      </div>
    </div>

    <div class="insight-card">
      <div class="insight-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>健康洞察图标</title><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div class="insight-text">Mochi 近 30 天体重轻微下降，建议观察饮食量是否稳定，并在 2 周后复测。</div>
    </div>
  </div>

  <button class="fab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><title>打开新增记录</title><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <nav class="bottom-tab">
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>首页标签</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>爱宠标签</title><path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.4V10h4c2.2 0 4 1.8 4 4v2a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4v-2c0-2.2 1.8-4 4-4h4V9.4A4 4 0 0 1 8 6a4 4 0 0 1 4-4z"/></svg>
      <span>爱宠</span>
    </a>
    <div class="tab-placeholder"></div>
    <a href="#" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>健康标签</title><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1 7.8 7.8 7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      <span>健康</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>家人标签</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>家人</span>
    </a>
  </nav>
</div>
</body>
</html>
