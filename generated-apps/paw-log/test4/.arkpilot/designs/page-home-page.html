<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PawLog 首页</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'HarmonyOS Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(180deg, #EEFCF6 0%, #FFFBF7 55%, #FFF0F2 100%);
  color: #2E2B29;
  min-height: 100vh;
}
.app-shell { max-width: 390px; margin: 0 auto; position: relative; min-height: 100vh; padding-bottom: 130px; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 50px 16px 14px;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.page-title { font-size: 24px; font-weight: 800; letter-spacing: -0.01em; }
.pet-switcher {
  display: flex; align-items: center; gap: 8px;
  background: #fff; border-radius: 20px; padding: 5px 12px 5px 5px;
  box-shadow: 0 2px 8px rgba(46,43,41,0.05);
}
.pet-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: #EEFCF6; display: grid; place-items: center;
}
.pet-avatar svg { width: 18px; height: 18px; }
.pet-name { font-size: 13px; font-weight: 700; color: #4BBF9A; }
.chevron { width: 14px; height: 14px; color: #A8A29C; }
.content { padding: 0 16px; }
.greeting { font-size: 15px; color: #5C5856; margin-bottom: 16px; }
.greeting strong { color: #2E2B29; }
.quick-actions {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px;
}
.quick-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  background: #fff; border-radius: 20px; padding: 12px 0;
  box-shadow: 0 6px 16px rgba(127,222,184,0.14);
  border: none; cursor: pointer;
}
.quick-btn .icon-wrap {
  width: 48px; height: 48px; border-radius: 50%; background: #EEFCF6;
  display: grid; place-items: center;
}
.quick-btn svg { width: 24px; height: 24px; color: #4BBF9A; }
.quick-btn span { font-size: 12px; font-weight: 600; color: #4BBF9A; }
.section-title {
  font-size: 18px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
}
.metrics-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px;
}
.metric-card {
  background: #fff; border-radius: 22px; padding: 18px;
  box-shadow: 0 8px 24px rgba(46,43,41,0.07);
}
.metric-card .icon-wrap {
  width: 44px; height: 44px; border-radius: 50%; background: #EEFCF6;
  display: grid; place-items: center; margin-bottom: 12px;
}
.metric-card svg { width: 24px; height: 24px; color: #4BBF9A; }
.metric-value { font-size: 26px; font-weight: 800; color: #2E2B29; letter-spacing: -0.02em; }
.metric-label { font-size: 12px; font-weight: 600; color: #8C8682; margin-top: 2px; }
.reminder-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
.reminder-card {
  background: linear-gradient(135deg, #FFF0F2 0%, #FFE4E8 50%, #FDD6DC 100%);
  border-radius: 20px; padding: 16px 18px;
  box-shadow: 0 8px 22px rgba(242,122,138,0.14);
  display: flex; align-items: center; gap: 12px;
  position: relative; overflow: hidden;
}
.reminder-card::before {
  content: ''; position: absolute; left: 0; top: 12px; bottom: 12px; width: 5px;
  background: #FFB8C1; border-radius: 0 4px 4px 0;
}
.reminder-card.due-soon::before { background: #F5C646; }
.reminder-icon { width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.7); display: grid; place-items: center; }
.reminder-icon svg { width: 22px; height: 22px; color: #E88694; }
.reminder-content { flex: 1; }
.reminder-title { font-size: 15px; font-weight: 700; color: #2E2B29; }
.reminder-sub { font-size: 12px; font-weight: 500; color: #8C8682; margin-top: 2px; }
.reminder-date { font-size: 12px; font-weight: 700; color: #E88694; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.view-all { font-size: 13px; font-weight: 700; color: #4BBF9A; }
.timeline { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
.timeline-item { display: flex; gap: 12px; }
.timeline-dot {
  width: 12px; height: 12px; border-radius: 50%; margin-top: 14px; margin-left: 6px;
  flex-shrink: 0; position: relative;
}
.timeline-dot::after {
  content: ''; position: absolute; left: 5px; top: 12px; width: 2px; height: calc(100% + 12px);
  border-left: 2px dashed #EDE9E5;
}
.timeline-item:last-child .timeline-dot::after { display: none; }
.timeline-card {
  flex: 1; background: #FFFBF7; border: 1px solid #F7F5F3; border-radius: 16px;
  padding: 14px 16px;
}
.timeline-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.timeline-title { font-size: 15px; font-weight: 700; color: #2E2B29; }
.timeline-time { font-size: 12px; font-weight: 500; color: #A8A29C; }
.timeline-note { font-size: 13px; color: #5C5856; }
.badge {
  display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 700;
}
.badge-food { background: rgba(127,222,184,0.15); color: #4BBF9A; }
.badge-waste { background: rgba(232,134,148,0.15); color: #E88694; }
.badge-weight { background: rgba(93,185,240,0.15); color: #5DB9F0; }
.badge-medicine { background: rgba(184,169,232,0.15); color: #B8A9E8; }
.fab {
  width: 60px; height: 60px; border-radius: 50%;
  background: linear-gradient(135deg, #7FDEB8 0%, #4BBF9A 100%);
  box-shadow: 0 8px 24px rgba(75,191,154,0.42);
  display: grid; place-items: center; border: none; cursor: pointer;
  position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
  z-index: 100;
}
.fab svg { width: 28px; height: 28px; color: #fff; }
.bottom-tab {
  position: fixed; left: 50%; bottom: 0; transform: translateX(-50%);
  width: 100%; max-width: 390px; height: 76px;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(24px) saturate(180%);
  box-shadow: 0 -6px 20px rgba(46,43,41,0.05);
  border-radius: 30px 30px 0 0;
  display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px;
  z-index: 99;
}
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding-top: 4px; color: #B8B2AE; text-decoration: none; }
.tab-item.active { color: #4BBF9A; }
.tab-item svg { width: 24px; height: 24px; }
.tab-item span { font-size: 11px; font-weight: 600; }
.tab-placeholder { width: 60px; }
</style>
</head>
<body data-page-id="home-page" data-tab-id="tab-home">
<div class="app-shell">
  <header class="header">
    <div class="header-left">
      <h1 class="page-title">宠迹</h1>
    </div>
    <div class="pet-switcher" data-ui-id="home-pet-switcher">
      <div class="pet-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>当前宠物头像</title><path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.4V10h4c2.2 0 4 1.8 4 4v2a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4v-2c0-2.2 1.8-4 4-4h4V9.4A4 4 0 0 1 8 6a4 4 0 0 1 4-4z"/></svg>
      </div>
      <span class="pet-name">Mochi</span>
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>切换宠物</title><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </header>

  <div class="content">
    <p class="greeting">早上好，<strong>Mochi</strong> 今天也元气满满 🌿</p>

    <div class="quick-actions">
      <button class="quick-btn" data-ui-id="home-quick-record-food">
        <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>快速记录饮食</title><path d="M4 10h16v6a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4z"/><path d="M6 10V7a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v3"/></svg></div>
        <span>饮食</span>
      </button>
      <button class="quick-btn" data-ui-id="home-quick-record-waste">
        <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>快速记录排泄</title><path d="M12 21c3.5 0 6-3 6-7 0-4-3-7-6-7s-6 3-6 7c0 4 2.5 7 6 7z"/><path d="M12 11v4"/><path d="M9 14h6"/></svg></div>
        <span>排泄</span>
      </button>
      <button class="quick-btn" data-ui-id="home-quick-record-weight">
        <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>快速记录体重</title><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M12 10v4"/><path d="M10 12h4"/></svg></div>
        <span>体重</span>
      </button>
      <button class="quick-btn" data-ui-id="home-quick-record-medicine">
        <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>快速记录用药</title><path d="M10.5 20.5 3.5 13.5a4.2 4.2 0 0 1 0-6l6-6a4.2 4.2 0 0 1 6 0l7 7a4.2 4.2 0 0 1 0 6l-6 6a4.2 4.2 0 0 1-6 0z"/><path d="m7 7 10 10"/></svg></div>
        <span>用药</span>
      </button>
    </div>

    <h2 class="section-title">今日概览</h2>
    <div class="metrics-grid">
      <div class="metric-card" data-ui-id="home-today-food-count">
        <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>今日饮食次数</title><path d="M4 10h16v6a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4z"/><path d="M6 10V7a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v3"/></svg></div>
        <div class="metric-value">2</div>
        <div class="metric-label">饮食 · 次</div>
      </div>
      <div class="metric-card" data-ui-id="home-today-waste-count">
        <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>今日排泄次数</title><path d="M12 21c3.5 0 6-3 6-7 0-4-3-7-6-7s-6 3-6 7c0 4 2.5 7 6 7z"/><path d="M12 11v4"/><path d="M9 14h6"/></svg></div>
        <div class="metric-value">1</div>
        <div class="metric-label">排泄 · 次</div>
      </div>
      <div class="metric-card" data-ui-id="home-latest-weight">
        <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>最新体重</title><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M12 10v4"/><path d="M10 12h4"/></svg></div>
        <div class="metric-value">4.6<span style="font-size:14px;font-weight:600;">kg</span></div>
        <div class="metric-label">最新体重</div>
      </div>
      <div class="metric-card" data-ui-id="home-today-medicine-count">
        <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>今日用药次数</title><path d="M10.5 20.5 3.5 13.5a4.2 4.2 0 0 1 0-6l6-6a4.2 4.2 0 0 1 6 0l7 7a4.2 4.2 0 0 1 0 6l-6 6a4.2 4.2 0 0 1-6 0z"/><path d="m7 7 10 10"/></svg></div>
        <div class="metric-value">0</div>
        <div class="metric-label">用药 · 次</div>
      </div>
    </div>

    <div class="section-header">
      <h2 class="section-title" style="margin:0;"> upcoming 提醒</h2>
      <span class="view-all">查看全部</span>
    </div>
    <div class="reminder-list" data-ui-id="home-reminder-list">
      <div class="reminder-card" id="home-reminder-1">
        <div class="reminder-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>疫苗提醒图标</title><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <div class="reminder-content">
          <div class="reminder-title">猫三联加强针</div>
          <div class="reminder-sub">Mochi · 疫苗</div>
        </div>
        <div class="reminder-date">3 天后</div>
      </div>
      <div class="reminder-card due-soon" id="home-reminder-2">
        <div class="reminder-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>驱虫提醒图标</title><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg></div>
        <div class="reminder-content">
          <div class="reminder-title">体外驱虫</div>
          <div class="reminder-sub">Mochi · 驱虫</div>
        </div>
        <div class="reminder-date">7 天后</div>
      </div>
    </div>

    <div class="section-header">
      <h2 class="section-title" style="margin:0;">最近记录</h2>
      <span class="view-all">查看全部</span>
    </div>
    <div class="timeline" data-ui-id="home-recent-record-list">
      <div class="timeline-item" id="home-record-1">
        <div class="timeline-dot" style="background:#7FDEB8;"></div>
        <div class="timeline-card">
          <div class="timeline-top">
            <div>
              <span class="timeline-title">早餐：猫粮 35g</span>
              <span class="badge badge-food">饮食</span>
            </div>
            <span class="timeline-time">08:30</span>
          </div>
          <div class="timeline-note">吃得很快，光盘。</div>
        </div>
      </div>
      <div class="timeline-item" id="home-record-2">
        <div class="timeline-dot" style="background:#E88694;"></div>
        <div class="timeline-card">
          <div class="timeline-top">
            <div>
              <span class="timeline-title">排便正常</span>
              <span class="badge badge-waste">排泄</span>
            </div>
            <span class="timeline-time">07:15</span>
          </div>
          <div class="timeline-note">成型，无异味。</div>
        </div>
      </div>
    </div>
  </div>

  <button class="fab" data-ui-id="home-floating-record-button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><title>打开新增记录</title><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <nav class="bottom-tab">
    <a href="#" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>首页标签</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>爱宠标签</title><path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.4V10h4c2.2 0 4 1.8 4 4v2a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4v-2c0-2.2 1.8-4 4-4h4V9.4A4 4 0 0 1 8 6a4 4 0 0 1 4-4z"/></svg>
      <span>爱宠</span>
    </a>
    <div class="tab-placeholder"></div>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>健康标签</title><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1 7.8 7.8 7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      <span>健康</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>家人标签</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>家人</span>
    </a>
  </nav>
</div>
</body>
</html>
