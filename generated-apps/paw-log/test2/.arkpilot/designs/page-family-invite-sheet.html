<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>家庭共享</title>
  <style>
    :root {
      --mint-600: #3FC0A0; --mint-500: #5ED7B6; --mint-300: #9CEBD4; --mint-100: #E5FAF4; --mint-50: #F4FDFA;
      --pink-600: #FF9AAE; --pink-500: #FFB3C1; --pink-100: #FFF0F3;
      --yellow-500: #FFD166; --yellow-100: #FFF9E6;
      --blue-500: #87CEEB; --blue-100: #E6F5FB;
      --lavender-500: #B8B8E0; --lavender-100: #F2F1FA;
      --apricot-500: #F4D0A4; --apricot-100: #FDF5EA;
      --forest-900: #163832; --forest-700: #3D5A52; --forest-500: #6F8983; --forest-200: #C9D8D4; --forest-100: #E3EDEA;
      --white: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: rgba(22,56,50,0.35); max-width: 390px; margin: 0 auto;
      min-height: 100vh; display: flex; align-items: flex-end;
    }
    .sheet {
      width: 100%; background: var(--white); border-radius: 28px 28px 0 0;
      padding: 20px 16px 32px; box-shadow: 0 -8px 32px rgba(22,56,50,0.2);
    }
    .sheet-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--forest-200); margin: 0 auto 16px; }
    .sheet-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; text-align: center; }
    .invite-card {
      background: var(--pink-100); border: 1px dashed var(--pink-500); border-radius: 20px;
      padding: 20px; text-align: center; margin-bottom: 20px;
    }
    .invite-label { font-size: 13px; color: var(--forest-500); margin-bottom: 8px; }
    .invite-code {
      font-size: 32px; font-weight: 800; letter-spacing: 6px; color: var(--pink-600); margin-bottom: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .copy-btn {
      padding: 10px 24px; border-radius: 20px; background: var(--pink-500); color: var(--white);
      border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: transform .15s;
    }
    .copy-btn:active { transform: scale(0.97); }

    .member-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .member-item {
      display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 16px;
      background: var(--mint-50); border: 1px solid var(--forest-100); margin-bottom: 10px;
    }
    .member-avatar {
      width: 44px; height: 44px; border-radius: 50%; background: var(--white);
      display: flex; align-items: center; justify-content: center;
    }
    .member-avatar svg { width: 22px; height: 22px; stroke: var(--mint-600); fill: none; }
    .member-main { flex: 1; }
    .member-name { font-size: 15px; font-weight: 700; }
    .member-role { font-size: 12px; color: var(--forest-500); }
    .close-btn {
      margin-top: 12px; width: 100%; padding: 14px; border-radius: 24px;
      background: var(--mint-100); color: var(--mint-600); border: none;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body data-page-id="family-invite-sheet">

  <div class="sheet">
    <div class="sheet-handle" data-ui-id="family-invite-close"></div>
    <div class="sheet-title">家庭共享</div>

    <div class="invite-card">
      <div class="invite-label">邀请码</div>
      <div class="invite-code" data-ui-id="family-invite-code">PAW9988</div>
      <button class="copy-btn" data-ui-id="family-invite-copy">复制邀请码</button>
    </div>

    <div class="member-title">家庭成员</div>
    <div data-ui-id="family-member-list">
      <div class="member-item" data-ui-id="family-member-u1">
        <div class="member-avatar">
          <svg viewBox="0 0 24 24" role="img"><title>家庭成员头像</title><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke-width="2"/></svg>
        </div>
        <div class="member-main">
          <div class="member-name">布丁的主人</div>
          <div class="member-role">管理员</div>
        </div>
      </div>
      <div class="member-item" data-ui-id="family-member-u2">
        <div class="member-avatar">
          <svg viewBox="0 0 24 24" role="img"><title>家庭成员头像</title><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke-width="2"/></svg>
        </div>
        <div class="member-main">
          <div class="member-name">年糕的铲屎官</div>
          <div class="member-role">成员</div>
        </div>
      </div>
    </div>

    <button class="close-btn" data-ui-id="family-invite-close">关闭</button>
  </div>

</body>
</html>
