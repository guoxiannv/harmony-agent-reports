<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>提醒详情</title>
  <style>
    :root {
      --mint-600: #3FC0A0; --mint-500: #5ED7B6; --mint-300: #9CEBD4; --mint-100: #E5FAF4; --mint-50: #F4FDFA;
      --pink-600: #FF9AAE; --pink-500: #FFB3C1; --pink-100: #FFF0F3;
      --yellow-500: #FFD166; --yellow-100: #FFF9E6;
      --blue-500: #87CEEB; --blue-100: #E6F5FB;
      --lavender-500: #B8B8E0; --lavender-100: #F2F1FA;
      --apricot-500: #F4D0A4; --apricot-100: #FDF5EA;
      --forest-900: #163832; --forest-700: #3D5A52; --forest-500: #6F8983; --forest-200: #C9D8D4; --forest-100: #E3EDEA;
      --white: #FFFFFF; --page-bg: #FAFDFC;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--page-bg); color: var(--forest-900); max-width: 390px; margin: 0 auto;
      min-height: 100vh; position: relative; padding-bottom: 32px;
    }
    .header { padding: 12px 16px; height: 56px; display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 36px; height: 36px; border-radius: 12px; background: var(--white); border: 1px solid var(--forest-100); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .back-btn svg { width: 18px; height: 18px; stroke: var(--forest-700); fill: none; }
    .header-title { font-size: 18px; font-weight: 800; }

    .detail-card {
      margin: 8px 16px 16px; padding: 24px; border-radius: 28px;
      background: var(--pink-100); border: 1px solid var(--pink-500);
      box-shadow: 0 8px 28px rgba(255,154,174,0.16);
      text-align: center;
    }
    .detail-icon {
      width: 72px; height: 72px; border-radius: 22px; background: var(--white);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
      box-shadow: 0 4px 14px rgba(255,154,174,0.15);
    }
    .detail-icon svg { width: 38px; height: 38px; stroke: var(--pink-600); fill: none; }
    .detail-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .detail-due { font-size: 15px; color: var(--forest-700); margin-bottom: 12px; }
    .detail-status { display: inline-block; padding: 6px 14px; border-radius: 20px; background: var(--pink-600); color: var(--white); font-size: 13px; font-weight: 700; }

    .info-card {
      background: var(--white); border: 1px solid rgba(201,216,212,0.45); border-radius: 24px;
      margin: 0 16px 16px; padding: 16px; box-shadow: 0 6px 22px rgba(22,56,50,0.05);
    }
    .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--forest-100); }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 14px; color: var(--forest-500); }
    .info-value { font-size: 14px; font-weight: 700; color: var(--forest-900); }

    .actions { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
    .btn-primary {
      width: 100%; padding: 15px; border-radius: 28px; border: none;
      background: linear-gradient(135deg, var(--mint-500) 0%, var(--mint-600) 50%, #2DB08E 100%);
      color: var(--white); font-size: 16px; font-weight: 700;
      box-shadow: 0 8px 24px rgba(63,192,160,0.36), inset 0 1px 0 rgba(255,255,255,0.35);
      cursor: pointer; transition: transform .15s;
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary {
      width: 100%; padding: 15px; border-radius: 28px; border: 1px solid var(--forest-100);
      background: var(--white); color: var(--forest-900); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: transform .15s;
    }
    .btn-secondary:active { transform: scale(0.97); }
    .btn-danger {
      width: 100%; padding: 15px; border-radius: 28px; border: none;
      background: var(--pink-100); color: var(--pink-600); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: transform .15s;
    }
    .btn-danger:active { transform: scale(0.97); }
  </style>
</head>
<body data-page-id="reminder-detail-page">

  <header class="header">
    <button class="back-btn" data-ui-id="reminder-detail-back">
      <svg viewBox="0 0 24 24" role="img"><title>返回上一页</title><path d="M15 18l-6-6 6-6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="header-title">提醒详情</span>
  </header>

  <section class="detail-card">
    <div class="detail-icon">
      <svg viewBox="0 0 24 24" role="img">
        <title>疫苗提醒详情图标</title>
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="detail-title" data-ui-id="reminder-detail-title">狂犬疫苗加强针</div>
    <div class="detail-due" data-ui-id="reminder-detail-due">到期时间：2026-06-25</div>
    <span class="detail-status" data-ui-id="reminder-detail-status">即将到期 · 还剩3天</span>
  </section>

  <section class="info-card">
    <div class="info-row">
      <span class="info-label">宠物</span>
      <span class="info-value">布丁</span>
    </div>
    <div class="info-row">
      <span class="info-label">类别</span>
      <span class="info-value">疫苗</span>
    </div>
    <div class="info-row">
      <span class="info-label">提醒时间</span>
      <span class="info-value">2026-06-22 09:00</span>
    </div>
    <div class="info-row">
      <span class="info-label">备注</span>
      <span class="info-value">每年一针，记得带疫苗本</span>
    </div>
  </section>

  <section class="actions">
    <button class="btn-primary" data-ui-id="reminder-detail-mark-done">标记已完成</button>
    <button class="btn-secondary" data-ui-id="reminder-detail-edit">编辑提醒</button>
    <button class="btn-danger" data-ui-id="reminder-detail-delete">删除提醒</button>
  </section>

</body>
</html>
