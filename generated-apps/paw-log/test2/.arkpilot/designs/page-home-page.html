<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹·PawLog 首页</title>
  <style>
    :root {
      --mint-600: #3FC0A0;
      --mint-500: #5ED7B6;
      --mint-300: #9CEBD4;
      --mint-100: #E5FAF4;
      --mint-50: #F4FDFA;
      --pink-600: #FF9AAE;
      --pink-500: #FFB3C1;
      --pink-100: #FFF0F3;
      --yellow-500: #FFD166;
      --yellow-100: #FFF9E6;
      --blue-500: #87CEEB;
      --blue-100: #E6F5FB;
      --lavender-500: #B8B8E0;
      --lavender-100: #F2F1FA;
      --apricot-500: #F4D0A4;
      --apricot-100: #FDF5EA;
      --forest-900: #163832;
      --forest-700: #3D5A52;
      --forest-500: #6F8983;
      --forest-200: #C9D8D4;
      --forest-100: #E3EDEA;
      --white: #FFFFFF;
      --page-bg: #FAFDFC;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--page-bg);
      color: var(--forest-900);
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      padding-bottom: 88px;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px; height: 64px;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .app-logo {
      width: 36px; height: 36px; border-radius: 12px;
      background: linear-gradient(135deg, var(--mint-500), var(--mint-600));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(63,192,160,0.25);
    }
    .app-logo svg { width: 22px; height: 22px; }
    .app-title { font-size: 20px; font-weight: 800; color: var(--forest-900); }
    .header-actions { display: flex; gap: 10px; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 14px;
      background: var(--white);
      border: 1px solid var(--forest-100);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(22,56,50,0.04);
      transition: transform .15s;
    }
    .icon-btn:active { transform: scale(0.94); }
    .icon-btn svg { width: 20px; height: 20px; stroke: var(--forest-700); }

    /* Pet switcher */
    .pet-switcher {
      padding: 8px 16px 16px;
      display: flex; gap: 14px; overflow-x: auto; scrollbar-width: none;
    }
    .pet-switcher::-webkit-scrollbar { display: none; }
    .pet-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      min-width: 64px; cursor: pointer;
    }
    .pet-avatar-wrap {
      width: 64px; height: 64px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      padding: 3px;
      background: transparent;
      transition: transform .15s;
    }
    .pet-item.active .pet-avatar-wrap {
      background: linear-gradient(135deg, var(--mint-500), var(--pink-500));
      box-shadow: 0 4px 14px rgba(94,215,182,0.28);
    }
    .pet-item:active .pet-avatar-wrap { transform: scale(0.94); }
    .pet-avatar {
      width: 58px; height: 58px; border-radius: 50%;
      background: var(--mint-100);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      border: 2px solid var(--white);
    }
    .pet-avatar svg { width: 32px; height: 32px; }
    .pet-name { font-size: 12px; font-weight: 600; color: var(--forest-700); }
    .pet-item.active .pet-name { color: var(--mint-600); }
    .pet-add {
      width: 58px; height: 58px; border-radius: 50%;
      background: var(--mint-100);
      display: flex; align-items: center; justify-content: center;
    }
    .pet-add svg { width: 24px; height: 24px; stroke: var(--mint-600); }

    /* Hero summary */
    .hero-card {
      margin: 0 16px 16px;
      padding: 22px;
      border-radius: 28px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid rgba(255,255,255,0.65);
      box-shadow: 0 8px 32px rgba(22,56,50,0.07);
    }
    .hero-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .hero-pet {
      display: flex; align-items: center; gap: 10px;
    }
    .hero-pet-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--mint-100), var(--pink-100));
      display: flex; align-items: center; justify-content: center;
    }
    .hero-pet-avatar svg { width: 28px; height: 28px; }
    .hero-pet-name { font-size: 20px; font-weight: 800; }
    .hero-pet-meta { font-size: 12px; color: var(--forest-500); margin-top: 2px; }
    .hero-status-pill {
      padding: 6px 12px; border-radius: 20px;
      background: var(--mint-100); color: var(--mint-600);
      font-size: 12px; font-weight: 700;
    }
    .summary-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    }
    .summary-cell {
      background: var(--white);
      border-radius: 18px; padding: 14px;
      border: 1px solid var(--forest-100);
      box-shadow: 0 2px 8px rgba(22,56,50,0.03);
    }
    .summary-label { font-size: 12px; color: var(--forest-500); margin-bottom: 4px; }
    .summary-value { font-size: 18px; font-weight: 800; color: var(--forest-900); }
    .summary-value span { font-size: 12px; font-weight: 600; color: var(--forest-500); margin-left: 2px; }

    /* Quick actions */
    .section-title {
      font-size: 18px; font-weight: 800; margin: 24px 16px 14px;
    }
    .quick-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      padding: 0 16px;
    }
    .quick-item {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .quick-btn {
      width: 72px; height: 72px; border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 18px rgba(22,56,50,0.08);
      transition: transform .15s;
      cursor: pointer;
    }
    .quick-btn:active { transform: scale(0.94); }
    .quick-btn.diet { background: var(--apricot-100); }
    .quick-btn.stool { background: var(--mint-100); }
    .quick-btn.weight { background: var(--blue-100); }
    .quick-btn.meds { background: var(--lavender-100); }
    .quick-icon {
      width: 44px; height: 44px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .quick-btn.diet .quick-icon { background: linear-gradient(135deg, #FFD8A8, #F4C288); }
    .quick-btn.stool .quick-icon { background: linear-gradient(135deg, var(--mint-300), var(--mint-500)); }
    .quick-btn.weight .quick-icon { background: linear-gradient(135deg, #B2E3F5, var(--blue-500)); }
    .quick-btn.meds .quick-icon { background: linear-gradient(135deg, #D4D4F0, var(--lavender-500)); }
    .quick-icon svg { width: 24px; height: 24px; stroke: var(--white); fill: none; }
    .quick-label { font-size: 13px; font-weight: 600; color: var(--forest-900); }

    /* Reminder section */
    .card {
      background: var(--white);
      border: 1px solid rgba(201,216,212,0.45);
      border-radius: 24px;
      box-shadow: 0 6px 22px rgba(22,56,50,0.05), 0 2px 8px rgba(22,56,50,0.04);
      margin: 0 16px 16px;
      padding: 16px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-title { font-size: 17px; font-weight: 700; }
    .card-more {
      font-size: 13px; font-weight: 600; color: var(--mint-600);
      display: flex; align-items: center; gap: 2px;
    }
    .reminder-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px; border-radius: 18px;
      background: var(--white); border: 1px solid var(--forest-100);
      margin-bottom: 10px;
    }
    .reminder-item.urgent {
      background: var(--pink-100); border-color: var(--pink-500);
      box-shadow: 0 6px 18px rgba(255,154,174,0.12);
    }
    .reminder-bar {
      width: 4px; height: 36px; border-radius: 2px;
      background: var(--mint-500); flex-shrink: 0;
    }
    .reminder-item.urgent .reminder-bar { background: var(--pink-600); }
    .reminder-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--mint-100);
      display: flex; align-items: center; justify-content: center;
    }
    .reminder-item.urgent .reminder-icon { background: rgba(255,255,255,0.7); }
    .reminder-icon svg { width: 22px; height: 22px; stroke: var(--mint-600); fill: none; }
    .reminder-main { flex: 1; }
    .reminder-title { font-size: 15px; font-weight: 700; }
    .reminder-date { font-size: 12px; color: var(--forest-500); margin-top: 2px; }
    .reminder-tag {
      padding: 4px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 700;
    }
    .reminder-tag.urgent { background: var(--pink-600); color: var(--white); }
    .reminder-tag.normal { background: var(--mint-100); color: var(--mint-600); }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 20px; text-align: center;
    }
    .empty-illust {
      width: 120px; height: 120px; border-radius: 32px;
      background: linear-gradient(135deg, var(--mint-50), var(--mint-100));
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .empty-illust svg { width: 64px; height: 64px; }
    .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .empty-desc { font-size: 14px; color: var(--forest-500); margin-bottom: 16px; line-height: 1.55; }
    .btn-primary {
      background: linear-gradient(135deg, var(--mint-500) 0%, var(--mint-600) 50%, #2DB08E 100%);
      color: var(--white); border: none; border-radius: 28px;
      padding: 14px 28px; font-size: 16px; font-weight: 700;
      box-shadow: 0 8px 24px rgba(63,192,160,0.36), inset 0 1px 0 rgba(255,255,255,0.35);
      transition: transform .15s;
    }
    .btn-primary:active { transform: scale(0.97); }

    /* Bottom tab */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 390px; margin: 0 auto;
      height: 68px;
      background: var(--white);
      border-top: 1px solid var(--forest-100);
      display: flex; justify-content: space-around; align-items: flex-start;
      padding-top: 8px;
      z-index: 100;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; padding: 6px 14px; cursor: pointer;
    }
    .tab-item.active .tab-icon { stroke: var(--mint-600); }
    .tab-item.active .tab-label { color: var(--mint-600); }
    .tab-icon { width: 24px; height: 24px; stroke: var(--forest-500); fill: none; }
    .tab-label { font-size: 11px; font-weight: 500; color: var(--forest-500); }
  </style>
</head>
