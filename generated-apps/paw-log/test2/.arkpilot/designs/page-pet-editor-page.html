<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠物档案编辑</title>
  <style>
    :root {
      --mint-600: #3FC0A0; --mint-500: #5ED7B6; --mint-300: #9CEBD4; --mint-100: #E5FAF4; --mint-50: #F4FDFA;
      --pink-600: #FF9AAE; --pink-500: #FFB3C1; --pink-100: #FFF0F3;
      --yellow-500: #FFD166; --yellow-100: #FFF9E6;
      --blue-500: #87CEEB; --blue-100: #E6F5FB;
      --lavender-500: #B8B8E0; --lavender-100: #F2F1FA;
      --apricot-500: #F4D0A4; --apricot-100: #FDF5EA;
      --forest-900: #163832; --forest-700: #3D5A52; --forest-500: #6F8983; --forest-200: #C9D8D4; --forest-100: #E3EDEA;
      --white: #FFFFFF; --page-bg: #FAFDFC;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--page-bg); color: var(--forest-900); max-width: 390px; margin: 0 auto;
      min-height: 100vh; position: relative; padding-bottom: 100px;
    }
    .header { padding: 12px 16px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 36px; height: 36px; border-radius: 12px; background: var(--white); border: 1px solid var(--forest-100); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .back-btn svg { width: 18px; height: 18px; stroke: var(--forest-700); fill: none; }
    .header-title { font-size: 18px; font-weight: 800; }
    .save-top { padding: 8px 16px; border-radius: 18px; background: var(--mint-100); color: var(--mint-600); font-size: 13px; font-weight: 700; border: none; cursor: pointer; }

    .avatar-section { display: flex; flex-direction: column; align-items: center; padding: 16px 0; }
    .avatar-edit {
      width: 96px; height: 96px; border-radius: 50%; background: linear-gradient(135deg, var(--mint-100), var(--pink-100));
      display: flex; align-items: center; justify-content: center; border: 3px solid var(--white);
      box-shadow: 0 6px 20px rgba(94,215,182,0.2); cursor: pointer; position: relative;
    }
    .avatar-edit svg { width: 48px; height: 48px; }
    .avatar-badge {
      position: absolute; bottom: 0; right: 0; width: 32px; height: 32px; border-radius: 50%;
      background: var(--mint-500); display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--white);
    }
    .avatar-badge svg { width: 16px; height: 16px; stroke: var(--white); fill: none; }
    .avatar-tip { font-size: 13px; color: var(--forest-500); margin-top: 10px; }

    .form-card {
      background: var(--white); border: 1px solid rgba(201,216,212,0.45); border-radius: 24px;
      margin: 0 16px 16px; padding: 16px; box-shadow: 0 6px 22px rgba(22,56,50,0.05);
    }
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--forest-700); margin-bottom: 6px; }
    .input {
      width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--forest-100);
      background: var(--mint-50); font-size: 15px; color: var(--forest-900); outline: none;
    }
    .input:focus { border-color: var(--mint-500); box-shadow: 0 0 0 4px rgba(94,215,182,0.12); }
    .input-row { display: flex; gap: 12px; }
    .input-row .form-group { flex: 1; }
    .segment { display: flex; gap: 8px; }
    .segment-btn {
      flex: 1; padding: 12px; border-radius: 16px; border: 1px solid var(--forest-100);
      background: var(--white); color: var(--forest-700); font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .segment-btn.active { background: var(--mint-100); color: var(--mint-600); border-color: var(--mint-500); }
    .textarea {
      width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--forest-100);
      background: var(--mint-50); font-size: 15px; color: var(--forest-900); outline: none; min-height: 80px; resize: none;
    }
    .textarea:focus { border-color: var(--mint-500); box-shadow: 0 0 0 4px rgba(94,215,182,0.12); }

    .bottom-actions {
      position: fixed; bottom: 0; left: 0; right: 0; max-width: 390px; margin: 0 auto;
      padding: 12px 16px 24px; background: var(--white); border-top: 1px solid var(--forest-100);
    }
    .btn-primary {
      width: 100%; padding: 15px; border-radius: 28px; border: none;
      background: linear-gradient(135deg, var(--mint-500) 0%, var(--mint-600) 50%, #2DB08E 100%);
      color: var(--white); font-size: 16px; font-weight: 700;
      box-shadow: 0 8px 24px rgba(63,192,160,0.36), inset 0 1px 0 rgba(255,255,255,0.35);
      cursor: pointer; transition: transform .15s;
    }
    .btn-primary:active { transform: scale(0.97); }
  </style>
</head>
<body data-page-id="pet-editor-page">

  <header class="header">
    <div class="header-left">
      <button class="back-btn" data-ui-id="pet-editor-back">
        <svg viewBox="0 0 24 24" role="img"><title>返回上一页</title><path d="M15 18l-6-6 6-6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span class="header-title">编辑宠物档案</span>
    </div>
    <button class="save-top" data-ui-id="pet-editor-save">保存</button>
  </header>

  <section class="avatar-section">
    <div class="avatar-edit" data-ui-id="pet-editor-avatar">
      <svg viewBox="0 0 24 24" role="img">
        <title>宠物头像</title>
        <path d="M12 14c-3.5 0-6 2.5-6 5.5 0 1.5 1 2.5 2.5 2.5h7c1.5 0 2.5-1 2.5-2.5 0-3-2.5-5.5-6-5.5z" fill="#3FC0A0"/>
        <circle cx="7.5" cy="10" r="2" fill="#3FC0A0"/>
        <circle cx="16.5" cy="10" r="2" fill="#3FC0A0"/>
        <circle cx="12" cy="7" r="2.5" fill="#3FC0A0"/>
      </svg>
      <div class="avatar-badge">
        <svg viewBox="0 0 24 24" role="img"><title>更换头像</title><path d="M12 5v14M5 12h14" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div class="avatar-tip">点击更换头像</div>
  </section>

  <section class="form-card">
    <div class="form-group">
      <label class="form-label">名字</label>
      <input class="input" type="text" value="布丁" data-ui-id="pet-editor-name" />
    </div>

    <div class="input-row">
      <div class="form-group">
        <label class="form-label">物种</label>
        <input class="input" type="text" value="犬" data-ui-id="pet-editor-species" />
      </div>
      <div class="form-group">
        <label class="form-label">品种</label>
        <input class="input" type="text" value="柯基" data-ui-id="pet-editor-breed" />
      </div>
    </div>

    <div class="input-row">
      <div class="form-group">
        <label class="form-label">生日</label>
        <input class="input" type="text" value="2023-05-20" data-ui-id="pet-editor-birthday" />
      </div>
      <div class="form-group">
        <label class="form-label">当前体重</label>
        <input class="input" type="text" value="12.5kg" data-ui-id="pet-editor-weight" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">性别</label>
      <div class="segment" data-ui-id="pet-editor-gender">
        <button class="segment-btn active">弟弟</button>
        <button class="segment-btn">妹妹</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">绝育状态</label>
      <div class="segment" data-ui-id="pet-editor-neutered">
        <button class="segment-btn active">已绝育</button>
        <button class="segment-btn">未绝育</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">备注</label>
      <textarea class="textarea" data-ui-id="pet-editor-notes">对鸡肉粮轻微过敏，换粮需谨慎。</textarea>
    </div>
  </section>

  <div class="bottom-actions">
    <button class="btn-primary" data-ui-id="pet-editor-save">保存档案</button>
  </div>

</body>
</html>
