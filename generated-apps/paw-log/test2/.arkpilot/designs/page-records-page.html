<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹·PawLog 记录</title>
  <style>
    :root {
      --mint-600: #3FC0A0; --mint-500: #5ED7B6; --mint-300: #9CEBD4; --mint-100: #E5FAF4; --mint-50: #F4FDFA;
      --pink-600: #FF9AAE; --pink-500: #FFB3C1; --pink-100: #FFF0F3;
      --yellow-500: #FFD166; --yellow-100: #FFF9E6;
      --blue-500: #87CEEB; --blue-100: #E6F5FB;
      --lavender-500: #B8B8E0; --lavender-100: #F2F1FA;
      --apricot-500: #F4D0A4; --apricot-100: #FDF5EA;
      --forest-900: #163832; --forest-700: #3D5A52; --forest-500: #6F8983; --forest-200: #C9D8D4; --forest-100: #E3EDEA;
      --white: #FFFFFF; --page-bg: #FAFDFC;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--page-bg); color: var(--forest-900); max-width: 390px; margin: 0 auto;
      min-height: 100vh; position: relative; padding-bottom: 88px;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px; height: 64px;
    }
    .header-title { font-size: 22px; font-weight: 800; }
    .header-actions { display: flex; gap: 10px; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 14px; background: var(--white);
      border: 1px solid var(--forest-100); display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(22,56,50,0.04); transition: transform .15s;
    }
    .icon-btn:active { transform: scale(0.94); }
    .icon-btn svg { width: 20px; height: 20px; stroke: var(--forest-700); fill: none; }

    /* Filter chips */
    .filter-bar {
      display: flex; gap: 10px; padding: 0 16px 16px; overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .chip {
      padding: 8px 16px; border-radius: 20px; background: var(--white);
      border: 1px solid var(--forest-100); font-size: 14px; font-weight: 600;
      color: var(--forest-700); white-space: nowrap; transition: all .15s; cursor: pointer;
    }
    .chip.active { background: var(--mint-100); color: var(--mint-600); border-color: var(--mint-500); box-shadow: 0 2px 8px rgba(94,215,182,0.12); }
    .chip:active { transform: scale(0.96); }

    /* Timeline */
    .timeline { padding: 0 16px; }
    .timeline-date {
      font-size: 13px; font-weight: 700; color: var(--forest-700); margin: 8px 0 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .timeline-date::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--mint-500);
    }
    .record-item {
      display: flex; gap: 12px; background: var(--white); border: 1px solid rgba(201,216,212,0.45);
      border-radius: 20px; padding: 14px; margin-bottom: 10px;
      box-shadow: 0 4px 14px rgba(22,56,50,0.04); transition: transform .15s;
    }
    .record-item:active { transform: scale(0.98); }
    .record-icon {
      width: 46px; height: 46px; border-radius: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .record-icon.diet { background: var(--apricot-100); }
    .record-icon.stool { background: var(--mint-100); }
    .record-icon.weight { background: var(--blue-100); }
    .record-icon.meds { background: var(--lavender-100); }
    .record-icon svg { width: 24px; height: 24px; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .record-icon.diet svg { stroke: var(--apricot-500); }
    .record-icon.stool svg { stroke: var(--mint-500); }
    .record-icon.weight svg { stroke: var(--blue-500); }
    .record-icon.meds svg { stroke: var(--lavender-500); }
    .record-main { flex: 1; }
    .record-title { font-size: 15px; font-weight: 700; }
    .record-sub { font-size: 12px; color: var(--forest-500); margin-top: 3px; }
    .record-right { text-align: right; }
    .record-time { font-size: 12px; color: var(--forest-500); }
    .record-tag {
      display: inline-block; margin-top: 6px; padding: 3px 8px; border-radius: 8px;
      font-size: 11px; font-weight: 700;
    }
    .record-tag.diet { background: var(--apricot-100); color: var(--apricot-500); }
    .record-tag.stool { background: var(--mint-100); color: var(--mint-600); }
    .record-tag.weight { background: var(--blue-100); color: var(--blue-500); }
    .record-tag.meds { background: var(--lavender-100); color: var(--lavender-500); }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; padding: 48px 24px; text-align: center;
    }
    .empty-illust {
      width: 120px; height: 120px; border-radius: 32px;
      background: linear-gradient(135deg, var(--mint-50), var(--mint-100));
      display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
    }
    .empty-illust svg { width: 64px; height: 64px; stroke: var(--mint-500); fill: none; }
    .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .empty-desc { font-size: 14px; color: var(--forest-500); margin-bottom: 16px; line-height: 1.55; }
    .btn-primary {
      background: linear-gradient(135deg, var(--mint-500) 0%, var(--mint-600) 50%, #2DB08E 100%);
      color: var(--white); border: none; border-radius: 28px; padding: 14px 28px;
      font-size: 16px; font-weight: 700; box-shadow: 0 8px 24px rgba(63,192,160,0.36), inset 0 1px 0 rgba(255,255,255,0.35);
    }

    /* Tabbar */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0; max-width: 390px; margin: 0 auto;
      height: 68px; background: var(--white); border-top: 1px solid var(--forest-100);
      display: flex; justify-content: space-around; align-items: flex-start; padding-top: 8px; z-index: 100;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 14px; cursor: pointer; }
    .tab-item.active .tab-icon { stroke: var(--mint-600); }
    .tab-item.active .tab-label { color: var(--mint-600); }
    .tab-icon { width: 24px; height: 24px; stroke: var(--forest-500); fill: none; }
    .tab-label { font-size: 11px; font-weight: 500; color: var(--forest-500); }
  </style>
</head>
<body data-page-id="records-page" data-tab-id="tab-records">

  <header class="header">
    <span class="header-title">记录</span>
    <div class="header-actions">
      <button class="icon-btn" data-ui-id="records-add-button" aria-label="添加记录">
        <svg viewBox="0 0 24 24" role="img">
          <title>添加新记录</title>
          <path d="M12 5v14M5 12h14" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="filter-bar">
    <button class="chip active" data-ui-id="records-filter-all">全部</button>
    <button class="chip" data-ui-id="records-filter-diet">饮食</button>
    <button class="chip" data-ui-id="records-filter-stool">排泄</button>
    <button class="chip" data-ui-id="records-filter-weight">体重</button>
    <button class="chip" data-ui-id="records-filter-meds">用药</button>
  </div>

  <div class="timeline" data-ui-id="records-list">
    <div class="timeline-date">今天</div>

    <div class="record-item" data-ui-id="records-item-d1">
      <div class="record-icon diet">
        <svg viewBox="0 0 24 24" role="img">
          <title>饮食记录条目</title>
          <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="2" x2="6" y2="8"/>
          <line x1="10" y1="2" x2="10" y2="8"/>
          <line x1="14" y1="2" x2="14" y2="8"/>
        </svg>
      </div>
      <div class="record-main">
        <div class="record-title">早餐：鸡肉粮</div>
        <div class="record-sub">布丁 · 80g · 光盘</div>
      </div>
      <div class="record-right">
        <div class="record-time">08:30</div>
        <span class="record-tag diet">饮食</span>
      </div>
    </div>

    <div class="record-item" data-ui-id="records-item-s1">
      <div class="record-icon stool">
        <svg viewBox="0 0 24 24" role="img">
          <title>排泄记录条目</title>
          <path d="M12 22c4.97 0 9-3.58 9-8s-4.03-8-9-8-9 3.58-9 8 4.03 8 9 8z"/>
          <circle cx="9" cy="13" r="1.5" fill="currentColor"/>
          <circle cx="15" cy="13" r="1.5" fill="currentColor"/>
          <path d="M9 17c1.5 1.5 4.5 1.5 6 0"/>
        </svg>
      </div>
      <div class="record-main">
        <div class="record-title">排便正常</div>
        <div class="record-sub">布丁 · 棕色 · 成型</div>
      </div>
      <div class="record-right">
        <div class="record-time">09:15</div>
        <span class="record-tag stool">排泄</span>
      </div>
    </div>

    <div class="timeline-date">昨天</div>

    <div class="record-item" data-ui-id="records-item-w1">
      <div class="record-icon weight">
        <svg viewBox="0 0 24 24" role="img">
          <title>体重记录条目</title>
          <path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.4V9h4a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h4v-.6c-1.2-.6-2-1.9-2-3.4a4 4 0 0 1 4-4z"/>
        </svg>
      </div>
      <div class="record-main">
        <div class="record-title">体重 12.5kg</div>
        <div class="record-sub">布丁 · 较上周 +0.1kg</div>
      </div>
      <div class="record-right">
        <div class="record-time">20:00</div>
        <span class="record-tag weight">体重</span>
      </div>
    </div>

    <div class="record-item" data-ui-id="records-item-m1">
      <div class="record-icon meds">
        <svg viewBox="0 0 24 24" role="img">
          <title>用药记录条目</title>
          <path d="M10 2h4a2 2 0 0 1 2 2v3H8V4a2 2 0 0 1 2-2z"/>
          <rect x="6" y="7" width="12" height="15" rx="2"/>
          <line x1="12" y1="12" x2="12" y2="17"/>
          <line x1="9.5" y1="14.5" x2="14.5" y2="14.5"/>
        </svg>
      </div>
      <div class="record-main">
        <div class="record-title">益生菌</div>
        <div class="record-sub">布丁 · 1/2 包 · 饭后</div>
      </div>
      <div class="record-right">
        <div class="record-time">19:30</div>
        <span class="record-tag meds">用药</span>
      </div>
    </div>
  </div>

  <nav class="tabbar">
    <div class="tab-item" data-ui-id="tab-home" data-tab-id="tab-home">
      <svg class="tab-icon" viewBox="0 0 24 24" role="img">
        <title>首页标签</title>
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="9 22 9 12 15 12 15 22" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="tab-label">首页</span>
    </div>
    <div class="tab-item active" data-ui-id="tab-records" data-tab-id="tab-records">
      <svg class="tab-icon" viewBox="0 0 24 24" role="img">
        <title>记录标签</title>
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="14 2 14 8 20 8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="16" y1="13" x2="8" y2="13" stroke-width="2" stroke-linecap="round"/>
        <line x1="16" y1="17" x2="8" y2="17" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="tab-label">记录</span>
    </div>
    <div class="tab-item" data-ui-id="tab-trends" data-tab-id="tab-trends">
      <svg class="tab-icon" viewBox="0 0 24 24" role="img">
        <title>趋势标签</title>
        <path d="M3 3v18h18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="tab-label">趋势</span>
    </div>
    <div class="tab-item" data-ui-id="tab-care" data-tab-id="tab-care">
      <svg class="tab-icon" viewBox="0 0 24 24" role="img">
        <title>照护标签</title>
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="tab-label">照护</span>
    </div>
    <div class="tab-item" data-ui-id="tab-profile" data-tab-id="tab-profile">
      <svg class="tab-icon" viewBox="0 0 24 24" role="img">
        <title>我的标签</title>
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="7" r="4" stroke-width="2"/>
      </svg>
      <span class="tab-label">我的</span>
    </div>
  </nav>

</body>
</html>
