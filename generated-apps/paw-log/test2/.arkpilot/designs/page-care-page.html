<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠迹·PawLog 照护</title>
  <style>
    :root {
      --mint-600: #3FC0A0; --mint-500: #5ED7B6; --mint-300: #9CEBD4; --mint-100: #E5FAF4; --mint-50: #F4FDFA;
      --pink-600: #FF9AAE; --pink-500: #FFB3C1; --pink-100: #FFF0F3;
      --yellow-500: #FFD166; --yellow-100: #FFF9E6;
      --blue-500: #87CEEB; --blue-100: #E6F5FB;
      --lavender-500: #B8B8E0; --lavender-100: #F2F1FA;
      --apricot-500: #F4D0A4; --apricot-100: #FDF5EA;
      --forest-900: #163832; --forest-700: #3D5A52; --forest-500: #6F8983; --forest-200: #C9D8D4; --forest-100: #E3EDEA;
      --white: #FFFFFF; --page-bg: #FAFDFC;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--page-bg); color: var(--forest-900); max-width: 390px; margin: 0 auto;
      min-height: 100vh; position: relative; padding-bottom: 88px;
    }
    .header { padding: 16px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 22px; font-weight: 800; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 14px; background: var(--white);
      border: 1px solid var(--forest-100); display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(22,56,50,0.04); transition: transform .15s;
    }
    .icon-btn:active { transform: scale(0.94); }
    .icon-btn svg { width: 20px; height: 20px; stroke: var(--forest-700); fill: none; }

    .tab-row { display: flex; gap: 8px; padding: 0 16px 12px; }
    .tab-row .chip { flex: 1; text-align: center; }
    .chip {
      padding: 10px 0; border-radius: 16px; background: var(--white);
      border: 1px solid var(--forest-100); font-size: 14px; font-weight: 600;
      color: var(--forest-700); transition: all .15s; cursor: pointer;
    }
    .chip.active { background: var(--mint-100); color: var(--mint-600); border-color: var(--mint-500); box-shadow: 0 2px 8px rgba(94,215,182,0.12); }

    .section { padding: 0 16px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-title { font-size: 17px; font-weight: 700; }
    .section-action {
      padding: 8px 14px; border-radius: 20px; background: var(--mint-100); color: var(--mint-600);
      font-size: 13px; font-weight: 700; border: none; cursor: pointer; transition: transform .15s;
    }
    .section-action:active { transform: scale(0.96); }

    .reminder-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px; border-radius: 18px; background: var(--white); border: 1px solid var(--forest-100);
      margin-bottom: 10px; box-shadow: 0 4px 14px rgba(22,56,50,0.04); transition: transform .15s;
    }
    .reminder-item:active { transform: scale(0.98); }
    .reminder-item.urgent { background: var(--pink-100); border-color: var(--pink-500); box-shadow: 0 6px 18px rgba(255,154,174,0.12); }
    .reminder-item.done { background: var(--yellow-100); opacity: 0.82; }
    .reminder-bar { width: 4px; height: 36px; border-radius: 2px; background: var(--mint-500); flex-shrink: 0; }
    .reminder-item.urgent .reminder-bar { background: var(--pink-600); }
    .reminder-item.done .reminder-bar { background: var(--yellow-500); }
    .reminder-icon {
      width: 40px; height: 40px; border-radius: 12px; background: var(--mint-100);
      display: flex; align-items: center; justify-content: center;
    }
    .reminder-item.urgent .reminder-icon { background: rgba(255,255,255,0.7); }
    .reminder-item.done .reminder-icon { background: rgba(255,255,255,0.7); }
    .reminder-icon svg { width: 22px; height: 22px; stroke: var(--mint-600); fill: none; }
    .reminder-main { flex: 1; }
    .reminder-title { font-size: 15px; font-weight: 700; }
    .reminder-date { font-size: 12px; color: var(--forest-500); margin-top: 2px; }
    .reminder-tag {
      padding: 4px 8px; border-radius: 10px; font-size: 11px; font-weight: 700;
    }
    .reminder-tag.urgent { background: var(--pink-600); color: var(--white); }
    .reminder-tag.normal { background: var(--mint-100); color: var(--mint-600); }
    .reminder-tag.done { background: var(--white); color: var(--yellow-500); }

    .medical-card {
      background: var(--lavender-100); border: 1px solid rgba(184,184,224,0.4); border-radius: 20px;
      padding: 14px; margin-bottom: 12px; box-shadow: 0 4px 14px rgba(22,56,50,0.04); transition: transform .15s;
    }
    .medical-card:active { transform: scale(0.98); }
    .medical-header { display: flex; gap: 12px; }
    .medical-icon {
      width: 48px; height: 48px; border-radius: 16px; background: var(--lavender-500);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .medical-icon svg { width: 26px; height: 26px; stroke: var(--white); fill: none; }
    .medical-main { flex: 1; }
    .medical-title { font-size: 16px; font-weight: 700; }
    .medical-meta { font-size: 12px; color: var(--forest-500); margin-top: 2px; }
    .medical-images { display: flex; gap: 8px; margin-top: 12px; }
    .medical-thumb {
      width: 56px; height: 56px; border-radius: 12px; background: var(--white);
      display: flex; align-items: center; justify-content: center; border: 1px solid var(--forest-100);
    }
    .medical-thumb svg { width: 24px; height: 24px; stroke: var(--lavender-500); fill: none; }

    .empty-state { display: flex; flex-direction: column; align-items: center; padding: 40px 24px; text-align: center; }
    .empty-illust { width: 120px; height: 120px; border-radius: 32px; background: linear-gradient(135deg, var(--mint-50), var(--mint-100)); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .empty-illust svg { width: 64px; height: 64px; stroke: var(--mint-500); fill: none; }
    .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .empty-desc { font-size: 14px; color: var(--forest-500); margin-bottom: 16px; }

    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0; max-width: 390px; margin: 0 auto;
      height: 68px; background: var(--white); border-top: 1px solid var(--forest-100);
      display: flex; justify-content: space-around; align-items: flex-start; padding-top: 8px; z-index: 100;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 14px; cursor: pointer; }
    .tab-item.active .tab-icon { stroke: var(--mint-600); }
    .tab-item.active .tab-label { color: var(--mint-600); }
    .tab-icon { width: 24px; height: 24px; stroke: var(--forest-500); fill: none; }
    .tab-label { font-size: 11px; font-weight: 500; color: var(--forest-500); }
  </style>
</head>
<body data-page-id="care-page" data-tab-id="tab-care">

  <header class="header">
    <span class="header-title">照护</span>
    <button class="icon-btn" aria-label="添加">
      <svg viewBox="0 0 24 24" role="img"><title>添加照护项目</title><path d="M12 5v14M5 12h14" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </header>

  <div class="tab-row">
    <button class="chip active" data-ui-id="care-tab-reminders">提醒</button>
    <button class="chip" data-ui-id="care-tab-medical">病历</button>
  </div>

  <section class="section" data-ui-id="care-reminder-list">
    <div class="section-header">
      <span class="section-title">疫苗与驱虫</span>
      <button class="section-action" data-ui-id="care-reminder-add">+ 新增提醒</button>
    </div>

    <div class="reminder-item urgent" data-ui-id="care-reminder-r1">
      <div class="reminder-bar"></div>
      <div class="reminder-icon">
        <svg viewBox="0 0 24 24" role="img"><title>疫苗提醒条目</title><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div class="reminder-main">
        <div class="reminder-title">狂犬疫苗加强针</div>
        <div class="reminder-date">2026-06-25 到期 · 布丁</div>
      </div>
      <span class="reminder-tag urgent">3天后</span>
    </div>

    <div class="reminder-item" data-ui-id="care-reminder-r2">
      <div class="reminder-bar"></div>
      <div class="reminder-icon">
        <svg viewBox="0 0 24 24" role="img"><title>驱虫提醒条目</title><circle cx="12" cy="12" r="9" stroke-width="2"/><path d="M12 7v5l3 3" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div class="reminder-main">
        <div class="reminder-title">体外驱虫</div>
        <div class="reminder-date">2026-07-02 到期 · 布丁</div>
      </div>
      <span class="reminder-tag normal">10天后</span>
    </div>

    <div class="reminder-item done" data-ui-id="care-reminder-r3">
      <div class="reminder-bar"></div>
      <div class="reminder-icon">
        <svg viewBox="0 0 24 24" role="img"><title>已完成提醒条目</title><path d="M20 6L9 17l-5-5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="reminder-main">
        <div class="reminder-title">年度体检</div>
        <div class="reminder-date">2026-05-20 已完成 · 布丁</div>
      </div>
      <span class="reminder-tag done">已完成</span>
    </div>
  </section>

  <section class="section" data-ui-id="care-medical-list" style="display:none">
    <div class="section-header">
      <span class="section-title">就医病历</span>
      <button class="section-action" data-ui-id="care-medical-add">+ 新增病历</button>
    </div>

    <div class="medical-card" data-ui-id="care-medical-m1">
      <div class="medical-header">
        <div class="medical-icon">
          <svg viewBox="0 0 24 24" role="img"><title>病历卡片</title><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke-width="2" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div class="medical-main">
          <div class="medical-title">肠胃炎复诊</div>
          <div class="medical-meta">布丁 · 瑞派宠物医院 · 2026-05-15</div>
        </div>
      </div>
      <div class="medical-images">
        <div class="medical-thumb"><svg viewBox="0 0 24 24" role="img"><title>病历附件图片</title><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="medical-thumb"><svg viewBox="0 0 24 24" role="img"><title>病历附件图片</title><rect x="3" y="3" width="18" height="18" rx="2" stroke-width="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
    </div>
  </section>

  <nav class="tabbar">
    <div class="tab-item" data-ui-id="tab-home" data-tab-id="tab-home">
      <svg class="tab-icon" viewBox="0 0 24 24" role="img"><title>首页标签</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="tab-label">首页</span>
    </div>
    <div class="tab-item" data-ui-id="tab-records" data-tab-id="tab-records">
      <svg class="tab-icon" viewBox="0 0 24 24" role="img"><title>记录标签</title><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="14 2 14 8 20 8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="16" y1="13" x2="8" y2="13" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="17" x2="8" y2="17" stroke-width="2" stroke-linecap="round"/></svg>
      <span class="tab-label">记录</span>
    </div>
    <div class="tab-item" data-ui-id="tab-trends" data-tab-id="tab-trends">
      <svg class="tab-icon" viewBox="0 0 24 24" role="img"><title>趋势标签</title><path d="M3 3v18h18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="tab-label">趋势</span>
    </div>
    <div class="tab-item active" data-ui-id="tab-care" data-tab-id="tab-care">
      <svg class="tab-icon" viewBox="0 0 24 24" role="img"><title>照护标签</title><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="tab-label">照护</span>
    </div>
    <div class="tab-item" data-ui-id="tab-profile" data-tab-id="tab-profile">
      <svg class="tab-icon" viewBox="0 0 24 24" role="img"><title>我的标签</title><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke-width="2"/></svg>
      <span class="tab-label">我的</span>
    </div>
  </nav>

</body>
</html>
