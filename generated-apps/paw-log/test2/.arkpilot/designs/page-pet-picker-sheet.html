<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>宠物选择</title>
  <style>
    :root {
      --mint-600: #3FC0A0; --mint-500: #5ED7B6; --mint-300: #9CEBD4; --mint-100: #E5FAF4; --mint-50: #F4FDFA;
      --pink-600: #FF9AAE; --pink-500: #FFB3C1; --pink-100: #FFF0F3;
      --yellow-500: #FFD166; --yellow-100: #FFF9E6;
      --blue-500: #87CEEB; --blue-100: #E6F5FB;
      --lavender-500: #B8B8E0; --lavender-100: #F2F1FA;
      --apricot-500: #F4D0A4; --apricot-100: #FDF5EA;
      --forest-900: #163832; --forest-700: #3D5A52; --forest-500: #6F8983; --forest-200: #C9D8D4; --forest-100: #E3EDEA;
      --white: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: rgba(22,56,50,0.35); max-width: 390px; margin: 0 auto;
      min-height: 100vh; display: flex; align-items: flex-end;
    }
    .sheet {
      width: 100%; background: var(--white); border-radius: 28px 28px 0 0;
      padding: 20px 16px 32px; box-shadow: 0 -8px 32px rgba(22,56,50,0.2);
    }
    .sheet-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--forest-200); margin: 0 auto 16px; }
    .sheet-title { font-size: 20px; font-weight: 800; margin-bottom: 16px; text-align: center; }
    .pet-option {
      display: flex; align-items: center; gap: 14px; padding: 14px;
      border-radius: 18px; border: 1px solid var(--forest-100); margin-bottom: 10px;
      background: var(--white); transition: transform .15s; cursor: pointer;
    }
    .pet-option:active { transform: scale(0.98); }
    .pet-option.active { background: var(--mint-100); border-color: var(--mint-500); }
    .pet-option-avatar {
      width: 52px; height: 52px; border-radius: 50%; background: var(--mint-50);
      display: flex; align-items: center; justify-content: center;
    }
    .pet-option-avatar svg { width: 28px; height: 28px; }
    .pet-option-main { flex: 1; }
    .pet-option-name { font-size: 16px; font-weight: 700; }
    .pet-option-meta { font-size: 12px; color: var(--forest-500); margin-top: 2px; }
    .pet-option-check {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--mint-500); display: flex; align-items: center; justify-content: center;
    }
    .pet-option-check svg { width: 14px; height: 14px; stroke: var(--white); fill: none; }
    .add-pet-row {
      display: flex; align-items: center; gap: 14px; padding: 14px;
      border-radius: 18px; border: 1px dashed var(--mint-500); margin-top: 4px;
      background: var(--mint-50); cursor: pointer;
    }
    .add-pet-row:active { transform: scale(0.98); }
    .add-pet-icon { width: 44px; height: 44px; border-radius: 50%; background: var(--mint-100); display: flex; align-items: center; justify-content: center; }
    .add-pet-icon svg { width: 22px; height: 22px; stroke: var(--mint-600); fill: none; }
    .add-pet-text { font-size: 15px; font-weight: 700; color: var(--mint-600); }
  </style>
</head>
<body data-page-id="pet-picker-sheet">

  <div class="sheet">
    <div class="sheet-handle" data-ui-id="pet-picker-close"></div>
    <div class="sheet-title">选择宠物</div>

    <div class="pet-option active" data-ui-id="pet-picker-item-p1">
      <div class="pet-option-avatar">
        <svg viewBox="0 0 24 24" role="img"><title>选择宠物布丁</title><path d="M12 14c-3.5 0-6 2.5-6 5.5 0 1.5 1 2.5 2.5 2.5h7c1.5 0 2.5-1 2.5-2.5 0-3-2.5-5.5-6-5.5z" fill="#3FC0A0"/><circle cx="7.5" cy="10" r="2" fill="#3FC0A0"/><circle cx="16.5" cy="10" r="2" fill="#3FC0A0"/><circle cx="12" cy="7" r="2.5" fill="#3FC0A0"/></svg>
      </div>
      <div class="pet-option-main">
        <div class="pet-option-name">布丁</div>
        <div class="pet-option-meta">柯基 · 3岁 · 12.5kg</div>
      </div>
      <div class="pet-option-check">
        <svg viewBox="0 0 24 24" role="img"><title>当前选中标记</title><path d="M20 6L9 17l-5-5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="pet-option" data-ui-id="pet-picker-item-p2">
      <div class="pet-option-avatar">
        <svg viewBox="0 0 24 24" role="img"><title>选择宠物年糕</title><path d="M12 14c-3.5 0-6 2.5-6 5.5 0 1.5 1 2.5 2.5 2.5h7c1.5 0 2.5-1 2.5-2.5 0-3-2.5-5.5-6-5.5z" fill="#FFB3C1"/><circle cx="7.5" cy="10" r="2" fill="#FFB3C1"/><circle cx="16.5" cy="10" r="2" fill="#FFB3C1"/><circle cx="12" cy="7" r="2.5" fill="#FFB3C1"/></svg>
      </div>
      <div class="pet-option-main">
        <div class="pet-option-name">年糕</div>
        <div class="pet-option-meta">布偶猫 · 2岁 · 4.8kg</div>
      </div>
    </div>

    <div class="add-pet-row" data-ui-id="pet-picker-add">
      <div class="add-pet-icon">
        <svg viewBox="0 0 24 24" role="img"><title>添加新宠物</title><path d="M12 5v14M5 12h14" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <span class="add-pet-text">添加宠物</span>
    </div>
  </div>

</body>
</html>
