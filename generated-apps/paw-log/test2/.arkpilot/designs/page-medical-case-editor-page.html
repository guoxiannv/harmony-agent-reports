<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>病历编辑</title>
  <style>
    :root {
      --mint-600: #3FC0A0; --mint-500: #5ED7B6; --mint-300: #9CEBD4; --mint-100: #E5FAF4; --mint-50: #F4FDFA;
      --pink-600: #FF9AAE; --pink-500: #FFB3C1; --pink-100: #FFF0F3;
      --yellow-500: #FFD166; --yellow-100: #FFF9E6;
      --blue-500: #87CEEB; --blue-100: #E6F5FB;
      --lavender-500: #B8B8E0; --lavender-100: #F2F1FA;
      --apricot-500: #F4D0A4; --apricot-100: #FDF5EA;
      --forest-900: #163832; --forest-700: #3D5A52; --forest-500: #6F8983; --forest-200: #C9D8D4; --forest-100: #E3EDEA;
      --white: #FFFFFF; --page-bg: #FAFDFC;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--page-bg); color: var(--forest-900); max-width: 390px; margin: 0 auto;
      min-height: 100vh; position: relative; padding-bottom: 100px;
    }
    .header { padding: 12px 16px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { width: 36px; height: 36px; border-radius: 12px; background: var(--white); border: 1px solid var(--forest-100); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .back-btn svg { width: 18px; height: 18px; stroke: var(--forest-700); fill: none; }
    .header-title { font-size: 18px; font-weight: 800; }
    .save-top { padding: 8px 16px; border-radius: 18px; background: var(--mint-100); color: var(--mint-600); font-size: 13px; font-weight: 700; border: none; cursor: pointer; }

    .form-card {
      background: var(--white); border: 1px solid rgba(201,216,212,0.45); border-radius: 24px;
      margin: 8px 16px 16px; padding: 16px; box-shadow: 0 6px 22px rgba(22,56,50,0.05);
    }
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--forest-700); margin-bottom: 6px; }
    .input {
      width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--forest-100);
      background: var(--mint-50); font-size: 15px; color: var(--forest-900); outline: none;
    }
    .input:focus { border-color: var(--mint-500); box-shadow: 0 0 0 4px rgba(94,215,182,0.12); }
    .textarea {
      width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--forest-100);
      background: var(--mint-50); font-size: 15px; color: var(--forest-900); outline: none; min-height: 90px; resize: none;
    }
    .textarea:focus { border-color: var(--mint-500); box-shadow: 0 0 0 4px rgba(94,215,182,0.12); }

    .image-upload {
      margin: 0 16px 16px;
    }
    .section-title { font-size: 17px; font-weight: 700; margin-bottom: 12px; }
    .upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .upload-thumb {
      aspect-ratio: 1; border-radius: 16px; background: var(--lavender-100); border: 1px dashed var(--lavender-500);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer;
    }
    .upload-thumb svg { width: 24px; height: 24px; stroke: var(--lavender-500); fill: none; }
    .upload-thumb span { font-size: 11px; color: var(--lavender-500); font-weight: 600; }

    .bottom-actions {
      position: fixed; bottom: 0; left: 0; right: 0; max-width: 390px; margin: 0 auto;
      padding: 12px 16px 24px; background: var(--white); border-top: 1px solid var(--forest-100);
    }
    .btn-primary {
      width: 100%; padding: 15px; border-radius: 28px; border: none;
      background: linear-gradient(135deg, var(--mint-500) 0%, var(--mint-600) 50%, #2DB08E 100%);
      color: var(--white); font-size: 16px; font-weight: 700;
      box-shadow: 0 8px 24px rgba(63,192,160,0.36), inset 0 1px 0 rgba(255,255,255,0.35);
      cursor: pointer; transition: transform .15s;
    }
    .btn-primary:active { transform: scale(0.97); }
  </style>
</head>
<body data-page-id="medical-case-editor-page">

  <header class="header">
    <div class="header-left">
      <button class="back-btn" data-ui-id="medical-editor-back">
        <svg viewBox="0 0 24 24" role="img"><title>返回上一页</title><path d="M15 18l-6-6 6-6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span class="header-title">编辑病历</span>
    </div>
    <button class="save-top" data-ui-id="medical-editor-save">保存</button>
  </header>

  <section class="form-card">
    <div class="form-group">
      <label class="form-label">标题</label>
      <input class="input" type="text" value="肠胃炎复诊" data-ui-id="medical-editor-title-input" />
    </div>

    <div class="form-group">
      <label class="form-label">就诊日期</label>
      <input class="input" type="text" value="2026-05-15" data-ui-id="medical-editor-date" />
    </div>

    <div class="form-group">
      <label class="form-label">医院</label>
      <input class="input" type="text" value="瑞派宠物医院（朝阳分院）" data-ui-id="medical-editor-hospital" />
    </div>

    <div class="form-group">
      <label class="form-label">诊断</label>
      <input class="input" type="text" value="轻度肠胃炎" data-ui-id="medical-editor-diagnosis" />
    </div>

    <div class="form-group">
      <label class="form-label">医嘱备注</label>
      <textarea class="textarea" data-ui-id="medical-editor-note">少食多餐，避免油腻，3天后复查。</textarea>
    </div>
  </section>

  <section class="image-upload">
    <div class="section-title">附件图片</div>
    <div class="upload-grid">
      <div class="upload-thumb" data-ui-id="medical-editor-add-image">
        <svg viewBox="0 0 24 24" role="img"><title>添加病历图片附件</title><path d="M12 5v14M5 12h14" stroke-width="2" stroke-linecap="round"/></svg>
        <span>添加图片</span>
      </div>
    </div>
  </section>

  <div class="bottom-actions">
    <button class="btn-primary" data-ui-id="medical-editor-save">保存病历</button>
  </div>

</body>
</html>
