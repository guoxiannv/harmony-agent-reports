<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>童词卡 - 复习页</title>
  <style>
    :root {
      --bg: #FAF8FF;
      --primary: #6B4EE6;
      --deep: #2D2A4A;
      --accent-green: #3DD9A0;
      --accent-green-dark: #2BC88E;
      --accent-orange: #FF8C69;
      --accent-orange-dark: #F57A54;
      --gold: #FFD36E;
      --mist: #B8B0E6;
      --silver: #9B96B0;
      --gray: #6B6580;
      --surface: #F0EDF8;
      --card-shadow: rgba(107, 78, 230, 0.18) 0px 20px 60px -12px, rgba(45, 42, 74, 0.08) 0px 8px 24px -6px;
      --btn-green-shadow: rgba(61, 217, 160, 0.45) 0px 12px 32px 0px;
      --btn-orange-shadow: rgba(255, 140, 105, 0.40) 0px 12px 32px 0px;
      --glass: rgba(255, 255, 255, 0.72);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--deep);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100%;
    }

    .app-shell {
      width: 100%;
      max-width: 420px;
      min-height: 100%;
      position: relative;
      padding: 0 24px;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: 0 -24px;
      padding: 56px 24px 16px;
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 0 0 24px 24px;
      box-shadow: 0 1px 0 rgba(107, 78, 230, 0.06);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: var(--primary);
    }
    .brand svg { width: 26px; height: 26px; color: var(--primary); }
    .stats {
      display: flex;
      gap: 20px;
    }
    .stat {
      text-align: right;
    }
    .stat-value {
      font-family: "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--deep);
    }
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: var(--silver);
      text-transform: uppercase;
      margin-top: 2px;
    }
    .progress-track {
      width: 100%;
      height: 10px;
      background: #E8E4F3;
      border-radius: 5px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent-green) 100%);
      border-radius: 5px;
      transition: width 350ms ease-out;
    }

    /* Card area */
    .card-stage {
      display: flex;
      justify-content: center;
      padding-top: 48px;
      padding-bottom: 140px;
    }

    .flip-card {
      width: 100%;
      max-width: 360px;
      height: 460px;
      perspective: 1200px;
      cursor: pointer;
    }
    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 800ms cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-style: preserve-3d;
    }
    .flip-card.is-flipped .flip-card-inner {
      transform: rotateY(180deg);
    }
    .flip-card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 36px;
      background: #FFFFFF;
      border: 1px solid rgba(107, 78, 230, 0.10);
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      overflow: hidden;
    }
    .flip-card-back {
      background: #FBFAFF;
      transform: rotateY(180deg);
    }

    .card-badge {
      position: absolute;
      top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 980px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(107, 78, 230, 0.12);
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
    }
    .card-badge svg { width: 16px; height: 16px; }

    .word-en {
      font-family: "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      font-size: 54px;
      font-weight: 800;
      letter-spacing: -0.6px;
      line-height: 1.0;
      color: var(--deep);
      text-align: center;
      margin-top: 8px;
    }
    .word-hint {
      position: absolute;
      bottom: 28px;
      font-size: 13px;
      font-weight: 500;
      color: var(--silver);
    }

    .meaning-tag {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      border-radius: 980px;
      background: rgba(184, 176, 230, 0.22);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 28px;
    }
    .phonetic {
      font-family: "SF Pro Text", "PingFang SC", sans-serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.2px;
      color: var(--silver);
      margin-bottom: 18px;
    }
    .divider {
      width: 60px;
      height: 1px;
      border-top: 1px dashed var(--mist);
      margin-bottom: 22px;
    }
    .word-cn {
      font-size: 30px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--deep);
      text-align: center;
    }

    /* Action bar */
    .action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
    }
    .action-bar-inner {
      width: 100%;
      max-width: 420px;
      padding: 20px 24px calc(20px + env(safe-area-inset-bottom));
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -4px 24px rgba(107, 78, 230, 0.08);
      display: flex;
      gap: 14px;
    }
    .btn {
      flex: 1;
      height: 60px;
      border: none;
      border-radius: 22px;
      font-family: "SF Pro Text", "PingFang SC", sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #FFFFFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 150ms ease, filter 150ms ease;
    }
    .btn:active { transform: scale(0.96); }
    .btn-known {
      background: linear-gradient(135deg, var(--accent-green) 0%, var(--accent-green-dark) 100%);
      box-shadow: var(--btn-green-shadow);
    }
    .btn-known:active { filter: brightness(0.92); }
    .btn-unknown {
      background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-orange-dark) 100%);
      box-shadow: var(--btn-orange-shadow);
    }
    .btn-unknown:active { filter: brightness(0.92); }
    .btn svg { width: 20px; height: 20px; }

    /* Completion overlay */
    .completion-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: radial-gradient(ellipse at 50% 20%, #F0E9FF 0%, #FAF8FF 55%, #FAF8FF 100%);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .completion-overlay.is-visible { display: flex; }

    .star-badge {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFECB3 0%, var(--gold) 100%);
      box-shadow: 0 16px 40px rgba(255, 211, 110, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      animation: starPop 600ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .star-badge svg { width: 64px; height: 64px; color: #8A6D1B; }

    @keyframes starPop {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .star-badge { animation: starPop 600ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards, float 4s ease-in-out infinite 600ms; }

    .completion-title {
      font-family: "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: var(--primary);
      margin-bottom: 10px;
    }
    .completion-desc {
      font-size: 16px;
      font-weight: 500;
      color: var(--gray);
      margin-bottom: 36px;
    }
    .btn-restart {
      width: 100%;
      max-width: 320px;
      height: 60px;
      border: none;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--primary) 0%, #8568F0 100%);
      box-shadow: rgba(107, 78, 230, 0.40) 0px 12px 32px 0px;
      font-family: "SF Pro Text", "PingFang SC", sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #FFFFFF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 150ms ease;
    }
    .btn-restart:active { transform: scale(0.96); }
    .btn-restart svg { width: 20px; height: 20px; }

    /* Decorative stars */
    .deco-star {
      position: absolute;
      color: var(--mist);
      opacity: 0.35;
      animation: float 6s ease-in-out infinite;
    }
    .deco-star.s1 { top: 10%; left: 12%; width: 18px; height: 18px; animation-delay: 0s; }
    .deco-star.s2 { top: 18%; right: 14%; width: 14px; height: 14px; animation-delay: 1.2s; }
    .deco-star.s3 { top: 42%; left: 8%; width: 12px; height: 12px; animation-delay: 2.4s; }
    .deco-star.s4 { bottom: 24%; right: 10%; width: 20px; height: 20px; animation-delay: 0.8s; }
    .deco-star.s5 { bottom: 12%; left: 16%; width: 10px; height: 10px; animation-delay: 1.8s; }
  </style>
</head>

      <svg class="deco-star s1" viewBox="0 0 24 24" fill="currentColor" role="img" aria-label="装饰星光一"><title>装饰性星光一</title><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z" /></svg>

  <script>
    const card = document.getElementById('flashcard');
    card.addEventListener('click', () => card.classList.toggle('is-flipped'));

    const words = [
      { en: 'elephant', cn: '大象', ph: '/ˈelɪfənt/' },
      { en: 'giraffe', cn: '长颈鹿', ph: '/dʒəˈrɑːf/' },
      { en: 'penguin', cn: '企鹅', ph: '/ˈpeŋɡwɪn/' },
      { en: 'butterfly', cn: '蝴蝶', ph: '/ˈbʌtəflaɪ/' },
      { en: 'rainbow', cn: '彩虹', ph: '/ˈreɪnbəʊ/' }
    ];
    let index = 0;
    let known = 3;
    let remaining = 7;
    const total = 10;

    function updateCard() {
      const w = words[index % words.length];
      document.querySelector('[data-ui-id="study-word-front"]').textContent = w.en;
      document.querySelector('[data-ui-id="study-word-back-meaning"]').textContent = w.cn;
      document.querySelector('[data-ui-id="study-word-back-phonetic"]').textContent = w.ph;
      card.classList.remove('is-flipped');
    }

    function updateProgress() {
      document.querySelector('[data-ui-id="study-remaining-count"]').textContent = remaining;
      document.querySelector('[data-ui-id="study-known-count"]').textContent = known;
      document.getElementById('progressFill').style.width = ((known / total) * 100) + '%';
    }

    document.querySelector('[data-ui-id="study-known-button"]').addEventListener('click', () => {
      known = Math.min(total, known + 1);
      remaining = Math.max(0, remaining - 1);
      index++;
      updateProgress();
      updateCard();
    });

    document.querySelector('[data-ui-id="study-unknown-button"]').addEventListener('click', () => {
      index++;
      updateCard();
    });

    document.querySelector('[data-ui-id="study-restart-button"]').addEventListener('click', () => {
      document.getElementById('completionOverlay').classList.remove('is-visible');
      known = 0;
      remaining = total;
      index = 0;
      updateProgress();
      updateCard();
    });

    // Demo: show completion overlay after 5 seconds for visual verification
    setTimeout(() => {
      document.getElementById('completionOverlay').classList.add('is-visible');
    }, 5000);
  </script>
</body>
</html>
