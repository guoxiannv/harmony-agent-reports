<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>平安扣 - 巡检</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #F3F6F8; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; color: #0F172A; }
    body { max-width: 420px; margin: 0 auto; position: relative; }
    .page { min-height: 100%; padding: 24px 16px 120px; }
    .appbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .appbar-title { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
    .appbar-action { width: 40px; height: 40px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(15,23,42,0.06); }

    .segment-control { display: flex; background: #fff; border-radius: 14px; padding: 4px; box-shadow: 0 4px 16px rgba(15,23,42,0.05); margin-bottom: 20px; }
    .segment-item { flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: 500; color: #64748B; border-radius: 12px; }
    .segment-item.active { background: #CCFBF1; color: #0F766E; }

    .task-list { display: flex; flex-direction: column; gap: 12px; }
    .task-card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 4px 16px rgba(15,23,42,0.05); }
    .task-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .task-title { font-size: 16px; font-weight: 600; color: #0F172A; margin-bottom: 4px; }
    .task-meta { font-size: 12px; color: #64748B; }
    .task-status { font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 8px; }
    .task-status.pending { background: #E0F2FE; color: #0EA5E9; }
    .task-status.done { background: #DCFCE7; color: #16A34A; }
    .task-progress { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .progress-track { flex: 1; height: 6px; background: #F1F5F9; border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #0D9488, #2DD4BF); border-radius: 999px; }
    .progress-text { font-size: 12px; color: #64748B; }
    .task-actions { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 12px; border-radius: 14px; font-size: 15px; font-weight: 600; text-align: center; border: none; }
    .btn-primary { background: linear-gradient(135deg, #0D9488, #2DD4BF); color: #fff; box-shadow: 0 8px 24px rgba(13,148,136,0.24); }
    .btn-secondary { background: #CCFBF1; color: #0F766E; }

    .empty-state { text-align: center; padding: 60px 16px; }
    .empty-icon { width: 120px; height: 120px; margin: 0 auto 16px; }
    .empty-title { font-size: 16px; font-weight: 600; color: #0F172A; margin-bottom: 6px; }
    .empty-desc { font-size: 14px; color: #64748B; margin-bottom: 20px; }
    .btn-secondary-empty { display: inline-block; background: #CCFBF1; color: #0F766E; padding: 12px 24px; border-radius: 14px; font-size: 15px; font-weight: 600; }

    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto; max-width: 420px; height: 68px; background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.76) 100%); backdrop-filter: blur(24px); border-top: 1px solid rgba(226,232,240,0.6); box-shadow: 0 -4px 16px rgba(15,23,42,0.05); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 8px; z-index: 100; }
    .tab-item { flex: 1; text-align: center; padding-top: 4px; }
    .tab-icon { width: 24px; height: 24px; margin: 0 auto 3px; color: #94A3B8; }
    .tab-item.active .tab-icon { color: #0D9488; }
    .tab-label { font-size: 11px; font-weight: 500; color: #94A3B8; }
    .tab-item.active .tab-label { color: #0D9488; }
    .tab-fab { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #0D9488, #2DD4BF); display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 36px rgba(13,148,136,0.32); border: 3px solid #F3F6F8; }

    svg { display: block; }
  </style>
</head>
<body data-page-id="inspection-page" data-tab-id="tab-inspection">
  <div class="page">
    <header class="appbar">
      <h1 class="appbar-title">巡检任务</h1>
      <div class="appbar-action" data-ui-id="inspection-add-task">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#0F172A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>新建巡检任务</title>
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </div>
    </header>

    <div class="segment-control">
      <div class="segment-item active" data-ui-id="inspection-segment-today">今日</div>
      <div class="segment-item" data-ui-id="inspection-segment-pending">待办</div>
      <div class="segment-item" data-ui-id="inspection-segment-history">历史</div>
    </div>

    <div class="task-list" data-ui-id="inspection-task-list">
      <div class="task-card" id="inspection-task-1">
        <div class="task-header">
          <div>
            <div class="task-title">北区消防通道</div>
            <div class="task-meta">08:30 · 预计 15 分钟 · 8 个检查项</div>
          </div>
          <span class="task-status pending">待完成</span>
        </div>
        <div class="task-progress">
          <div class="progress-track"><div class="progress-fill" style="width:30%;"></div></div>
          <span class="progress-text">3/8</span>
        </div>
        <div class="task-actions">
          <button class="btn btn-primary" data-ui-id="inspection-task-start-1">继续巡检</button>
          <button class="btn btn-secondary">详情</button>
        </div>
      </div>

      <div class="task-card" id="inspection-task-2">
        <div class="task-header">
          <div>
            <div class="task-title">仓库配电区</div>
            <div class="task-meta">10:00 · 预计 20 分钟 · 12 个检查项</div>
          </div>
          <span class="task-status pending">待开始</span>
        </div>
        <div class="task-progress">
          <div class="progress-track"><div class="progress-fill" style="width:0%;"></div></div>
          <span class="progress-text">0/12</span>
        </div>
        <div class="task-actions">
          <button class="btn btn-primary" data-ui-id="inspection-task-start-2">开始巡检</button>
          <button class="btn btn-secondary">详情</button>
        </div>
      </div>

      <div class="task-card" id="inspection-task-3">
        <div class="task-header">
          <div>
            <div class="task-title">车间入口测温点</div>
            <div class="task-meta">昨日 09:00 · 10 个检查项</div>
          </div>
          <span class="task-status done">已完成</span>
        </div>
        <div class="task-progress">
          <div class="progress-track"><div class="progress-fill" style="width:100%;"></div></div>
          <span class="progress-text">10/10</span>
        </div>
        <div class="task-actions">
          <button class="btn btn-secondary" style="flex:1;">查看结果</button>
        </div>
      </div>
    </div>

    <div class="empty-state" id="inspection-empty-task" style="display:none;">
      <div class="empty-icon">
        <svg viewBox="0 0 120 120" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>暂无巡检任务图标</title>
          <defs><linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D9488"/><stop offset="100%" stop-color="#2DD4BF"/></linearGradient></defs>
          <rect x="25" y="20" width="70" height="80" rx="8"/>
          <path d="M40 45h40"/>
          <path d="M40 60h30"/>
          <path d="M40 75h20"/>
          <circle cx="82" cy="82" r="12"/>
          <path d="M78 82l3 3 6-6"/>
        </svg>
      </div>
      <div class="empty-title">暂无巡检任务</div>
      <div class="empty-desc">点击右上角添加任务，或从首页快捷入口开始</div>
      <div class="btn-secondary-empty">创建巡检任务</div>
    </div>
  </div>

  <nav class="tabbar">
    <div class="tab-item" data-tab-id="tab-home">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打开首页统计看板</title>
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="tab-label">首页</div>
    </div>
    <div class="tab-item active" data-tab-id="tab-inspection">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打开巡检任务页面</title>
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <div class="tab-label">巡检</div>
    </div>
    <div class="tab-fab" data-ui-id="risk-add-button">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <title>快速上报隐患</title>
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
    <div class="tab-item" data-tab-id="tab-risk" style="margin-left:48px;">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打开隐患列表页面</title>
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="tab-label">隐患</div>
    </div>
    <div class="tab-item" data-tab-id="tab-emergency">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打开应急联系人页面</title>
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
      <div class="tab-label">应急</div>
    </div>
    <div class="tab-item" data-tab-id="tab-profile">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打开个人中心页面</title>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="tab-label">我的</div>
    </div>
  </nav>
</body>
</html>
