<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>平安扣 - 隐患</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #F3F6F8; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; color: #0F172A; }
    body { max-width: 420px; margin: 0 auto; position: relative; }
    .page { min-height: 100%; padding: 24px 16px 120px; }
    .appbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .appbar-title { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
    .appbar-action { width: 40px; height: 40px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(15,23,42,0.06); }

    .search-box { display: flex; align-items: center; background: #fff; border-radius: 999px; padding: 10px 16px; box-shadow: 0 4px 16px rgba(15,23,42,0.05); margin-bottom: 14px; }
    .search-box svg { color: #94A3B8; margin-right: 10px; flex-shrink: 0; }
    .search-box input { border: none; outline: none; flex: 1; font-size: 14px; color: #334155; background: transparent; }

    .filter-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 16px; }
    .filter-chips::-webkit-scrollbar { display: none; }
    .chip { white-space: nowrap; padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; background: #F1F5F9; color: #64748B; border: 1px solid transparent; }
    .chip.active { background: #CCFBF1; color: #0F766E; border-color: #0D9488; }

    .risk-list { display: flex; flex-direction: column; gap: 12px; }
    .risk-card { background: #fff; border-radius: 16px; padding: 14px 16px; box-shadow: 0 4px 16px rgba(15,23,42,0.05); }
    .risk-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .risk-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .risk-icon.fire { background: #FEE2E2; color: #DC2626; }
    .risk-icon.elec { background: #FEF3C7; color: #D97706; }
    .risk-icon.mech { background: #E0F2FE; color: #0EA5E9; }
    .risk-icon.env { background: #DCFCE7; color: #16A34A; }
    .risk-main { flex: 1; min-width: 0; }
    .risk-title { font-size: 15px; font-weight: 600; color: #0F172A; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .risk-meta { font-size: 12px; color: #64748B; }
    .risk-badges { display: flex; gap: 6px; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
    .badge.low { background: #DCFCE7; color: #16A34A; }
    .badge.mid { background: #FEF3C7; color: #D97706; }
    .badge.high { background: #FEE2E2; color: #DC2626; }
    .badge.critical { background: #FECACA; color: #991B1B; }
    .badge.status-pending { background: #F1F5F9; color: #64748B; }
    .badge.status-progress { background: #E0F2FE; color: #0EA5E9; }
    .badge.status-review { background: #FEF3C7; color: #D97706; }
    .badge.status-closed { background: #DCFCE7; color: #16A34A; }
    .badge.status-overdue { background: #FFEDD5; color: #EA580C; }
    .risk-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 12px; color: #64748B; }
    .risk-deadline.overdue { color: #EA580C; font-weight: 600; }

    .empty-state { text-align: center; padding: 60px 16px; }
    .empty-icon { width: 120px; height: 120px; margin: 0 auto 16px; }
    .empty-title { font-size: 16px; font-weight: 600; color: #0F172A; margin-bottom: 6px; }
    .empty-desc { font-size: 14px; color: #64748B; margin-bottom: 20px; }
    .btn-secondary-empty { display: inline-block; background: #CCFBF1; color: #0F766E; padding: 12px 24px; border-radius: 14px; font-size: 15px; font-weight: 600; }

    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto; max-width: 420px; height: 68px; background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.76) 100%); backdrop-filter: blur(24px); border-top: 1px solid rgba(226,232,240,0.6); box-shadow: 0 -4px 16px rgba(15,23,42,0.05); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 8px; z-index: 100; }
    .tab-item { flex: 1; text-align: center; padding-top: 4px; }
    .tab-icon { width: 24px; height: 24px; margin: 0 auto 3px; color: #94A3B8; }
    .tab-item.active .tab-icon { color: #0D9488; }
    .tab-label { font-size: 11px; font-weight: 500; color: #94A3B8; }
    .tab-item.active .tab-label { color: #0D9488; }
    .tab-fab { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #0D9488, #2DD4BF); display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 36px rgba(13,148,136,0.32); border: 3px solid #F3F6F8; }

    svg { display: block; }
  </style>
</head>
<body data-page-id="risk-page" data-tab-id="tab-risk">
  <div class="page">
    <header class="appbar">
      <h1 class="appbar-title">隐患管理</h1>
      <div class="appbar-action" data-ui-id="risk-add-button">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#0F172A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>上报新的风险隐患</title>
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </div>
    </header>

    <div class="search-box">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>搜索隐患</title>
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="搜索隐患编号、地点、描述" data-ui-id="risk-search-input" />
    </div>

    <div class="filter-chips">
      <div class="chip active" data-ui-id="risk-filter-all">全部</div>
      <div class="chip" data-ui-id="risk-filter-pending">待整改</div>
      <div class="chip" data-ui-id="risk-filter-inprogress">整改中</div>
      <div class="chip" data-ui-id="risk-filter-review">待复核</div>
      <div class="chip" data-ui-id="risk-filter-closed">已关闭</div>
    </div>

    <div class="risk-list" data-ui-id="risk-list">
      <div class="risk-card" id="risk-item-1">
        <div class="risk-header">
          <div class="risk-icon elec">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>电气类隐患图标</title>
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </div>
          <div class="risk-main">
            <div class="risk-title">仓库配电箱未关闭</div>
            <div class="risk-meta">#2025062201 · 仓库配电区</div>
          </div>
          <div class="risk-badges">
            <span class="badge high">高</span>
            <span class="badge status-progress">整改中</span>
          </div>
        </div>
        <div class="risk-footer">
          <span>责任人：张师傅</span>
          <span class="risk-deadline overdue">逾期 1 天</span>
        </div>
      </div>

      <div class="risk-card" id="risk-item-2">
        <div class="risk-header">
          <div class="risk-icon fire">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>消防类隐患图标</title>
              <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-2.072-2.143-3-1.5-1.928 1.286-3 4.5-3 7.5a6 6 0 0 0 12 0c0-2.5-1-4.5-2.5-6"/>
            </svg>
          </div>
          <div class="risk-main">
            <div class="risk-title">2 号楼东侧灭火器压力偏低</div>
            <div class="risk-meta">#2025062202 · 北区消防通道</div>
          </div>
          <div class="risk-badges">
            <span class="badge mid">中</span>
            <span class="badge status-pending">待整改</span>
          </div>
        </div>
        <div class="risk-footer">
          <span>责任人：待指派</span>
          <span class="risk-deadline">截止 06-25</span>
        </div>
      </div>

      <div class="risk-card" id="risk-item-3">
        <div class="risk-header">
          <div class="risk-icon env">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>环境类隐患图标</title>
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <div class="risk-main">
            <div class="risk-title">车间地面有油污未清理</div>
            <div class="risk-meta">#2025062101 · 装配车间</div>
          </div>
          <div class="risk-badges">
            <span class="badge low">低</span>
            <span class="badge status-closed">已关闭</span>
          </div>
        </div>
        <div class="risk-footer">
          <span>责任人：李安全</span>
          <span class="risk-deadline">已关闭</span>
        </div>
      </div>
    </div>

    <div class="empty-state" id="risk-empty-list" style="display:none;">
      <div class="empty-icon">
        <svg viewBox="0 0 120 120" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>暂无隐患图标</title>
          <defs><linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D9488"/><stop offset="100%" stop-color="#2DD4BF"/></linearGradient></defs>
          <path d="M60 20L20 100h80L60 20z"/>
          <line x1="60" y1="45" x2="60" y2="70"/>
          <line x1="60" y1="80" x2="60.01" y2="80"/>
        </svg>
      </div>
      <div class="empty-title">暂无隐患</div>
      <div class="empty-desc">当前筛选条件下没有隐患记录</div>
      <div class="btn-secondary-empty">上报隐患</div>
    </div>
  </div>

  <nav class="tabbar">
    <div class="tab-item" data-tab-id="tab-home">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打开首页统计看板</title>
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="tab-label">首页</div>
    </div>
    <div class="tab-item" data-tab-id="tab-inspection">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打开巡检任务页面</title>
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <div class="tab-label">巡检</div>
    </div>
    <div class="tab-fab" data-ui-id="risk-add-button">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <title>快速上报隐患</title>
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
    <div class="tab-item active" data-tab-id="tab-risk" style="margin-left:48px;">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打开隐患列表页面</title>
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="tab-label">隐患</div>
    </div>
    <div class="tab-item" data-tab-id="tab-emergency">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打开应急联系人页面</title>
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
      <div class="tab-label">应急</div>
    </div>
    <div class="tab-item" data-tab-id="tab-profile">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打开个人中心页面</title>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="tab-label">我的</div>
    </div>
  </nav>
</body>
</html>
