<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>平安扣 - 巡检详情</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #F3F6F8; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; color: #0F172A; }
    body { max-width: 420px; margin: 0 auto; position: relative; }
    .page { min-height: 100%; padding: 24px 16px 120px; }
    .appbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .back-btn { width: 40px; height: 40px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(15,23,42,0.06); }
    .appbar-title { font-size: 20px; font-weight: 700; }

    .info-card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 4px 16px rgba(15,23,42,0.05); margin-bottom: 20px; }
    .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
    .info-row:last-child { margin-bottom: 0; }
    .info-label { color: #64748B; }
    .info-value { color: #0F172A; font-weight: 500; }
    .info-value.tag { background: #E0F2FE; color: #0EA5E9; padding: 2px 8px; border-radius: 6px; font-size: 12px; }

    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; }

    .checklist { display: flex; flex-direction: column; gap: 12px; }
    .check-item { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 4px 16px rgba(15,23,42,0.05); }
    .check-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .check-index { width: 28px; height: 28px; border-radius: 50%; background: #CCFBF1; color: #0F766E; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .check-title { font-size: 15px; font-weight: 600; color: #0F172A; line-height: 1.4; }
    .check-actions { display: flex; gap: 10px; margin-bottom: 10px; }
    .check-btn { flex: 1; padding: 10px; border-radius: 12px; font-size: 14px; font-weight: 600; text-align: center; border: none; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .check-btn.pass { background: #DCFCE7; color: #16A34A; }
    .check-btn.fail { background: #FEE2E2; color: #DC2626; }
    .check-btn.active { box-shadow: inset 0 0 0 2px currentColor; }
    .check-note { width: 100%; border: 1px solid #E2E8F0; border-radius: 12px; padding: 10px 12px; font-size: 14px; color: #334155; background: #F8FAFC; }
    .check-note::placeholder { color: #94A3B8; }

    .photo-area { background: #F8FAFC; border: 2px dashed #CBD5E1; border-radius: 12px; padding: 20px; text-align: center; color: #64748B; }
    .photo-area svg { margin: 0 auto 8px; }

    .submit-btn { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 388px; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #0D9488, #2DD4BF); color: #fff; font-size: 16px; font-weight: 600; box-shadow: 0 10px 28px rgba(13,148,136,0.28); z-index: 90; }

    svg { display: block; }
  </style>
</head>
<body data-page-id="inspection-detail-page">
  <div class="page">
    <header class="appbar">
      <div class="back-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#0F172A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>返回巡检列表</title>
          <path d="M19 12H5"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
      </div>
      <h1 class="appbar-title" data-ui-id="inspection-detail-title">北区消防通道</h1>
    </header>

    <div class="info-card">
      <div class="info-row">
        <span class="info-label">巡检时间</span>
        <span class="info-value">08:30 - 08:45</span>
      </div>
      <div class="info-row">
        <span class="info-label">负责人</span>
        <span class="info-value">李安全</span>
      </div>
      <div class="info-row">
        <span class="info-label">状态</span>
        <span class="info-value tag">进行中</span>
      </div>
    </div>

    <div class="section-title">检查项</div>
    <div class="checklist" data-ui-id="inspection-detail-checklist">
      <div class="check-item" id="inspection-checkitem-1">
        <div class="check-header">
          <div class="check-index">1</div>
          <div class="check-title">消防通道是否畅通，无杂物堆放</div>
        </div>
        <div class="check-actions">
          <button class="check-btn pass active" data-ui-id="inspection-checkitem-pass-1">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <title>标记该项为正常</title>
              <polyline points="3 8 6 11 13 4"/>
            </svg>
            正常
          </button>
          <button class="check-btn fail" data-ui-id="inspection-checkitem-fail-1">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <title>标记该项为异常并上报隐患</title>
              <line x1="4" y1="4" x2="12" y2="12"/>
              <line x1="12" y1="4" x2="4" y2="12"/>
            </svg>
            异常
          </button>
        </div>
        <input type="text" class="check-note" placeholder="备注（可选）" data-ui-id="inspection-checkitem-note-1" />
      </div>

      <div class="check-item" id="inspection-checkitem-2">
        <div class="check-header">
          <div class="check-index">2</div>
          <div class="check-title">灭火器压力表是否在绿色有效区</div>
        </div>
        <div class="check-actions">
          <button class="check-btn pass" data-ui-id="inspection-checkitem-pass-2">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <title>标记该项为正常</title>
              <polyline points="3 8 6 11 13 4"/>
            </svg>
            正常
          </button>
          <button class="check-btn fail active" data-ui-id="inspection-checkitem-fail-2">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <title>标记该项为异常并上报隐患</title>
              <line x1="4" y1="4" x2="12" y2="12"/>
              <line x1="12" y1="4" x2="4" y2="12"/>
            </svg>
            异常
          </button>
        </div>
        <input type="text" class="check-note" placeholder="请说明异常情况及位置" data-ui-id="inspection-checkitem-note-2" value="2 号楼东侧灭火器压力偏低" />
        <div class="photo-area" style="margin-top:10px;">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>上传异常现场照片</title>
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <div style="font-size:13px;">点击添加照片</div>
        </div>
      </div>

      <div class="check-item" id="inspection-checkitem-3">
        <div class="check-header">
          <div class="check-index">3</div>
          <div class="check-title">应急照明灯是否正常工作</div>
        </div>
        <div class="check-actions">
          <button class="check-btn pass" data-ui-id="inspection-checkitem-pass-3">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <title>标记该项为正常</title>
              <polyline points="3 8 6 11 13 4"/>
            </svg>
            正常
          </button>
          <button class="check-btn fail" data-ui-id="inspection-checkitem-fail-3">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <title>标记该项为异常并上报隐患</title>
              <line x1="4" y1="4" x2="12" y2="12"/>
              <line x1="12" y1="4" x2="4" y2="12"/>
            </svg>
            异常
          </button>
        </div>
        <input type="text" class="check-note" placeholder="备注（可选）" data-ui-id="inspection-checkitem-note-3" />
      </div>
    </div>
  </div>

  <button class="submit-btn" data-ui-id="inspection-submit-result">提交巡检结果</button>
</body>
</html>
