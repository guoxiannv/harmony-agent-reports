<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>平安扣 - 巡检打卡</title>
  <style>
    :root {
      --brand-deep: #115E59; --brand-primary: #0D9488; --brand-bright: #14B8A6; --brand-light: #5EEAD4; --brand-mint: #CCFBF1; --brand-pale: #F0FDFA;
      --safe: #059669; --safe-bg: #D1FAE5; --warning: #B45309; --warning-bg: #FEF3C7; --danger: #DC2626; --danger-bg: #FEE2E2;
      --text-primary: #0F172A; --text-secondary: #475569; --text-tertiary: #94A3B8;
      --surface-primary: #FFFFFF; --surface-secondary: #F8FAFC; --surface-tertiary: #E2E8F0;
      --shadow-sm: 0 1px 2px rgba(15,23,42,0.04); --shadow-md: 0 4px 14px -3px rgba(13,148,136,0.13); --shadow-lg: 0 12px 32px -10px rgba(13,148,136,0.20); --glow-brand: 0 0 18px rgba(94,234,212,0.48);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'HarmonyOS Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--brand-pale); color: var(--text-primary); min-height: 100vh; max-width: 420px; margin: 0 auto; padding-bottom: 90px; }
    .header { padding: 16px; display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 22px; font-weight: 700; color: var(--brand-deep); }
    .header-date { font-size: 13px; color: var(--text-secondary); }
    .summary-card {
      background: linear-gradient(145deg, #FFFFFF 0%, var(--brand-pale) 100%);
      border-radius: 24px; margin: 0 16px 18px; padding: 20px;
      box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 20px;
      border-top: 3px solid transparent; border-image: linear-gradient(90deg, var(--brand-primary), var(--brand-light)) 1;
    }
    .progress-ring { width: 90px; height: 90px; flex-shrink: 0; }
    .progress-ring circle { fill: none; stroke-width: 8; stroke-linecap: round; }
    .progress-ring .bg { stroke: var(--surface-tertiary); }
    .progress-ring .fg { stroke: url(#ringGradient); stroke-dasharray: 251; stroke-dashoffset: 160; transform: rotate(-90deg); transform-origin: center; }
    .progress-text { font-size: 20px; font-weight: 700; fill: var(--brand-deep); }
    .summary-info { flex: 1; }
    .summary-route { font-size: 17px; font-weight: 600; color: var(--text-primary); }
    .summary-count { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .section-title { font-size: 18px; font-weight: 600; padding: 6px 16px 12px; }
    .list { display: flex; flex-direction: column; gap: 10px; padding: 0 16px; }
    .point-card { background: var(--surface-primary); border-radius: 16px; padding: 16px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 14px; }
    .point-marker { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .marker-done { background: var(--safe-bg); color: var(--safe); }
    .marker-current { background: #fff; color: var(--brand-primary); border: 2px solid var(--brand-primary); box-shadow: var(--glow-brand); }
    .marker-todo { background: var(--surface-secondary); color: var(--text-tertiary); }
    .point-content { flex: 1; }
    .point-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .point-name.done { color: var(--text-tertiary); text-decoration: line-through; }
    .point-area { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .point-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
    .btn-checkin { height: 34px; padding: 0 16px; border-radius: 9999px; border: none; background: linear-gradient(135deg, var(--brand-primary), var(--brand-bright)); color: #fff; font-size: 13px; font-weight: 700; box-shadow: var(--shadow-md); }
    .btn-checkin:disabled { background: var(--surface-tertiary); color: var(--text-tertiary); box-shadow: none; }
    .link-report { font-size: 12px; color: var(--text-tertiary); text-decoration: none; }
    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto; max-width: 420px; height: 68px; background: rgba(255,255,255,0.85); backdrop-filter: blur(24px) saturate(160%); border-top: 1px solid rgba(226,232,240,0.6); display: flex; justify-content: space-around; align-items: center; padding-bottom: 8px; box-shadow: var(--shadow-lg); }
    .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text-tertiary); font-size: 10px; }
    .tab.active { color: var(--brand-primary); }
    .tab-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
    .tab.active .tab-icon { background: linear-gradient(135deg, var(--brand-primary), var(--brand-bright)); color: #fff; box-shadow: var(--glow-brand); }
  </style>
</head>
<body data-page-id="patrol" data-tab-id="tab-patrol">
  <header class="header">
    <h1 class="header-title" data-ui-id="patrol-header-title">巡检打卡</h1>
    <div class="header-date" data-ui-id="patrol-date-label">2026年6月22日</div>
  </header>

  <section class="summary-card">
    <svg class="progress-ring" viewBox="0 0 100 100" data-ui-id="patrol-progress-ring">
      <defs>
        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0D9488" />
          <stop offset="100%" stop-color="#5EEAD4" />
        </linearGradient>
      </defs>
      <circle class="bg" cx="50" cy="50" r="40"></circle>
      <circle class="fg" cx="50" cy="50" r="40"></circle>
      <text x="50" y="55" text-anchor="middle" class="progress-text">36%</text>
    </svg>
    <div class="summary-info">
      <div class="summary-route" data-ui-id="patrol-route-name">A栋日常巡检路线</div>
      <div class="summary-count">已完成 4 / 共 11 个点位</div>
    </div>
  </section>

  <h2 class="section-title">巡检点位</h2>
  <section class="list" data-ui-id="patrol-point-list">
    <article class="point-card" data-ui-id="patrol-point-1">
      <div class="point-marker marker-done">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><title>该点位已巡检完成</title><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="point-content">
        <div class="point-name done">大堂入口消防设施</div>
        <div class="point-area">A栋1层大堂</div>
      </div>
      <div class="point-actions">
        <button class="btn-checkin" disabled data-ui-id="patrol-point-1-checkin-button">已打卡</button>
      </div>
    </article>

    <article class="point-card" data-ui-id="patrol-point-2">
      <div class="point-marker marker-done">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><title>该点位已巡检完成</title><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="point-content">
        <div class="point-name done">2层电梯厅</div>
        <div class="point-area">A栋2层</div>
      </div>
      <div class="point-actions">
        <button class="btn-checkin" disabled data-ui-id="patrol-point-2-checkin-button">已打卡</button>
      </div>
    </article>

    <article class="point-card" data-ui-id="patrol-point-3">
      <div class="point-marker marker-current">3</div>
      <div class="point-content">
        <div class="point-name">3层消防通道</div>
        <div class="point-area">A栋3层东侧</div>
      </div>
      <div class="point-actions">
        <button class="btn-checkin" data-ui-id="patrol-point-3-checkin-button">打卡</button>
        <a class="link-report" href="#" data-ui-id="patrol-point-3-report-issue-link">报隐患</a>
      </div>
    </article>

    <article class="point-card" data-ui-id="patrol-point-4">
      <div class="point-marker marker-todo">4</div>
      <div class="point-content">
        <div class="point-name">4层配电间</div>
        <div class="point-area">A栋4层西北角</div>
      </div>
      <div class="point-actions">
        <button class="btn-checkin" data-ui-id="patrol-point-4-checkin-button">打卡</button>
        <a class="link-report" href="#" data-ui-id="patrol-point-4-report-issue-link">报隐患</a>
      </div>
    </article>
  </section>

  <nav class="tabbar">
    <div class="tab">
      <div class="tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>首页工作台</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      </div>
      <span>首页</span>
    </div>
    <div class="tab active">
      <div class="tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>巡检打卡</title><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      </div>
      <span>巡检</span>
    </div>
    <div class="tab">
      <div class="tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>隐患与事项</title><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      </div>
      <span>隐患</span>
    </div>
    <div class="tab">
      <div class="tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>应急联系人</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      </div>
      <span>联系人</span>
    </div>
    <div class="tab">
      <div class="tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>统计看板</title><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
      </div>
      <span>统计</span>
    </div>
  </nav>
</body>
</html>
