<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>平安扣 - 巡检打卡确认</title>
  <style>
    :root {
      --brand-deep: #115E59; --brand-primary: #0D9488; --brand-bright: #14B8A6; --brand-light: #5EEAD4; --brand-mint: #CCFBF1; --brand-pale: #F0FDFA;
      --text-primary: #0F172A; --text-secondary: #475569; --text-tertiary: #94A3B8;
      --surface-primary: #FFFFFF; --surface-secondary: #F8FAFC; --surface-tertiary: #E2E8F0;
      --shadow-sm: 0 1px 2px rgba(15,23,42,0.04); --shadow-md: 0 4px 14px -3px rgba(13,148,136,0.13); --shadow-lg: 0 12px 32px -10px rgba(13,148,136,0.20);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'HarmonyOS Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: rgba(15,23,42,0.35); min-height: 100vh; max-width: 420px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: center; }
    .sheet { width: 100%; background: var(--surface-primary); border-radius: 28px 28px 0 0; padding: 22px 16px 28px; box-shadow: var(--shadow-lg); }
    .handle { width: 40px; height: 4px; background: var(--surface-tertiary); border-radius: 999px; margin: 0 auto 18px; }
    .sheet-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .sheet-subtitle { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: 18px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .field textarea { width: 100%; border-radius: 12px; border: 1px solid transparent; background: var(--surface-secondary); padding: 12px 14px; font-size: 14px; color: var(--text-primary); min-height: 80px; resize: vertical; }
    .field textarea:focus { outline: none; border-color: var(--brand-primary); box-shadow: 0 0 0 3px rgba(13,148,136,0.10); }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface-secondary); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
    .toggle-label { font-size: 14px; font-weight: 600; }
    .toggle-switch { width: 48px; height: 28px; border-radius: 999px; background: var(--surface-tertiary); position: relative; transition: background 0.2s; }
    .toggle-switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
    .toggle-row.active .toggle-switch { background: var(--brand-primary); }
    .toggle-row.active .toggle-switch::after { transform: translateX(20px); }
    .photo-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .photo-btn { flex: 1; height: 80px; border-radius: 14px; border: 2px dashed var(--brand-primary); background: rgba(13,148,136,0.05); color: var(--brand-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 12px; font-weight: 600; }
    .actions { display: flex; gap: 10px; }
    .btn-primary { flex: 1; height: 48px; border-radius: 9999px; border: none; background: linear-gradient(135deg, var(--brand-primary), var(--brand-bright)); color: #fff; font-size: 15px; font-weight: 700; box-shadow: var(--shadow-md); }
    .btn-secondary { flex: 1; height: 48px; border-radius: 9999px; border: none; background: var(--surface-secondary); color: var(--text-secondary); font-size: 15px; font-weight: 600; }
  </style>
</head>
<body data-page-id="patrol-checkin">
  <div class="sheet" data-ui-id="patrol-checkin-modal">
    <div class="handle"></div>
    <h2 class="sheet-title">确认巡检打卡</h2>
    <p class="sheet-subtitle">A栋3层消防通道 · 08:52</p>

    <div class="field">
      <label for="notes">备注</label>
      <textarea id="notes" placeholder="记录巡检情况（可选）" data-ui-id="patrol-checkin-notes-input"></textarea>
    </div>

    <div class="toggle-row" data-ui-id="patrol-checkin-abnormal-toggle">
      <span class="toggle-label">发现异常并上报隐患</span>
      <div class="toggle-switch"></div>
    </div>

    <div class="photo-row">
      <button class="photo-btn" data-ui-id="patrol-checkin-photo-button">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>拍摄巡检现场照片</title><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
        拍照
      </button>
    </div>

    <div class="actions">
      <button class="btn-secondary" data-ui-id="patrol-checkin-cancel-button">取消</button>
      <button class="btn-primary" data-ui-id="patrol-checkin-submit-button">确认打卡</button>
    </div>
  </div>
</body>
</html>
