<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>平安扣 - 我的</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #F0FDFA; color: #0F172A; max-width: 390px; margin: 0 auto;
      min-height: 100vh; padding-bottom: 88px;
    }
    .header {
      background: linear-gradient(135deg, #0D9488 0%, #06B6D4 100%);
      border-radius: 0 0 24px 24px;
      padding: 52px 20px 24px; color: #fff;
      display: flex; align-items: center; gap: 16px;
    }
    .avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700;
    }
    .user-name { font-size: 20px; font-weight: 700; }
    .user-role { font-size: 13px; opacity: 0.85; margin-top: 4px; }

    .section { padding: 16px; }
    .menu-card {
      background: #fff; border-radius: 18px; padding: 8px 16px;
      box-shadow: 0 6px 24px rgba(13, 148, 136, 0.10);
    }
    .menu-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; border-bottom: 1px solid #F1F5F9; cursor: pointer;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-left { display: flex; align-items: center; gap: 12px; }
    .menu-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .menu-icon svg { width: 18px; height: 18px; }
    .menu-icon.settings { background: #F0F9FF; }
    .menu-icon.settings svg { stroke: #0EA5E9; }
    .menu-icon.about { background: #F0FDFA; }
    .menu-icon.about svg { stroke: #0D9488; }
    .menu-icon.export { background: #EEF2FF; }
    .menu-icon.export svg { stroke: #6366F1; }
    .menu-icon.danger { background: #FEF2F2; }
    .menu-icon.danger svg { stroke: #EF4444; }
    .menu-text { font-size: 15px; font-weight: 500; color: #334155; }
    .menu-arrow { width: 18px; height: 18px; stroke: #94A3B8; }

    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; max-width: 390px; margin: 0 auto;
      height: 68px; background: rgba(255,255,255,0.88); backdrop-filter: blur(24px) saturate(180%);
      box-shadow: 0 -4px 20px rgba(15, 23, 42, 0.06);
      display: flex; justify-content: space-around; align-items: center; padding-bottom: 8px;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94A3B8; position: relative; }
    .tab-item.active { color: #0D9488; }
    .tab-item.active::before { content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 18px; height: 3px; border-radius: 2px; background: #0D9488; }
    .tab-item svg { width: 22px; height: 22px; stroke: currentColor; }
    .tab-item span { font-size: 11px; }
  </style>
</head>
<body data-page-id="profile-page" data-tab-id="tab-profile">
  <header class="header">
    <div class="avatar">安</div>
    <div>
      <div class="user-name">安全员 001</div>
      <div class="user-role">车间安全员 · 仓库班组</div>
    </div>
  </header>

  <div class="section" style="margin-top:8px;">
    <div class="menu-card">
      <div class="menu-item" data-ui-id="profile-settings-button">
        <div class="menu-left">
          <div class="menu-icon settings">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>打开应用设置</title>
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </div>
          <div class="menu-text">设置</div>
        </div>
        <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>进入设置页</title>
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>

      <div class="menu-item" data-ui-id="profile-about-button">
        <div class="menu-left">
          <div class="menu-icon about">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>查看关于平安扣</title>
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="16" x2="12" y2="12"/>
              <line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
          </div>
          <div class="menu-text">关于</div>
        </div>
        <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>进入关于页</title>
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>

      <div class="menu-item" data-ui-id="profile-export-button">
        <div class="menu-left">
          <div class="menu-icon export">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>导出本地数据</title>
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </div>
          <div class="menu-text">导出数据</div>
        </div>
        <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>开始导出数据</title>
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>

      <div class="menu-item" data-ui-id="profile-clear-data-button">
        <div class="menu-left">
          <div class="menu-icon danger">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>清除所有本地数据</title>
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            </svg>
          </div>
          <div class="menu-text" style="color:#EF4444;">清除本地数据</div>
        </div>
        <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>确认清除本地数据</title>
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
    </div>
  </div>

  <nav class="tab-bar" role="tablist">
    <div class="tab-item" role="tab" data-ui-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>工作台标签</title>
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>工作台</span>
    </div>
    <div class="tab-item" role="tab" data-ui-id="tab-inspections">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>巡检标签</title>
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      <span>巡检</span>
    </div>
    <div class="tab-item" role="tab" data-ui-id="tab-hazards">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>隐患标签</title>
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>隐患</span>
    </div>
    <div class="tab-item" role="tab" data-ui-id="tab-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>统计标签</title>
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>统计</span>
    </div>
    <div class="tab-item active" role="tab" data-ui-id="tab-profile">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>我的标签</title>
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </div>
  </nav>
</body>
</html>
