<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>平安扣 - 巡检</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #F0FDFA; color: #0F172A; max-width: 390px; margin: 0 auto;
      min-height: 100vh; padding-bottom: 88px;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 52px 16px 16px;
    }
    .header-title { font-size: 22px; font-weight: 700; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(13, 148, 136, 0.30);
      cursor: pointer;
    }
    .icon-btn svg { width: 20px; height: 20px; stroke: #fff; }

    .section { padding: 0 16px 16px; }
    .segment {
      display: flex; gap: 8px; background: #F8FAFC;
      border-radius: 14px; padding: 4px;
    }
    .segment-item {
      flex: 1; text-align: center; padding: 8px 0;
      border-radius: 12px; font-size: 13px; color: #64748B;
      cursor: pointer;
    }
    .segment-item.active {
      background: #fff; color: #0D9488; font-weight: 600;
      box-shadow: 0 2px 8px rgba(13, 148, 136, 0.12);
    }

    .list { display: flex; flex-direction: column; gap: 12px; }
    .card {
      background: #fff; border-radius: 18px; padding: 16px;
      box-shadow: 0 6px 24px rgba(13, 148, 136, 0.10);
      display: flex; gap: 12px; cursor: pointer;
    }
    .card:active { transform: scale(0.99); }
    .card-strip {
      width: 4px; border-radius: 2px; flex-shrink: 0;
    }
    .card-strip.blue { background: #0EA5E9; }
    .card-strip.green { background: #10B981; }
    .card-strip.gray { background: #CBD5E1; }
    .card-body { flex: 1; }
    .card-title { font-size: 16px; font-weight: 600; }
    .card-meta { font-size: 12px; color: #64748B; margin-top: 4px; display: flex; gap: 12px; }
    .card-meta svg { width: 12px; height: 12px; stroke: #94A3B8; margin-right: 3px; }
    .card-footer { margin-top: 10px; }
    .progress-bg {
      height: 6px; border-radius: 3px; background: #E2E8F0; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #0D9488, #14B8A6);
    }
    .progress-text { font-size: 11px; color: #64748B; margin-top: 6px; }

    .empty {
      background: #fff; border-radius: 18px; padding: 48px 24px;
      text-align: center; box-shadow: 0 6px 24px rgba(13, 148, 136, 0.10);
    }
    .empty svg { width: 48px; height: 48px; stroke: #94A3B8; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 600; color: #334155; }
    .empty-desc { font-size: 13px; color: #94A3B8; margin-top: 6px; }

    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; max-width: 390px; margin: 0 auto;
      height: 68px; background: rgba(255,255,255,0.88); backdrop-filter: blur(24px) saturate(180%);
      box-shadow: 0 -4px 20px rgba(15, 23, 42, 0.06);
      display: flex; justify-content: space-around; align-items: center; padding-bottom: 8px;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94A3B8; position: relative; }
    .tab-item.active { color: #0D9488; }
    .tab-item.active::before { content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 18px; height: 3px; border-radius: 2px; background: #0D9488; }
    .tab-item svg { width: 22px; height: 22px; stroke: currentColor; }
    .tab-item span { font-size: 11px; }
  </style>
</head>
<body data-page-id="inspections-page" data-tab-id="tab-inspections">
  <header class="header">
    <div class="header-title" data-ui-id="inspections-title">巡检</div>
    <div class="icon-btn" data-ui-id="inspections-add-button">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>新增巡检任务</title>
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
  </header>

  <div class="section">
    <div class="segment" data-ui-id="inspections-filter-segment">
      <div class="segment-item active">全部</div>
      <div class="segment-item">进行中</div>
      <div class="segment-item">已完成</div>
    </div>
  </div>

  <div class="section" style="padding-top:0;">
    <div class="list" data-ui-id="inspections-list">
      <div class="card" data-ui-id="inspection-1">
        <div class="card-strip blue"></div>
        <div class="card-body">
          <div class="card-title">仓库北区日常巡检</div>
          <div class="card-meta">
            <span style="display:flex;align-items:center;">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>地点图标</title>
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              仓库北区
            </span>
            <span style="display:flex;align-items:center;">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>时间图标</title>
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
              今天 09:00
            </span>
          </div>
          <div class="card-footer">
            <div class="progress-bg">
              <div class="progress-fill" style="width: 60%;"></div>
            </div>
            <div class="progress-text">3 / 5 项已完成</div>
          </div>
        </div>
      </div>

      <div class="card" data-ui-id="inspection-2">
        <div class="card-strip green"></div>
        <div class="card-body">
          <div class="card-title">消防器材月度检查</div>
          <div class="card-meta">
            <span style="display:flex;align-items:center;">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>地点图标</title>
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              全厂区
            </span>
            <span style="display:flex;align-items:center;">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>时间图标</title>
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
              昨天 14:00
            </span>
          </div>
          <div class="card-footer">
            <div class="progress-bg">
              <div class="progress-fill" style="width: 100%;"></div>
            </div>
            <div class="progress-text">8 / 8 项已完成</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <nav class="tab-bar" role="tablist">
    <div class="tab-item" role="tab" data-ui-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>工作台标签</title>
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>工作台</span>
    </div>
    <div class="tab-item active" role="tab" data-ui-id="tab-inspections">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>巡检标签</title>
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      <span>巡检</span>
    </div>
    <div class="tab-item" role="tab" data-ui-id="tab-hazards">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>隐患标签</title>
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>隐患</span>
    </div>
    <div class="tab-item" role="tab" data-ui-id="tab-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>统计标签</title>
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>统计</span>
    </div>
    <div class="tab-item" role="tab" data-ui-id="tab-profile">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>我的标签</title>
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </div>
  </nav>
</body>
</html>
