<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>平安扣 - 应急联系人</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #F0FDFA; color: #0F172A; max-width: 390px; margin: 0 auto;
      min-height: 100vh; padding-bottom: 24px;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 52px 16px 12px;
    }
    .header-title { font-size: 22px; font-weight: 700; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(13, 148, 136, 0.30); cursor: pointer;
    }
    .icon-btn svg { width: 20px; height: 20px; stroke: #fff; }

    .search-box {
      margin: 0 16px 16px; position: relative;
    }
    .search-input {
      width: 100%; padding: 12px 14px 12px 38px; border-radius: 12px;
      border: 1px solid #E2E8F0; background: #F8FAFC; font-size: 14px;
    }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; stroke: #94A3B8;
    }

    .section-title { font-size: 14px; font-weight: 600; color: #334155; margin: 0 16px 10px; }
    .list { display: flex; flex-direction: column; gap: 12px; padding: 0 16px; }
    .card {
      background: #fff; border-radius: 18px; padding: 14px 16px;
      box-shadow: 0 6px 24px rgba(13, 148, 136, 0.10);
      display: flex; align-items: center; gap: 12px; cursor: pointer;
    }
    .card:active { transform: scale(0.99); }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px; font-weight: 600;
    }
    .card-body { flex: 1; }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-meta { font-size: 12px; color: #64748B; margin-top: 2px; }
    .emergency-badge {
      display: inline-block; padding: 2px 6px; border-radius: 6px;
      background: #FEF2F2; color: #EF4444; font-size: 10px; font-weight: 700; margin-left: 6px;
    }
    .action-btns { display: flex; gap: 8px; }
    .action-btn {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .action-btn.call { background: #ECFDF5; }
    .action-btn.call svg { stroke: #10B981; }
    .action-btn.msg { background: #F0F9FF; }
    .action-btn.msg svg { stroke: #0EA5E9; }
    .action-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body data-page-id="contacts-page">
  <header class="header">
    <div class="header-title" data-ui-id="contacts-title">应急联系人</div>
    <div class="icon-btn" data-ui-id="contacts-add-button">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>新增应急联系人</title>
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
  </header>

  <div class="search-box">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <title>搜索联系人</title>
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" type="text" placeholder="搜索姓名、部门或角色" data-ui-id="contacts-search-input" />
  </div>

  <div class="section-title">紧急联系人</div>
  <div class="list" data-ui-id="contacts-list">
    <div class="card" data-ui-id="contact-1">
      <div class="avatar">赵</div>
      <div class="card-body">
        <div class="card-title">赵经理<span class="emergency-badge">急</span></div>
        <div class="card-meta">安全主管 · 安全部 · 138-0000-0001</div>
      </div>
      <div class="action-btns">
        <div class="action-btn call" data-ui-id="contacts-call-button">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>拨打联系人电话</title>
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.56 12.56 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.56 12.56 0 002.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </div>
        <div class="action-btn msg" data-ui-id="contacts-message-button">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>发送短信给联系人</title>
            <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
