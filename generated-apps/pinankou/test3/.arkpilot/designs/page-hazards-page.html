<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>平安扣 - 隐患</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #F0FDFA; color: #0F172A; max-width: 390px; margin: 0 auto;
      min-height: 100vh; padding-bottom: 88px;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 52px 16px 12px;
    }
    .header-title { font-size: 22px; font-weight: 700; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #0D9488, #14B8A6);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(13, 148, 136, 0.30); cursor: pointer;
    }
    .icon-btn svg { width: 20px; height: 20px; stroke: #fff; }

    .section { padding: 0 16px 16px; }
    .filter-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .filter-row:last-child { margin-bottom: 0; }
    .filter-chip {
      padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 500;
      background: #F8FAFC; color: #64748B; border: 1px solid #E2E8F0; cursor: pointer;
    }
    .filter-chip.active { background: #fff; color: #0D9488; border-color: #CCFBF1; font-weight: 600; }

    .list { display: flex; flex-direction: column; gap: 12px; }
    .card {
      background: #fff; border-radius: 18px; padding: 16px;
      box-shadow: 0 6px 24px rgba(13, 148, 136, 0.10);
      display: flex; gap: 12px; cursor: pointer;
    }
    .card:active { transform: scale(0.99); }
    .card-strip { width: 4px; border-radius: 2px; flex-shrink: 0; }
    .card-strip.red { background: #EF4444; }
    .card-strip.amber { background: #F59E0B; }
    .card-strip.green { background: #10B981; }
    .card-body { flex: 1; }
    .card-title { font-size: 16px; font-weight: 600; }
    .card-tags { display: flex; gap: 6px; margin-top: 8px; }
    .tag { padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; }
    .tag.high { background: #FEF2F2; color: #EF4444; }
    .tag.medium { background: #FFFBEB; color: #F59E0B; }
    .tag.low { background: #ECFDF5; color: #10B981; }
    .tag.status { background: #F0F9FF; color: #0EA5E9; }
    .card-meta { font-size: 12px; color: #64748B; margin-top: 8px; display: flex; gap: 12px; }
    .card-meta svg { width: 12px; height: 12px; stroke: #94A3B8; margin-right: 3px; }
    .overdue { color: #EF4444; font-weight: 600; }

    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; max-width: 390px; margin: 0 auto;
      height: 68px; background: rgba(255,255,255,0.88); backdrop-filter: blur(24px) saturate(180%);
      box-shadow: 0 -4px 20px rgba(15, 23, 42, 0.06);
      display: flex; justify-content: space-around; align-items: center; padding-bottom: 8px;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94A3B8; position: relative; }
    .tab-item.active { color: #0D9488; }
    .tab-item.active::before { content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); width: 18px; height: 3px; border-radius: 2px; background: #0D9488; }
    .tab-item svg { width: 22px; height: 22px; stroke: currentColor; }
    .tab-item span { font-size: 11px; }
  </style>
</head>
<body data-page-id="hazards-page" data-tab-id="tab-hazards">
  <header class="header">
    <div class="header-title" data-ui-id="hazards-title">隐患</div>
    <div class="icon-btn" data-ui-id="hazards-add-button">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>新增隐患上报</title>
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
  </header>

  <div class="section">
    <div class="filter-row" data-ui-id="hazards-filter-status">
      <div class="filter-chip active">全部</div>
      <div class="filter-chip">待处理</div>
      <div class="filter-chip">整改中</div>
      <div class="filter-chip">待验收</div>
      <div class="filter-chip">已关闭</div>
    </div>
    <div class="filter-row" data-ui-id="hazards-filter-level">
      <div class="filter-chip active">全部等级</div>
      <div class="filter-chip">高</div>
      <div class="filter-chip">中</div>
      <div class="filter-chip">低</div>
    </div>
  </div>

  <div class="section" style="padding-top:0;">
    <div class="list" data-ui-id="hazards-list">
      <div class="card" data-ui-id="hazard-1">
        <div class="card-strip red"></div>
        <div class="card-body">
          <div class="card-title">叉车通道标识模糊</div>
          <div class="card-tags">
            <span class="tag high">高风险</span>
            <span class="tag status">整改中</span>
          </div>
          <div class="card-meta">
            <span style="display:flex;align-items:center;">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>地点图标</title>
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              仓库北区
            </span>
            <span class="overdue" style="display:flex;align-items:center;">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>截止日期图标</title>
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              逾期 1 天
            </span>
          </div>
        </div>
      </div>

      <div class="card" data-ui-id="hazard-2">
        <div class="card-strip amber"></div>
        <div class="card-body">
          <div class="card-title">配电箱未张贴警示标识</div>
          <div class="card-tags">
            <span class="tag medium">中风险</span>
            <span class="tag status">待处理</span>
          </div>
          <div class="card-meta">
            <span style="display:flex;align-items:center;">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>地点图标</title>
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              车间 A 区
            </span>
            <span style="display:flex;align-items:center;">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>截止日期图标</title>
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              06-25
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <nav class="tab-bar" role="tablist">
    <div class="tab-item" role="tab" data-ui-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>工作台标签</title>
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>工作台</span>
    </div>
    <div class="tab-item" role="tab" data-ui-id="tab-inspections">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>巡检标签</title>
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      <span>巡检</span>
    </div>
    <div class="tab-item active" role="tab" data-ui-id="tab-hazards">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>隐患标签</title>
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>隐患</span>
    </div>
    <div class="tab-item" role="tab" data-ui-id="tab-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>统计标签</title>
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>统计</span>
    </div>
    <div class="tab-item" role="tab" data-ui-id="tab-profile">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>我的标签</title>
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </div>
  </nav>
</body>
</html>
