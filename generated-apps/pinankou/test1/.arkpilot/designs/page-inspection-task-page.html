<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>平安扣 - 巡检任务</title>
  <style>
    :root { --sky:#38BDF8; --mint:#34D399; --teal:#0F766E; --slate-900:#0F172A; --slate-600:#475569; --slate-400:#94A3B8; --slate-200:#E2E8F0; --card-bg:rgba(255,255,255,0.88); --shadow-card:0 24px 48px -14px rgba(14,165,233,0.14),0 6px 16px -6px rgba(0,0,0,0.05); }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; padding:0; height:100%; font-family:"PingFang SC","HarmonyOS Sans SC","SF Pro Text",-apple-system,BlinkMacSystemFont,sans-serif; background: linear-gradient(180deg,#E0F2FE 0%,#D1FAE5 32%,#F0FDFA 68%,#F8FAFC 100%); color:var(--slate-900); }
    #app { max-width:390px; margin:0 auto; min-height:100%; position:relative; padding:16px; padding-bottom:120px; }
    .topbar { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
    .back-btn { width:36px; height:36px; border-radius:12px; background:rgba(255,255,255,0.72); border:1px solid var(--slate-200); display:grid; place-items:center; color:var(--slate-600); }
    .page-title { font-size:22px; font-weight:700; color:var(--teal); margin:0; }
    .progress-panel { padding:18px; border-radius:22px; background:var(--card-bg); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.65); box-shadow:var(--shadow-card); margin-bottom:20px; }
    .progress-label { display:flex; justify-content:space-between; font-size:14px; color:var(--slate-600); margin-bottom:10px; }
    .progress-label strong { color:var(--teal); }
    .progress-track { height:8px; border-radius:4px; background:var(--slate-200); overflow:hidden; }
    .progress-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--sky),var(--mint)); width:50%; }
    .checkpoint-card { padding:18px; border-radius:22px; background:var(--card-bg); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.65); box-shadow:var(--shadow-card); margin-bottom:14px; }
    .checkpoint-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
    .checkpoint-name { font-size:16px; font-weight:600; margin:0; }
    .checkpoint-location { font-size:13px; color:var(--slate-400); display:flex; align-items:center; gap:4px; margin-top:4px; }
    .toggle-group { display:flex; gap:10px; margin-bottom:14px; }
    .toggle-btn { flex:1; padding:10px; border-radius:12px; border:1px solid var(--slate-200); background:rgba(255,255,255,0.6); font-size:14px; font-weight:500; color:var(--slate-600); display:flex; align-items:center; justify-content:center; gap:6px; }
    .toggle-btn.active-normal { background:linear-gradient(135deg,#D1FAE5,#A7F3D0); border-color:#34D399; color:#047857; }
    .toggle-btn.active-abnormal { background:linear-gradient(135deg,#FEE2E2,#FECACA); border-color:#F87171; color:#DC2626; }
    .note-input { width:100%; padding:12px 14px; border-radius:14px; background:#F8FAFC; border:1px solid var(--slate-200); font-size:14px; outline:none; margin-bottom:12px; resize:none; }
    .photo-btn { display:inline-flex; align-items:center; gap:6px; padding:10px 14px; border-radius:12px; background:#F1F5F9; color:var(--slate-600); font-size:13px; border:1px dashed var(--slate-200); }
    .footer-actions { position:fixed; bottom:0; left:0; right:0; margin:0 auto; max-width:390px; padding:16px; padding-bottom:calc(16px + env(safe-area-inset-bottom,0)); background:rgba(255,255,255,0.92); backdrop-filter:blur(20px); border-top:1px solid rgba(226,232,240,0.6); display:flex; gap:12px; }
    .btn-submit { flex:1; padding:14px; border-radius:16px; background:linear-gradient(135deg,var(--sky) 0%,var(--mint) 100%); color:#fff; font-size:16px; font-weight:700; border:none; box-shadow:0 10px 24px -6px rgba(14,165,233,0.35); }
    .btn-cancel { padding:14px 20px; border-radius:16px; background:#F1F5F9; color:var(--slate-600); font-size:16px; font-weight:600; border:none; }
  </style>
</head>
<body>
  <div id="app" data-page-id="inspection-task-page">
    <div class="topbar">
      <button class="back-btn" data-ui-id="task-back-button" aria-label="返回">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回巡检列表</title><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h1 class="page-title">每日消防安全巡检</h1>
    </div>

    <div class="progress-panel">
      <div class="progress-label">
        <span>检查进度</span>
        <strong>已完成 4/8</strong>
      </div>
      <div class="progress-track" data-ui-id="task-progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div data-ui-id="task-checkpoint-list">
      <article class="checkpoint-card" data-ui-id="task-checkpoint-1">
        <div class="checkpoint-header">
          <div>
            <h3 class="checkpoint-name">消防栓水压检查</h3>
            <div class="checkpoint-location">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>检查点位置</title><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
              A栋1层大厅
            </div>
          </div>
        </div>

        <div class="toggle-group">
          <button class="toggle-btn active-normal" data-ui-id="task-checkpoint-1-normal">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>标记检查点正常</title><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
            正常
          </button>
          <button class="toggle-btn" data-ui-id="task-checkpoint-1-abnormal">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>标记检查点异常</title><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
            异常
          </button>
        </div>

        <textarea class="note-input" data-ui-id="task-checkpoint-1-note" rows="2" placeholder="备注（可选）"></textarea>

        <button class="photo-btn" data-ui-id="task-checkpoint-1-photo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>拍摄检查点照片</title><path d="M13.997 4a2 2 0 0 1 1.76 1.05l.486.9A2 2 0 0 0 18.003 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1.997a2 2 0 0 0 1.759-1.048l.489-.904A2 2 0 0 1 10.004 4z"/><circle cx="12" cy="13" r="3"/></svg>
          拍照留痕
        </button>
      </article>

      <article class="checkpoint-card" data-ui-id="task-checkpoint-2">
        <div class="checkpoint-header">
          <div>
            <h3 class="checkpoint-name">灭火器有效期</h3>
            <div class="checkpoint-location">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>检查点位置</title><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
              A栋2层走廊
            </div>
          </div>
        </div>

        <div class="toggle-group">
          <button class="toggle-btn" data-ui-id="task-checkpoint-2-normal">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>标记检查点正常</title><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
            正常
          </button>
          <button class="toggle-btn active-abnormal" data-ui-id="task-checkpoint-2-abnormal">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>标记检查点异常</title><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
            异常
          </button>
        </div>

        <textarea class="note-input" data-ui-id="task-checkpoint-2-note" rows="2" placeholder="备注（可选）">压力指示偏低，需更换</textarea>

        <button class="photo-btn" data-ui-id="task-checkpoint-2-photo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>拍摄检查点照片</title><path d="M13.997 4a2 2 0 0 1 1.76 1.05l.486.9A2 2 0 0 0 18.003 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1.997a2 2 0 0 0 1.759-1.048l.489-.904A2 2 0 0 1 10.004 4z"/><circle cx="12" cy="13" r="3"/></svg>
          已拍 1 张
        </button>
      </article>
    </div>

    <div class="footer-actions">
      <button class="btn-cancel">取消</button>
      <button class="btn-submit" data-ui-id="task-submit-button">提交巡检结果</button>
    </div>
  </div>
</body>
</html>
