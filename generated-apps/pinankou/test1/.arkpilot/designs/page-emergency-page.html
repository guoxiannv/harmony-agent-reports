<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>平安扣 - 应急联系人</title>
  <style>
    :root { --sky:#38BDF8; --mint:#34D399; --teal:#0F766E; --slate-900:#0F172A; --slate-600:#475569; --slate-400:#94A3B8; --slate-200:#E2E8F0; --card-bg:rgba(255,255,255,0.88); --shadow-card:0 24px 48px -14px rgba(14,165,233,0.14),0 6px 16px -6px rgba(0,0,0,0.05); --shadow-fab:0 18px 44px -10px rgba(14,165,233,0.5); }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; padding:0; height:100%; font-family:"PingFang SC","HarmonyOS Sans SC","SF Pro Text",-apple-system,BlinkMacSystemFont,sans-serif; background: linear-gradient(180deg,#E0F2FE 0%,#D1FAE5 32%,#F0FDFA 68%,#F8FAFC 100%); color:var(--slate-900); }
    #app { max-width:390px; margin:0 auto; min-height:100%; position:relative; padding:16px; padding-bottom:100px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .back-btn { width:36px; height:36px; border-radius:12px; background:rgba(255,255,255,0.72); border:1px solid var(--slate-200); display:grid; place-items:center; color:var(--slate-600); }
    .page-title { font-size:24px; font-weight:700; color:var(--teal); margin:0; }
    .icon-btn { width:40px; height:40px; border-radius:14px; background:linear-gradient(135deg,var(--sky) 0%,var(--mint) 100%); border:none; display:grid; place-items:center; color:#fff; box-shadow:0 8px 20px -6px rgba(14,165,233,0.35); }
    .tip-card { padding:14px 16px; border-radius:16px; background:linear-gradient(135deg,#FEF3C7,#FDE68A); color:#B45309; font-size:13px; display:flex; align-items:center; gap:10px; margin-bottom:18px; }
    .contact-card { padding:16px; border-radius:22px; background:var(--card-bg); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.65); box-shadow:var(--shadow-card); margin-bottom:14px; display:flex; align-items:center; gap:14px; }
    .avatar { width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,var(--sky) 0%,var(--mint) 100%); display:grid; place-items:center; color:#fff; font-size:20px; font-weight:700; flex-shrink:0; }
    .contact-info { flex:1; }
    .contact-name { font-size:16px; font-weight:600; display:flex; align-items:center; gap:6px; }
    .contact-role { font-size:13px; color:var(--slate-400); margin-top:2px; }
    .contact-phone { font-size:14px; color:var(--teal); margin-top:4px; font-weight:500; }
    .preferred { padding:2px 8px; border-radius:12px; background:linear-gradient(135deg,#FEE2E2,#FECACA); color:#DC2626; font-size:11px; font-weight:600; }
    .action-group { display:flex; gap:10px; }
    .action-btn { width:40px; height:40px; border-radius:14px; border:none; display:grid; place-items:center; }
    .action-btn.call { background:linear-gradient(135deg,#D1FAE5,#A7F3D0); color:#047857; }
    .action-btn.sms { background:linear-gradient(135deg,#DBEAFE,#BFDBFE); color:#1D4ED8; }
    .action-btn.edit { background:#F1F5F9; color:var(--slate-600); }
    .empty-state { text-align:center; padding:60px 20px; }
    .empty-icon { width:96px; height:96px; margin:0 auto 18px; border-radius:50%; background:linear-gradient(135deg,#FEE2E2,#FECACA); display:grid; place-items:center; }
    .empty-state h3 { font-size:18px; font-weight:600; margin:0 0 8px; }
    .empty-state p { font-size:14px; color:var(--slate-400); margin:0 0 20px; }
    .btn-primary { display:inline-flex; align-items:center; gap:8px; padding:14px 28px; border-radius:16px; background:linear-gradient(135deg,var(--sky) 0%,var(--mint) 100%); color:#fff; font-size:16px; font-weight:600; border:none; box-shadow:0 10px 24px -6px rgba(14,165,233,0.35); }
    .fab { position:fixed; bottom:24px; right:50%; transform:translateX(195px); width:58px; height:58px; border-radius:50%; background:linear-gradient(135deg,var(--sky) 0%,var(--mint) 100%); border:none; display:grid; place-items:center; color:#fff; box-shadow:var(--shadow-fab); }
    .hidden { display:none; }
    @media (max-width:390px){ .fab { right:20px; transform:none; } }
  </style>
</head>
<body>
  <div id="app" data-page-id="emergency-page">
    <div class="topbar">
      <div class="topbar-left">
        <button class="back-btn" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h1 class="page-title">应急联系人</h1>
      </div>
      <button class="icon-btn" data-ui-id="emergency-add-button" aria-label="新增联系人">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><title>新增应急联系人</title><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      </button>
    </div>

    <div class="tip-card">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>应急提示</title><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      紧急情况下，首选联系人将优先显示并一键拨打。
    </div>

    <div data-ui-id="emergency-list">
      <article class="contact-card" data-ui-id="emergency-contact-1">
        <div class="avatar">李</div>
        <div class="contact-info">
          <div class="contact-name">
            李建国
            <span class="preferred">首选</span>
          </div>
          <div class="contact-role">安全主管</div>
          <div class="contact-phone">138-0013-8000</div>
        </div>
        <div class="action-group">
          <button class="action-btn call" data-ui-id="emergency-contact-1-call" aria-label="拨打电话">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>拨打李建国电话</title><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/></svg>
          </button>
          <button class="action-btn sms" data-ui-id="emergency-contact-1-sms" aria-label="发送短信">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>给李建国发短信</title><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
          </button>
          <button class="action-btn edit" data-ui-id="emergency-contact-1-edit" aria-label="编辑联系人">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>编辑李建国联系人信息</title><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
        </div>
      </article>

      <article class="contact-card" data-ui-id="emergency-contact-2">
        <div class="avatar">王</div>
        <div class="contact-info">
          <div class="contact-name">王小梅</div>
          <div class="contact-role">物业值班室</div>
          <div class="contact-phone">021-6888-9999</div>
        </div>
        <div class="action-group">
          <button class="action-btn call" data-ui-id="emergency-contact-2-call" aria-label="拨打电话">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>拨打王小梅电话</title><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/></svg>
          </button>
          <button class="action-btn sms" data-ui-id="emergency-contact-2-sms" aria-label="发送短信">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>给王小梅发短信</title><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
          </button>
          <button class="action-btn edit" data-ui-id="emergency-contact-2-edit" aria-label="编辑联系人">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>编辑王小梅联系人信息</title><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </button>
        </div>
      </article>
    </div>

    <div class="empty-state hidden" data-ui-id="emergency-empty-state">
      <div class="empty-icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>暂无应急联系人</title><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/></svg>
      </div>
      <h3>暂无应急联系人</h3>
      <p>添加第一位联系人，紧急时刻一键求助</p>
      <button class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><title>添加应急联系人</title><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        添加联系人
      </button>
    </div>

    <button class="fab" data-ui-id="emergency-add-button" aria-label="新增应急联系人">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><title>新增应急联系人</title><path d="M5 12h14"/><path d="M12 5v14"/></svg>
    </button>
  </div>
</body>
</html>
