<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>平安扣 - 巡检打卡</title>
  <style>
    :root { --sky:#38BDF8; --mint:#34D399; --teal:#0F766E; --slate-900:#0F172A; --slate-600:#475569; --slate-400:#94A3B8; --slate-200:#E2E8F0; --card-bg:rgba(255,255,255,0.88); --shadow-card:0 24px 48px -14px rgba(14,165,233,0.14),0 6px 16px -6px rgba(0,0,0,0.05); }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; padding:0; height:100%; font-family:"PingFang SC","HarmonyOS Sans SC","SF Pro Text",-apple-system,BlinkMacSystemFont,sans-serif; background: linear-gradient(180deg,#E0F2FE 0%,#D1FAE5 32%,#F0FDFA 68%,#F8FAFC 100%); color:var(--slate-900); }
    #app { max-width:390px; margin:0 auto; min-height:100%; position:relative; padding:16px; padding-bottom:100px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .back-btn { width:36px; height:36px; border-radius:12px; background:rgba(255,255,255,0.72); border:1px solid var(--slate-200); display:grid; place-items:center; color:var(--slate-600); }
    .page-title { font-size:24px; font-weight:700; color:var(--teal); margin:0; }
    .history-link { font-size:14px; color:var(--teal); font-weight:600; display:flex; align-items:center; gap:4px; }
    .cta-card { padding:20px; border-radius:22px; background:linear-gradient(135deg,var(--sky) 0%,var(--mint) 100%); color:#fff; box-shadow:0 16px 40px -10px rgba(14,165,233,0.4); margin-bottom:24px; }
    .cta-card h2 { margin:0 0 8px; font-size:20px; font-weight:700; }
    .cta-card p { margin:0 0 16px; font-size:14px; opacity:0.92; }
    .cta-btn { width:100%; padding:14px; border-radius:16px; background:#fff; color:var(--teal); font-size:16px; font-weight:700; border:none; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 8px 20px rgba(0,0,0,0.08); }
    .section-title { font-size:18px; font-weight:600; margin:0 0 14px; }
    .task-card { padding:18px; border-radius:22px; background:var(--card-bg); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.65); box-shadow:var(--shadow-card); margin-bottom:14px; display:flex; align-items:center; gap:16px; }
    .ring { width:56px; height:56px; flex-shrink:0; }
    .ring circle { fill:none; stroke:var(--slate-200); stroke-width:5; }
    .ring .progress { stroke:url(#ringGradient); stroke-dasharray:126; stroke-linecap:round; }
    .ring-text { font-size:13px; font-weight:700; fill:var(--teal); }
    .task-info { flex:1; }
    .task-name { font-size:16px; font-weight:600; margin:0 0 6px; }
    .task-meta { font-size:13px; color:var(--slate-400); }
    .task-status { padding:4px 10px; border-radius:20px; font-size:12px; font-weight:500; }
    .task-status.pending { background:#F1F5F9; color:#64748B; }
    .task-status.done { background:linear-gradient(135deg,#D1FAE5,#A7F3D0); color:#047857; }
    .empty-state { text-align:center; padding:60px 20px; }
    .empty-icon { width:96px; height:96px; margin:0 auto 18px; border-radius:50%; background:linear-gradient(135deg,#D1FAE5,#A7F3D0); display:grid; place-items:center; }
    .empty-state h3 { font-size:18px; font-weight:600; margin:0 0 8px; }
    .empty-state p { font-size:14px; color:var(--slate-400); margin:0 0 20px; }
    .btn-primary { display:inline-flex; align-items:center; gap:8px; padding:14px 28px; border-radius:16px; background:linear-gradient(135deg,var(--sky) 0%,var(--mint) 100%); color:#fff; font-size:16px; font-weight:600; border:none; box-shadow:0 10px 24px -6px rgba(14,165,233,0.35); }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div id="app" data-page-id="inspections-page" data-tab-id="tab-inspections">
    <div class="topbar">
      <div class="topbar-left">
        <button class="back-btn" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h1 class="page-title">巡检打卡</h1>
      </div>
      <button class="history-link" data-ui-id="inspections-history-button">
        历史记录
      </button>
    </div>

    <div class="cta-card">
      <h2>开始今日巡检</h2>
      <p>按检查点逐项确认，异常情况拍照留痕，守护每一处细节。</p>
      <button class="cta-btn" data-ui-id="home-scan-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>开始巡检打卡</title><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 12h10"/></svg>
        立即巡检
      </button>
    </div>

    <h2 class="section-title">今日任务</h2>

    <div data-ui-id="inspections-list">
      <article class="task-card" data-ui-id="inspections-item-1">
        <svg class="ring" viewBox="0 0 44 44">
          <title>任务完成进度</title>
          <defs><linearGradient id="ringGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#34D399"/></linearGradient></defs>
          <circle cx="22" cy="22" r="18"/>
          <circle class="progress" cx="22" cy="22" r="18" stroke-dashoffset="31.5"/>
          <text x="22" y="25" text-anchor="middle" class="ring-text">75%</text>
        </svg>
        <div class="task-info">
          <div class="task-name">每日消防安全巡检</div>
          <div class="task-meta">8 个检查点 · 截止 18:00</div>
        </div>
        <span class="task-status pending">进行中</span>
      </article>

      <article class="task-card" data-ui-id="inspections-item-2">
        <svg class="ring" viewBox="0 0 44 44">
          <title>任务完成进度</title>
          <circle cx="22" cy="22" r="18"/>
          <circle class="progress" cx="22" cy="22" r="18" stroke-dashoffset="0"/>
          <text x="22" y="25" text-anchor="middle" class="ring-text">100%</text>
        </svg>
        <div class="task-info">
          <div class="task-name">配电室周检</div>
          <div class="task-meta">6 个检查点 · 已完成</div>
        </div>
        <span class="task-status done">已完成</span>
      </article>
    </div>

    <div class="empty-state hidden" data-ui-id="inspections-empty-state">
      <div class="empty-icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#047857" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>暂无巡检任务</title><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 12h10"/></svg>
      </div>
      <h3>暂无巡检任务</h3>
      <p>点击上方按钮开始一次新巡检</p>
      <button class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>开始巡检</title><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 12h10"/></svg>
        开始巡检
      </button>
    </div>
  </div>
</body>
</html>
