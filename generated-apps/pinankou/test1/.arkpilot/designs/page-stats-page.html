<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>平安扣 - 统计看板</title>
  <style>
    :root { --sky:#38BDF8; --mint:#34D399; --teal:#0F766E; --slate-900:#0F172A; --slate-600:#475569; --slate-400:#94A3B8; --slate-200:#E2E8F0; --card-bg:rgba(255,255,255,0.88); --shadow-card:0 24px 48px -14px rgba(14,165,233,0.14),0 6px 16px -6px rgba(0,0,0,0.05); }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; padding:0; height:100%; font-family:"PingFang SC","HarmonyOS Sans SC","SF Pro Text",-apple-system,BlinkMacSystemFont,sans-serif; background: linear-gradient(180deg,#E0F2FE 0%,#D1FAE5 32%,#F0FDFA 68%,#F8FAFC 100%); color:var(--slate-900); }
    #app { max-width:390px; margin:0 auto; min-height:100%; position:relative; padding:16px; padding-bottom:100px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .back-btn { width:36px; height:36px; border-radius:12px; background:rgba(255,255,255,0.72); border:1px solid var(--slate-200); display:grid; place-items:center; color:var(--slate-600); }
    .page-title { font-size:24px; font-weight:700; color:var(--teal); margin:0; }
    .period-switch { display:flex; gap:8px; padding:4px; border-radius:16px; background:rgba(255,255,255,0.72); border:1px solid var(--slate-200); margin-bottom:18px; }
    .period-btn { flex:1; padding:8px 0; border-radius:12px; border:none; background:transparent; font-size:13px; color:var(--slate-600); font-weight:500; }
    .period-btn.active { background:linear-gradient(135deg,var(--sky) 0%,var(--mint) 100%); color:#fff; box-shadow:0 4px 12px rgba(14,165,233,0.25); }
    .metrics-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:24px; }
    .metric-card { padding:18px; border-radius:22px; background:var(--card-bg); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.65); box-shadow:var(--shadow-card); }
    .metric-icon { width:40px; height:40px; border-radius:12px; display:grid; place-items:center; margin-bottom:12px; }
    .metric-icon.blue { background:linear-gradient(135deg,#DBEAFE,#BFDBFE); color:#1D4ED8; }
    .metric-icon.orange { background:linear-gradient(135deg,#FEF3C7,#FDE68A); color:#B45309; }
    .metric-icon.green { background:linear-gradient(135deg,#D1FAE5,#A7F3D0); color:#047857; }
    .metric-icon.red { background:linear-gradient(135deg,#FEE2E2,#FECACA); color:#DC2626; }
    .metric-label { font-size:13px; color:var(--slate-600); margin-bottom:6px; }
    .metric-value { font-size:28px; font-weight:700; line-height:1.1; background:linear-gradient(135deg,var(--teal) 0%,var(--sky) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .metric-value.red-gradient { background:linear-gradient(135deg,#F87171,#DC2626); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .chart-card { padding:18px; border-radius:22px; background:var(--card-bg); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.65); box-shadow:var(--shadow-card); margin-bottom:18px; }
    .chart-title { font-size:16px; font-weight:600; margin:0 0 16px; }
    .bar-chart { display:flex; align-items:flex-end; justify-content:space-between; height:120px; gap:8px; }
    .bar { flex:1; border-radius:6px 6px 0 0; background:linear-gradient(180deg,var(--sky) 0%,var(--mint) 100%); min-height:8px; position:relative; }
    .bar span { position:absolute; bottom:-18px; left:50%; transform:translateX(-50%); font-size:11px; color:var(--slate-400); }
    .donut { width:140px; height:140px; margin:0 auto; }
    .donut circle { fill:none; stroke-width:18; }
    .donut .bg { stroke:var(--slate-200); }
    .donut .seg1 { stroke:#F87171; stroke-dasharray:88 251; stroke-dashoffset:0; }
    .donut .seg2 { stroke:#FBBF24; stroke-dasharray:63 251; stroke-dashoffset:-88; }
    .donut .seg3 { stroke:#60A5FA; stroke-dasharray:50 251; stroke-dashoffset:-151; }
    .donut .seg4 { stroke:#34D399; stroke-dasharray:50 251; stroke-dashoffset:-201; }
    .legend { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
    .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--slate-600); }
    .legend-dot { width:8px; height:8px; border-radius:50%; }
  </style>
</head>
<body>
  <div id="app" data-page-id="stats-page" data-tab-id="tab-stats">
    <div class="topbar">
      <div class="topbar-left">
        <button class="back-btn" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h1 class="page-title">统计看板</h1>
      </div>
    </div>

    <div class="period-switch">
      <button class="period-btn active" data-ui-id="stats-period-week">本周</button>
      <button class="period-btn" data-ui-id="stats-period-month">本月</button>
      <button class="period-btn" data-ui-id="stats-period-quarter">本季度</button>
    </div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-icon blue">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>隐患总数指标</title><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        </div>
        <div class="metric-label">隐患总数</div>
        <div class="metric-value" data-ui-id="stats-hazard-total">28</div>
      </div>

      <div class="metric-card">
        <div class="metric-icon orange">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>待整改指标</title><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        </div>
        <div class="metric-label">待整改</div>
        <div class="metric-value" data-ui-id="stats-pending-count">7</div>
      </div>

      <div class="metric-card">
        <div class="metric-icon green">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>整改完成率指标</title><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
        </div>
        <div class="metric-label">整改完成率</div>
        <div class="metric-value" data-ui-id="stats-completion-rate">82%</div>
      </div>

      <div class="metric-card">
        <div class="metric-icon blue">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>巡检完成率指标</title><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 12h10"/></svg>
        </div>
        <div class="metric-label">巡检完成率</div>
        <div class="metric-value" data-ui-id="stats-inspection-rate">91%</div>
      </div>

      <div class="metric-card">
        <div class="metric-icon red">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>逾期事项指标</title><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <div class="metric-label">逾期事项</div>
        <div class="metric-value red-gradient" data-ui-id="stats-overdue-count">2</div>
      </div>

      <div class="metric-card">
        <div class="metric-icon green">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>本月新增指标</title><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
        </div>
        <div class="metric-label">本月新增</div>
        <div class="metric-value">12</div>
      </div>
    </div>

    <div class="chart-card">
      <h3 class="chart-title">近7天隐患上报趋势</h3>
      <div class="bar-chart" data-ui-id="stats-trend-chart">
        <div class="bar" style="height:30%"><span>周一</span></div>
        <div class="bar" style="height:55%"><span>周二</span></div>
        <div class="bar" style="height:40%"><span>周三</span></div>
        <div class="bar" style="height:70%"><span>周四</span></div>
        <div class="bar" style="height:45%"><span>周五</span></div>
        <div class="bar" style="height:85%"><span>周六</span></div>
        <div class="bar" style="height:60%"><span>周日</span></div>
      </div>
    </div>

    <div class="chart-card">
      <h3 class="chart-title">隐患等级分布</h3>
      <svg class="donut" viewBox="0 0 100 100" data-ui-id="stats-distribution-chart">
        <title>隐患等级分布环形图</title>
        <circle class="bg" cx="50" cy="50" r="40"/>
        <circle class="seg1" cx="50" cy="50" r="40" transform="rotate(-90 50 50)"/>
        <circle class="seg2" cx="50" cy="50" r="40" transform="rotate(-90 50 50)"/>
        <circle class="seg3" cx="50" cy="50" r="40" transform="rotate(-90 50 50)"/>
        <circle class="seg4" cx="50" cy="50" r="40" transform="rotate(-90 50 50)"/>
        <text x="50" y="47" text-anchor="middle" font-size="14" font-weight="700" fill="#0F766E">28</text>
        <text x="50" y="60" text-anchor="middle" font-size="8" fill="#94A3B8">总计</text>
      </svg>
      <div class="legend">
        <div class="legend-item"><span class="legend-dot" style="background:#F87171"></span>高风险 35%</div>
        <div class="legend-item"><span class="legend-dot" style="background:#FBBF24"></span>中风险 25%</div>
        <div class="legend-item"><span class="legend-dot" style="background:#60A5FA"></span>低风险 20%</div>
        <div class="legend-item"><span class="legend-dot" style="background:#34D399"></span>已完成 20%</div>
      </div>
    </div>
  </div>
</body>
</html>
