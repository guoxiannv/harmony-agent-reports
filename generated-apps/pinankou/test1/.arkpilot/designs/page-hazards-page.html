<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>平安扣 - 风险隐患</title>
  <style>
    :root { --sky:#38BDF8; --mint:#34D399; --teal:#0F766E; --slate-900:#0F172A; --slate-600:#475569; --slate-400:#94A3B8; --slate-200:#E2E8F0; --card-bg:rgba(255,255,255,0.88); --shadow-card:0 24px 48px -14px rgba(14,165,233,0.14),0 6px 16px -6px rgba(0,0,0,0.05); --shadow-fab:0 18px 44px -10px rgba(14,165,233,0.5); }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; padding:0; height:100%; font-family:"PingFang SC","HarmonyOS Sans SC","SF Pro Text",-apple-system,BlinkMacSystemFont,sans-serif; background: linear-gradient(180deg,#E0F2FE 0%,#D1FAE5 32%,#F0FDFA 68%,#F8FAFC 100%); color:var(--slate-900); }
    #app { max-width:390px; margin:0 auto; min-height:100%; position:relative; padding:16px; padding-bottom:100px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .back-btn { width:36px; height:36px; border-radius:12px; background:rgba(255,255,255,0.72); border:1px solid var(--slate-200); display:grid; place-items:center; color:var(--slate-600); }
    .page-title { font-size:24px; font-weight:700; color:var(--teal); margin:0; }
    .icon-btn { width:40px; height:40px; border-radius:14px; background:linear-gradient(135deg,var(--sky) 0%,var(--mint) 100%); border:none; display:grid; place-items:center; color:#fff; box-shadow:0 8px 20px -6px rgba(14,165,233,0.35); }
    .filter-bar { display:flex; gap:10px; margin-bottom:16px; overflow-x:auto; }
    .filter-bar::-webkit-scrollbar { display:none; }
    .filter-pill { padding:8px 14px; border-radius:20px; background:rgba(255,255,255,0.72); border:1px solid var(--slate-200); font-size:13px; color:var(--slate-600); display:flex; align-items:center; gap:6px; white-space:nowrap; }
    .filter-pill.active { background:linear-gradient(135deg,#FEF3C7,#FDE68A); border-color:#F59E0B; color:#B45309; font-weight:600; }
    .hazard-card { padding:18px; border-radius:22px; background:var(--card-bg); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.65); box-shadow:var(--shadow-card); margin-bottom:14px; }
    .hazard-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .hazard-title { font-size:16px; font-weight:600; margin:0; }
    .hazard-location { display:flex; align-items:center; gap:4px; font-size:13px; color:var(--slate-400); margin-bottom:12px; }
    .hazard-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .level-badge { padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
    .level-badge.high { background:linear-gradient(135deg,#FEE2E2,#FECACA); color:#DC2626; }
    .level-badge.medium { background:linear-gradient(135deg,#FEF3C7,#FDE68A); color:#B45309; }
    .level-badge.low { background:linear-gradient(135deg,#DBEAFE,#BFDBFE); color:#1E40AF; }
    .status-chip { padding:4px 10px; border-radius:20px; font-size:12px; font-weight:500; }
    .status-chip.pending { background:#F1F5F9; color:#64748B; }
    .status-chip.processing { background:linear-gradient(135deg,#FEF3C7,#FDE68A); color:#B45309; }
    .status-chip.done { background:linear-gradient(135deg,#D1FAE5,#A7F3D0); color:#047857; }
    .progress-track { height:6px; border-radius:3px; background:var(--slate-200); overflow:hidden; margin-bottom:10px; }
    .progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--sky),var(--mint)); }
    .hazard-footer { font-size:12px; color:var(--slate-400); }
    .fab { position:fixed; bottom:24px; right:50%; transform:translateX(195px); width:58px; height:58px; border-radius:50%; background:linear-gradient(135deg,var(--sky) 0%,var(--mint) 100%); border:none; display:grid; place-items:center; color:#fff; box-shadow:var(--shadow-fab); }
    .empty-state { text-align:center; padding:60px 20px; }
    .empty-icon { width:96px; height:96px; margin:0 auto 18px; border-radius:50%; background:linear-gradient(135deg,#FEF3C7,#FECACA); display:grid; place-items:center; }
    .empty-state h3 { font-size:18px; font-weight:600; margin:0 0 8px; }
    .empty-state p { font-size:14px; color:var(--slate-400); margin:0 0 20px; }
    .btn-primary { display:inline-flex; align-items:center; gap:8px; padding:14px 28px; border-radius:16px; background:linear-gradient(135deg,var(--sky) 0%,var(--mint) 100%); color:#fff; font-size:16px; font-weight:600; border:none; box-shadow:0 10px 24px -6px rgba(14,165,233,0.35); }
    .hidden { display:none; }
    @media (max-width:390px){ .fab { right:20px; transform:none; } }
  </style>
</head>
<body>
  <div id="app" data-page-id="hazards-page" data-tab-id="tab-hazards">
    <div class="topbar">
      <div class="topbar-left">
        <button class="back-btn" aria-label="返回">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h1 class="page-title">风险隐患</h1>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-pill active" data-ui-id="hazards-filter-level">全部等级</button>
      <button class="filter-pill" data-ui-id="hazards-filter-level">高风险</button>
      <button class="filter-pill" data-ui-id="hazards-filter-level">中风险</button>
      <button class="filter-pill" data-ui-id="hazards-filter-status">待处理</button>
    </div>

    <div data-ui-id="hazards-list">
      <article class="hazard-card" data-ui-id="hazards-item-1">
        <div class="hazard-header">
          <h3 class="hazard-title">消防通道堆放杂物</h3>
          <span class="level-badge high">高风险</span>
        </div>
        <div class="hazard-location">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>隐患位置</title><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
          A栋3层东侧通道
        </div>

        <div class="hazard-meta">
          <span class="status-chip processing">处理中</span>
          <span style="font-size:12px;color:var(--slate-400)">上报于 2小时前</span>
        </div>

        <div class="progress-track"><div class="progress-fill" style="width:60%"></div></div>
        <div class="hazard-footer">整改进度 60% · 责任人：王主管</div>
      </article>

      <article class="hazard-card" data-ui-id="hazards-item-2">
        <div class="hazard-header">
          <h3 class="hazard-title">应急照明灯不亮</h3>
          <span class="level-badge medium">中风险</span>
        </div>
        <div class="hazard-location">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>隐患位置</title><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
          B栋地下室
        </div>

        <div class="hazard-meta">
          <span class="status-chip pending">待处理</span>
          <span style="font-size:12px;color:var(--slate-400)">上报于 昨天</span>
        </div>

        <div class="progress-track"><div class="progress-fill" style="width:10%"></div></div>
        <div class="hazard-footer">整改进度 10% · 待分派责任人</div>
      </article>

      <article class="hazard-card" data-ui-id="hazards-item-3">
        <div class="hazard-header">
          <h3 class="hazard-title">地面湿滑未设警示牌</h3>
          <span class="level-badge low">低风险</span>
        </div>
        <div class="hazard-location">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>隐患位置</title><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
          食堂入口
        </div>

        <div class="hazard-meta">
          <span class="status-chip done">已完成</span>
          <span style="font-size:12px;color:var(--slate-400)">上报于 3天前</span>
        </div>

        <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
        <div class="hazard-footer">整改进度 100% · 已验收</div>
      </article>
    </div>

    <div class="empty-state hidden" data-ui-id="hazards-empty-state">
      <div class="empty-icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#B45309" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>暂无风险隐患</title><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      </div>
      <h3>暂无风险隐患</h3>
      <p>发现隐患？立即上报，守护安全</p>
      <button class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><title>上报隐患</title><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        上报隐患
      </button>
    </div>

    <button class="fab" data-ui-id="hazards-add-button" aria-label="上报隐患">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><title>上报新的风险隐患</title><path d="M5 12h14"/><path d="M12 5v14"/></svg>
    </button>
  </div>
</body>
</html>
