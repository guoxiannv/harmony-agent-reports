<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>平安扣 - 我的</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #F0F9FF 0%, #F0FDFA 50%, #F0F4F8 100%);
      color: #334155;
      padding-bottom: 84px;
    }
    .app-shell { max-width: 420px; margin: 0 auto; position: relative; }
    .page-header { padding: 56px 16px 16px; }
    .page-title { font-size: 22px; font-weight: 700; color: #0F172A; }
    .profile-card {
      background: linear-gradient(135deg, #0F766E 0%, #134E4A 100%);
      border-radius: 20px; padding: 22px 18px; margin: 0 16px;
      border: 1px solid rgba(45,212,191,0.28); color: #fff;
      display: flex; align-items: center; gap: 16px; position: relative; overflow: hidden;
    }
    .profile-card::after {
      content: ""; position: absolute; top: -30px; right: -30px; width: 130px; height: 130px;
      background: radial-gradient(circle, rgba(45,212,191,0.2) 0%, transparent 70%);
    }
    .avatar-ring {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%);
      padding: 3px; flex-shrink: 0; position: relative; z-index: 1;
    }
    .avatar {
      width: 58px; height: 58px; border-radius: 50%; background: #fff; color: #0D9488;
      display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700;
    }
    .profile-info { flex: 1; position: relative; z-index: 1; }
    .profile-name { font-size: 18px; font-weight: 700; }
    .profile-role { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .menu-list { padding: 0 16px; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    .menu-item {
      background: #fff; border-radius: 16px; padding: 14px 16px;
      box-shadow: 0 4px 12px rgba(15,23,42,0.04); border: 1px solid #E2E8F0;
      display: flex; align-items: center; gap: 14px; cursor: pointer;
    }
    .menu-icon {
      width: 38px; height: 38px; border-radius: 12px; background: #F0FDFA;
      display: flex; align-items: center; justify-content: center; color: #0D9488; flex-shrink: 0;
    }
    .menu-label { flex: 1; font-size: 15px; font-weight: 600; color: #0F172A; }
    .menu-arrow { color: #94A3B8; }
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      width: 100%; max-width: 420px; margin: 0 auto;
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(24px) saturate(170%);
      border-top: 0.5px solid rgba(226,232,240,0.9);
      display: flex; justify-content: space-around; padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #94A3B8; font-size: 11px; font-weight: 500; }
    .tab-item.active { color: #0D9488; }
    .tab-item svg { width: 24px; height: 24px; stroke-width: 2; }
    .tab-item.active svg { stroke: #0D9488; }
  </style>
</head>
<body>
  <div class="app-shell" data-page-id="profile-page" data-tab-id="tab-profile">
    <header class="page-header">
      <h1 class="page-title">我的</h1>
    </header>

    <section class="profile-card">
      <div class="avatar-ring" data-ui-id="profile-avatar">
        <div class="avatar">王</div>
      </div>
      <div class="profile-info">
        <div class="profile-name" data-ui-id="profile-name">王安全</div>
        <div class="profile-role">安全管理员 · 生产一部</div>
      </div>
    </section>

    <section class="menu-list">
      <div class="menu-item" data-ui-id="profile-settings-button">
        <div class="menu-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>打开应用设置</title><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="menu-label">设置</div>
        <div class="menu-arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>进入设置</title><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </div>

      <div class="menu-item" data-ui-id="profile-sync-button">
        <div class="menu-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>同步本地数据到云端</title><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        </div>
        <div class="menu-label">同步数据</div>
        <div class="menu-arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>开始同步</title><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </div>

      <div class="menu-item" data-ui-id="profile-about-button">
        <div class="menu-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>查看关于应用信息</title><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        </div>
        <div class="menu-label">关于</div>
        <div class="menu-arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>进入关于页面</title><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </div>
    </section>

    <nav class="tabbar" aria-label="底部导航">
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>工作台标签</title><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>工作台</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>隐患管理标签</title><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
        <span>隐患</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>巡检打卡标签</title><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></svg>
        <span>巡检</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>应急联系人标签</title><path d="M13 2a9 9 0 0 1 9 9"/><path d="M13 6a5 5 0 0 1 5 5"/><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/></svg>
        <span>联系人</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>统计看板标签</title><path d="M5 21v-6"/><path d="M12 21V9"/><path d="M19 21V3"/></svg>
        <span>统计</span>
      </div>
      <div class="tab-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>我的标签</title><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>我的</span>
      </div>
    </nav>
  </div>
</body>
</html>
