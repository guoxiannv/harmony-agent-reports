<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>平安扣 - 隐患详情</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #F0F9FF 0%, #F0FDFA 50%, #F0F4F8 100%);
      color: #334155;
      padding-bottom: 100px;
    }
    .app-shell { max-width: 420px; margin: 0 auto; position: relative; }
    .nav-bar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
      border-bottom: 0.5px solid rgba(226,232,240,0.8);
    }
    .nav-bar h1 { flex: 1; font-size: 18px; font-weight: 700; color: #0F172A; text-align: center; margin-right: 40px; }
    .back-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: #0F172A; cursor: pointer; }
    .hero {
      height: 220px; background: linear-gradient(135deg, #0F766E 0%, #134E4A 100%);
      margin: 16px; border-radius: 20px; position: relative; overflow: hidden;
      border: 1px solid rgba(45,212,191,0.28); display: flex; align-items: flex-end; padding: 18px;
    }
    .hero::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle at 80% 20%, rgba(45,212,191,0.18) 0%, transparent 45%);
    }
    .hero-content { position: relative; z-index: 1; color: #fff; }
    .hero-title { font-size: 20px; font-weight: 700; line-height: 1.35; }
    .hero-tags { display: flex; gap: 8px; margin-top: 10px; }
    .hero-tag { padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .tag-level-high { background: rgba(244,63,94,0.18); color: #FFF1F2; }
    .tag-status { background: rgba(255,255,255,0.18); color: #fff; }
    .section { padding: 0 16px; margin-top: 18px; }
    .section-title { font-size: 16px; font-weight: 700; color: #0F172A; margin-bottom: 10px; }
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .info-card {
      background: #fff; border-radius: 16px; padding: 14px; border: 1px solid #E2E8F0;
      box-shadow: 0 4px 12px rgba(15,23,42,0.04);
    }
    .info-label { font-size: 12px; color: #64748B; }
    .info-value { font-size: 15px; font-weight: 600; color: #0F172A; margin-top: 4px; }
    .desc-card {
      background: #fff; border-radius: 16px; padding: 16px; border: 1px solid #E2E8F0;
      box-shadow: 0 4px 12px rgba(15,23,42,0.04);
    }
    .desc-text { font-size: 15px; line-height: 1.6; color: #334155; }
    .timeline { display: flex; flex-direction: column; gap: 14px; position: relative; padding-left: 24px; }
    .timeline::before {
      content: ""; position: absolute; left: 7px; top: 6px; bottom: 6px; width: 2px;
      background: #E2E8F0;
    }
    .timeline-item { position: relative; }
    .timeline-dot {
      position: absolute; left: -21px; top: 4px; width: 12px; height: 12px; border-radius: 50%;
      background: #0D9488; border: 2px solid #fff; box-shadow: 0 0 0 2px #0D9488;
    }
    .timeline-item.pending .timeline-dot { background: #F59E0B; box-shadow: 0 0 0 2px #F59E0B; }
    .timeline-title { font-size: 14px; font-weight: 600; color: #0F172A; }
    .timeline-time { font-size: 12px; color: #94A3B8; margin-top: 2px; }
    .bottom-actions {
      position: fixed; bottom: 0; left: 0; right: 0;
      width: 100%; max-width: 420px; margin: 0 auto;
      background: #fff; border-top: 0.5px solid #E2E8F0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      display: flex; gap: 12px; z-index: 100;
    }
    .btn { flex: 1; padding: 13px; border-radius: 14px; font-size: 15px; font-weight: 600; text-align: center; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #14B8A6 0%, #0D9488 100%); color: #fff; box-shadow: 0 4px 12px rgba(13,148,136,0.24); }
    .btn-secondary { background: #fff; color: #0D9488; border: 1.5px solid #0D9488; }
  </style>
</head>
<body>
  <div class="app-shell" data-page-id="hazard-detail-page">
    <nav class="nav-bar">
      <button class="back-btn" data-ui-id="hazard-detail-back-button" aria-label="返回">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h1>隐患详情</h1>
      <button class="back-btn" data-ui-id="hazard-detail-edit-button" aria-label="编辑隐患" style="margin-left: auto; margin-right: 0;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>编辑当前隐患</title><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg>
      </button>
    </nav>

    <section class="hero">
      <div class="hero-content">
        <div class="hero-title" data-ui-id="hazard-detail-title">仓库货架消防通道堵塞</div>
        <div class="hero-tags">
          <span class="hero-tag tag-level-high">高风险</span>
          <span class="hero-tag tag-status" data-ui-id="hazard-detail-status">待整改</span>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-title">基础信息</div>
      <div class="info-grid">
        <div class="info-card">
          <div class="info-label">隐患位置</div>
          <div class="info-value">B区仓库-3号通道</div>
        </div>
        <div class="info-card">
          <div class="info-label">上报人</div>
          <div class="info-value">张工</div>
        </div>
        <div class="info-card">
          <div class="info-label">责任人</div>
          <div class="info-value">李安全</div>
        </div>
        <div class="info-card">
          <div class="info-label">截止时间</div>
          <div class="info-value">06-20 18:00</div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-title">隐患描述</div>
      <div class="desc-card">
        <p class="desc-text">货架临时堆放纸箱与托盘，导致消防通道宽度不足1.2米，存在火灾疏散隐患。需立即清理通道两侧杂物并设置警示标识。</p>
      </div>
    </section>

    <section class="section">
      <div class="section-title">整改进度</div>
      <div class="timeline" data-ui-id="hazard-detail-progress-list">
        <div class="timeline-item" data-ui-id="hazard-progress-1">
          <div class="timeline-dot"></div>
          <div class="timeline-title">隐患上报</div>
          <div class="timeline-time">张工 · 06-19 09:30</div>
        </div>
        <div class="timeline-item pending" data-ui-id="hazard-progress-2">
          <div class="timeline-dot"></div>
          <div class="timeline-title">指派整改</div>
          <div class="timeline-time">待李安全确认接单</div>
        </div>
        <div class="timeline-item pending" data-ui-id="hazard-progress-3">
          <div class="timeline-dot"></div>
          <div class="timeline-title">整改完成验收</div>
          <div class="timeline-time">待验收</div>
        </div>
      </div>
    </section>

    <div class="bottom-actions">
      <button class="btn btn-secondary" data-ui-id="hazard-detail-urge-button">催办</button>
      <button class="btn btn-primary" data-ui-id="hazard-detail-accept-button">验收通过</button>
    </div>
  </div>
</body>
</html>
