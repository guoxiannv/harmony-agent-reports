<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>平安扣 - 隐患编辑</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #F0F9FF 0%, #F0FDFA 50%, #F0F4F8 100%);
      color: #334155;
      padding-bottom: 90px;
    }
    .app-shell { max-width: 420px; margin: 0 auto; position: relative; }
    .nav-bar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
      border-bottom: 0.5px solid rgba(226,232,240,0.8);
    }
    .nav-bar h1 { flex: 1; font-size: 18px; font-weight: 700; color: #0F172A; text-align: center; margin-right: 40px; }
    .back-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: #0F172A; cursor: pointer; }
    .section { padding: 0 16px; margin-top: 18px; }
    .section-title { font-size: 16px; font-weight: 700; color: #0F172A; margin-bottom: 12px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; display: block; }
    .form-input, .form-textarea {
      width: 100%; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 12px;
      padding: 12px 14px; font-size: 15px; color: #0F172A; outline: none;
    }
    .form-input:focus, .form-textarea:focus { border-color: #14B8A6; box-shadow: 0 0 0 3px rgba(20,184,166,0.14); }
    .form-textarea { min-height: 100px; resize: none; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .photo-upload {
      width: 100%; height: 120px; border: 2px dashed #CBD5E1; border-radius: 14px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      color: #64748B; background: #F8FAFC; cursor: pointer;
    }
    .photo-upload svg { stroke: #94A3B8; }
    .photo-upload span { font-size: 13px; }
    .save-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      width: 100%; max-width: 420px; margin: 0 auto;
      background: #fff; border-top: 0.5px solid #E2E8F0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .save-btn {
      width: 100%; padding: 14px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, #14B8A6 0%, #0D9488 100%);
      color: #fff; font-size: 16px; font-weight: 600;
      box-shadow: 0 4px 12px rgba(13,148,136,0.24); cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app-shell" data-page-id="hazard-edit-page">
    <nav class="nav-bar">
      <button class="back-btn" data-ui-id="hazard-edit-back-button" aria-label="返回">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h1>新建隐患</h1>
    </nav>

    <section class="section">
      <div class="section-title">基本信息</div>
      <div class="form-group">
        <label class="form-label">隐患标题</label>
        <input class="form-input" type="text" placeholder="请输入隐患标题" data-ui-id="hazard-edit-title-input">
      </div>
      <div class="form-group">
        <label class="form-label">隐患位置</label>
        <input class="form-input" type="text" placeholder="请选择或输入位置" data-ui-id="hazard-edit-location-input">
      </div>
      <div class="form-group">
        <label class="form-label">风险等级</label>
        <select class="form-input" data-ui-id="hazard-edit-level-picker">
          <option>请选择风险等级</option>
          <option value="high">高风险</option>
          <option value="normal">中风险</option>
          <option value="low">低风险</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">隐患描述</label>
        <textarea class="form-textarea" placeholder="请描述隐患详情" data-ui-id="hazard-edit-description-input"></textarea>
      </div>
    </section>

    <section class="section">
      <div class="section-title">现场照片</div>
      <div class="photo-upload" data-ui-id="hazard-edit-photo-button">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>拍摄现场照片</title><path d="M13.997 4a2 2 0 0 1 1.76 1.05l.486.9A2 2 0 0 0 18.003 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1.997a2 2 0 0 0 1.759-1.048l.489-.904A2 2 0 0 1 10.004 4z"/><circle cx="12" cy="13" r="3"/></svg>
        <span>点击拍照或选择图片</span>
      </div>
    </section>

    <section class="section">
      <div class="section-title">指派信息</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">整改责任人</label>
          <select class="form-input" data-ui-id="hazard-edit-assignee-picker">
            <option>请选择责任人</option>
            <option>李安全</option>
            <option>张工</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">截止时间</label>
          <input class="form-input" type="datetime-local" data-ui-id="hazard-edit-deadline-picker">
        </div>
      </div>
    </section>

    <div class="save-bar">
      <button class="save-btn" data-ui-id="hazard-edit-save-button">保存</button>
    </div>
  </div>
</body>
</html>
