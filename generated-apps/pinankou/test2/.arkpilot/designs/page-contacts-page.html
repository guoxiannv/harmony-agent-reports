<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>平安扣 - 应急联系人</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #F0F9FF 0%, #F0FDFA 50%, #F0F4F8 100%);
      color: #334155;
      padding-bottom: 84px;
    }
    .app-shell { max-width: 420px; margin: 0 auto; position: relative; }
    .page-header { padding: 56px 16px 12px; display: flex; align-items: center; justify-content: space-between; }
    .page-title { font-size: 22px; font-weight: 700; color: #0F172A; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 12px; background: #F0FDFA;
      display: flex; align-items: center; justify-content: center; color: #0D9488; border: none; cursor: pointer;
    }
    .search-bar {
      margin: 0 16px 12px;
      background: #fff; border-radius: 14px; border: 1px solid #E2E8F0;
      padding: 10px 14px; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 2px 8px rgba(15,23,42,0.04);
    }
    .search-bar input {
      border: none; outline: none; flex: 1; font-size: 15px; color: #334155; background: transparent;
    }
    .search-bar input::placeholder { color: #94A3B8; }
    .group-tabs {
      display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto;
    }
    .group-tab {
      white-space: nowrap; padding: 7px 14px; border-radius: 999px; font-size: 13px; font-weight: 500;
      background: #fff; border: 1px solid #E2E8F0; color: #64748B;
    }
    .group-tab.active { background: #0D9488; color: #fff; border-color: #0D9488; }
    .contact-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
    .contact-card {
      background: #fff; border-radius: 18px; padding: 14px 16px;
      box-shadow: 0 4px 12px rgba(15,23,42,0.04); border: 1px solid #E2E8F0;
      display: flex; align-items: center; gap: 12px;
    }
    .avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, #14B8A6 0%, #0D9488 100%);
      color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; flex-shrink: 0;
    }
    .contact-info { flex: 1; }
    .contact-name { font-size: 16px; font-weight: 600; color: #0F172A; }
    .contact-role { font-size: 13px; color: #64748B; margin-top: 2px; }
    .contact-role span { color: #0D9488; font-weight: 500; }
    .call-btn {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, #14B8A6 0%, #0D9488 100%);
      display: flex; align-items: center; justify-content: center; color: #fff; border: none; cursor: pointer;
      box-shadow: 0 4px 10px rgba(13,148,136,0.24);
    }
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      width: 100%; max-width: 420px; margin: 0 auto;
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(24px) saturate(170%);
      border-top: 0.5px solid rgba(226,232,240,0.9);
      display: flex; justify-content: space-around; padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #94A3B8; font-size: 11px; font-weight: 500; }
    .tab-item.active { color: #0D9488; }
    .tab-item svg { width: 24px; height: 24px; stroke-width: 2; }
    .tab-item.active svg { stroke: #0D9488; }
  </style>
</head>
<body>
  <div class="app-shell" data-page-id="contacts-page" data-tab-id="tab-contacts">
    <header class="page-header">
      <h1 class="page-title">应急联系人</h1>
      <button class="icon-btn" data-ui-id="contacts-add-button" aria-label="添加联系人">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>添加应急联系人</title><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      </button>
    </header>

    <div class="search-bar" data-ui-id="contacts-search-input">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>搜索联系人图标</title><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
      <input type="text" placeholder="搜索姓名、角色、电话">
    </div>

    <div class="group-tabs" data-ui-id="contacts-group-filter">
      <div class="group-tab active">全部</div>
      <div class="group-tab">安全负责人</div>
      <div class="group-tab">医疗急救</div>
      <div class="group-tab">消防</div>
      <div class="group-tab">班组长</div>
    </div>

    <div class="contact-list" data-ui-id="contacts-list">
      <div class="contact-card" data-ui-id="contact-item-1">
        <div class="avatar">李</div>
        <div class="contact-info">
          <div class="contact-name">李安全</div>
          <div class="contact-role">安全负责人 · <span>138-0013-0001</span></div>
        </div>
        <button class="call-btn" data-ui-id="contacts-call-button" aria-label="拨打电话">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>呼叫李安全</title><path d="M13 2a9 9 0 0 1 9 9"/><path d="M13 6a5 5 0 0 1 5 5"/><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/></svg>
        </button>
      </div>

      <div class="contact-card" data-ui-id="contact-item-2">
        <div class="avatar" style="background: linear-gradient(135deg, #FB7185 0%, #F43F5E 100%);">医</div>
        <div class="contact-info">
          <div class="contact-name">医务室值班</div>
          <div class="contact-role">医疗急救 · <span>120 / 内线 8120</span></div>
        </div>
        <button class="call-btn" data-ui-id="contacts-call-button" aria-label="拨打电话">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>呼叫医务室值班</title><path d="M13 2a9 9 0 0 1 9 9"/><path d="M13 6a5 5 0 0 1 5 5"/><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/></svg>
        </button>
      </div>

      <div class="contact-card" data-ui-id="contact-item-3">
        <div class="avatar" style="background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);">张</div>
        <div class="contact-info">
          <div class="contact-name">张工</div>
          <div class="contact-role">班组长 · <span>138-0013-0002</span></div>
        </div>
        <button class="call-btn" data-ui-id="contacts-call-button" aria-label="拨打电话">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>呼叫张工</title><path d="M13 2a9 9 0 0 1 9 9"/><path d="M13 6a5 5 0 0 1 5 5"/><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/></svg>
        </button>
      </div>
    </div>

    <nav class="tabbar" aria-label="底部导航">
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>工作台标签</title><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>工作台</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>隐患管理标签</title><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
        <span>隐患</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>巡检打卡标签</title><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></svg>
        <span>巡检</span>
      </div>
      <div class="tab-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>应急联系人标签</title><path d="M13 2a9 9 0 0 1 9 9"/><path d="M13 6a5 5 0 0 1 5 5"/><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/></svg>
        <span>联系人</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>统计看板标签</title><path d="M5 21v-6"/><path d="M12 21V9"/><path d="M19 21V3"/></svg>
        <span>统计</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>我的标签</title><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>我的</span>
      </div>
    </nav>
  </div>
</body>
</html>
