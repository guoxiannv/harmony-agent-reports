<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>平安扣 - 巡检打卡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #F0F9FF 0%, #F0FDFA 50%, #F0F4F8 100%);
      color: #334155;
      padding-bottom: 160px;
    }
    .app-shell { max-width: 420px; margin: 0 auto; position: relative; }
    .page-header { padding: 56px 16px 16px; }
    .page-title { font-size: 22px; font-weight: 700; color: #0F172A; }
    .route-card {
      background: linear-gradient(135deg, #0F766E 0%, #134E4A 100%);
      border-radius: 20px; padding: 18px; margin: 0 16px 18px;
      border: 1px solid rgba(45,212,191,0.28);
      color: #fff; position: relative; overflow: hidden;
    }
    .route-card::after {
      content: ""; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(45,212,191,0.2) 0%, transparent 70%);
    }
    .route-name { font-size: 18px; font-weight: 700; position: relative; z-index: 1; }
    .route-meta { font-size: 13px; opacity: 0.8; margin-top: 6px; position: relative; z-index: 1; }
    .route-progress { margin-top: 14px; position: relative; z-index: 1; }
    .progress-track { height: 6px; background: rgba(255,255,255,0.2); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; width: 60%; background: #2DD4BF; border-radius: 999px; }
    .progress-text { font-size: 12px; margin-top: 6px; }
    .start-btn {
      margin-top: 14px; width: 100%; padding: 12px; border-radius: 12px; border: none;
      background: #fff; color: #0D9488; font-weight: 600; font-size: 15px; cursor: pointer; position: relative; z-index: 1;
    }
    .section { padding: 0 16px; margin-top: 18px; }
    .section-title { font-size: 16px; font-weight: 700; color: #0F172A; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .checkpoint-list { display: flex; flex-direction: column; gap: 10px; }
    .checkpoint-item {
      background: #fff; border-radius: 16px; padding: 14px 16px;
      box-shadow: 0 4px 12px rgba(15,23,42,0.04); border: 1px solid #E2E8F0;
      display: flex; align-items: center; gap: 12px;
    }
    .checkpoint-status {
      width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .checkpoint-status.done { background: #ECFDF5; color: #10B981; }
    .checkpoint-status.todo { background: #F1F5F9; color: #94A3B8; }
    .checkpoint-info { flex: 1; }
    .checkpoint-name { font-size: 15px; font-weight: 600; color: #0F172A; }
    .checkpoint-loc { font-size: 12px; color: #64748B; margin-top: 2px; }
    .checkpoint-action {
      padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none;
    }
    .checkpoint-action.checkin { background: #F0FDFA; color: #0D9488; }
    .checkpoint-action.done { background: #ECFDF5; color: #10B981; }
    .bottom-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      width: 100%; max-width: 420px; margin: 0 auto;
      background: #fff; border-radius: 20px 20px 0 0;
      box-shadow: 0 -8px 30px rgba(15,23,42,0.10);
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom)); z-index: 100;
    }
    .sheet-row { display: flex; gap: 12px; }
    .btn { flex: 1; padding: 13px; border-radius: 14px; font-size: 15px; font-weight: 600; text-align: center; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #14B8A6 0%, #0D9488 100%); color: #fff; }
    .btn-secondary { background: #F0FDFA; color: #0D9488; }
    .btn-danger { background: #FFF1F2; color: #F43F5E; }
    .title-svg { width: 20px; height: 20px; stroke: #0D9488; }
  </style>
</head>
<body>
  <div class="app-shell" data-page-id="patrol-page" data-tab-id="tab-patrol">
    <header class="page-header">
      <h1 class="page-title">巡检打卡</h1>
    </header>

    <section class="route-card" data-ui-id="patrol-route-list">
      <div class="route-name">A区日常巡检路线</div>
      <div class="route-meta">8 个点位 · 预计 35 分钟</div>
      <div class="route-progress">
        <div class="progress-track"><div class="progress-fill"></div></div>
        <div class="progress-text">已完成 5/8 个点位</div>
      </div>
      <button class="start-btn" data-ui-id="patrol-start-button">开始巡检</button>
    </section>

    <section class="section">
      <div class="section-title">
        <svg class="title-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>巡检点位图标</title><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></svg>
        巡检点位
      </div>
      <div class="checkpoint-list" data-ui-id="patrol-checkpoint-list">
        <div class="checkpoint-item" data-ui-id="patrol-checkpoint-1">
          <div class="checkpoint-status done">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><title>点位已打卡</title><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <div class="checkpoint-info">
            <div class="checkpoint-name">主入口门禁</div>
            <div class="checkpoint-loc">A区大门 · 09:05</div>
          </div>
          <button class="checkpoint-action done">已打卡</button>
        </div>

        <div class="checkpoint-item" data-ui-id="patrol-checkpoint-2">
          <div class="checkpoint-status done">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><title>点位已打卡</title><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <div class="checkpoint-info">
            <div class="checkpoint-name">配电房</div>
            <div class="checkpoint-loc">A区配电房 · 09:18</div>
          </div>
          <button class="checkpoint-action done">已打卡</button>
        </div>

        <div class="checkpoint-item" data-ui-id="patrol-checkpoint-3">
          <div class="checkpoint-status todo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>点位未打卡</title><circle cx="12" cy="12" r="10"/></svg>
          </div>
          <div class="checkpoint-info">
            <div class="checkpoint-name">消防栓检查点</div>
            <div class="checkpoint-loc">A区走廊-3号</div>
          </div>
          <button class="checkpoint-action checkin" data-ui-id="patrol-checkin-button">打卡</button>
        </div>
      </div>
    </section>

    <div class="bottom-sheet">
      <div class="sheet-row">
        <button class="btn btn-danger" data-ui-id="patrol-report-abnormal-button">上报异常</button>
        <button class="btn btn-secondary">扫码</button>
        <button class="btn btn-primary" data-ui-id="patrol-complete-button">完成巡检</button>
      </div>
    </div>
  </div>
</body>
</html>
