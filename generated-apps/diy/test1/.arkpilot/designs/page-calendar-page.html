<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 课程日历</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #FAF6F0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #5A4A3F;
    }
    body { max-width: 390px; margin: 0 auto; }
    .page { min-height: 100%; padding-bottom: 88px; }
    .header {
      padding: 20px 20px 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-title {
      font-family: "ZCOOL XiaoWei", "STKaiti", cursive;
      font-size: 30px; color: #3D2B1F;
    }
    .calendar-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px 16px;
    }
    .calendar-nav {
      display: flex; align-items: center; gap: 12px;
    }
    .calendar-nav button {
      width: 32px; height: 32px;
      background: #FFFDF9; border: 1px solid #F0E6DA;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .calendar-month {
      font-size: 17px; font-weight: 700; color: #3D2B1F;
    }
    .view-switch {
      background: #F5EDE4;
      border-radius: 999px;
      padding: 4px;
      display: flex;
    }
    .view-switch button {
      background: transparent; border: none;
      padding: 6px 14px;
      font-size: 13px; font-weight: 600; color: #8C7D70;
      border-radius: 999px;
    }
    .view-switch button.active {
      background: #C67B5C; color: #FFFFFF;
    }
    .week-strip {
      display: flex; justify-content: space-between;
      padding: 0 20px 16px;
    }
    .day-cell {
      width: 44px; text-align: center;
      padding: 8px 0;
      border-radius: 14px;
    }
    .day-cell .dow { font-size: 11px; color: #8C7D70; margin-bottom: 4px; }
    .day-cell .date { font-size: 15px; font-weight: 600; color: #3D2B1F; }
    .day-cell.active { background: #C67B5C; }
    .day-cell.active .dow, .day-cell.active .date { color: #FFFFFF; }
    .day-cell.today .date { color: #C67B5C; }
    .section { padding: 0 20px; }
    .section-title { font-size: 18px; font-weight: 700; color: #3D2B1F; margin-bottom: 12px; }
    .course-card {
      background: #FFFDF9;
      border: 1px solid #F0E6DA;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(99,72,54,0.06);
    }
    .course-card .time-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .time-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #C67B5C;
    }
    .time-text { font-size: 13px; color: #8C7D70; }
    .course-card h4 { font-size: 16px; font-weight: 700; color: #3D2B1F; margin-bottom: 4px; }
    .course-card p { font-size: 13px; color: #8C7D70; }
    .course-meta {
      display: flex; gap: 12px; margin-top: 10px;
    }
    .meta-badge {
      background: #F5EDE4;
      color: #5A4A3F;
      font-size: 12px; font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
    }
    .fab {
      position: fixed; bottom: 88px;
      left: 50%; transform: translateX(-50%);
      margin-left: 145px;
      width: 60px; height: 60px;
      background: #C67B5C; border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(198,123,92,0.36);
      color: #FFFFFF;
    }
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 390px; margin: 0 auto;
      height: 68px;
      background: rgba(255,253,249,0.94);
      backdrop-filter: blur(16px);
      border-top: 1px solid #EFE6DA;
      box-shadow: 0 -6px 24px rgba(99,72,54,0.08);
      display: flex; justify-content: space-around; align-items: center;
    }
    .tab-item { text-align: center; color: #9E9186; }
    .tab-item.active { color: #C67B5C; }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-label { font-size: 11px; font-weight: 600; margin-top: 4px; }
  </style>
</head>
<body data-page-id="calendar-page" data-tab-id="tab-calendar">
  <div class="page">
    <header class="header">
      <h1 class="header-title">课程日历</h1>
      <button class="filter-btn" style="width:40px;height:40px;border-radius:50%;background:#FFFDF9;border:1px solid #F0E6DA;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round">
          <title>Calendar Settings</title>
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
        </svg>
      </button>
    </header>

    <div class="calendar-toolbar">
      <div class="calendar-nav">
        <button data-ui-id="calendar-prev-button" aria-label="上一周">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Previous Calendar Period</title>
            <path d="m15 18-6-6 6-6"/>
          </svg>
        </button>
        <div class="calendar-month">2026 年 6 月</div>
        <button data-ui-id="calendar-next-button" aria-label="下一周">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Next Calendar Period</title>
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </button>
      </div>
      <div class="view-switch" data-ui-id="calendar-view-switch">
        <button class="active">日</button>
        <button>周</button>
        <button>月</button>
      </div>
    </div>

    <div class="week-strip">
      <div class="day-cell">
        <div class="dow">一</div>
        <div class="date">22</div>
      </div>
      <div class="day-cell today active">
        <div class="dow">二</div>
        <div class="date">23</div>
      </div>
      <div class="day-cell">
        <div class="dow">三</div>
        <div class="date">24</div>
      </div>
      <div class="day-cell">
        <div class="dow">四</div>
        <div class="date">25</div>
      </div>
      <div class="day-cell">
        <div class="dow">五</div>
        <div class="date">26</div>
      </div>
      <div class="day-cell">
        <div class="dow">六</div>
        <div class="date">27</div>
      </div>
      <div class="day-cell">
        <div class="dow">日</div>
        <div class="date">28</div>
      </div>
    </div>

    <section class="section">
      <h2 class="section-title">今日课程</h2>
      <div data-ui-id="calendar-course-list">
        <div class="course-card" id="calendar-course-101">
          <div class="time-row">
            <div class="time-dot"></div>
            <div class="time-text">14:00 - 16:00</div>
          </div>
          <h4>手工陶艺杯</h4>
          <p>老师：阿陶 · 已报名 2/6</p>
          <div class="course-meta">
            <span class="meta-badge">陶艺</span>
            <span class="meta-badge">剩余 4 席</span>
          </div>
        </div>

        <div class="course-card" id="calendar-course-102">
          <div class="time-row">
            <div class="time-dot"></div>
            <div class="time-text">16:30 - 18:30</div>
          </div>
          <h4>植物染方巾</h4>
          <p>老师：小织 · 已报名 4/8</p>
          <div class="course-meta">
            <span class="meta-badge">染织</span>
            <span class="meta-badge">剩余 4 席</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <button class="fab" data-ui-id="calendar-add-course-button" aria-label="新增课程">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <title>Add New Course</title>
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <nav class="tabbar">
    <button class="tab-item" data-ui-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Home Tab</title>
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <div class="tab-label">首页</div>
    </button>
    <button class="tab-item" data-ui-id="tab-members">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Members Tab</title>
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <div class="tab-label">会员</div>
    </button>
    <button class="tab-item active" data-ui-id="tab-calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Course Calendar Tab</title>
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <div class="tab-label">课程</div>
    </button>
    <button class="tab-item" data-ui-id="tab-points">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Points Tab</title>
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <div class="tab-label">积分</div>
    </button>
    <button class="tab-item" data-ui-id="tab-inventory">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Inventory Tab</title>
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
        <path d="m3.3 7 8.7 5 8.7-5"/>
        <path d="M12 22V12"/>
      </svg>
      <div class="tab-label">库存</div>
    </button>
  </nav>
</body>
</html>
