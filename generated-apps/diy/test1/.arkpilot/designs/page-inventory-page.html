<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 库存</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #FAF6F0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #5A4A3F;
    }
    body { max-width: 390px; margin: 0 auto; }
    .page { min-height: 100%; padding-bottom: 88px; }
    .header {
      padding: 20px 20px 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-title {
      font-family: "ZCOOL XiaoWei", "STKaiti", cursive;
      font-size: 30px; color: #3D2B1F;
    }
    .alert-card {
      margin: 0 20px 20px;
      background: rgba(160,82,45,0.08);
      border: 1px solid rgba(160,82,45,0.20);
      border-left: 4px solid #A0522D;
      border-radius: 18px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .alert-icon {
      width: 40px; height: 40px;
      background: rgba(160,82,45,0.12);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: #A0522D;
    }
    .alert-content h4 { font-size: 15px; font-weight: 700; color: #3D2B1F; margin-bottom: 2px; }
    .alert-content p { font-size: 13px; color: #8C7D70; }
    .section { padding: 0 20px; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .section-title { font-size: 18px; font-weight: 700; color: #3D2B1F; }
    .section-link { font-size: 13px; font-weight: 600; color: #5A6F7C; }
    .inventory-card {
      background: #FFFDF9;
      border: 1px solid #F0E6DA;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(99,72,54,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    .inventory-info h4 { font-size: 15px; font-weight: 700; color: #3D2B1F; margin-bottom: 4px; }
    .inventory-info p { font-size: 12px; color: #8C7D70; }
    .inventory-qty { text-align: right; }
    .inventory-qty .num {
      font-family: "ZCOOL XiaoWei", cursive;
      font-size: 26px; color: #B87D4B;
    }
    .inventory-qty .unit { font-size: 12px; color: #8C7D70; }
    .inventory-qty .warn .num { color: #A0522D; }
    .fab {
      position: fixed; bottom: 88px;
      left: 50%; transform: translateX(-50%);
      margin-left: 145px;
      width: 60px; height: 60px;
      background: #C67B5C; border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(198,123,92,0.36);
      color: #FFFFFF;
    }
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 390px; margin: 0 auto;
      height: 68px;
      background: rgba(255,253,249,0.94);
      backdrop-filter: blur(16px);
      border-top: 1px solid #EFE6DA;
      box-shadow: 0 -6px 24px rgba(99,72,54,0.08);
      display: flex; justify-content: space-around; align-items: center;
    }
    .tab-item { text-align: center; color: #9E9186; }
    .tab-item.active { color: #C67B5C; }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-label { font-size: 11px; font-weight: 600; margin-top: 4px; }
  </style>
</head>
<body data-page-id="inventory-page" data-tab-id="tab-inventory">
  <div class="page">
    <header class="header">
      <h1 class="header-title">材料库存</h1>
      <button class="header-action" data-ui-id="inventory-log-button" style="width:40px;height:40px;border-radius:50%;background:#FFFDF9;border:1px solid #F0E6DA;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round">
          <title>View Inventory Logs</title>
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </button>
    </header>

    <div class="alert-card" data-ui-id="inventory-low-stock-alert">
      <div class="alert-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <title>Low Stock Warning</title>
          <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="alert-content">
        <h4>库存预警</h4>
        <p>2 种材料低于安全库存，请及时补货</p>
      </div>
    </div>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">全部材料</h2>
        <button class="section-link">分类筛选</button>
      </div>
      <div data-ui-id="inventory-list">
        <div class="inventory-card" id="inventory-item-1">
          <div class="inventory-info">
            <h4>陶土（高白泥）</h4>
            <p>陶艺 · 安全库存 5kg</p>
          </div>
          <div class="inventory-qty">
            <div class="num">12.5</div>
            <div class="unit">kg</div>
          </div>
        </div>

        <div class="inventory-card" id="inventory-item-2">
          <div class="inventory-info">
            <h4>透明釉</h4>
            <p>陶艺 · 安全库存 200ml</p>
          </div>
          <div class="inventory-qty warn">
            <div class="num">80</div>
            <div class="unit">ml</div>
          </div>
        </div>

        <div class="inventory-card" id="inventory-item-3">
          <div class="inventory-info">
            <h4>棉线（植物染）</h4>
            <p>染织 · 安全库存 10 卷</p>
          </div>
          <div class="inventory-qty">
            <div class="num">24</div>
            <div class="unit">卷</div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <button class="fab" data-ui-id="inventory-add-button" aria-label="新增库存">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <title>Add Inventory Item</title>
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <nav class="tabbar">
    <button class="tab-item" data-ui-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Home Tab</title>
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <div class="tab-label">首页</div>
    </button>
    <button class="tab-item" data-ui-id="tab-members">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Members Tab</title>
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <div class="tab-label">会员</div>
    </button>
    <button class="tab-item" data-ui-id="tab-calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Course Calendar Tab</title>
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <div class="tab-label">课程</div>
    </button>
    <button class="tab-item" data-ui-id="tab-points">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Points Tab</title>
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <div class="tab-label">积分</div>
    </button>
    <button class="tab-item active" data-ui-id="tab-inventory">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Inventory Tab</title>
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
        <path d="m3.3 7 8.7 5 8.7-5"/>
        <path d="M12 22V12"/>
      </svg>
      <div class="tab-label">库存</div>
    </button>
  </nav>
</body>
</html>
