<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #FAF6F0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #5A4A3F;
    }
    body { max-width: 390px; margin: 0 auto; }
    .page { min-height: 100%; padding-bottom: 32px; }
    .header {
      padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 36px; height: 36px;
      background: #FFFDF9; border: 1px solid #F0E6DA;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .header-title {
      flex: 1;
      font-family: "ZCOOL XiaoWei", "STKaiti", cursive;
      font-size: 28px; color: #3D2B1F;
    }
    .form { padding: 0 20px; }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 14px; font-weight: 700; color: #3D2B1F;
      margin-bottom: 8px;
    }
    .form-desc {
      font-size: 12px; color: #8C7D70; margin-top: 6px;
    }
    .form-input {
      width: 100%;
      background: #F5EDE4;
      border: 1.5px solid transparent;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px; color: #3D2B1F;
      outline: none;
    }
    .form-input:focus {
      border-color: #C67B5C;
      background: #FAF6F0;
      box-shadow: 0 0 0 4px rgba(198,123,92,0.08);
    }
    .setting-card {
      background: #FFFDF9;
      border: 1px solid #F0E6DA;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(99,72,54,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    .setting-card h4 { font-size: 15px; font-weight: 700; color: #3D2B1F; }
    .setting-card p { font-size: 12px; color: #8C7D70; margin-top: 2px; }
    .submit-row {
      padding: 8px 20px 32px;
      display: flex; gap: 12px;
    }
    .btn-primary {
      flex: 1;
      background: #C67B5C; color: #FFFFFF;
      border: none; border-radius: 999px;
      padding: 15px 0; font-size: 15px; font-weight: 700;
      box-shadow: 0 4px 14px rgba(198,123,92,0.32);
    }
    .btn-secondary {
      flex: 1;
      background: transparent; color: #C67B5C;
      border: 1.5px solid #C67B5C; border-radius: 999px;
      padding: 14px 0; font-size: 15px; font-weight: 600;
    }
  </style>
</head>
<body data-page-id="settings-page">
  <div class="page">
    <header class="header">
      <button class="back-btn" aria-label="返回">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Go Back</title>
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <h1 class="header-title">设置</h1>
    </header>

    <form class="form">
      <div class="form-group">
        <label class="form-label" for="dormant-threshold">沉睡会员阈值（天）</label>
        <input id="dormant-threshold" class="form-input" data-ui-id="settings-dormant-threshold-input" type="number" value="60" />
        <p class="form-desc">超过此天数未到店的会员将被标记为沉睡。</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="points-ratio">积分兑换比例</label>
        <input id="points-ratio" class="form-input" data-ui-id="settings-points-ratio-input" type="number" value="1" />
        <p class="form-desc">每消费 1 元可获得 1 积分。</p>
      </div>

      <div class="form-group">
        <label class="form-label">数据管理</label>
        <div class="setting-card" data-ui-id="settings-backup-button">
          <div>
            <h4>备份数据</h4>
            <p>导出会员、课程、积分与库存记录</p>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8C7D70" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Backup App Data</title>
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </div>
        <div class="setting-card" data-ui-id="settings-restore-button">
          <div>
            <h4>恢复数据</h4>
            <p>从本地备份文件恢复</p>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8C7D70" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Restore App Data</title>
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </div>
      </div>
    </form>

    <div class="submit-row">
      <button type="submit" class="btn-primary">保存设置</button>
      <button type="button" class="btn-secondary">重置</button>
    </div>
  </div>
</body>
</html>
