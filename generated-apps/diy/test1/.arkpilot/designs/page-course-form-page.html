<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 课程表单</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #FAF6F0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #5A4A3F;
    }
    body { max-width: 390px; margin: 0 auto; }
    .page { min-height: 100%; padding-bottom: 32px; }
    .header {
      padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 36px; height: 36px;
      background: #FFFDF9; border: 1px solid #F0E6DA;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .header-title {
      flex: 1;
      font-family: "ZCOOL XiaoWei", "STKaiti", cursive;
      font-size: 28px; color: #3D2B1F;
    }
    .form { padding: 0 20px; }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 14px; font-weight: 700; color: #3D2B1F;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: #F5EDE4;
      border: 1.5px solid transparent;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px; color: #3D2B1F;
      outline: none;
    }
    .form-input:focus {
      border-color: #C67B5C;
      background: #FAF6F0;
      box-shadow: 0 0 0 4px rgba(198,123,92,0.08);
    }
    .form-input::placeholder { color: #9E9186; }
    .form-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .material-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .material-row .form-input { flex: 1; }
    .material-row .qty-input { max-width: 80px; }
    .add-link {
      font-size: 14px; font-weight: 600; color: #5A6F7C;
      background: transparent; border: none;
      padding: 8px 0;
    }
    .submit-row {
      padding: 8px 20px 32px;
    }
    .btn-primary {
      width: 100%;
      background: #C67B5C; color: #FFFFFF;
      border: none; border-radius: 999px;
      padding: 15px 0; font-size: 15px; font-weight: 700;
      box-shadow: 0 4px 14px rgba(198,123,92,0.32);
    }
  </style>
</head>
<body data-page-id="course-form-page">
  <div class="page">
    <header class="header">
      <button class="back-btn" aria-label="返回">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Go Back</title>
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <h1 class="header-title">编辑课程</h1>
    </header>

    <form class="form">
      <div class="form-group">
        <label class="form-label" for="course-title">课程名称</label>
        <input id="course-title" class="form-input" data-ui-id="course-form-title-input" type="text" value="手工陶艺杯" placeholder="如：手工陶艺杯" />
      </div>

      <div class="form-group">
        <label class="form-label" for="course-teacher">授课老师</label>
        <input id="course-teacher" class="form-input" data-ui-id="course-form-teacher-input" type="text" value="阿陶" placeholder="请输入老师姓名" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="course-time">时间</label>
          <input id="course-time" class="form-input" data-ui-id="course-form-time-picker" type="text" value="6月23日 14:00" placeholder="选择时间" />
        </div>
        <div class="form-group">
          <label class="form-label" for="course-capacity">容量</label>
          <input id="course-capacity" class="form-input" data-ui-id="course-form-capacity-input" type="number" value="6" placeholder="人数" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">关联材料</label>
        <div data-ui-id="course-form-material-selector">
          <div class="material-row">
            <input class="form-input" type="text" value="陶土（高白泥）" placeholder="材料名称" />
            <input class="form-input qty-input" type="text" value="500g" placeholder="用量" />
          </div>
          <div class="material-row">
            <input class="form-input" type="text" value="透明釉" placeholder="材料名称" />
            <input class="form-input qty-input" type="text" value="50ml" placeholder="用量" />
          </div>
        </div>
        <button type="button" class="add-link">+ 添加材料</button>
      </div>
    </form>

    <div class="submit-row">
      <button type="submit" class="btn-primary" data-ui-id="course-form-save-button">保存课程</button>
    </div>
  </div>
</body>
</html>
