<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 会员</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #FAF6F0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #5A4A3F;
    }
    body {
      max-width: 390px;
      margin: 0 auto;
      position: relative;
      background: #FAF6F0;
    }
    .page {
      min-height: 100%;
      padding-bottom: 88px;
    }
    .header {
      padding: 20px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-title {
      font-family: "ZCOOL XiaoWei", "STKaiti", cursive;
      font-size: 30px;
      color: #3D2B1F;
    }
    .search-bar {
      margin: 0 20px 16px;
      background: #F5EDE4;
      border: 1.5px solid transparent;
      border-radius: 16px;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .search-bar input {
      flex: 1; border: none; background: transparent;
      font-size: 15px; color: #3D2B1F; outline: none;
    }
    .search-bar input::placeholder { color: #9E9186; }
    .filter-row {
      display: flex; gap: 10px;
      padding: 0 20px 16px;
    }
    .filter-btn {
      background: #FFFDF9;
      border: 1px solid #F0E6DA;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 13px; font-weight: 600; color: #5A4A3F;
      display: flex; align-items: center; gap: 6px;
    }
    .section { padding: 0 20px; margin-bottom: 20px; }
    .section-title {
      font-size: 18px; font-weight: 700; color: #3D2B1F;
      margin-bottom: 12px;
    }
    .member-card {
      background: #FFFDF9;
      border: 1px solid #F0E6DA;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(99,72,54,0.06), 0 10px 28px rgba(99,72,54,0.06);
      display: flex; gap: 14px; align-items: center;
    }
    .member-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #F0E6DA, #E8DDD0);
      display: flex; align-items: center; justify-content: center;
      font-family: "ZCOOL XiaoWei", cursive;
      font-size: 22px; color: #8B5A45;
      flex-shrink: 0;
    }
    .member-info { flex: 1; }
    .member-info h4 { font-size: 16px; font-weight: 700; color: #3D2B1F; margin-bottom: 4px; }
    .member-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      background: #F5EDE4;
      color: #5A4A3F;
      font-size: 11px; font-weight: 600;
      padding: 4px 8px;
      border-radius: 999px;
    }
    .member-points {
      text-align: right;
    }
    .member-points .num {
      font-family: "ZCOOL XiaoWei", cursive;
      font-size: 26px; color: #B87D4B;
    }
    .member-points .label {
      font-size: 11px; color: #8C7D70;
    }
    .fab {
      position: fixed;
      bottom: 88px;
      left: 50%; transform: translateX(-50%);
      margin-left: 145px;
      width: 60px; height: 60px;
      background: #C67B5C;
      border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(198,123,92,0.36);
      color: #FFFFFF;
    }
    .empty-state {
      text-align: center; padding: 60px 20px;
    }
    .empty-icon { width: 96px; height: 96px; margin: 0 auto 16px; color: #D9CFC2; }
    .empty-title { font-size: 18px; font-weight: 700; color: #3D2B1F; margin-bottom: 6px; }
    .empty-sub { font-size: 14px; color: #8C7D70; margin-bottom: 20px; }
    .btn-outline {
      background: transparent; color: #C67B5C;
      border: 1.5px solid #C67B5C; border-radius: 999px;
      padding: 12px 22px; font-size: 14px; font-weight: 600;
    }
    .tabbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 390px;
      margin: 0 auto;
      height: 68px;
      background: rgba(255,253,249,0.94);
      backdrop-filter: blur(16px);
      border-top: 1px solid #EFE6DA;
      box-shadow: 0 -6px 24px rgba(99,72,54,0.08);
      display: flex; justify-content: space-around; align-items: center;
    }
    .tab-item { text-align: center; color: #9E9186; }
    .tab-item.active { color: #C67B5C; }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-label { font-size: 11px; font-weight: 600; margin-top: 4px; }
  </style>
</head>
<body data-page-id="members-page" data-tab-id="tab-members">
  <div class="page">
    <header class="header">
      <h1 class="header-title">工坊会员</h1>
      <button class="filter-btn" data-ui-id="members-filter-button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <title>Filter Members</title>
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
        筛选
      </button>
    </header>

    <div class="search-bar" data-ui-id="members-search-input">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9E9186" stroke-width="2" stroke-linecap="round">
        <title>Search Members</title>
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="搜索姓名、手机号或工艺标签" />
    </div>

    <section class="section">
      <h2 class="section-title">全部会员</h2>
      <div data-ui-id="members-list">
        <div class="member-card" id="members-item-1">
          <div class="member-avatar">林</div>
          <div class="member-info">
            <h4>林小雨</h4>
            <div class="member-tags">
              <span class="tag">陶艺</span>
              <span class="tag">编织</span>
            </div>
          </div>
          <div class="member-points">
            <div class="num">286</div>
            <div class="label">积分</div>
          </div>
        </div>

        <div class="member-card" id="members-item-2">
          <div class="member-avatar">陈</div>
          <div class="member-info">
            <h4>陈木心</h4>
            <div class="member-tags">
              <span class="tag">木工</span>
              <span class="tag">皮具</span>
            </div>
          </div>
          <div class="member-points">
            <div class="num">540</div>
            <div class="label">积分</div>
          </div>
        </div>

        <div class="member-card" id="members-item-3">
          <div class="member-avatar">苏</div>
          <div class="member-info">
            <h4>苏染</h4>
            <div class="member-tags">
              <span class="tag">染织</span>
            </div>
          </div>
          <div class="member-points">
            <div class="num">128</div>
            <div class="label">积分</div>
          </div>
        </div>
      </div>

      <div class="empty-state" id="members-empty-state" style="display:none">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <title>No Members Yet</title>
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
        </svg>
        <div class="empty-title">还没有会员</div>
        <div class="empty-sub">添加第一位会员，开始记录他们的手作印记。</div>
        <button class="btn-outline">新增会员</button>
      </div>
    </section>
  </div>

  <button class="fab" data-ui-id="members-add-button" aria-label="新增会员">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <title>Add New Member</title>
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <nav class="tabbar">
    <button class="tab-item" data-ui-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Home Tab</title>
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <div class="tab-label">首页</div>
    </button>
    <button class="tab-item active" data-ui-id="tab-members">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Members Tab</title>
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <div class="tab-label">会员</div>
    </button>
    <button class="tab-item" data-ui-id="tab-calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Course Calendar Tab</title>
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <div class="tab-label">课程</div>
    </button>
    <button class="tab-item" data-ui-id="tab-points">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Points Tab</title>
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <div class="tab-label">积分</div>
    </button>
    <button class="tab-item" data-ui-id="tab-inventory">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Inventory Tab</title>
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
        <path d="m3.3 7 8.7 5 8.7-5"/>
        <path d="M12 22V12"/>
      </svg>
      <div class="tab-label">库存</div>
    </button>
  </nav>
</body>
</html>
