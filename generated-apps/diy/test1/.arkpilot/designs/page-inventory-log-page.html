<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 库存记录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #FAF6F0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #5A4A3F;
    }
    body { max-width: 390px; margin: 0 auto; }
    .page { min-height: 100%; padding-bottom: 32px; }
    .header {
      padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 36px; height: 36px;
      background: #FFFDF9; border: 1px solid #F0E6DA;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .header-title {
      flex: 1;
      font-family: "ZCOOL XiaoWei", "STKaiti", cursive;
      font-size: 28px; color: #3D2B1F;
    }
    .filter-tabs {
      display: flex; gap: 8px;
      padding: 0 20px 16px;
    }
    .filter-tab {
      background: #F5EDE4;
      color: #5A4A3F;
      border: none; border-radius: 999px;
      padding: 8px 16px;
      font-size: 13px; font-weight: 600;
    }
    .filter-tab.active {
      background: #C67B5C; color: #FFFFFF;
    }
    .section { padding: 0 20px; }
    .section-title { font-size: 18px; font-weight: 700; color: #3D2B1F; margin-bottom: 12px; }
    .log-item {
      background: #FFFDF9;
      border: 1px solid #F0E6DA;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(99,72,54,0.04);
      display: flex; justify-content: space-between; align-items: center;
    }
    .log-left h4 { font-size: 15px; font-weight: 700; color: #3D2B1F; margin-bottom: 4px; }
    .log-left p { font-size: 12px; color: #8C7D70; }
    .log-qty {
      font-size: 15px; font-weight: 700;
    }
    .log-qty.in { color: #A8B5A0; }
    .log-qty.out { color: #A0522D; }
    .log-type {
      font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 999px;
      margin-left: 8px;
    }
    .log-type.auto { background: rgba(168,181,160,0.14); color: #6B7A62; }
  </style>
</head>
<body data-page-id="inventory-log-page">
  <div class="page">
    <header class="header">
      <button class="back-btn" aria-label="返回">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Go Back</title>
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <h1 class="header-title">库存记录</h1>
    </header>

    <div class="filter-tabs" data-ui-id="inventory-log-filter-type">
      <button class="filter-tab active">全部</button>
      <button class="filter-tab">入库</button>
      <button class="filter-tab">出库</button>
      <button class="filter-tab">自动扣减</button>
    </div>

    <section class="section">
      <h2 class="section-title">6 月记录</h2>
      <div data-ui-id="inventory-log-list">
        <div class="log-item" id="inventory-log-1">
          <div class="log-left">
            <h4>陶土（高白泥）</h4>
            <p>课程「手工陶艺杯」自动扣减 · 06-23 14:00</p>
          </div>
          <div style="display:flex;align-items:center;">
            <span class="log-type auto">自动</span>
            <span class="log-qty out">-1kg</span>
          </div>
        </div>

        <div class="log-item" id="inventory-log-2">
          <div class="log-left">
            <h4>透明釉</h4>
            <p>课程「手工陶艺杯」自动扣减 · 06-23 14:00</p>
          </div>
          <div style="display:flex;align-items:center;">
            <span class="log-type auto">自动</span>
            <span class="log-qty out">-100ml</span>
          </div>
        </div>

        <div class="log-item" id="inventory-log-3">
          <div class="log-left">
            <h4>陶土（高白泥）</h4>
            <p>采购入库 · 06-20 10:30</p>
          </div>
          <div style="display:flex;align-items:center;">
            <span class="log-type auto">入库</span>
            <span class="log-qty in">+10kg</span>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
