<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 积分</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #FAF6F0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #5A4A3F;
    }
    body { max-width: 390px; margin: 0 auto; }
    .page { min-height: 100%; padding-bottom: 88px; }
    .header {
      padding: 20px 20px 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-title {
      font-family: "ZCOOL XiaoWei", "STKaiti", cursive;
      font-size: 30px; color: #3D2B1F;
    }
    .header-action {
      width: 40px; height: 40px;
      background: #FFFDF9; border: 1px solid #F0E6DA;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .summary-card {
      margin: 0 20px 20px;
      background: linear-gradient(145deg, #FFFDF9 0%, #F8F1E9 55%, #F0E6DA 100%);
      border: 1px solid #EFE6DA;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 4px 12px rgba(99,72,54,0.06), 0 18px 44px rgba(99,72,54,0.10);
    }
    .summary-title {
      font-size: 14px; color: #8C7D70; margin-bottom: 4px;
    }
    .summary-num {
      font-family: "ZCOOL XiaoWei", cursive;
      font-size: 44px; color: #B87D4B; margin-bottom: 20px;
    }
    .summary-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .summary-item {
      background: rgba(255,255,255,0.5);
      border-radius: 16px;
      padding: 14px;
    }
    .summary-item .num {
      font-family: "ZCOOL XiaoWei", cursive;
      font-size: 28px; color: #3D2B1F;
    }
    .summary-item .label {
      font-size: 12px; color: #8C7D70; margin-top: 2px;
    }
    .action-row {
      display: flex; gap: 12px;
      padding: 0 20px 24px;
    }
    .btn-primary {
      flex: 1;
      background: #C67B5C; color: #FFFFFF;
      border: none; border-radius: 999px;
      padding: 14px 0; font-size: 15px; font-weight: 700;
      box-shadow: 0 4px 14px rgba(198,123,92,0.32);
    }
    .btn-secondary {
      flex: 1;
      background: transparent; color: #C67B5C;
      border: 1.5px solid #C67B5C; border-radius: 999px;
      padding: 13px 0; font-size: 15px; font-weight: 600;
    }
    .section { padding: 0 20px; }
    .section-title { font-size: 18px; font-weight: 700; color: #3D2B1F; margin-bottom: 12px; }
    .record-item {
      background: #FFFDF9;
      border: 1px solid #F0E6DA;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(99,72,54,0.04);
      display: flex; justify-content: space-between; align-items: center;
    }
    .record-left h4 { font-size: 15px; font-weight: 700; color: #3D2B1F; margin-bottom: 4px; }
    .record-left p { font-size: 12px; color: #8C7D70; }
    .record-points {
      font-size: 17px; font-weight: 700;
    }
    .record-points.earn { color: #A8B5A0; }
    .record-points.redeem { color: #A0522D; }
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 390px; margin: 0 auto;
      height: 68px;
      background: rgba(255,253,249,0.94);
      backdrop-filter: blur(16px);
      border-top: 1px solid #EFE6DA;
      box-shadow: 0 -6px 24px rgba(99,72,54,0.08);
      display: flex; justify-content: space-around; align-items: center;
    }
    .tab-item { text-align: center; color: #9E9186; }
    .tab-item.active { color: #C67B5C; }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-label { font-size: 11px; font-weight: 600; margin-top: 4px; }
  </style>
</head>
<body data-page-id="points-page" data-tab-id="tab-points">
  <div class="page">
    <header class="header">
      <h1 class="header-title">积分中心</h1>
      <button class="header-action" data-ui-id="points-rule-setting-button" aria-label="积分规则">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C67B5C" stroke-width="2" stroke-linecap="round">
          <title>Open Points Rule Settings</title>
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
        </svg>
      </button>
    </header>

    <div class="summary-card">
      <div class="summary-title">会员总剩余积分</div>
      <div class="summary-num">4,280</div>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="num" data-ui-id="points-total-issued">8,650</div>
          <div class="label">累计发放</div>
        </div>
        <div class="summary-item">
          <div class="num" data-ui-id="points-total-redeemed">4,370</div>
          <div class="label">累计兑换</div>
        </div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-primary" data-ui-id="points-redeem-button">积分兑换</button>
      <button class="btn-secondary" data-ui-id="points-rule-setting-button">兑换规则</button>
    </div>

    <section class="section">
      <h2 class="section-title">积分流水</h2>
      <div data-ui-id="points-record-list">
        <div class="record-item" id="points-record-1">
          <div class="record-left">
            <h4>签到奖励</h4>
            <p>林小雨 · 2026-06-20 14:32</p>
          </div>
          <div class="record-points earn">+10</div>
        </div>
        <div class="record-item" id="points-record-2">
          <div class="record-left">
            <h4>消费积分</h4>
            <p>陈木心 · 2026-06-19 16:10</p>
          </div>
          <div class="record-points earn">+128</div>
        </div>
        <div class="record-item" id="points-record-3">
          <div class="record-left">
            <h4>兑换课程</h4>
            <p>苏染 · 2026-06-18 11:05</p>
          </div>
          <div class="record-points redeem">-200</div>
        </div>
      </div>
    </section>
  </div>

  <nav class="tabbar">
    <button class="tab-item" data-ui-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Home Tab</title>
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <div class="tab-label">首页</div>
    </button>
    <button class="tab-item" data-ui-id="tab-members">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Members Tab</title>
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <div class="tab-label">会员</div>
    </button>
    <button class="tab-item" data-ui-id="tab-calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Course Calendar Tab</title>
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <div class="tab-label">课程</div>
    </button>
    <button class="tab-item active" data-ui-id="tab-points">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Points Tab</title>
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <div class="tab-label">积分</div>
    </button>
    <button class="tab-item" data-ui-id="tab-inventory">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <title>Inventory Tab</title>
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
        <path d="m3.3 7 8.7 5 8.7-5"/>
        <path d="M12 22V12"/>
      </svg>
      <div class="tab-label">库存</div>
    </button>
  </nav>
</body>
</html>
