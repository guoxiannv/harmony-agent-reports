<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 会员详情</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #FAF6F0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #5A4A3F;
    }
    body { max-width: 390px; margin: 0 auto; }
    .page { min-height: 100%; padding-bottom: 32px; }
    .header {
      padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 36px; height: 36px;
      background: #FFFDF9; border: 1px solid #F0E6DA;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .header-title {
      flex: 1;
      font-family: "ZCOOL XiaoWei", "STKaiti", cursive;
      font-size: 28px; color: #3D2B1F;
    }
    .header-action {
      font-size: 14px; font-weight: 600; color: #5A6F7C;
      background: transparent; border: none;
    }
    .profile-card {
      margin: 0 20px 20px;
      background: linear-gradient(145deg, #FFFDF9 0%, #F8F1E9 55%, #F0E6DA 100%);
      border: 1px solid #EFE6DA;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 4px 12px rgba(99,72,54,0.06), 0 18px 44px rgba(99,72,54,0.10);
      text-align: center;
    }
    .profile-avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #F0E6DA, #E8DDD0);
      margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center;
      font-family: "ZCOOL XiaoWei", cursive;
      font-size: 38px; color: #8B5A45;
    }
    .profile-name {
      font-family: "ZCOOL XiaoWei", cursive;
      font-size: 28px; color: #3D2B1F;
      margin-bottom: 6px;
    }
    .profile-phone {
      font-size: 14px; color: #8C7D70;
      margin-bottom: 14px;
    }
    .craft-tags {
      display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .craft-tag {
      background: rgba(198,123,92,0.12);
      color: #C67B5C;
      font-size: 13px; font-weight: 600;
      padding: 6px 14px;
      border-radius: 999px;
    }
    .points-row {
      display: flex; justify-content: center; gap: 32px;
    }
    .points-item .num {
      font-family: "ZCOOL XiaoWei", cursive;
      font-size: 34px; color: #B87D4B;
    }
    .points-item .label {
      font-size: 12px; color: #8C7D70; margin-top: 2px;
    }
    .action-row {
      display: flex; gap: 12px;
      padding: 0 20px 24px;
    }
    .btn-primary {
      flex: 1;
      background: #C67B5C; color: #FFFFFF;
      border: none; border-radius: 999px;
      padding: 14px 0; font-size: 15px; font-weight: 700;
      box-shadow: 0 4px 14px rgba(198,123,92,0.32);
    }
    .btn-secondary {
      flex: 1;
      background: transparent; color: #C67B5C;
      border: 1.5px solid #C67B5C; border-radius: 999px;
      padding: 13px 0; font-size: 15px; font-weight: 600;
    }
    .section { padding: 0 20px 24px; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .section-title { font-size: 18px; font-weight: 700; color: #3D2B1F; }
    .section-link { font-size: 13px; font-weight: 600; color: #5A6F7C; }
    .works-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .work-thumb {
      aspect-ratio: 1/1;
      background: #F5EDE4;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      color: #D9CFC2;
      overflow: hidden;
    }
    .info-list {
      background: #FFFDF9;
      border: 1px solid #F0E6DA;
      border-radius: 18px;
      padding: 8px 18px;
      box-shadow: 0 2px 8px rgba(99,72,54,0.06);
    }
    .info-row {
      display: flex; justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #EFE6DA;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 14px; color: #8C7D70; }
    .info-value { font-size: 14px; font-weight: 600; color: #3D2B1F; }
  </style>
</head>
<body data-page-id="member-detail-page">
  <div class="page">
    <header class="header">
      <button class="back-btn" aria-label="返回">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Go Back</title>
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <h1 class="header-title">会员详情</h1>
      <button class="header-action" data-ui-id="member-detail-edit-button">编辑</button>
    </header>

    <div class="profile-card">
      <div class="profile-avatar">林</div>
      <div class="profile-name">林小雨</div>
      <div class="profile-phone">138 **** 6688</div>
      <div class="craft-tags" data-ui-id="member-detail-crafts-tags">
        <span class="craft-tag">陶艺</span>
        <span class="craft-tag">编织</span>
        <span class="craft-tag">植物染</span>
      </div>
      <div class="points-row" data-ui-id="member-detail-points-balance">
        <div class="points-item">
          <div class="num">286</div>
          <div class="label">当前积分</div>
        </div>
        <div class="points-item">
          <div class="num">12</div>
          <div class="label">累计课程</div>
        </div>
        <div class="points-item">
          <div class="num">7</div>
          <div class="label">作品数</div>
        </div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-primary" data-ui-id="member-detail-checkin-button">签到</button>
      <button class="btn-secondary" data-ui-id="member-detail-points-history-button">积分流水</button>
    </div>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">作品图</h2>
        <button class="section-link">查看全部</button>
      </div>
      <div class="works-grid" data-ui-id="member-detail-works-grid">
        <div class="work-thumb" id="member-work-1">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <title>Artwork Thumbnail Placeholder</title>
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15 16 10 5 21"/>
          </svg>
        </div>
        <div class="work-thumb" id="member-work-2">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <title>Artwork Thumbnail Placeholder</title>
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15 16 10 5 21"/>
          </svg>
        </div>
        <div class="work-thumb" id="member-work-3">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <title>Artwork Thumbnail Placeholder</title>
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15 16 10 5 21"/>
          </svg>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">更多信息</h2>
        <button class="section-link" data-ui-id="member-detail-bookings-button">预约记录</button>
      </div>
      <div class="info-list">
        <div class="info-row">
          <span class="info-label">加入时间</span>
          <span class="info-value">2025-08-12</span>
        </div>
        <div class="info-row">
          <span class="info-label">最后到店</span>
          <span class="info-value">2026-06-15</span>
        </div>
        <div class="info-row">
          <span class="info-label">备注</span>
          <span class="info-value">喜欢釉下彩，偏好下午时段</span>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
