<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 — 编辑档案</title>
<style>
:root {
  --bg: #FAF6F1;
  --card: #EDE6DC;
  --card-light: #FAF6F1;
  --text: #3A2E29;
  --text-secondary: #6B5A4F;
  --text-tertiary: #A89A8E;
  --clay: #A65D48;
  --fire: #E57A39;
  --green: #4D8A72;
  --yellow: #C99E3A;
  --red: #B84A3D;
  --sand: #EBDBC2;
  --border: #DCC8B0;
  --shadow: rgba(111, 69, 59, 0.10);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", sans-serif; }
body { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px; }
.page { padding: 20px; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card-light); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; color: var(--clay); }
.page-title { font-family: "Ma Shan Zheng", cursive; font-size: 30px; color: var(--clay); flex: 1; }
.save-btn { background: var(--fire); color: #FFFBF6; border: none; padding: 10px 20px; border-radius: 999px; font-size: 14px; font-weight: 600; box-shadow: 0 4px 12px rgba(229,122,57,0.28); }
.section-title { font-family: "Ma Shan Zheng", cursive; font-size: 22px; color: var(--clay); margin: 24px 0 12px; }
.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
.input { width: 100%; border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; font-size: 15px; background: var(--card-light); color: var(--text); }
.input:focus { outline: none; border-color: var(--clay); box-shadow: 0 0 0 3px rgba(166,93,72,0.12); }
.add-row { display: flex; gap: 10px; }
.add-row .input { flex: 1; }
.add-row .add-btn { width: 48px; height: 48px; border-radius: 14px; border: none; background: var(--clay); color: #FFFBF6; display: inline-flex; align-items: center; justify-content: center; }
.tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.tag { background: var(--sand); color: var(--clay); border: 1px dashed var(--yellow); border-radius: 999px; padding: 6px 12px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
.tag .remove { width: 16px; height: 16px; border-radius: 50%; background: rgba(184,74,61,0.12); color: var(--red); display: inline-flex; align-items: center; justify-content: center; }
.gallery-edit { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.work { aspect-ratio: 1; border-radius: 16px; background: var(--card); display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); overflow: hidden; position: relative; }
.work.add { border: 2px dashed var(--border); background: var(--card-light); }
.work svg { width: 28px; height: 28px; }
.work .remove { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%; background: var(--red); color: #fff; display: inline-flex; align-items: center; justify-content: center; }
.fab { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); max-width: 420px; width: calc(100% - 40px); }
.fab .save-btn { width: 100%; padding: 16px; font-size: 16px; }
</style>
</head>
<body data-page-id="profile-edit-page">
<div class="page">
  <div class="header">
    <button class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回</title><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="page-title">编辑档案</div>
  </div>

  <div class="section-title">基本信息</div>
  <div class="input-group">
    <label for="profile-edit-name-input">昵称</label>
    <input id="profile-edit-name-input" class="input" data-ui-id="profile-edit-name-input" type="text" value="林小陶" placeholder="输入你的昵称" />
  </div>

  <div class="section-title">擅长工艺</div>
  <div class="add-row">
    <input class="input" data-ui-id="profile-edit-craft-input" type="text" placeholder="例如：拉坯、釉下彩" />
    <button class="add-btn" data-ui-id="profile-edit-add-work" aria-label="添加工艺">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>添加工艺标签</title><path d="M5 12h14"/><path d="M12 5v14"/></svg>
    </button>
  </div>
  <div class="tags" data-ui-id="profile-edit-craft-list">
    <span class="tag" data-ui-id-item="profile-edit-craft-1">拉坯<button class="remove" data-ui-id="profile-edit-craft-1-remove" aria-label="删除拉坯标签">×</button></span>
    <span class="tag" data-ui-id-item="profile-edit-craft-2">釉下彩<button class="remove" data-ui-id="profile-edit-craft-2-remove" aria-label="删除釉下彩标签">×</button></span>
    <span class="tag" data-ui-id-item="profile-edit-craft-3">手捏器<button class="remove" data-ui-id="profile-edit-craft-3-remove" aria-label="删除手捏器标签">×</button></span>
    <span class="tag" data-ui-id-item="profile-edit-craft-4">皮具手缝<button class="remove" data-ui-id="profile-edit-craft-4-remove" aria-label="删除皮具手缝标签">×</button></span>
  </div>

  <div class="section-title">作品图集</div>
  <div class="gallery-edit" data-ui-id="profile-edit-work-list">
    <div class="work" data-ui-id-item="profile-edit-work-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><title>作品图1</title><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
      <button class="remove" data-ui-id="profile-edit-work-1-remove" aria-label="删除作品图1">×</button>
    </div>
    <div class="work" data-ui-id-item="profile-edit-work-2">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><title>作品图2</title><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
      <button class="remove" data-ui-id="profile-edit-work-2-remove" aria-label="删除作品图2">×</button>
    </div>
    <div class="work add" data-ui-id="profile-edit-add-work">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>上传新作品图</title><path d="M5 12h14"/><path d="M12 5v14"/></svg>
    </div>
  </div>

  <div class="fab">
    <button class="save-btn" data-ui-id="profile-edit-save">保存修改</button>
  </div>
</div>
</body>
</html>
