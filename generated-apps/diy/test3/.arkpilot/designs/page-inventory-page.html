<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 — 库存管理</title>
<style>
:root {
  --bg: #FAF6F1;
  --card: #EDE6DC;
  --card-light: #FAF6F1;
  --text: #3A2E29;
  --text-secondary: #6B5A4F;
  --text-tertiary: #A89A8E;
  --clay: #A65D48;
  --fire: #E57A39;
  --green: #4D8A72;
  --yellow: #C99E3A;
  --red: #B84A3D;
  --sand: #EBDBC2;
  --border: #DCC8B0;
  --shadow: rgba(111, 69, 59, 0.10);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", sans-serif; }
body { max-width: 420px; margin: 0 auto; min-height: 100vh; }
.page { padding: 20px; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card-light); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; color: var(--clay); }
.page-title { font-family: "Ma Shan Zheng", cursive; font-size: 30px; color: var(--clay); flex: 1; }
.alert { background: #F4E4E2; color: var(--red); border-radius: 16px; padding: 14px 16px; font-size: 13px; display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.alert svg { width: 20px; height: 20px; flex-shrink: 0; }
.section-title { font-family: "Ma Shan Zheng", cursive; font-size: 22px; color: var(--clay); margin: 24px 0 12px; }
.item-card { background: var(--card-light); border-radius: 20px; padding: 16px; box-shadow: 0 8px 24px var(--shadow); margin-bottom: 12px; }
.item-card .row { display: flex; align-items: center; gap: 12px; }
.item-card .icon { width: 44px; height: 44px; border-radius: 12px; background: var(--sand); color: var(--clay); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.item-card .body { flex: 1; }
.item-card .name { font-size: 16px; font-weight: 600; }
.item-card .meta { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.item-card .qty { font-size: 22px; font-weight: 700; color: var(--clay); }
.item-card .qty.warn { color: var(--red); }
.item-card .actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); }
.item-card .actions button { flex: 1; padding: 10px; border-radius: 999px; border: none; font-size: 13px; font-weight: 600; }
.item-card .actions .restock { background: var(--green); color: #FFFBF6; }
.item-card .actions .link { background: var(--card); color: var(--clay); border: 1px solid var(--border); }
.empty-state { text-align: center; padding: 50px 20px; color: var(--text-tertiary); }
.empty-state svg { width: 64px; height: 64px; color: var(--border); margin-bottom: 12px; }
</style>
</head>
<body data-page-id="inventory-page">
<div class="page">
  <div class="header">
    <button class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回</title><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="page-title">库存管理</div>
  </div>

  <div class="alert" id="inventory-low-stock-alert" data-ui-id="inventory-low-stock-alert">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>库存预警</title><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
    有 1 项耗材库存不足，已影响课程预约
  </div>

  <div class="section-title">耗材库存</div>
  <div data-ui-id="inventory-list">
    <div class="item-card" data-ui-id-item="inventory-item-1">
      <div class="row">
        <div class="icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>库存物品图标</title><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/></svg>
        </div>
        <div class="body">
          <div class="name">陶泥（高白泥）</div>
          <div class="meta">每课消耗 500g · 关联课程：拉坯入门</div>
        </div>
        <div class="qty" data-ui-id="inventory-item-1-quantity">32</div>
      </div>
      <div class="actions">
        <button class="restock" data-ui-id="inventory-item-1-restock">补货</button>
        <button class="link" data-ui-id="inventory-item-1-link-class">关联课程</button>
      </div>
    </div>

    <div class="item-card" data-ui-id-item="inventory-item-2">
      <div class="row">
        <div class="icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>库存物品图标</title><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/></svg>
        </div>
        <div class="body">
          <div class="name">釉下彩颜料套装</div>
          <div class="meta">每课消耗 1 套 · 关联课程：釉下彩绘制</div>
        </div>
        <div class="qty warn" data-ui-id="inventory-item-2-quantity">2</div>
      </div>
      <div class="actions">
        <button class="restock" data-ui-id="inventory-item-2-restock">补货</button>
        <button class="link" data-ui-id="inventory-item-2-link-class">关联课程</button>
      </div>
    </div>

    <div class="item-card" data-ui-id-item="inventory-item-3">
      <div class="row">
        <div class="icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>库存物品图标</title><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/></svg>
        </div>
        <div class="body">
          <div class="name">植鞣革皮料</div>
          <div class="meta">每课消耗 1 张 · 关联课程：皮具手缝基础</div>
        </div>
        <div class="qty" data-ui-id="inventory-item-3-quantity">18</div>
      </div>
      <div class="actions">
        <button class="restock" data-ui-id="inventory-item-3-restock">补货</button>
        <button class="link" data-ui-id="inventory-item-3-link-class">关联课程</button>
      </div>
    </div>
  </div>

  <div class="empty-state" id="inventory-empty-state" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><title>暂无库存</title><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/></svg>
    <div>还没有库存数据，添加第一件耗材吧</div>
  </div>
</div>
</body>
</html>
