<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 — 课程详情</title>
<style>
:root {
  --bg: #FAF6F1;
  --card: #EDE6DC;
  --card-light: #FAF6F1;
  --text: #3A2E29;
  --text-secondary: #6B5A4F;
  --text-tertiary: #A89A8E;
  --clay: #A65D48;
  --fire: #E57A39;
  --green: #4D8A72;
  --yellow: #C99E3A;
  --red: #B84A3D;
  --sand: #EBDBC2;
  --border: #DCC8B0;
  --shadow: rgba(111, 69, 59, 0.10);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", sans-serif; }
body { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px; }
.page { padding: 20px; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card-light); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; color: var(--clay); }
.page-title { font-family: "Ma Shan Zheng", cursive; font-size: 30px; color: var(--clay); flex: 1; }
.hero { background: linear-gradient(135deg, var(--clay) 0%, #C06B50 100%); border-radius: 24px; padding: 24px; color: #FFFBF6; box-shadow: 0 10px 28px rgba(166,93,72,0.28); margin-bottom: 20px; }
.hero .tag { display: inline-block; background: rgba(255,255,255,0.18); padding: 4px 12px; border-radius: 999px; font-size: 12px; margin-bottom: 10px; }
.hero .title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
.hero .meta { font-size: 14px; opacity: 0.9; }
.info-card { background: var(--card-light); border-radius: 22px; padding: 18px; box-shadow: 0 8px 24px var(--shadow); margin-bottom: 16px; }
.info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(111,69,59,0.08); }
.info-row:last-child { border-bottom: none; }
.info-row .label { color: var(--text-secondary); font-size: 14px; }
.info-row .value { font-weight: 600; font-size: 14px; }
.section-title { font-family: "Ma Shan Zheng", cursive; font-size: 22px; color: var(--clay); margin: 24px 0 12px; }
.material-list { display: flex; flex-direction: column; gap: 10px; }
.material-item { display: flex; align-items: center; gap: 12px; background: var(--card-light); border-radius: 16px; padding: 14px; border: 1px solid var(--border); }
.material-item .icon { width: 36px; height: 36px; border-radius: 10px; background: var(--sand); color: var(--clay); display: inline-flex; align-items: center; justify-content: center; }
.material-item .body { flex: 1; }
.material-item .name { font-size: 15px; font-weight: 600; }
.material-item .qty { font-size: 12px; color: var(--text-tertiary); }
.material-item .status { font-size: 12px; font-weight: 600; color: var(--green); }
.material-item .status.warn { color: var(--red); }
.alert { background: #F4E4E2; color: var(--red); border-radius: 14px; padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.alert svg { width: 18px; height: 18px; flex-shrink: 0; }
.fab { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); max-width: 420px; width: calc(100% - 40px); display: flex; gap: 12px; }
.fab .btn { flex: 1; padding: 16px; border-radius: 999px; border: none; font-size: 16px; font-weight: 600; }
.fab .btn-primary { background: var(--fire); color: #FFFBF6; box-shadow: 0 4px 14px rgba(229,122,57,0.32); }
.fab .btn-secondary { background: var(--card); color: var(--clay); border: 1px solid var(--border); }
.fab .btn:disabled { background: var(--card); color: var(--text-tertiary); box-shadow: none; }
.empty-state { text-align: center; padding: 30px 20px; color: var(--text-tertiary); }
.empty-state svg { width: 48px; height: 48px; color: var(--border); margin-bottom: 10px; }
</style>
</head>
<body data-page-id="class-detail-page">
<div class="page">
  <div class="header">
    <button class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回</title><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="page-title">课程详情</div>
  </div>

  <div class="hero">
    <div class="tag">进阶课程</div>
    <div class="title" data-ui-id="class-detail-title">釉下彩绘制</div>
    <div class="meta">
      <span data-ui-id="class-detail-date">6月10日 14:00–16:00</span> ·
      名额 <span data-ui-id="class-detail-capacity">1/6</span>
    </div>
  </div>

  <div class="alert" id="class-detail-stock-alert" data-ui-id="class-detail-stock-alert">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>库存预警提示</title><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
    部分耗材库存不足，当前名额不可再约
  </div>

  <div class="info-card">
    <div class="info-row">
      <span class="label">课程时长</span>
      <span class="value">120 分钟</span>
    </div>
    <div class="info-row">
      <span class="label">适合人群</span>
      <span class="value">有拉坯基础者</span>
    </div>
    <div class="info-row">
      <span class="label">消耗积分</span>
      <span class="value">免费（预约后扣减名额）</span>
    </div>
  </div>

  <div class="section-title">课程耗材</div>
  <div class="material-list" data-ui-id="class-detail-materials">
    <div class="material-item" data-ui-id-item="class-material-1">
      <div class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>耗材图标</title><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/></svg>
      </div>
      <div class="body">
        <div class="name">陶坯素胎</div>
        <div class="qty">每课消耗 1 个</div>
      </div>
      <div class="status">库存充足</div>
    </div>
    <div class="material-item" data-ui-id-item="class-material-2">
      <div class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>耗材图标</title><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/></svg>
      </div>
      <div class="body">
        <div class="name">釉下彩颜料套装</div>
        <div class="qty">每课消耗 1 套</div>
      </div>
      <div class="status warn">库存不足</div>
    </div>
  </div>
  <div class="empty-state" id="class-materials-empty" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><title>暂无耗材</title><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/></svg>
    <div>暂无耗材数据</div>
  </div>

  <div class="fab">
    <button class="btn btn-secondary" data-ui-id="class-detail-cancel">取消预约</button>
    <button class="btn btn-primary" disabled data-ui-id="class-detail-book">已约满</button>
  </div>
</div>
</body>
</html>
