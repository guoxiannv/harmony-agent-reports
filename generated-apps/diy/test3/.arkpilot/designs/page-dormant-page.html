<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 — 沉睡会员提醒</title>
<style>
:root {
  --bg: #FAF6F1;
  --card: #EDE6DC;
  --card-light: #FAF6F1;
  --text: #3A2E29;
  --text-secondary: #6B5A4F;
  --text-tertiary: #A89A8E;
  --clay: #A65D48;
  --fire: #E57A39;
  --green: #4D8A72;
  --yellow: #C99E3A;
  --red: #B84A3D;
  --sand: #EBDBC2;
  --border: #DCC8B0;
  --shadow: rgba(111, 69, 59, 0.10);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", sans-serif; }
body { max-width: 420px; margin: 0 auto; min-height: 100vh; }
.page { padding: 20px; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card-light); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; color: var(--clay); }
.page-title { font-family: "Ma Shan Zheng", cursive; font-size: 30px; color: var(--clay); flex: 1; }
.summary-card { background: linear-gradient(135deg, var(--yellow) 0%, #D4A843 100%); border-radius: 24px; padding: 24px; color: #FFFBF6; box-shadow: 0 10px 28px rgba(201,158,58,0.28); margin-bottom: 20px; }
.summary-card .label { font-size: 14px; opacity: 0.92; }
.summary-card .value { font-size: 42px; font-weight: 700; margin-top: 4px; }
.setting-row { display: flex; align-items: center; justify-content: space-between; background: var(--card-light); border-radius: 16px; padding: 14px 16px; margin-bottom: 16px; border: 1px solid var(--border); }
.setting-row label { font-size: 14px; color: var(--text-secondary); }
.setting-row input { width: 60px; border: 1px solid var(--border); border-radius: 10px; padding: 6px 8px; text-align: center; font-size: 14px; background: var(--bg); }
.section-title { font-family: "Ma Shan Zheng", cursive; font-size: 22px; color: var(--clay); margin: 24px 0 12px; }
.member-card { background: var(--card-light); border-radius: 20px; padding: 16px; box-shadow: 0 8px 24px var(--shadow); margin-bottom: 12px; }
.member-card .row { display: flex; align-items: center; gap: 12px; }
.member-card .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--sand); display: flex; align-items: center; justify-content: center; color: var(--clay); flex-shrink: 0; }
.member-card .body { flex: 1; }
.member-card .name { font-size: 16px; font-weight: 600; }
.member-card .last { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.member-card .wake-btn { background: var(--green); color: #FFFBF6; border: none; padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; }
.member-card .note { font-size: 12px; color: var(--text-secondary); margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
.empty-state { text-align: center; padding: 50px 20px; color: var(--text-tertiary); }
.empty-state svg { width: 64px; height: 64px; color: var(--border); margin-bottom: 12px; }
</style>
</head>
<body data-page-id="dormant-page">
<div class="page">
  <div class="header">
    <button class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回</title><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="page-title">沉睡会员</div>
  </div>

  <div class="summary-card">
    <div class="label">待唤醒会员</div>
    <div class="value" data-ui-id="dormant-count">3</div>
  </div>

  <div class="setting-row">
    <label>超过 <input data-ui-id="dormant-threshold-input" type="number" value="30" /> 天未活跃即视为沉睡</label>
  </div>

  <div class="section-title">提醒列表</div>
  <div data-ui-id="dormant-list">
    <div class="member-card" data-ui-id-item="dormant-member-1">
      <div class="row">
        <div class="avatar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>会员头像</title><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="body">
          <div class="name">陈木作</div>
          <div class="last" data-ui-id="dormant-member-1-last-active">最后活跃：45 天前</div>
        </div>
        <button class="wake-btn" data-ui-id="dormant-member-1-wake">唤醒</button>
      </div>
      <div class="note">建议发送「木作体验券」唤醒</div>
    </div>

    <div class="member-card" data-ui-id-item="dormant-member-2">
      <div class="row">
        <div class="avatar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>会员头像</title><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="body">
          <div class="name">王釉子</div>
          <div class="last" data-ui-id="dormant-member-2-last-active">最后活跃：38 天前</div>
        </div>
        <button class="wake-btn" data-ui-id="dormant-member-2-wake">唤醒</button>
      </div>
      <div class="note">擅长釉下彩，可推荐新课程</div>
    </div>

    <div class="member-card" data-ui-id-item="dormant-member-3">
      <div class="row">
        <div class="avatar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>会员头像</title><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="body">
          <div class="name">李皮匠</div>
          <div class="last" data-ui-id="dormant-member-3-last-active">最后活跃：32 天前</div>
        </div>
        <button class="wake-btn" data-ui-id="dormant-member-3-wake">唤醒</button>
      </div>
      <div class="note">积分余额较高，可推送积分兑换提醒</div>
    </div>
  </div>

  <div class="empty-state" id="dormant-empty-state" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><title>暂无沉睡会员</title><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg>
    <div>暂无沉睡会员，继续保持温度吧～</div>
  </div>
</div>
</body>
</html>
