<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 — 会员档案</title>
<style>
:root {
  --bg: #FAF6F1;
  --card: #EDE6DC;
  --card-light: #FAF6F1;
  --text: #3A2E29;
  --text-secondary: #6B5A4F;
  --text-tertiary: #A89A8E;
  --clay: #A65D48;
  --fire: #E57A39;
  --green: #4D8A72;
  --yellow: #C99E3A;
  --sand: #EBDBC2;
  --border: #DCC8B0;
  --shadow: rgba(111, 69, 59, 0.10);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", sans-serif; }
body { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 92px; }
.page { padding: 20px; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card-light); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; color: var(--clay); }
.page-title { font-family: "Ma Shan Zheng", cursive; font-size: 30px; color: var(--clay); flex: 1; }
.icon-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card-light); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; color: var(--clay); }
.profile-card { background: var(--card-light); border-radius: 24px; padding: 24px; box-shadow: 0 8px 24px var(--shadow); text-align: center; margin-bottom: 20px; }
.avatar { width: 90px; height: 90px; border-radius: 50%; background: var(--sand); border: 3px solid var(--border); margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; color: var(--clay); overflow: hidden; }
.avatar svg { width: 44px; height: 44px; }
.profile-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.profile-level { display: inline-block; font-size: 12px; color: var(--fire); background: #FCE8D9; padding: 4px 12px; border-radius: 999px; font-weight: 600; }
.section-title { font-family: "Ma Shan Zheng", cursive; font-size: 24px; color: var(--clay); margin: 24px 0 14px; display: flex; align-items: center; justify-content: space-between; }
.section-title button { font-family: inherit; font-size: 13px; color: var(--clay); background: transparent; border: none; display: inline-flex; align-items: center; gap: 4px; }
.tags { display: flex; flex-wrap: wrap; gap: 8px; }
.tag { background: var(--sand); color: var(--clay); border: 1px dashed var(--yellow); border-radius: 999px; padding: 6px 14px; font-size: 13px; }
.gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.work { aspect-ratio: 1; border-radius: 16px; background: var(--card); display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); overflow: hidden; position: relative; }
.work.add { border: 2px dashed var(--border); background: var(--card-light); }
.work svg { width: 28px; height: 28px; }
.work .note { position: absolute; bottom: 6px; font-size: 11px; }
.menu-card { background: var(--card-light); border-radius: 22px; padding: 4px 18px; box-shadow: 0 8px 24px var(--shadow); margin-top: 20px; }
.menu-item { display: flex; align-items: center; gap: 12px; padding: 16px 0; border-bottom: 1px solid rgba(111,69,59,0.08); }
.menu-item:last-child { border-bottom: none; }
.menu-item .icon { width: 36px; height: 36px; border-radius: 10px; background: var(--sand); color: var(--clay); display: inline-flex; align-items: center; justify-content: center; }
.menu-item .text { flex: 1; font-size: 15px; font-weight: 600; }
.menu-item .arrow { color: var(--text-tertiary); }
.empty-state { text-align: center; padding: 30px 20px; color: var(--text-tertiary); }
.empty-state svg { width: 48px; height: 48px; color: var(--border); margin-bottom: 10px; }
.tabbar { position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto; max-width: 420px; height: 76px; background: rgba(250,246,241,0.92); backdrop-filter: blur(18px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
.tab { flex: 1; text-align: center; color: var(--text-tertiary); font-size: 11px; padding-top: 8px; }
.tab.active { color: var(--clay); }
.tab svg { width: 24px; height: 24px; margin-bottom: 4px; }
</style>
</head>
<body data-page-id="profile-page" data-tab-id="tab-profile">
<div class="page">
  <div class="header">
    <button class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回</title><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="page-title">会员档案</div>
    <button class="icon-btn" data-ui-id="profile-edit-button" aria-label="编辑档案">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>编辑会员档案</title><path d="M13 21h8"/><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>
    </button>
  </div>

  <div class="profile-card">
    <div class="avatar" data-ui-id="profile-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><title>会员头像</title><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
    <div class="profile-name" data-ui-id="profile-name">林小陶</div>
    <div class="profile-level" data-ui-id="profile-level">陶艺学徒 Lv.3</div>
  </div>

  <div class="section-title">
    <span>擅长工艺</span>
  </div>
  <div class="tags" data-ui-id="profile-craft-tags">
    <span class="tag" data-ui-id-item="profile-craft-1">拉坯</span>
    <span class="tag" data-ui-id-item="profile-craft-2">釉下彩</span>
    <span class="tag" data-ui-id-item="profile-craft-3">手捏器</span>
    <span class="tag" data-ui-id-item="profile-craft-4">皮具手缝</span>
  </div>
  <div class="empty-state" id="profile-crafts-empty" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><title>暂无工艺标签</title><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
    <div>还没有添加擅长工艺</div>
  </div>

  <div class="section-title">
    <span>作品图集</span>
  </div>
  <div class="gallery" data-ui-id="profile-gallery">
    <div class="work" data-ui-id-item="profile-work-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><title>作品图1</title><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
      <div class="note">茶杯</div>
    </div>
    <div class="work" data-ui-id-item="profile-work-2">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><title>作品图2</title><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
      <div class="note">花器</div>
    </div>
    <div class="work add" data-ui-id="profile-edit-add-work">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>添加作品图</title><path d="M5 12h14"/><path d="M12 5v14"/></svg>
    </div>
  </div>
  <div class="empty-state" id="profile-gallery-empty" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><title>暂无作品</title><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
    <div>还没有上传作品</div>
  </div>

  <div class="menu-card">
    <div class="menu-item" data-ui-id="profile-inventory-button">
      <div class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>库存管理入口</title><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/><polyline points="3.29 7 12 12 20.71 7"/></svg>
      </div>
      <div class="text">库存管理</div>
      <div class="arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>进入库存管理</title><path d="m9 18 6-6-6-6"/></svg>
      </div>
    </div>
  </div>
</div>

<div class="tabbar">
  <div class="tab" data-ui-id="tab-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>首页</title><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <div>首页</div>
  </div>
  <div class="tab" data-ui-id="tab-classes">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>课程</title><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
    <div>课程</div>
  </div>
  <div class="tab" data-ui-id="tab-points">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>积分</title><circle cx="12" cy="12" r="10"/><path d="M14.83 14.83a4 4 0 0 1-5.66-5.66"/></svg>
    <div>积分</div>
  </div>
  <div class="tab active" data-ui-id="tab-profile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>我的</title><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <div>我的</div>
  </div>
</div>
</body>
</html>
