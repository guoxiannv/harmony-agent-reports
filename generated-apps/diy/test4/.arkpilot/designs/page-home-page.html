<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 - 首页</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#F8F3EE; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; color:#3D2E26; }
  .app-shell { width:100%; max-width:390px; margin:0 auto; min-height:100%; position:relative; padding-bottom:88px; }
  .header { height:56px; background:linear-gradient(180deg, #C17A53 0%, #A85D3C 100%); border-radius:0 0 28px 28px; display:flex; align-items:center; justify-content:center; position:relative; }
  .header-title { font-size:18px; font-weight:700; color:#F8F3EE; }
  .content { padding:16px; display:flex; flex-direction:column; gap:16px; }
  .card { background:#FFFFFF; border-radius:24px; padding:20px; box-shadow:0px 10px 28px rgba(61,46,38,0.08); }
  .section-title { font-size:18px; font-weight:700; color:#3D2E26; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .checkin-card { background:linear-gradient(135deg, #C17A53 0%, #A85D3C 100%); color:#FFFFFF; border-radius:24px; padding:20px; box-shadow:0px 10px 28px rgba(193,122,83,0.28); display:flex; align-items:center; justify-content:space-between; }
  .checkin-text h2 { font-size:20px; font-weight:700; margin-bottom:6px; }
  .checkin-text p { font-size:13px; opacity:0.92; }
  .checkin-btn { background:#FFFFFF; color:#C17A53; border:none; border-radius:18px; height:48px; padding:0 24px; font-size:16px; font-weight:700; box-shadow:0px 6px 16px rgba(61,46,38,0.12); cursor:pointer; }
  .points-card { display:flex; align-items:center; justify-content:space-between; }
  .points-info .points-label { font-size:13px; color:#7A665B; margin-bottom:4px; }
  .points-info .points-value { font-size:36px; font-weight:700; color:#C17A53; font-variant-numeric:tabular-nums; }
  .points-arrow { width:40px; height:40px; border-radius:14px; background:#F0E8E0; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .lesson-card { display:flex; flex-direction:column; gap:12px; }
  .lesson-row { display:flex; align-items:center; gap:12px; }
  .lesson-icon { width:48px; height:48px; border-radius:14px; background:#F0E8E0; display:flex; align-items:center; justify-content:center; }
  .lesson-detail h3 { font-size:16px; font-weight:700; }
  .lesson-detail p { font-size:13px; color:#7A665B; }
  .primary-small { background:linear-gradient(180deg, #D48C65 0%, #C17A53 100%); color:#FFFFFF; border:none; border-radius:14px; height:40px; padding:0 18px; font-size:14px; font-weight:700; box-shadow:0px 6px 16px rgba(193,122,83,0.24); cursor:pointer; align-self:flex-start; }
  .menu-list { display:flex; flex-direction:column; gap:12px; }
  .menu-item { display:flex; align-items:center; justify-content:space-between; padding:16px; background:#FFFFFF; border-radius:18px; box-shadow:0px 8px 24px rgba(61,46,38,0.06); cursor:pointer; }
  .menu-item-left { display:flex; align-items:center; gap:12px; }
  .menu-item-icon { width:40px; height:40px; border-radius:12px; background:#F0E8E0; display:flex; align-items:center; justify-content:center; }
  .menu-item-title { font-size:15px; font-weight:700; }
  .menu-item-badge { background:#C45A4B; color:#FFFFFF; font-size:11px; font-weight:700; padding:2px 8px; border-radius:10px; margin-left:8px; }
  .menu-item-right { color:#7A665B; }
  .empty-state { text-align:center; padding:32px 20px; }
  .empty-state svg { margin-bottom:12px; }
  .empty-state h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
  .empty-state p { font-size:13px; color:#7A665B; }
  .tab-bar { position:fixed; bottom:0; left:0; right:0; margin:0 auto; width:100%; max-width:390px; height:68px; background:rgba(248,243,238,0.90); backdrop-filter:blur(20px); border-top:1px solid #E6D5C7; display:flex; justify-content:space-around; align-items:center; padding-bottom:8px; }
  .tab { display:flex; flex-direction:column; align-items:center; gap:4px; color:#7A665B; font-size:12px; font-weight:600; cursor:pointer; position:relative; }
  .tab.active { color:#C17A53; }
  .tab.active::after { content:''; position:absolute; bottom:-4px; width:4px; height:4px; border-radius:50%; background:#C17A53; }
  .tab svg { width:24px; height:24px; }
</style>
</head>
<body>
<div class="app-shell" data-page-id="home-page" data-tab-id="tab-home">
  <header class="header">
    <h1 class="header-title" data-ui-id="home-header-title">手作·印记</h1>
  </header>
  <main class="content">
    <section class="checkin-card">
      <div class="checkin-text">
        <h2>今日到店</h2>
        <p>签到即可 +5 积分，记录你的手作时光</p>
      </div>
      <button class="checkin-btn" data-ui-id="home-checkin-button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px;"><title>签到打卡图标</title><path d="M12 2v20M2 12h20"/></svg>
        签到
      </button>
    </section>

    <section class="card points-card" data-ui-id="home-points-card">
      <div class="points-info">
        <div class="points-label">当前积分</div>
        <div class="points-value" data-ui-id="points-balance">1,280</div>
      </div>
      <div class="points-arrow" data-ui-id="home-points-detail-link" aria-label="查看积分明细">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A85D3C" stroke-width="2"><title>前往积分明细</title><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </section>

    <section class="card lesson-card" data-ui-id="home-upcoming-lesson-card">
      <div class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C17A53" stroke-width="2"><title>待上课程标记</title><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        待上课程
      </div>
      <div class="lesson-row">
        <div class="lesson-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#A85D3C" stroke-width="2"><title>陶艺课程图标</title><path d="M12 21c4.97 0 9-4.03 9-9-2.5 0-3-1.5-3-3 0-2-1.5-3-3-3s-3 1-3 3c0 1.5-.5 3-3 3 0 4.97 4.03 9 9 9z"/></svg>
        </div>
        <div class="lesson-detail">
          <h3>陶艺拉坯体验课</h3>
          <p>06月24日 14:00 - 16:00</p>
        </div>
      </div>
      <button class="primary-small" data-ui-id="home-book-lesson-button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px;"><title>预约新课程</title><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
        预约课程
      </button>
    </section>

    <section class="menu-list">
      <div class="menu-item" data-ui-id="home-dormant-link">
        <div class="menu-item-left">
          <div class="menu-item-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C45A4B" stroke-width="2"><title>沉睡会员提醒入口</title><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4"/><circle cx="12" cy="17" r="1"/></svg>
          </div>
          <div class="menu-item-title">沉睡提醒 <span class="menu-item-badge">3</span></div>
        </div>
        <div class="menu-item-right">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7A665B" stroke-width="2"><title>进入沉睡提醒</title><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>
      <div class="menu-item" data-ui-id="home-inventory-link">
        <div class="menu-item-left">
          <div class="menu-item-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8A9A8C" stroke-width="2"><title>库存管理入口</title><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          </div>
          <div class="menu-item-title">库存管理</div>
        </div>
        <div class="menu-item-right">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7A665B" stroke-width="2"><title>进入库存管理</title><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>
    </section>

    <section class="card empty-state" data-ui-id="home-empty-state" style="display:none;">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#E6D5C7" stroke-width="1.5"><title>暂无内容插画</title><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      <h3>还没有记录</h3>
      <p>签到或预约第一节课程，开启你的手作之旅</p>
    </section>
  </main>

  <nav class="tab-bar">
    <div class="tab active" data-ui-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到首页</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="tab" data-ui-id="tab-calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到课程日历</title><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>课程</span>
    </div>
    <div class="tab" data-ui-id="tab-members">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到会员列表</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>会员</span>
    </div>
    <div class="tab" data-ui-id="tab-my">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到我的</title><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </nav>
</div>
</body>
</html>
