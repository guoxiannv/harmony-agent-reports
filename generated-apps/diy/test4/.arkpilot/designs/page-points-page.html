<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 - 积分明细</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#F8F3EE; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; color:#3D2E26; }
  .app-shell { width:100%; max-width:390px; margin:0 auto; min-height:100%; position:relative; padding-bottom:88px; }
  .header { height:56px; background:linear-gradient(180deg, #C17A53 0%, #A85D3C 100%); border-radius:0 0 28px 28px; display:flex; align-items:center; padding:0 16px; position:relative; }
  .back-btn { width:40px; height:40px; border-radius:14px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.16); cursor:pointer; }
  .header-title { position:absolute; left:50%; transform:translateX(-50%); font-size:18px; font-weight:700; color:#F8F3EE; }
  .content { padding:16px; display:flex; flex-direction:column; gap:16px; }
  .points-hero { background:linear-gradient(135deg, #C17A53 0%, #A85D3C 100%); border-radius:24px; padding:24px 20px; color:#FFFFFF; box-shadow:0px 12px 32px rgba(193,122,83,0.28); display:flex; align-items:center; justify-content:space-between; }
  .points-hero-label { font-size:13px; opacity:0.9; margin-bottom:6px; }
  .points-hero-value { font-size:42px; font-weight:700; font-variant-numeric:tabular-nums; }
  .checkin-btn { background:#FFFFFF; color:#C17A53; border:none; border-radius:16px; height:44px; padding:0 20px; font-size:15px; font-weight:700; box-shadow:0px 6px 16px rgba(61,46,38,0.12); cursor:pointer; }
  .filter-bar { display:flex; gap:10px; }
  .filter-chip { flex:1; height:40px; border-radius:14px; background:#FFFFFF; color:#7A665B; font-size:14px; font-weight:600; border:none; box-shadow:0px 4px 12px rgba(61,46,38,0.05); cursor:pointer; }
  .filter-chip.active { background:#C17A53; color:#FFFFFF; }
  .list-card { background:#FFFFFF; border-radius:24px; padding:8px 20px; box-shadow:0px 10px 28px rgba(61,46,38,0.08); }
  .list-item { display:flex; align-items:center; justify-content:space-between; padding:16px 0; border-bottom:1px solid #F0E8E0; }
  .list-item:last-child { border-bottom:none; }
  .list-left { display:flex; align-items:center; gap:12px; }
  .list-icon { width:44px; height:44px; border-radius:12px; background:#F0E8E0; display:flex; align-items:center; justify-content:center; }
  .list-title { font-size:15px; font-weight:700; margin-bottom:4px; }
  .list-desc { font-size:12px; color:#7A665B; }
  .list-right { text-align:right; }
  .points-positive { font-size:16px; font-weight:700; color:#C17A53; }
  .points-negative { font-size:16px; font-weight:700; color:#C45A4B; }
  .list-time { font-size:11px; color:#7A665B; margin-top:2px; }
  .empty-state { text-align:center; padding:48px 20px; }
  .empty-state svg { margin-bottom:12px; }
  .empty-state h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
  .empty-state p { font-size:13px; color:#7A665B; }
</style>
</head>
<body>
<div class="app-shell" data-page-id="points-page">
  <header class="header">
    <div class="back-btn" data-ui-id="back-button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2"><title>返回上一页</title><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <h1 class="header-title">积分明细</h1>
  </header>
  <main class="content">
    <section class="points-hero">
      <div>
        <div class="points-hero-label">当前积分</div>
        <div class="points-hero-value" data-ui-id="points-balance">1,280</div>
      </div>
      <button class="checkin-btn" data-ui-id="points-checkin-button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px;"><title>签到打卡图标</title><path d="M12 2v20M2 12h20"/></svg>
        签到
      </button>
    </section>

    <section class="filter-bar">
      <button class="filter-chip active" data-ui-id="points-filter-all">全部</button>
      <button class="filter-chip" data-ui-id="points-filter-income">收入</button>
      <button class="filter-chip" data-ui-id="points-filter-expense">支出</button>
    </section>

    <section class="list-card">
      <div class="list-item" data-ui-id="points-list">
        <div class="list-left">
          <div class="list-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C17A53" stroke-width="2"><title>签到积分图标</title><path d="M12 2v20M2 12h20"/></svg>
          </div>
          <div>
            <div class="list-title">每日签到</div>
            <div class="list-desc">06月22日</div>
          </div>
        </div>
        <div class="list-right">
          <div class="points-positive">+5</div>
          <div class="list-time">08:32</div>
        </div>
      </div>
      <div class="list-item" data-ui-id="points-list">
        <div class="list-left">
          <div class="list-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#A85D3C" stroke-width="2"><title>消费积分图标</title><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          </div>
          <div>
            <div class="list-title">课程消费</div>
            <div class="list-desc">陶艺拉坯体验课</div>
          </div>
        </div>
        <div class="list-right">
          <div class="points-positive">+128</div>
          <div class="list-time">06月20日</div>
        </div>
      </div>
      <div class="list-item" data-ui-id="points-list">
        <div class="list-left">
          <div class="list-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C45A4B" stroke-width="2"><title>积分兑换图标</title><path d="M12 8v13M12 8l4 4M12 8l-4 4M5 3h14"/></svg>
          </div>
          <div>
            <div class="list-title">积分兑换</div>
            <div class="list-desc">兑换陶土材料包</div>
          </div>
        </div>
        <div class="list-right">
          <div class="points-negative">-200</div>
          <div class="list-time">06月15日</div>
        </div>
      </div>
    </section>

    <section class="empty-state" data-ui-id="points-empty-state" style="display:none;">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#E6D5C7" stroke-width="1.5"><title>暂无积分记录插画</title><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      <h3>暂无积分记录</h3>
      <p>签到或消费后将自动累计积分</p>
    </section>
  </main>
</div>
</body>
</html>
