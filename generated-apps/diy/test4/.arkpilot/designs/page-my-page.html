<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 - 我的</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#F8F3EE; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; color:#3D2E26; }
  .app-shell { width:100%; max-width:390px; margin:0 auto; min-height:100%; position:relative; padding-bottom:88px; }
  .header { height:56px; background:linear-gradient(180deg, #C17A53 0%, #A85D3C 100%); border-radius:0 0 28px 28px; display:flex; align-items:center; justify-content:center; position:relative; }
  .header-title { font-size:18px; font-weight:700; color:#F8F3EE; }
  .content { padding:16px; display:flex; flex-direction:column; gap:16px; }
  .profile-card { background:linear-gradient(135deg, #C17A53 0%, #A85D3C 100%); border-radius:24px; padding:24px 20px; color:#FFFFFF; box-shadow:0px 12px 32px rgba(193,122,83,0.28); display:flex; align-items:center; gap:16px; }
  .avatar-large { width:72px; height:72px; border-radius:26px; background:#FFFFFF; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:700; color:#C17A53; }
  .profile-info h2 { font-size:20px; font-weight:700; margin-bottom:6px; }
  .profile-info p { font-size:13px; opacity:0.9; }
  .card { background:#FFFFFF; border-radius:24px; padding:8px 20px; box-shadow:0px 10px 28px rgba(61,46,38,0.08); }
  .menu-item { display:flex; align-items:center; justify-content:space-between; padding:16px 0; border-bottom:1px solid #F0E8E0; cursor:pointer; }
  .menu-item:last-child { border-bottom:none; }
  .menu-item-left { display:flex; align-items:center; gap:12px; }
  .menu-item-icon { width:40px; height:40px; border-radius:12px; background:#F0E8E0; display:flex; align-items:center; justify-content:center; }
  .menu-item-title { font-size:15px; font-weight:700; }
  .menu-item-right { color:#7A665B; }
  .logout-btn { width:100%; height:52px; border-radius:18px; background:#FFFFFF; color:#C45A4B; border:none; font-size:16px; font-weight:700; box-shadow:0px 8px 20px rgba(61,46,38,0.08); cursor:pointer; margin-top:8px; }
  .tab-bar { position:fixed; bottom:0; left:0; right:0; margin:0 auto; width:100%; max-width:390px; height:68px; background:rgba(248,243,238,0.90); backdrop-filter:blur(20px); border-top:1px solid #E6D5C7; display:flex; justify-content:space-around; align-items:center; padding-bottom:8px; }
  .tab { display:flex; flex-direction:column; align-items:center; gap:4px; color:#7A665B; font-size:12px; font-weight:600; cursor:pointer; position:relative; }
  .tab.active { color:#C17A53; }
  .tab.active::after { content:''; position:absolute; bottom:-4px; width:4px; height:4px; border-radius:50%; background:#C17A53; }
  .tab svg { width:24px; height:24px; }
</style>
</head>
<body>
<div class="app-shell" data-page-id="my-page" data-tab-id="tab-my">
  <header class="header">
    <h1 class="header-title">我的</h1>
  </header>
  <main class="content">
    <section class="profile-card">
      <div class="avatar-large" data-ui-id="my-avatar">店</div>
      <div class="profile-info">
        <h2 data-ui-id="my-name">木芽工坊</h2>
        <p>店长版 · 本地数据</p>
      </div>
    </section>

    <section class="card">
      <div class="menu-item" data-ui-id="my-settings-button">
        <div class="menu-item-left">
          <div class="menu-item-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C17A53" stroke-width="2"><title>设置入口</title><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </div>
          <div class="menu-item-title">设置</div>
        </div>
        <div class="menu-item-right">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7A665B" stroke-width="2"><title>进入设置</title><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>
      <div class="menu-item" data-ui-id="my-about-button">
        <div class="menu-item-left">
          <div class="menu-item-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8A9A8C" stroke-width="2"><title>关于入口</title><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </div>
          <div class="menu-item-title">关于</div>
        </div>
        <div class="menu-item-right">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7A665B" stroke-width="2"><title>进入关于</title><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>
    </section>

    <button class="logout-btn" data-ui-id="my-logout-button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px;"><title>退出登录</title><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      退出登录
    </button>
  </main>

  <nav class="tab-bar">
    <div class="tab" data-ui-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到首页</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="tab" data-ui-id="tab-calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到课程日历</title><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>课程</span>
    </div>
    <div class="tab" data-ui-id="tab-members">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到会员列表</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>会员</span>
    </div>
    <div class="tab active" data-ui-id="tab-my">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到我的</title><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </nav>
</div>
</body>
</html>
