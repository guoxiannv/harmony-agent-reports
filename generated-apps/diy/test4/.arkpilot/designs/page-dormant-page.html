<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 - 沉睡提醒</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#F8F3EE; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; color:#3D2E26; }
  .app-shell { width:100%; max-width:390px; margin:0 auto; min-height:100%; position:relative; padding-bottom:24px; }
  .header { height:56px; background:linear-gradient(180deg, #C17A53 0%, #A85D3C 100%); border-radius:0 0 28px 28px; display:flex; align-items:center; padding:0 16px; position:relative; }
  .back-btn { width:40px; height:40px; border-radius:14px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.16); cursor:pointer; }
  .header-title { position:absolute; left:50%; transform:translateX(-50%); font-size:18px; font-weight:700; color:#F8F3EE; }
  .content { padding:16px; display:flex; flex-direction:column; gap:16px; }
  .card { background:#FFFFFF; border-radius:24px; padding:20px; box-shadow:0px 10px 28px rgba(61,46,38,0.08); }
  .section-title { font-size:18px; font-weight:700; color:#3D2E26; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .stats-row { display:flex; gap:12px; }
  .stat-box { flex:1; background:linear-gradient(135deg, #C45A4B 0%, #A85D3C 100%); border-radius:18px; padding:18px 12px; text-align:center; color:#FFFFFF; }
  .stat-value { font-size:32px; font-weight:700; font-variant-numeric:tabular-nums; }
  .stat-label { font-size:12px; opacity:0.9; margin-top:4px; }
  .threshold-row { display:flex; align-items:center; justify-content:space-between; }
  .threshold-label { font-size:14px; font-weight:600; color:#7A665B; }
  .threshold-input { width:80px; height:40px; border-radius:12px; background:#F8F3EE; border:none; text-align:center; font-size:16px; font-weight:700; color:#3D2E26; outline:none; }
  .primary-small { background:linear-gradient(180deg, #D48C65 0%, #C17A53 100%); color:#FFFFFF; border:none; border-radius:14px; height:40px; padding:0 18px; font-size:14px; font-weight:700; box-shadow:0px 6px 16px rgba(193,122,83,0.24); cursor:pointer; }
  .wake-all { width:100%; height:48px; border-radius:18px; background:#C45A4B; color:#FFFFFF; border:none; font-size:16px; font-weight:700; box-shadow:0px 8px 20px rgba(196,90,75,0.24); cursor:pointer; }
  .dormant-list { display:flex; flex-direction:column; gap:12px; }
  .dormant-item { display:flex; align-items:center; justify-content:space-between; padding:16px; background:#F8F3EE; border-radius:18px; }
  .dormant-left { display:flex; align-items:center; gap:12px; }
  .avatar { width:48px; height:48px; border-radius:16px; background:linear-gradient(135deg, #E6D5C7 0%, #D4A26A 100%); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:#FFFFFF; }
  .dormant-name { font-size:15px; font-weight:700; margin-bottom:4px; }
  .dormant-desc { font-size:12px; color:#7A665B; }
  .dormant-days { font-size:13px; font-weight:700; color:#C45A4B; margin-bottom:6px; text-align:right; }
  .wake-btn { height:32px; border-radius:10px; background:#C45A4B; color:#FFFFFF; border:none; padding:0 14px; font-size:13px; font-weight:700; cursor:pointer; }
  .empty-state { text-align:center; padding:48px 20px; }
  .empty-state svg { margin-bottom:12px; }
  .empty-state h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
  .empty-state p { font-size:13px; color:#7A665B; }
</style>
</head>
<body>
<div class="app-shell" data-page-id="dormant-page">
  <header class="header">
    <div class="back-btn" data-ui-id="back-button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2"><title>返回上一页</title><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <h1 class="header-title">沉睡提醒</h1>
  </header>
  <main class="content">
    <section class="card">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-value" data-ui-id="dormant-count">3</div>
          <div class="stat-label">沉睡会员</div>
        </div>
        <div class="stat-box" style="background:linear-gradient(135deg, #C17A53 0%, #A85D3C 100%);">
          <div class="stat-value">30</div>
          <div class="stat-label">沉睡天数阈值</div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="threshold-row">
        <div class="threshold-label">超过 N 天未活跃即视为沉睡</div>
        <input type="number" class="threshold-input" value="30" data-ui-id="dormant-threshold-input" />
      </div>
    </section>

    <button class="wake-all" data-ui-id="dormant-wake-all-button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px;"><title>批量唤醒会员</title><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      一键唤醒全部
    </button>

    <section class="card">
      <div class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C45A4B" stroke-width="2"><title>沉睡会员列表</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>
        沉睡会员
      </div>
      <div class="dormant-list" data-ui-id="dormant-list">
        <div class="dormant-item">
          <div class="dormant-left">
            <div class="avatar">阿</div>
            <div>
              <div class="dormant-name">阿木</div>
              <div class="dormant-desc">擅长：木作 · 积分 860</div>
            </div>
          </div>
          <div>
            <div class="dormant-days">35 天</div>
            <button class="wake-btn" data-ui-id="dormant-wake-button">唤醒</button>
          </div>
        </div>
        <div class="dormant-item">
          <div class="dormant-left">
            <div class="avatar" style="background:linear-gradient(135deg, #8A9A8C 0%, #6B7D6F 100%);">皮</div>
            <div>
              <div class="dormant-name">皮小匠</div>
              <div class="dormant-desc">擅长：皮具 · 积分 2,450</div>
            </div>
          </div>
          <div>
            <div class="dormant-days">42 天</div>
            <button class="wake-btn" data-ui-id="dormant-wake-button">唤醒</button>
          </div>
        </div>
        <div class="dormant-item">
          <div class="dormant-left">
            <div class="avatar" style="background:linear-gradient(135deg, #C17A53 0%, #A85D3C 100%);">陶</div>
            <div>
              <div class="dormant-name">陶子</div>
              <div class="dormant-desc">擅长：陶艺 · 积分 520</div>
            </div>
          </div>
          <div>
            <div class="dormant-days">58 天</div>
            <button class="wake-btn" data-ui-id="dormant-wake-button">唤醒</button>
          </div>
        </div>
      </div>
      <div class="empty-state" data-ui-id="dormant-empty-state" style="display:none;">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#E6D5C7" stroke-width="1.5"><title>暂无沉睡会员插画</title><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        <h3>没有沉睡会员</h3>
        <p>大家最近都很活跃</p>
      </div>
    </section>
  </main>
</div>
</body>
</html>
