<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 - 课程日历</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#F8F3EE; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; color:#3D2E26; }
  .app-shell { width:100%; max-width:390px; margin:0 auto; min-height:100%; position:relative; padding-bottom:88px; }
  .header { height:56px; background:linear-gradient(180deg, #C17A53 0%, #A85D3C 100%); border-radius:0 0 28px 28px; display:flex; align-items:center; padding:0 16px; position:relative; }
  .back-btn { width:40px; height:40px; border-radius:14px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.16); cursor:pointer; }
  .header-title { position:absolute; left:50%; transform:translateX(-50%); font-size:18px; font-weight:700; color:#F8F3EE; }
  .content { padding:16px; display:flex; flex-direction:column; gap:16px; }
  .card { background:#FFFFFF; border-radius:24px; padding:20px; box-shadow:0px 10px 28px rgba(61,46,38,0.08); }
  .calendar-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .month-title { font-size:18px; font-weight:700; }
  .month-nav { display:flex; gap:8px; }
  .month-nav button { width:36px; height:36px; border-radius:12px; border:none; background:#F0E8E0; color:#3D2E26; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .weekdays { display:grid; grid-template-columns:repeat(7, 1fr); text-align:center; margin-bottom:8px; }
  .weekdays div { font-size:12px; font-weight:600; color:#7A665B; padding:8px 0; }
  .calendar-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; }
  .day-cell { aspect-ratio:1; border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; background:#F8F3EE; cursor:pointer; position:relative; }
  .day-cell.today { background:#C17A53; color:#FFFFFF; }
  .day-cell.selected { box-shadow:0 0 0 2px #C17A53; }
  .day-cell.has-lesson::after { content:''; position:absolute; bottom:6px; width:4px; height:4px; border-radius:50%; background:#D4A26A; }
  .day-cell.today.has-lesson::after { background:#FFFFFF; }
  .day-number { font-size:14px; font-weight:600; }
  .day-lunar { font-size:10px; color:#7A665B; }
  .day-cell.today .day-lunar { color:rgba(255,255,255,0.8); }
  .section-title { font-size:18px; font-weight:700; color:#3D2E26; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .lesson-list { display:flex; flex-direction:column; gap:10px; }
  .lesson-item { display:flex; align-items:center; justify-content:space-between; padding:14px; background:#F8F3EE; border-radius:16px; }
  .lesson-item-left h4 { font-size:15px; font-weight:700; margin-bottom:4px; }
  .lesson-item-left p { font-size:12px; color:#7A665B; }
  .primary-small { background:linear-gradient(180deg, #D48C65 0%, #C17A53 100%); color:#FFFFFF; border:none; border-radius:14px; height:36px; padding:0 16px; font-size:13px; font-weight:700; box-shadow:0px 6px 16px rgba(193,122,83,0.24); cursor:pointer; }
  .empty-state { text-align:center; padding:32px 20px; }
  .empty-state svg { margin-bottom:12px; }
  .empty-state h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
  .empty-state p { font-size:13px; color:#7A665B; }
  .tab-bar { position:fixed; bottom:0; left:0; right:0; margin:0 auto; width:100%; max-width:390px; height:68px; background:rgba(248,243,238,0.90); backdrop-filter:blur(20px); border-top:1px solid #E6D5C7; display:flex; justify-content:space-around; align-items:center; padding-bottom:8px; }
  .tab { display:flex; flex-direction:column; align-items:center; gap:4px; color:#7A665B; font-size:12px; font-weight:600; cursor:pointer; position:relative; }
  .tab.active { color:#C17A53; }
  .tab.active::after { content:''; position:absolute; bottom:-4px; width:4px; height:4px; border-radius:50%; background:#C17A53; }
  .tab svg { width:24px; height:24px; }
</style>
</head>
<body>
<div class="app-shell" data-page-id="calendar-page" data-tab-id="tab-calendar">
  <header class="header">
    <div class="back-btn" data-ui-id="back-button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2"><title>返回上一页</title><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <h1 class="header-title">课程日历</h1>
  </header>
  <main class="content">
    <section class="card">
      <div class="calendar-header">
        <div class="month-title" data-ui-id="calendar-month-title">2026年6月</div>
        <div class="month-nav">
          <button data-ui-id="calendar-prev-month">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>上个月</title><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button data-ui-id="calendar-next-month">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>下个月</title><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
      <div class="weekdays">
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
      </div>
      <div class="calendar-grid" data-ui-id="calendar-grid">
        <div class="day-cell" data-ui-id="calendar-day-2026-06-01"><span class="day-number">1</span><span class="day-lunar">十七</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-02"><span class="day-number">2</span><span class="day-lunar">十八</span></div>
        <div class="day-cell has-lesson" data-ui-id="calendar-day-2026-06-03"><span class="day-number">3</span><span class="day-lunar">十九</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-04"><span class="day-number">4</span><span class="day-lunar">二十</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-05"><span class="day-number">5</span><span class="day-lunar">廿一</span></div>
        <div class="day-cell has-lesson" data-ui-id="calendar-day-2026-06-06"><span class="day-number">6</span><span class="day-lunar">廿二</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-07"><span class="day-number">7</span><span class="day-lunar">廿三</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-08"><span class="day-number">8</span><span class="day-lunar">廿四</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-09"><span class="day-number">9</span><span class="day-lunar">廿五</span></div>
        <div class="day-cell has-lesson" data-ui-id="calendar-day-2026-06-10"><span class="day-number">10</span><span class="day-lunar">廿六</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-11"><span class="day-number">11</span><span class="day-lunar">廿七</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-12"><span class="day-number">12</span><span class="day-lunar">廿八</span></div>
        <div class="day-cell has-lesson" data-ui-id="calendar-day-2026-06-13"><span class="day-number">13</span><span class="day-lunar">廿九</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-14"><span class="day-number">14</span><span class="day-lunar">三十</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-15"><span class="day-number">15</span><span class="day-lunar">初一</span></div>
        <div class="day-cell has-lesson" data-ui-id="calendar-day-2026-06-16"><span class="day-number">16</span><span class="day-lunar">初二</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-17"><span class="day-number">17</span><span class="day-lunar">初三</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-18"><span class="day-number">18</span><span class="day-lunar">初四</span></div>
        <div class="day-cell today has-lesson selected" data-ui-id="calendar-day-2026-06-19"><span class="day-number">19</span><span class="day-lunar">初五</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-20"><span class="day-number">20</span><span class="day-lunar">初六</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-21"><span class="day-number">21</span><span class="day-lunar">初七</span></div>
        <div class="day-cell selected" data-ui-id="calendar-day-2026-06-22"><span class="day-number">22</span><span class="day-lunar">初八</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-23"><span class="day-number">23</span><span class="day-lunar">初九</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-24"><span class="day-number">24</span><span class="day-lunar">初十</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-25"><span class="day-number">25</span><span class="day-lunar">十一</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-26"><span class="day-number">26</span><span class="day-lunar">十二</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-27"><span class="day-number">27</span><span class="day-lunar">十三</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-28"><span class="day-number">28</span><span class="day-lunar">十四</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-29"><span class="day-number">29</span><span class="day-lunar">十五</span></div>
        <div class="day-cell" data-ui-id="calendar-day-2026-06-30"><span class="day-number">30</span><span class="day-lunar">十六</span></div>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C17A53" stroke-width="2"><title>选中日期课程</title><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        06月22日 课程安排
      </div>
      <div class="lesson-list" data-ui-id="calendar-selected-day-lessons">
        <div class="lesson-item" data-ui-id="calendar-lesson-1">
          <div class="lesson-item-left">
            <h4>陶艺拉坯体验课</h4>
            <p>14:00 - 16:00 · 林小陶</p>
          </div>
          <button class="primary-small" data-ui-id="calendar-book-button">预约</button>
        </div>
      </div>
      <div class="empty-state" data-ui-id="calendar-day-empty" style="display:none;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#E6D5C7" stroke-width="1.5"><title>当日无课程插画</title><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <h3>当天没有课程</h3>
        <p>点击下方按钮预约新课程</p>
      </div>
    </section>
  </main>

  <nav class="tab-bar">
    <div class="tab" data-ui-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到首页</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="tab active" data-ui-id="tab-calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到课程日历</title><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>课程</span>
    </div>
    <div class="tab" data-ui-id="tab-members">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到会员列表</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>会员</span>
    </div>
    <div class="tab" data-ui-id="tab-my">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到我的</title><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </nav>
</div>
</body>
</html>
