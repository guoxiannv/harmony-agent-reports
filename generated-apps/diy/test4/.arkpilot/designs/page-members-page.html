<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 - 会员列表</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#F8F3EE; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; color:#3D2E26; }
  .app-shell { width:100%; max-width:390px; margin:0 auto; min-height:100%; position:relative; padding-bottom:88px; }
  .header { height:56px; background:linear-gradient(180deg, #C17A53 0%, #A85D3C 100%); border-radius:0 0 28px 28px; display:flex; align-items:center; padding:0 16px; position:relative; }
  .back-btn { width:40px; height:40px; border-radius:14px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.16); cursor:pointer; }
  .header-title { position:absolute; left:50%; transform:translateX(-50%); font-size:18px; font-weight:700; color:#F8F3EE; }
  .add-btn { position:absolute; right:16px; width:40px; height:40px; border-radius:14px; background:rgba(255,255,255,0.20); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .content { padding:16px; display:flex; flex-direction:column; gap:16px; }
  .search-bar { display:flex; align-items:center; gap:10px; padding:0 16px; height:48px; background:#FFFFFF; border-radius:16px; box-shadow:0px 6px 18px rgba(61,46,38,0.06); }
  .search-bar input { flex:1; border:none; background:transparent; font-size:15px; color:#3D2E26; outline:none; }
  .search-bar input::placeholder { color:rgba(61,46,38,0.4); }
  .filter-bar { display:flex; gap:10px; }
  .filter-chip { height:36px; border-radius:14px; padding:0 16px; background:#FFFFFF; color:#7A665B; font-size:14px; font-weight:600; border:none; box-shadow:0px 4px 12px rgba(61,46,38,0.05); cursor:pointer; }
  .filter-chip.active { background:#C17A53; color:#FFFFFF; }
  .list-card { background:#FFFFFF; border-radius:24px; padding:8px 20px; box-shadow:0px 10px 28px rgba(61,46,38,0.08); }
  .list-item { display:flex; align-items:center; justify-content:space-between; padding:16px 0; border-bottom:1px solid #F0E8E0; cursor:pointer; }
  .list-item:last-child { border-bottom:none; }
  .list-left { display:flex; align-items:center; gap:12px; }
  .avatar { width:48px; height:48px; border-radius:16px; background:linear-gradient(135deg, #E6D5C7 0%, #D4A26A 100%); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:#FFFFFF; }
  .list-title { font-size:15px; font-weight:700; margin-bottom:4px; }
  .list-desc { font-size:12px; color:#7A665B; }
  .dormant-tag { display:inline-block; margin-top:4px; background:rgba(196,90,75,0.12); color:#C45A4B; font-size:11px; font-weight:700; padding:2px 8px; border-radius:10px; }
  .list-right { color:#7A665B; }
  .empty-state { text-align:center; padding:48px 20px; }
  .empty-state svg { margin-bottom:12px; }
  .empty-state h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
  .empty-state p { font-size:13px; color:#7A665B; }
  .tab-bar { position:fixed; bottom:0; left:0; right:0; margin:0 auto; width:100%; max-width:390px; height:68px; background:rgba(248,243,238,0.90); backdrop-filter:blur(20px); border-top:1px solid #E6D5C7; display:flex; justify-content:space-around; align-items:center; padding-bottom:8px; }
  .tab { display:flex; flex-direction:column; align-items:center; gap:4px; color:#7A665B; font-size:12px; font-weight:600; cursor:pointer; position:relative; }
  .tab.active { color:#C17A53; }
  .tab.active::after { content:''; position:absolute; bottom:-4px; width:4px; height:4px; border-radius:50%; background:#C17A53; }
  .tab svg { width:24px; height:24px; }
</style>
</head>
<body>
<div class="app-shell" data-page-id="members-page" data-tab-id="tab-members">
  <header class="header">
    <div class="back-btn" data-ui-id="back-button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2"><title>返回上一页</title><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <h1 class="header-title">会员列表</h1>
    <div class="add-btn" data-ui-id="members-add-button">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2"><title>添加新会员</title><path d="M12 5v14M5 12h14"/></svg>
    </div>
  </header>
  <main class="content">
    <section class="search-bar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7A665B" stroke-width="2"><title>搜索会员</title><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="搜索会员昵称或手机号" data-ui-id="members-search-input" />
    </section>

    <section class="filter-bar">
      <button class="filter-chip active" data-ui-id="members-filter-all">全部</button>
      <button class="filter-chip" data-ui-id="members-filter-dormant">沉睡会员</button>
    </section>

    <section class="list-card">
      <div class="list-item" data-ui-id="members-list">
        <div class="list-left">
          <div class="avatar">林</div>
          <div>
            <div class="list-title">林小陶</div>
            <div class="list-desc">擅长：陶艺、木雕 · 积分 1,280</div>
          </div>
        </div>
        <div class="list-right">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7A665B" stroke-width="2"><title>查看会员档案</title><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>
      <div class="list-item" data-ui-id="members-list">
        <div class="list-left">
          <div class="avatar" style="background:linear-gradient(135deg, #C17A53 0%, #A85D3C 100%);">阿</div>
          <div>
            <div class="list-title">阿木</div>
            <div class="list-desc">擅长：木作 · 积分 860</div>
            <span class="dormant-tag">沉睡 35 天</span>
          </div>
        </div>
        <div class="list-right">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7A665B" stroke-width="2"><title>查看会员档案</title><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>
      <div class="list-item" data-ui-id="members-list">
        <div class="list-left">
          <div class="avatar" style="background:linear-gradient(135deg, #8A9A8C 0%, #6B7D6F 100%);">皮</div>
          <div>
            <div class="list-title">皮小匠</div>
            <div class="list-desc">擅长：皮具 · 积分 2,450</div>
          </div>
        </div>
        <div class="list-right">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7A665B" stroke-width="2"><title>查看会员档案</title><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>
    </section>

    <section class="empty-state" data-ui-id="members-empty-state" style="display:none;">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#E6D5C7" stroke-width="1.5"><title>暂无会员插画</title><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      <h3>还没有会员</h3>
      <p>点击右上角添加第一位会员</p>
    </section>
  </main>

  <nav class="tab-bar">
    <div class="tab" data-ui-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到首页</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </div>
    <div class="tab" data-ui-id="tab-calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到课程日历</title><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>课程</span>
    </div>
    <div class="tab active" data-ui-id="tab-members">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到会员列表</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>会员</span>
    </div>
    <div class="tab" data-ui-id="tab-my">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>切换到我的</title><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </nav>
</div>
</body>
</html>
