<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 - 我的</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: linear-gradient(180deg, #FBF8F5 0%, #F0EBE5 55%, #E9E3DA 100%);
  color: #3A2D28;
  max-width: 390px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 88px;
}
.page { padding: 0 16px; }
.header {
  padding-top: 48px;
  padding-bottom: 12px;
}
.page-title { font-size: 22px; font-weight: 700; }
.profile-card {
  background: #FFFDFA;
  border-radius: 22px;
  padding: 24px;
  box-shadow: 0 10px 28px rgba(58, 45, 40, 0.08);
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 12px;
}
.profile-avatar {
  width: 68px; height: 68px;
  border-radius: 50%;
  background: linear-gradient(135deg, #B88363, #C87E5D);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Caveat', cursive;
  font-size: 32px;
  color: #FBF8F5;
  flex-shrink: 0;
}
.profile-info { flex: 1; }
.profile-name { font-size: 18px; font-weight: 700; color: #3A2D28; }
.profile-role { font-size: 13px; color: #9B9189; margin-top: 4px; }
.section-title {
  font-size: 18px;
  font-weight: 700;
  color: #3A2D28;
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-dot { width: 8px; height: 8px; border-radius: 50%; background: #B88363; }
.settings-card {
  background: #FFFDFA;
  border-radius: 22px;
  padding: 8px 16px;
  box-shadow: 0 10px 28px rgba(58, 45, 40, 0.08);
}
.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  border-bottom: 1.5px dashed rgba(195, 170, 150, 0.22);
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 15px; color: #3A2D28; }
.setting-control {
  display: flex;
  align-items: center;
  gap: 8px;
}
.setting-input {
  width: 64px;
  background: #F0EBE5;
  border: none;
  border-radius: 10px;
  padding: 8px 10px;
  text-align: right;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: #3A2D28;
}
.setting-unit { font-size: 13px; color: #9B9189; }
.toggle {
  width: 48px; height: 28px;
  border-radius: 999px;
  background: #B88363;
  position: relative;
}
.toggle::after {
  content: '';
  position: absolute;
  top: 3px; right: 3px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #FFFDFA;
}
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  max-width: 390px;
  margin: 0 auto;
  height: 68px;
  background: rgba(251, 248, 245, 0.92);
  backdrop-filter: blur(18px);
  border-top: 1px solid rgba(195, 170, 150, 0.12);
  display: flex;
  justify-content: space-around;
  align-items: center;
}
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #B9AEA4; font-size: 11px; position: relative; }
.tab-item.active { color: #3A2D28; }
.tab-item.active .tab-icon { color: #B88363; }
.tab-dot { width: 4px; height: 4px; border-radius: 50%; background: #B88363; position: absolute; top: 8px; }
</style>
</head>
<body data-page-id="profile" data-tab-id="tab-profile">
<div class="page">
  <header class="header">
    <h1 class="page-title">我的</h1>
  </header>

  <div class="profile-card">
    <div class="profile-avatar" data-ui-id="profile-avatar">李</div>
    <div class="profile-info">
      <div class="profile-name" data-ui-id="profile-name">李主理</div>
      <div class="profile-role">手作·印记 · 主理人</div>
    </div>
  </div>

  <h2 class="section-title"><span class="section-dot"></span>积分规则</h2>
  <div class="settings-card">
    <div class="setting-row">
      <span class="setting-label">每日签到积分</span>
      <div class="setting-control">
        <input class="setting-input" data-ui-id="profile-check-in-points-setting" type="number" value="5" />
        <span class="setting-unit">分</span>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">消费积分比例</span>
      <div class="setting-control">
        <input class="setting-input" data-ui-id="profile-spend-ratio-setting" type="number" value="1" />
        <span class="setting-unit">元/分</span>
      </div>
    </div>
  </div>

  <h2 class="section-title"><span class="section-dot"></span>沉睡提醒</h2>
  <div class="settings-card">
    <div class="setting-row">
      <span class="setting-label">沉睡阈值</span>
      <div class="setting-control">
        <input class="setting-input" data-ui-id="profile-sleeping-threshold-setting" type="number" value="45" />
        <span class="setting-unit">天</span>
      </div>
    </div>
  </div>

  <h2 class="section-title"><span class="section-dot"></span>通知</h2>
  <div class="settings-card">
    <div class="setting-row">
      <span class="setting-label">库存预警通知</span>
      <div class="toggle" data-ui-id="profile-notification-toggle"></div>
    </div>
  </div>
</div>

<nav class="tabbar">
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>首页标签</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>首页</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>会员列表标签</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span>会员</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>课程日历标签</title><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>课程</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>库存管理标签</title><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    <span>库存</span>
  </div>
  <div class="tab-item active">
    <div class="tab-dot"></div>
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>我的设置标签</title><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>我的</span>
  </div>
</nav>
</body>
</html>
