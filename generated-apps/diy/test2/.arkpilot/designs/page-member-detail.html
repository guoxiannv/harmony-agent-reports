<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 - 会员详情</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: linear-gradient(180deg, #FBF8F5 0%, #F0EBE5 55%, #E9E3DA 100%);
  color: #3A2D28;
  max-width: 390px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 32px;
}
.page { padding: 0 16px; }
.header {
  padding-top: 48px;
  padding-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.back-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: #FFFDFA;
  border: 1px solid rgba(195, 170, 150, 0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #3A2D28;
}
.page-title { font-size: 22px; font-weight: 700; flex: 1; }
.edit-btn {
  font-size: 14px;
  color: #B88363;
  font-weight: 600;
  background: transparent;
  border: none;
}
.profile-card {
  background: #FFFDFA;
  border-radius: 22px;
  padding: 22px;
  box-shadow: 0 10px 28px rgba(58, 45, 40, 0.08);
  text-align: center;
  position: relative;
}
.profile-avatar {
  width: 84px; height: 84px;
  border-radius: 50%;
  background: linear-gradient(135deg, #E9E3DA, #D9C8B8);
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 32px; font-weight: 500;
  color: #5D4237;
  margin: 0 auto 14px;
}
.profile-name {
  font-size: 22px;
  font-weight: 700;
  color: #3A2D28;
  margin-bottom: 4px;
}
.profile-phone { font-size: 13px; color: #9B9189; margin-bottom: 12px; }
.profile-points {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
  background: rgba(217, 169, 109, 0.18);
  padding: 8px 16px;
  border-radius: 999px;
  color: #8F6A3A;
  margin-bottom: 12px;
}
.profile-points-value { font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500; }
.profile-points-label { font-size: 13px; }
.sleeping-badge {
  display: inline-block;
  background: #C87E5D;
  color: #FBF8F5;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
}
.tags-section { margin-top: 20px; }
.section-title {
  font-size: 18px;
  font-weight: 700;
  color: #3A2D28;
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-dot { width: 8px; height: 8px; border-radius: 50%; background: #B88363; }
.tags-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tag {
  background: rgba(184, 131, 99, 0.12);
  color: #5D4237;
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 500;
}
.gallery-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.gallery-item {
  aspect-ratio: 1 / 1;
  border-radius: 18px;
  background: #E9E3DA;
  box-shadow: 0 6px 16px rgba(58, 45, 40, 0.1);
  border: 2px solid #FFFDFA;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #B9AEA4;
  font-size: 13px;
}
.gallery-item:nth-child(odd) { transform: rotate(-1.5deg); }
.gallery-item:nth-child(even) { transform: rotate(1.5deg); }
.history-card {
  background: #FFFDFA;
  border-radius: 22px;
  padding: 16px;
  box-shadow: 0 10px 28px rgba(58, 45, 40, 0.08);
}
.history-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1.5px dashed rgba(195, 170, 150, 0.22);
}
.history-item:last-child { border-bottom: none; }
.history-left { display: flex; align-items: center; gap: 10px; }
.history-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: rgba(184, 131, 99, 0.1);
  display: flex; align-items: center; justify-content: center;
  color: #B88363;
}
.history-text { font-size: 14px; color: #3A2D28; }
.history-time { font-size: 12px; color: #9B9189; margin-top: 2px; }
.history-value {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
}
.positive { color: #7E9273; }
.negative { color: #C87E5D; }
.empty-state {
  text-align: center;
  padding: 32px 20px;
  color: #9B9189;
  font-size: 13px;
}
</style>
</head>
<body data-page-id="member-detail">
<div class="page">
  <header class="header">
    <button class="back-btn" data-ui-id="member-detail-back-button" aria-label="返回">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1 class="page-title">会员详情</h1>
    <button class="edit-btn" data-ui-id="member-detail-edit-button">编辑</button>
  </header>

  <div class="profile-card">
    <div class="profile-avatar">林</div>
    <div class="profile-name" data-ui-id="member-detail-name">林小陶</div>
    <div class="profile-phone">138 **** 6677</div>
    <div class="profile-points">
      <span class="profile-points-value" data-ui-id="member-detail-points">368</span>
      <span class="profile-points-label">积分</span>
    </div>
    <div class="sleeping-badge" data-ui-id="member-detail-sleeping-badge">沉睡 12 天</div>
  </div>

  <div class="tags-section">
    <h2 class="section-title"><span class="section-dot"></span>擅长工艺</h2>
    <div class="tags-row" data-ui-id="member-detail-craft-tags">
      <span class="tag">陶艺</span>
      <span class="tag">银饰</span>
      <span class="tag">皮具</span>
    </div>
  </div>

  <h2 class="section-title"><span class="section-dot"></span>作品集</h2>
  <div class="gallery-grid" data-ui-id="member-detail-gallery-list">
    <div class="gallery-item" data-ui-id="member-gallery-1">作品图 1</div>
    <div class="gallery-item" data-ui-id="member-gallery-2">作品图 2</div>
    <div class="gallery-item" data-ui-id="member-gallery-3">作品图 3</div>
    <div class="gallery-item" data-ui-id="member-gallery-4">作品图 4</div>
  </div>
  <div class="empty-state" data-ui-id="member-gallery-empty" style="display:none">还没有上传作品，点击编辑添加</div>

  <h2 class="section-title"><span class="section-dot"></span>积分明细</h2>
  <div class="history-card">
    <div class="history-list" data-ui-id="member-detail-points-history-list">
      <div class="history-item" data-ui-id="member-points-item-1">
        <div class="history-left">
          <div class="history-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>签到积分记录图标</title><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div>
            <div class="history-text">到店签到</div>
            <div class="history-time">2026-06-20 10:23</div>
          </div>
        </div>
        <div class="history-value positive">+5</div>
      </div>
      <div class="history-item" data-ui-id="member-points-item-2">
        <div class="history-left">
          <div class="history-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>课程积分记录图标</title><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </div>
          <div>
            <div class="history-text">完成课程「陶艺拉坯入门」</div>
            <div class="history-time">2026-06-15 16:40</div>
          </div>
        </div>
        <div class="history-value positive">+30</div>
      </div>
      <div class="history-item" data-ui-id="member-points-item-3">
        <div class="history-left">
          <div class="history-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>兑换积分记录图标</title><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </div>
          <div>
            <div class="history-text">兑换材料包</div>
            <div class="history-time">2026-06-10 14:05</div>
          </div>
        </div>
        <div class="history-value negative">-50</div>
      </div>
    </div>
    <div class="empty-state" data-ui-id="member-points-empty" style="display:none">暂无积分记录</div>
  </div>
</div>
</body>
</html>
