<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 - 库存管理</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: linear-gradient(180deg, #FBF8F5 0%, #F0EBE5 55%, #E9E3DA 100%);
  color: #3A2D28;
  max-width: 390px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 88px;
}
.page { padding: 0 16px; }
.header {
  padding-top: 48px;
  padding-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.page-title { font-size: 22px; font-weight: 700; }
.add-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: #B88363;
  color: #FBF8F5;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 18px rgba(184, 131, 99, 0.32);
}
.summary-card {
  background: #3A2D28;
  border-radius: 22px;
  padding: 18px;
  color: #FBF8F5;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 12px 0 16px;
  box-shadow: 0 10px 28px rgba(58, 45, 40, 0.16);
}
.summary-item { text-align: center; }
.summary-value {
  font-family: 'DM Mono', monospace;
  font-size: 24px;
  font-weight: 500;
  color: #D9A96D;
}
.summary-label { font-size: 12px; color: rgba(251,248,245,0.7); margin-top: 4px; }
.search-input {
  width: 100%;
  background: #FFFDFA;
  border: 1.5px solid rgba(195, 170, 150, 0.25);
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 14px;
  color: #3A2D28;
  outline: none;
  margin-bottom: 16px;
}
.search-input::placeholder { color: #C8BBAF; }
.inventory-list { display: flex; flex-direction: column; gap: 12px; }
.inventory-card {
  background: #FFFDFA;
  border-radius: 22px;
  padding: 16px;
  box-shadow: 0 10px 28px rgba(58, 45, 40, 0.08);
  display: flex;
  align-items: center;
  gap: 14px;
}
.inventory-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  background: rgba(184, 131, 99, 0.1);
  display: flex; align-items: center; justify-content: center;
  color: #B88363;
  flex-shrink: 0;
}
.inventory-info { flex: 1; }
.inventory-name { font-size: 16px; font-weight: 600; color: #3A2D28; }
.inventory-meta { font-size: 12px; color: #9B9189; margin-top: 4px; }
.inventory-qty {
  text-align: right;
}
.qty-value {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  font-weight: 500;
  color: #3A2D28;
}
.qty-unit { font-size: 12px; color: #9B9189; }
.warning-badge {
  display: inline-block;
  background: #F5E1D6;
  color: #A2573E;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  margin-top: 4px;
}
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: #9B9189;
  font-size: 13px;
}
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  max-width: 390px;
  margin: 0 auto;
  height: 68px;
  background: rgba(251, 248, 245, 0.92);
  backdrop-filter: blur(18px);
  border-top: 1px solid rgba(195, 170, 150, 0.12);
  display: flex;
  justify-content: space-around;
  align-items: center;
}
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #B9AEA4; font-size: 11px; position: relative; }
.tab-item.active { color: #3A2D28; }
.tab-item.active .tab-icon { color: #B88363; }
.tab-dot { width: 4px; height: 4px; border-radius: 50%; background: #B88363; position: absolute; top: 8px; }
</style>
</head>
<body data-page-id="inventory" data-tab-id="tab-inventory">
<div class="page">
  <header class="header">
    <h1 class="page-title">库存管理</h1>
    <button class="add-btn" data-ui-id="inventory-add-button" aria-label="新增材料">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>新增库存材料按钮</title><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </header>

  <div class="summary-card">
    <div class="summary-item">
      <div class="summary-value">24</div>
      <div class="summary-label">材料种类</div>
    </div>
    <div class="summary-item">
      <div class="summary-value" data-ui-id="inventory-low-stock-badge">3</div>
      <div class="summary-label">库存预警</div>
    </div>
    <div class="summary-item">
      <div class="summary-value">8</div>
      <div class="summary-label">今日扣减</div>
    </div>
  </div>

  <input class="search-input" data-ui-id="inventory-search-input" type="text" placeholder="搜索材料名称" />

  <div class="inventory-list" data-ui-id="inventory-list">
    <div class="inventory-card" data-ui-id="inventory-item-1">
      <div class="inventory-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>陶土材料图标</title><circle cx="12" cy="12" r="10"/><path d="M8 12s1.5 2 4 2 4-2 4-2"/></svg>
      </div>
      <div class="inventory-info">
        <div class="inventory-name">高白泥</div>
        <div class="inventory-meta">陶艺 · 安全库存 2kg</div>
      </div>
      <div class="inventory-qty">
        <div class="qty-value">8.2</div>
        <div class="qty-unit">kg</div>
      </div>
    </div>

    <div class="inventory-card" data-ui-id="inventory-item-2">
      <div class="inventory-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>釉料材料图标</title><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
      </div>
      <div class="inventory-info">
        <div class="inventory-name">透明釉</div>
        <div class="inventory-meta">陶艺 · 安全库存 200ml</div>
      </div>
      <div class="inventory-qty">
        <div class="qty-value">120</div>
        <div class="qty-unit">ml</div>
        <div class="warning-badge">库存不足</div>
      </div>
    </div>

    <div class="inventory-card" data-ui-id="inventory-item-3">
      <div class="inventory-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>木材材料图标</title><path d="M3 21h18"/><path d="M5 21V7l8-4 8 4v14"/></svg>
      </div>
      <div class="inventory-info">
        <div class="inventory-name">黑胡桃木块</div>
        <div class="inventory-meta">木作 · 安全库存 5 块</div>
      </div>
      <div class="inventory-qty">
        <div class="qty-value">18</div>
        <div class="qty-unit">块</div>
      </div>
    </div>
  </div>

  <div class="empty-state" data-ui-id="inventory-empty-state" style="display:none">还没有材料，点击右上角添加库存</div>
</div>

<nav class="tabbar">
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>首页标签</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>首页</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>会员列表标签</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span>会员</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>课程日历标签</title><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>课程</span>
  </div>
  <div class="tab-item active">
    <div class="tab-dot"></div>
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>库存管理标签</title><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    <span>库存</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>我的设置标签</title><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>我的</span>
  </div>
</nav>
</body>
</html>
