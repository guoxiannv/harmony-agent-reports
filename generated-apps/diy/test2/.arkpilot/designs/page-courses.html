<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 - 课程日历</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: linear-gradient(180deg, #FBF8F5 0%, #F0EBE5 55%, #E9E3DA 100%);
  color: #3A2D28;
  max-width: 390px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 88px;
}
.page { padding: 0 16px; }
.header {
  padding-top: 48px;
  padding-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.page-title { font-size: 22px; font-weight: 700; }
.add-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: #B88363;
  color: #FBF8F5;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 18px rgba(184, 131, 99, 0.32);
}
.calendar-card {
  background: #FFFDFA;
  border-radius: 22px;
  padding: 18px;
  box-shadow: 0 10px 28px rgba(58, 45, 40, 0.08);
  margin-top: 12px;
}
.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.calendar-month {
  font-size: 16px;
  font-weight: 700;
}
.calendar-nav {
  display: flex;
  gap: 8px;
}
.calendar-nav button {
  width: 32px; height: 32px;
  border-radius: 10px;
  background: #F0EBE5;
  border: none;
  display: flex; align-items: center; justify-content: center;
  color: #3A2D28;
}
.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 12px;
  color: #9B9189;
  margin-bottom: 8px;
}
.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.day {
  aspect-ratio: 1;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #3A2D28;
  background: transparent;
  position: relative;
}
.day.selected {
  background: #B88363;
  color: #FBF8F5;
}
.day.other { color: #C8BBAF; }
.day-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #C87E5D;
  position: absolute;
  bottom: 6px;
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  color: #3A2D28;
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-dot { width: 8px; height: 8px; border-radius: 50%; background: #B88363; }
.course-list { display: flex; flex-direction: column; gap: 12px; }
.course-card {
  background: #FFFDFA;
  border-radius: 22px;
  padding: 16px;
  box-shadow: 0 10px 28px rgba(58, 45, 40, 0.08);
  display: flex;
  gap: 14px;
}
.course-time {
  width: 56px;
  text-align: center;
  flex-shrink: 0;
}
.course-time-hour { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: #B88363; }
.course-time-period { font-size: 11px; color: #9B9189; margin-top: 2px; }
.course-info { flex: 1; }
.course-title { font-size: 16px; font-weight: 600; color: #3A2D28; }
.course-meta { font-size: 13px; color: #9B9189; margin-top: 4px; }
.course-tags { display: flex; gap: 6px; margin-top: 10px; }
.tag {
  background: rgba(126, 146, 115, 0.12);
  color: #4D5C44;
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 500;
}
.tag.warning {
  background: #F5E1D6;
  color: #A2573E;
}
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #9B9189;
  font-size: 13px;
}
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  max-width: 390px;
  margin: 0 auto;
  height: 68px;
  background: rgba(251, 248, 245, 0.92);
  backdrop-filter: blur(18px);
  border-top: 1px solid rgba(195, 170, 150, 0.12);
  display: flex;
  justify-content: space-around;
  align-items: center;
}
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #B9AEA4; font-size: 11px; position: relative; }
.tab-item.active { color: #3A2D28; }
.tab-item.active .tab-icon { color: #B88363; }
.tab-dot { width: 4px; height: 4px; border-radius: 50%; background: #B88363; position: absolute; top: 8px; }
</style>
</head>
<body data-page-id="courses" data-tab-id="tab-courses">
<div class="page">
  <header class="header">
    <h1 class="page-title">课程日历</h1>
    <button class="add-btn" data-ui-id="courses-add-button" aria-label="新增课程">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>新增课程按钮</title><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </header>

  <div class="calendar-card" data-ui-id="courses-date-picker">
    <div class="calendar-header">
      <div class="calendar-month">2026 年 6 月</div>
      <div class="calendar-nav">
        <button aria-label="上个月"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>切换到上个月</title><polyline points="15 18 9 12 15 6"/></svg></button>
        <button aria-label="下个月"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>切换到下个月</title><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </div>
    <div class="weekdays">
      <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
    </div>
    <div class="days">
      <div class="day other">31</div>
      <div class="day">1</div>
      <div class="day">2</div>
      <div class="day">3</div>
      <div class="day">4</div>
      <div class="day">5</div>
      <div class="day">6</div>
      <div class="day">7</div>
      <div class="day">8</div>
      <div class="day">9</div>
      <div class="day">10</div>
      <div class="day">11</div>
      <div class="day">12</div>
      <div class="day">13</div>
      <div class="day">14</div>
      <div class="day">15</div>
      <div class="day">16</div>
      <div class="day">17</div>
      <div class="day">18</div>
      <div class="day">19</div>
      <div class="day">20</div>
      <div class="day selected">21</div>
      <div class="day">22</div>
      <div class="day">23</div>
      <div class="day">24</div>
      <div class="day">25</div>
      <div class="day">26</div>
      <div class="day">27</div>
      <div class="day">28</div>
      <div class="day">29</div>
      <div class="day">30</div>
      <div class="day other">1</div>
      <div class="day other">2</div>
      <div class="day other">3</div>
      <div class="day other">4</div>
    </div>
  </div>

  <h2 class="section-title"><span class="section-dot"></span>今日课程</h2>
  <div class="course-list" data-ui-id="courses-list">
    <div class="course-card" data-ui-id="course-card-1">
      <div class="course-time">
        <div class="course-time-hour">14:00</div>
        <div class="course-time-period">90 分钟</div>
      </div>
      <div class="course-info">
        <div class="course-title">陶艺拉坯入门</div>
        <div class="course-meta">3 人已预约 / 限 6 人 · 积分奖励 +30</div>
        <div class="course-tags">
          <span class="tag">陶艺</span>
          <span class="tag">剩余 3 席</span>
        </div>
      </div>
    </div>

    <div class="course-card" data-ui-id="course-card-2">
      <div class="course-time">
        <div class="course-time-hour">16:30</div>
        <div class="course-time-period">120 分钟</div>
      </div>
      <div class="course-info">
        <div class="course-title">木作小 Spoon</div>
        <div class="course-meta">2 人已预约 / 限 4 人 · 积分奖励 +40</div>
        <div class="course-tags">
          <span class="tag">木作</span>
          <span class="tag warning">陶土库存不足</span>
        </div>
      </div>
    </div>
  </div>

  <div class="empty-state" data-ui-id="courses-empty-state" style="display:none">
    今日暂无课程，点击右上角添加
  </div>
</div>

<nav class="tabbar">
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>首页标签</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>首页</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>会员列表标签</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span>会员</span>
  </div>
  <div class="tab-item active">
    <div class="tab-dot"></div>
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>课程日历标签</title><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>课程</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>库存管理标签</title><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    <span>库存</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>我的设置标签</title><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>我的</span>
  </div>
</nav>
</body>
</html>
