<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 - 会员</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: linear-gradient(180deg, #FBF8F5 0%, #F0EBE5 55%, #E9E3DA 100%);
  color: #3A2D28;
  max-width: 390px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 88px;
}
.page { padding: 0 16px; }
.header {
  padding-top: 48px;
  padding-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.page-title {
  font-size: 22px;
  font-weight: 700;
  color: #3A2D28;
}
.add-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: #B88363;
  color: #FBF8F5;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 18px rgba(184, 131, 99, 0.32);
}
.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 12px 0 16px;
}
.search-input {
  flex: 1;
  background: #FFFDFA;
  border: 1.5px solid rgba(195, 170, 150, 0.25);
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 14px;
  color: #3A2D28;
  outline: none;
}
.search-input::placeholder { color: #C8BBAF; }
.filter-btn {
  width: 44px; height: 44px;
  background: #F0EBE5;
  border: none;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #3A2D28;
}
.member-list { display: flex; flex-direction: column; gap: 12px; }
.member-card {
  background: #FFFDFA;
  border-radius: 22px;
  padding: 16px;
  box-shadow: 0 10px 28px rgba(58, 45, 40, 0.08);
  display: flex;
  align-items: center;
  gap: 14px;
}
.member-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, #E9E3DA, #D9C8B8);
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 18px; font-weight: 500;
  color: #5D4237;
  flex-shrink: 0;
}
.member-info { flex: 1; }
.member-name {
  font-size: 16px;
  font-weight: 600;
  color: #3A2D28;
  display: flex;
  align-items: center;
  gap: 8px;
}
.member-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.tag {
  background: rgba(184, 131, 99, 0.12);
  color: #5D4237;
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 500;
}
.tag.sleeping {
  background: #C87E5D;
  color: #FBF8F5;
}
.member-points {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: #B88363;
  text-align: right;
}
.member-points-label { font-size: 11px; color: #9B9189; font-family: 'Noto Sans SC', sans-serif; }
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: #9B9189;
}
.empty-state svg { margin-bottom: 12px; color: #C8BBAF; }
.empty-title { font-size: 16px; font-weight: 600; color: #3A2D28; margin-bottom: 6px; }
.empty-desc { font-size: 13px; }
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  max-width: 390px;
  margin: 0 auto;
  height: 68px;
  background: rgba(251, 248, 245, 0.92);
  backdrop-filter: blur(18px);
  border-top: 1px solid rgba(195, 170, 150, 0.12);
  display: flex;
  justify-content: space-around;
  align-items: center;
}
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #B9AEA4; font-size: 11px; }
.tab-item.active { color: #3A2D28; }
.tab-item.active .tab-icon { color: #B88363; }
.tab-dot {
  width: 4px; height: 4px; border-radius: 50%; background: #B88363;
  position: absolute; top: 8px;
}
</style>
</head>
<body data-page-id="members" data-tab-id="tab-members">
<div class="page">
  <header class="header">
    <h1 class="page-title">会员</h1>
    <button class="add-btn" data-ui-id="members-add-button" aria-label="新增会员">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>新增会员按钮</title><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </header>

  <div class="search-bar">
    <input class="search-input" data-ui-id="members-search-input" type="text" placeholder="搜索昵称或手机号" />
    <button class="filter-btn" data-ui-id="members-filter-button" aria-label="打开筛选">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>打开会员筛选面板</title><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
    </button>
  </div>

  <div class="member-list" data-ui-id="members-list">
    <div class="member-card" data-ui-id="member-card-1">
      <div class="member-avatar">林</div>
      <div class="member-info">
        <div class="member-name">林小陶</div>
        <div class="member-tags">
          <span class="tag">陶艺</span>
          <span class="tag">银饰</span>
        </div>
      </div>
      <div class="member-points">
        <div>368</div>
        <div class="member-points-label">积分</div>
      </div>
    </div>

    <div class="member-card" data-ui-id="member-card-2">
      <div class="member-avatar">陈</div>
      <div class="member-info">
        <div class="member-name">陈木</div>
        <div class="member-tags">
          <span class="tag">木作</span>
        </div>
      </div>
      <div class="member-points">
        <div>520</div>
        <div class="member-points-label">积分</div>
      </div>
    </div>

    <div class="member-card" data-ui-id="member-card-3">
      <div class="member-avatar">周</div>
      <div class="member-info">
        <div class="member-name">周皮</div>
        <div class="member-tags">
          <span class="tag">皮具</span>
          <span class="tag sleeping">沉睡 52 天</span>
        </div>
      </div>
      <div class="member-points">
        <div>86</div>
        <div class="member-points-label">积分</div>
      </div>
    </div>
  </div>

  <div class="empty-state" data-ui-id="members-empty-state" style="display:none">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><title>会员列表为空</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <div class="empty-title">还没有会员</div>
    <div class="empty-desc">点击右上角添加第一位会员，开始记录他们的手作印记</div>
  </div>
</div>

<nav class="tabbar">
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>首页标签</title><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>首页</span>
  </div>
  <div class="tab-item active" style="position:relative">
    <div class="tab-dot"></div>
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>会员列表标签</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span>会员</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>课程日历标签</title><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>课程</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>库存管理标签</title><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    <span>库存</span>
  </div>
  <div class="tab-item">
    <svg class="tab-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>我的设置标签</title><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>我的</span>
  </div>
</nav>
</body>
</html>
