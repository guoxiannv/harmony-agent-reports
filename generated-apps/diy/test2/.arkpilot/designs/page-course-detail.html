<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手作·印记 - 课程详情</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: linear-gradient(180deg, #FBF8F5 0%, #F0EBE5 55%, #E9E3DA 100%);
  color: #3A2D28;
  max-width: 390px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 100px;
}
.page { padding: 0 16px; }
.header {
  padding-top: 48px;
  padding-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.back-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: #FFFDFA;
  border: 1px solid rgba(195, 170, 150, 0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #3A2D28;
}
.page-title { font-size: 22px; font-weight: 700; flex: 1; }
.hero-card {
  background: #3A2D28;
  border-radius: 26px;
  padding: 24px;
  color: #FBF8F5;
  box-shadow: 0 12px 32px rgba(58, 45, 40, 0.18);
}
.hero-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 14px;
}
.hero-meta {
  display: flex;
  flex-direction: column;
  gap: 10px;
  font-size: 14px;
  color: rgba(251, 248, 245, 0.8);
}
.hero-meta-row { display: flex; align-items: center; gap: 10px; }
.hero-meta-icon { color: #D9A96D; }
.capacity-bar {
  margin-top: 16px;
  background: rgba(251, 248, 245, 0.12);
  border-radius: 999px;
  height: 8px;
  overflow: hidden;
}
.capacity-fill {
  width: 50%;
  height: 100%;
  background: #D9A96D;
  border-radius: 999px;
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  color: #3A2D28;
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-dot { width: 8px; height: 8px; border-radius: 50%; background: #B88363; }
.card {
  background: #FFFDFA;
  border-radius: 22px;
  padding: 16px;
  box-shadow: 0 10px 28px rgba(58, 45, 40, 0.08);
}
.material-item, .reservation-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1.5px dashed rgba(195, 170, 150, 0.22);
}
.material-item:last-child, .reservation-item:last-child { border-bottom: none; }
.material-name, .reservation-name { font-size: 14px; color: #3A2D28; }
.material-qty, .reservation-status {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: #B88363;
}
.warning-text { color: #C87E5D; }
.reservation-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(184, 131, 99, 0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #5D4237; font-weight: 500;
}
.reservation-left { display: flex; align-items: center; gap: 10px; }
.action-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  max-width: 390px;
  margin: 0 auto;
  padding: 12px 16px 24px;
  background: rgba(251, 248, 245, 0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(195, 170, 150, 0.15);
  display: flex;
  gap: 12px;
}
.btn-primary {
  flex: 1;
  background: #B88363;
  color: #FBF8F5;
  border: none;
  padding: 14px;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 600;
  box-shadow: 0 6px 18px rgba(184, 131, 99, 0.32);
}
.btn-secondary {
  flex: 1;
  background: transparent;
  border: 1.5px solid #B88363;
  color: #B88363;
  padding: 14px;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 600;
}
.empty-state {
  text-align: center;
  padding: 24px 20px;
  color: #9B9189;
  font-size: 13px;
}
</style>
</head>
<body data-page-id="course-detail">
<div class="page">
  <header class="header">
    <button class="back-btn" data-ui-id="course-detail-back-button" aria-label="返回">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>返回上一页</title><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1 class="page-title">课程详情</h1>
  </header>

  <div class="hero-card">
    <div class="hero-title" data-ui-id="course-detail-title">陶艺拉坯入门</div>
    <div class="hero-meta">
      <div class="hero-meta-row">
        <span class="hero-meta-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>课程时间图标</title><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </span>
        <span data-ui-id="course-detail-time">2026-06-21 14:00 · 90 分钟</span>
      </div>
      <div class="hero-meta-row">
        <span class="hero-meta-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>课程容量图标</title><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span>
        <span data-ui-id="course-detail-capacity">3 人已预约 / 限 6 人</span>
      </div>
    </div>
    <div class="capacity-bar"><div class="capacity-fill"></div></div>
  </div>

  <h2 class="section-title"><span class="section-dot"></span>关联材料</h2>
  <div class="card">
    <div class="material-list" data-ui-id="course-detail-material-list">
      <div class="material-item" data-ui-id="course-material-1">
        <span class="material-name">高白泥</span>
        <span class="material-qty">每人 500g · 库存 8.2kg</span>
      </div>
      <div class="material-item" data-ui-id="course-material-2">
        <span class="material-name">透明釉</span>
        <span class="material-qty warning-text">每人 30ml · 库存 120ml ⚠</span>
      </div>
    </div>
    <div class="empty-state" data-ui-id="course-materials-empty" style="display:none">未配置关联材料</div>
  </div>

  <h2 class="section-title"><span class="section-dot"></span>已预约会员</h2>
  <div class="card">
    <div class="reservation-list" data-ui-id="course-detail-reservations-list">
      <div class="reservation-item" data-ui-id="course-reservation-1">
        <div class="reservation-left">
          <div class="reservation-avatar">林</div>
          <span class="reservation-name">林小陶</span>
        </div>
        <span class="reservation-status">已预约</span>
      </div>
      <div class="reservation-item" data-ui-id="course-reservation-2">
        <div class="reservation-left">
          <div class="reservation-avatar">陈</div>
          <span class="reservation-name">陈木</span>
        </div>
        <span class="reservation-status">已预约</span>
      </div>
    </div>
    <div class="empty-state" data-ui-id="course-reservations-empty" style="display:none">暂无人预约</div>
  </div>
</div>

<div class="action-bar">
  <button class="btn-secondary" data-ui-id="course-detail-cancel-booking-button">取消预约</button>
  <button class="btn-primary" data-ui-id="course-detail-book-button">预约会员</button>
</div>
</body>
</html>
