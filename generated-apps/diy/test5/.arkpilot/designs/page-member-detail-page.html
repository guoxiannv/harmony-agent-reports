<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 会员详情</title>
  <style>
    :root {
      --clay-white: #F7F4EF;
      --clay-brown: #B88B6F;
      --clay-ochre: #A2593B;
      --clay-dark: #3E2F27;
      --clay-gray: #7A6A5C;
      --kiln-green: #6E8078;
      --fire-orange: #E08A52;
      --warn-red: #B84A3E;
      --card-bg: #FFFFFF;
      --surface-khaki: #EBE2D7;
      --border-clay: rgba(162, 89, 59, 0.10);
      --shadow-card: rgba(62, 47, 39, 0.10) 0px 6px 20px -4px;
      --shadow-btn: rgba(162, 89, 59, 0.22) 0px 4px 14px 0px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: #E8E1D8; }
    body {
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--clay-dark);
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: var(--clay-white);
    }
    .page-root { padding-bottom: 32px; }
    .top-nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(247, 244, 239, 0.92);
      backdrop-filter: blur(14px);
      padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(162, 89, 59, 0.08);
    }
    .nav-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface-khaki);
      border: 1px solid rgba(162, 89, 59, 0.12);
      display: flex; align-items: center; justify-content: center;
    }
    .nav-title { font-size: 17px; font-weight: 600; }
    .profile-hero {
      background: linear-gradient(165deg, #CBA58C 0%, #B88B6F 45%, #F7F4EF 100%);
      padding: 24px 16px 28px;
      text-align: center;
    }
    .profile-avatar {
      width: 88px; height: 88px; border-radius: 50%;
      background: var(--clay-white);
      margin: 0 auto;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 600; color: var(--clay-ochre);
      border: 3px solid rgba(247, 244, 239, 0.6);
      box-shadow: var(--shadow-card);
    }
    .profile-name {
      font-size: 22px; font-weight: 600;
      margin-top: 12px; letter-spacing: 0.4px;
    }
    .profile-meta { font-size: 13px; color: var(--clay-gray); margin-top: 4px; }
    .points-orb {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(247, 244, 239, 0.85);
      border: 1px solid rgba(162, 89, 59, 0.15);
      border-radius: 999px;
      padding: 8px 18px;
      margin-top: 16px;
    }
    .points-orb .num { font-size: 24px; font-weight: 700; color: var(--clay-ochre); }
    .points-orb .lab { font-size: 12px; color: var(--clay-gray); }
    .action-row {
      display: flex; justify-content: center; gap: 16px;
      margin-top: 16px;
    }
    .action-pill {
      background: var(--clay-ochre);
      color: var(--clay-white);
      border: none;
      border-radius: 999px;
      padding: 10px 22px;
      font-size: 14px; font-weight: 600;
      box-shadow: var(--shadow-btn);
    }
    .action-pill.ghost {
      background: rgba(247, 244, 239, 0.85);
      color: var(--clay-ochre);
      border: 1.5px solid var(--clay-ochre);
      box-shadow: none;
    }
    .section { padding: 0 16px; margin-top: 24px; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .section-title { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; margin: 0; }
    .section-more { font-size: 13px; color: var(--clay-ochre); font-weight: 500; }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-clay);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow-card);
    }
    .tag-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag {
      background: rgba(162, 89, 59, 0.10);
      color: var(--clay-ochre);
      font-size: 13px; font-weight: 500;
      padding: 6px 14px; border-radius: 999px;
    }
    .gallery {
      display: flex; gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .gallery-item {
      width: 104px; height: 104px; border-radius: 14px;
      background: var(--surface-khaki);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border: 1px dashed rgba(162, 89, 59, 0.25);
    }
    .add-work {
      width: 104px; height: 104px; border-radius: 14px;
      background: var(--surface-khaki);
      border: 1.5px dashed rgba(162, 89, 59, 0.35);
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--clay-ochre); font-size: 12px; font-weight: 500;
      gap: 6px;
    }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(162, 89, 59, 0.08);
    }
    .history-item:last-child { border-bottom: none; padding-bottom: 0; }
    .history-info { display: flex; align-items: center; gap: 10px; }
    .history-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--kiln-green);
    }
    .history-dot.earn { background: var(--fire-orange); }
    .history-dot.redeem { background: var(--clay-ochre); }
    .history-title { font-size: 14px; font-weight: 500; }
    .history-date { font-size: 11px; color: var(--clay-gray); margin-top: 2px; }
    .history-points { font-size: 15px; font-weight: 700; }
    .history-points.pos { color: var(--fire-orange); }
    .history-points.neg { color: var(--clay-dark); }
    .empty-state {
      text-align: center; padding: 24px 0; color: var(--clay-gray);
    }
    .empty-state .icon { margin-bottom: 8px; }
    .empty-state .text { font-family: "Kaiti", "STKaiti", cursive; font-size: 16px; }
  </style>
</head>
<body data-page-id="member-detail-page">
  <div class="page-root">
    <header class="top-nav">
      <button class="nav-btn" data-ui-id="member-detail-back" data-event="navigate-back" aria-label="返回">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3E2F27" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>返回上一页</title>
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <div class="nav-title">会员档案</div>
      <button class="nav-btn" data-ui-id="member-detail-edit" data-event="open-edit-member" aria-label="编辑会员">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3E2F27" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>编辑会员档案</title>
          <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
        </svg>
      </button>
    </header>

    <section class="profile-hero">
      <div class="profile-avatar" data-ui-id="member-detail-avatar">林</div>
      <div class="profile-name" data-ui-id="member-detail-name">林小溪</div>
      <div class="profile-meta">2025/02/15 入会 · 138 天 · 已签到今日</div>
      <div class="points-orb" data-ui-id="member-detail-points">
        <span class="num">286</span>
        <span class="lab">可用积分</span>
      </div>
      <div class="action-row">
        <button class="action-pill" data-ui-id="member-detail-signin-button" data-event="member-signin">今日签到</button>
        <button class="action-pill ghost" data-ui-id="member-detail-redeem-points" data-event="open-redeem-points">积分兑换</button>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">擅长工艺</h2>
      </div>
      <div class="card">
        <div class="tag-row" data-ui-id="member-detail-tags">
          <span class="tag" id="member-detail-tag-0">陶艺</span>
          <span class="tag" id="member-detail-tag-1">釉下彩</span>
          <span class="tag" id="member-detail-tag-2">手捏杯</span>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">作品图</h2>
        <span class="section-more" data-ui-id="member-detail-add-work" data-event="open-add-work">+ 添加作品</span>
      </div>
      <div class="card">
        <div class="gallery" data-ui-id="member-detail-works-gallery">
          <div class="gallery-item" id="member-detail-work-w1">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#B88B6F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <title>会员作品图占位</title>
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <div class="gallery-item" id="member-detail-work-w2">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#B88B6F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <title>会员作品图占位</title>
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <div class="add-work" data-ui-id="member-detail-add-work" data-event="open-add-work">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A2593B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>添加新作品</title>
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            添加作品
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">积分流水</h2>
        <span class="section-more">全部 →</span>
      </div>
      <div class="card" data-ui-id="member-detail-points-history">
        <div class="history-item" id="member-detail-points-record-r1">
          <div class="history-info">
            <div class="history-dot earn"></div>
            <div>
              <div class="history-title">签到奖励</div>
              <div class="history-date">06/22 09:30</div>
            </div>
          </div>
          <div class="history-points pos">+5</div>
        </div>
        <div class="history-item" id="member-detail-points-record-r2">
          <div class="history-info">
            <div class="history-dot redeem"></div>
            <div>
              <div class="history-title">课程消费：手捏陶杯入门</div>
              <div class="history-date">06/20 14:00</div>
            </div>
          </div>
          <div class="history-points neg">-200</div>
        </div>
        <div class="history-item" id="member-detail-points-record-r3">
          <div class="history-info">
            <div class="history-dot earn"></div>
            <div>
              <div class="history-title">课程预约奖励</div>
              <div class="history-date">06/18 10:12</div>
            </div>
          </div>
          <div class="history-points pos">+20</div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
