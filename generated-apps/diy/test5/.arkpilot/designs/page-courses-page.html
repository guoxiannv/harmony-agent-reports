<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 课程</title>
  <style>
    :root {
      --clay-white: #F7F4EF;
      --clay-brown: #B88B6F;
      --clay-ochre: #A2593B;
      --clay-dark: #3E2F27;
      --clay-gray: #7A6A5C;
      --kiln-green: #6E8078;
      --fire-orange: #E08A52;
      --warn-red: #B84A3E;
      --card-bg: #FFFFFF;
      --surface-khaki: #EBE2D7;
      --border-clay: rgba(162, 89, 59, 0.10);
      --shadow-card: rgba(62, 47, 39, 0.10) 0px 6px 20px -4px;
      --shadow-btn: rgba(162, 89, 59, 0.22) 0px 4px 14px 0px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: #E8E1D8; }
    body {
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--clay-dark);
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: var(--clay-white);
    }
    .page-root { padding-bottom: 84px; }
    .sticky-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(247, 244, 239, 0.92);
      backdrop-filter: blur(14px);
      padding: 14px 16px;
      border-bottom: 1px solid rgba(162, 89, 59, 0.08);
    }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    .page-title { font-size: 26px; font-weight: 600; letter-spacing: 0.6px; margin: 0; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface-khaki);
      border: 1px solid rgba(162, 89, 59, 0.15);
      display: flex; align-items: center; justify-content: center;
    }
    .view-toggle {
      display: flex; background: var(--surface-khaki);
      border-radius: 999px;
      padding: 4px;
      margin-top: 14px;
      width: fit-content;
    }
    .view-toggle button {
      border: none; background: transparent;
      padding: 7px 18px; border-radius: 999px;
      font-size: 13px; font-weight: 600; color: var(--clay-gray);
    }
    .view-toggle button.active { background: var(--clay-ochre); color: var(--clay-white); }
    .calendar-strip {
      display: flex; justify-content: space-between;
      margin-top: 16px; padding: 0 16px;
    }
    .day-cell {
      flex: 1; text-align: center;
      padding: 10px 0; border-radius: 14px;
      color: var(--clay-gray);
    }
    .day-cell.active { background: var(--clay-ochre); color: var(--clay-white); }
    .day-cell .dow { font-size: 11px; }
    .day-cell .dom { font-size: 16px; font-weight: 600; margin-top: 3px; }
    .section { padding: 0 16px; margin-top: 24px; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .section-title { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; margin: 0; }
    .course-timeline {
      position: relative; padding-left: 28px;
    }
    .course-timeline::before {
      content: "";
      position: absolute; left: 8px; top: 8px; bottom: 8px;
      width: 2px;
      background: rgba(162, 89, 59, 0.15);
      border-radius: 2px;
    }
    .timeline-item {
      position: relative;
      margin-bottom: 16px;
    }
    .timeline-dot {
      position: absolute; left: -24px; top: 18px;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--kiln-green);
      border: 2px solid var(--clay-white);
      box-shadow: 0 0 0 2px rgba(110, 128, 120, 0.25);
    }
    .timeline-dot.booked { background: var(--clay-ochre); box-shadow: 0 0 0 2px rgba(162, 89, 59, 0.25); }
    .course-card {
      background: var(--card-bg);
      border: 1px solid var(--border-clay);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: var(--shadow-card);
    }
    .course-card.booked { border: 1.5px solid rgba(162, 89, 59, 0.35); }
    .course-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .course-card-title { font-size: 16px; font-weight: 600; }
    .course-card-time { font-size: 12px; color: var(--clay-gray); margin-top: 4px; }
    .course-card-meta { font-size: 12px; color: var(--clay-gray); margin-top: 6px; }
    .course-card-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px;
    }
    .seats-left { font-size: 12px; color: var(--clay-gray); }
    .seats-left b { color: var(--clay-ochre); }
    .book-btn {
      background: var(--clay-ochre);
      color: var(--clay-white);
      border: none;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 13px; font-weight: 600;
    }
    .book-btn.ghost {
      background: transparent;
      color: var(--clay-gray);
      border: 1px solid rgba(122, 106, 92, 0.3);
    }
    .fab {
      position: fixed; bottom: 84px; right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--clay-ochre);
      border: none; color: var(--clay-white);
      box-shadow: var(--shadow-btn);
      display: flex; align-items: center; justify-content: center;
      z-index: 90;
    }
    .bottom-tab {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 390px; margin: 0 auto;
      height: 64px;
      background: #5A463A;
      border-top: 1px solid rgba(247, 244, 239, 0.12);
      display: flex; justify-content: space-around; align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: #D9C3A0; font-size: 11px; font-weight: 500;
      text-decoration: none;
    }
    .tab-item.active { color: var(--clay-white); }
    .tab-item svg { opacity: 0.75; }
    .tab-item.active svg { opacity: 1; }
  </style>
</head>
<body data-page-id="courses-page" data-tab-id="tab-courses">
  <div class="page-root">
    <header class="sticky-header">
      <div class="header-row">
        <h1 class="page-title">课程</h1>
        <button class="icon-btn" aria-label="课程设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3E2F27" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>打开课程设置</title>
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
          </svg>
        </button>
      </div>
      <div class="view-toggle" data-ui-id="courses-calendar-toggle">
        <button class="active">列表</button>
        <button>日历</button>
      </div>
    </header>

    <div class="calendar-strip" data-ui-id="courses-date-picker">
      <div class="day-cell">
        <div class="dow">一</div>
        <div class="dom">22</div>
      </div>
      <div class="day-cell active">
        <div class="dow">二</div>
        <div class="dom">23</div>
      </div>
      <div class="day-cell">
        <div class="dow">三</div>
        <div class="dom">24</div>
      </div>
      <div class="day-cell">
        <div class="dow">四</div>
        <div class="dom">25</div>
      </div>
      <div class="day-cell">
        <div class="dow">五</div>
        <div class="dom">26</div>
      </div>
      <div class="day-cell">
        <div class="dow">六</div>
        <div class="dom">27</div>
      </div>
      <div class="day-cell">
        <div class="dow">日</div>
        <div class="dom">28</div>
      </div>
    </div>

    <section class="section" data-ui-id="courses-list">
      <div class="section-header">
        <h2 class="section-title">6月23日 周二</h2>
        <span class="section-more">2 节课</span>
      </div>
      <div class="course-timeline">
        <div class="timeline-item" id="courses-item-c1">
          <div class="timeline-dot booked"></div>
          <div class="course-card booked">
            <div class="course-card-header">
              <div>
                <div class="course-card-title">手捏陶杯入门</div>
                <div class="course-card-time">10:00 - 12:00 · 2小时</div>
              </div>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#A2593B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <title>已预约标记</title>
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
            <div class="course-card-meta">已预约 4/6 人 · 陶土 0.5kg/人 · 釉下彩 1套/人</div>
            <div class="course-card-footer">
              <div class="seats-left">剩余 <b>2</b> 席</div>
              <button class="book-btn ghost" data-ui-id="courses-item-c1-book" data-event="navigate-course-booking">查看</button>
            </div>
          </div>
        </div>

        <div class="timeline-item" id="courses-item-c2">
          <div class="timeline-dot"></div>
          <div class="course-card">
            <div class="course-card-header">
              <div>
                <div class="course-card-title">釉下彩绘制</div>
                <div class="course-card-time">14:30 - 17:00 · 2.5小时</div>
              </div>
            </div>
            <div class="course-card-meta">已预约 2/6 人 · 颜料套装 1套/人</div>
            <div class="course-card-footer">
              <div class="seats-left">剩余 <b>4</b> 席</div>
              <button class="book-btn" data-ui-id="courses-item-c2-book" data-event="navigate-course-booking">预约</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <button class="fab" data-ui-id="courses-add-button" aria-label="新增课程">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F7F4EF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <title>新增课程</title>
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <nav class="bottom-tab">
    <a class="tab-item" href="#" data-tab-id="tab-home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>首页标签</title>
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>首页</span>
    </a>
    <a class="tab-item" href="#" data-tab-id="tab-members">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>会员标签</title>
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>会员</span>
    </a>
    <a class="tab-item active" href="#" data-tab-id="tab-courses">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>课程标签</title>
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>课程</span>
    </a>
    <a class="tab-item" href="#" data-tab-id="tab-inventory">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>库存标签</title>
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
        <path d="m3.3 7 8.7 5 8.7-5"/>
        <path d="M12 22V12"/>
      </svg>
      <span>库存</span>
    </a>
    <a class="tab-item" href="#" data-tab-id="tab-profile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>我的标签</title>
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20v-2a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v2"/>
      </svg>
      <span>我的</span>
    </a>
  </nav>
</body>
</html>
