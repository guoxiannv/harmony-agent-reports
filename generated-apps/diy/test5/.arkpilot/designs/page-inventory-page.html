<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 库存</title>
  <style>
    :root {
      --clay-white: #F7F4EF;
      --clay-brown: #B88B6F;
      --clay-ochre: #A2593B;
      --clay-dark: #3E2F27;
      --clay-gray: #7A6A5C;
      --kiln-green: #6E8078;
      --fire-orange: #E08A52;
      --warn-red: #B84A3E;
      --card-bg: #FFFFFF;
      --surface-khaki: #EBE2D7;
      --border-clay: rgba(162, 89, 59, 0.10);
      --shadow-card: rgba(62, 47, 39, 0.10) 0px 6px 20px -4px;
      --shadow-btn: rgba(162, 89, 59, 0.22) 0px 4px 14px 0px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: #E8E1D8; }
    body {
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--clay-dark);
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: var(--clay-white);
    }
    .page-root { padding-bottom: 84px; }
    .sticky-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(247, 244, 239, 0.92);
      backdrop-filter: blur(14px);
      padding: 14px 16px;
      border-bottom: 1px solid rgba(162, 89, 59, 0.08);
    }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    .page-title { font-size: 26px; font-weight: 600; letter-spacing: 0.6px; margin: 0; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface-khaki);
      border: 1px solid rgba(162, 89, 59, 0.15);
      display: flex; align-items: center; justify-content: center;
    }
    .search-box {
      margin-top: 12px;
      background: var(--surface-khaki);
      border: 1px solid rgba(162, 89, 59, 0.15);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .search-box input {
      border: none; background: transparent; outline: none;
      flex: 1; font-size: 14px; color: var(--clay-dark);
    }
    .search-box input::placeholder { color: rgba(122, 106, 92, 0.65); }
    .section { padding: 0 16px; margin-top: 20px; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .section-title { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; margin: 0; }
    .section-more { font-size: 13px; color: var(--clay-ochre); font-weight: 500; }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-clay);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: var(--shadow-card);
      margin-bottom: 12px;
    }
    .warning-card {
      background: rgba(184, 74, 62, 0.06);
      border: 1px solid rgba(184, 74, 62, 0.15);
    }
    .warning-card .warning-title {
      font-size: 14px; font-weight: 600; color: var(--warn-red);
      display: flex; align-items: center; gap: 6px;
    }
    .warning-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(184, 74, 62, 0.10);
    }
    .warning-item:last-child { border-bottom: none; padding-bottom: 0; }
    .warning-item-name { font-size: 14px; }
    .warning-item-status { font-size: 12px; color: var(--warn-red); font-weight: 600; }
    .inventory-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .inventory-name { font-size: 15px; font-weight: 600; }
    .inventory-unit { font-size: 12px; color: var(--clay-gray); }
    .inventory-qty { font-size: 20px; font-weight: 700; color: var(--clay-ochre); }
    .progress-wrap { margin-top: 10px; }
    .progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--clay-gray); margin-bottom: 5px; }
    .progress-track {
      height: 8px; border-radius: 999px;
      background: var(--surface-khaki);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #6E8078 0%, #7F9189 100%);
    }
    .progress-fill.warn { background: linear-gradient(90deg, #E08A52 0%, #D66E3A 100%); }
    .progress-fill.danger { background: linear-gradient(90deg, #B84A3E 0%, #A03E33 100%); }
    .inventory-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px;
    }
    .inventory-link { font-size: 13px; color: var(--clay-ochre); font-weight: 600; }
    .inventory-status { font-size: 12px; font-weight: 600; }
    .inventory-status.ok { color: var(--kiln-green); }
    .inventory-status.warn { color: var(--fire-orange); }
    .inventory-status.danger { color: var(--warn-red); }
    .fab {
      position: fixed; bottom: 84px; right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--clay-ochre);
      border: none; color: var(--clay-white);
      box-shadow: var(--shadow-btn);
      display: flex; align-items: center; justify-content: center;
      z-index: 90;
    }
    .bottom-tab {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 390px; margin: 0 auto;
      height: 64px;
      background: #5A463A;
      border-top: 1px solid rgba(247, 244, 239, 0.12);
      display: flex; justify-content: space-around; align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: #D9C3A0; font-size: 11px; font-weight: 500;
      text-decoration: none;
    }
    .tab-item.active { color: var(--clay-white); }
    .tab-item svg { opacity: 0.75; }
    .tab-item.active svg { opacity: 1; }
  </style>
</head>
<body data-page-id="inventory-page" data-tab-id="tab-inventory">
  <div class="page-root">
    <header class="sticky-header">
      <div class="header-row">
        <h1 class="page-title">库存</h1>
        <button class="icon-btn" aria-label="库存设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3E2F27" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>打开库存设置</title>
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
          </svg>
        </button>
      </div>
      <div class="search-box" data-ui-id="inventory-search-input">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7A6A5C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>搜索库存图标</title>
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" placeholder="搜索耗材名称" />
      </div>
    </header>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">低库存预警</h2>
        <span class="section-more">2 项</span>
      </div>
      <div class="card warning-card" data-ui-id="inventory-low-stock-section">
        <div class="warning-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B84A3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>低库存预警图标</title>
            <path d="M12 2 2 22h20L12 2z" fill="none"/>
            <path d="M12 9v4"/>
            <path d="M12 17h.01"/>
          </svg>
          需尽快补货
        </div>
        <div class="warning-item" id="inventory-low-item-i2">
          <span class="warning-item-name">釉下彩颜料套装</span>
          <span class="warning-item-status">剩 1 套</span>
        </div>
        <div class="warning-item" id="inventory-low-item-i4">
          <span class="warning-item-name">陶土（白泥）</span>
          <span class="warning-item-status">剩 3kg</span>
        </div>
      </div>
    </section>

    <section class="section" data-ui-id="inventory-list">
      <div class="section-header">
        <h2 class="section-title">全部耗材</h2>
        <span class="section-more">6 种</span>
      </div>

      <div class="card" id="inventory-item-i1">
        <div class="inventory-card-header">
          <div>
            <div class="inventory-name">陶土（红泥）</div>
            <div class="inventory-unit">kg · 预警值 5</div>
          </div>
          <div class="inventory-qty">12</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-labels">
            <span>库存余量</span>
            <span>70%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width: 70%;"></div>
          </div>
        </div>
        <div class="inventory-footer">
          <span class="inventory-status ok">库存充足</span>
          <span class="inventory-link" data-ui-id="inventory-item-i1-adjust" data-event="open-adjust-stock">调整</span>
        </div>
      </div>

      <div class="card" id="inventory-item-i2">
        <div class="inventory-card-header">
          <div>
            <div class="inventory-name">釉下彩颜料套装</div>
            <div class="inventory-unit">套 · 预警值 3</div>
          </div>
          <div class="inventory-qty" style="color: var(--warn-red);">1</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-labels">
            <span>库存余量</span>
            <span>25%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill danger" style="width: 25%;"></div>
          </div>
        </div>
        <div class="inventory-footer">
          <span class="inventory-status danger">库存不足</span>
          <span class="inventory-link" data-ui-id="inventory-item-i2-adjust" data-event="open-adjust-stock">调整</span>
        </div>
      </div>

      <div class="card" id="inventory-item-i3">
        <div class="inventory-card-header">
          <div>
            <div class="inventory-name">海绵与修坯刀</div>
            <div class="inventory-unit">套 · 预警值 5</div>
          </div>
          <div class="inventory-qty">20</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-labels">
            <span>库存余量</span>
            <span>80%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width: 80%;"></div>
          </div>
        </div>
        <div class="inventory-footer">
          <span class="inventory-status ok">库存充足</span>
          <span class="inventory-link" data-ui-id="inventory-item-i3-adjust" data-event="open-adjust-stock">调整</span>
        </div>
      </div>
    </section>
  </div>

  <button class="fab" data-ui-id="inventory-add-button" aria-label="新增库存">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F7F4EF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <title>新增库存物品</title>
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <nav class="bottom-tab">
    <a class="tab-item" href="#" data-tab-id="tab-home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>首页标签</title>
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>首页</span>
    </a>
    <a class="tab-item" href="#" data-tab-id="tab-members">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>会员标签</title>
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>会员</span>
    </a>
    <a class="tab-item" href="#" data-tab-id="tab-courses">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>课程标签</title>
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>课程</span>
    </a>
    <a class="tab-item active" href="#" data-tab-id="tab-inventory">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>库存标签</title>
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
        <path d="m3.3 7 8.7 5 8.7-5"/>
        <path d="M12 22V12"/>
      </svg>
      <span>库存</span>
    </a>
    <a class="tab-item" href="#" data-tab-id="tab-profile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>我的标签</title>
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20v-2a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v2"/>
      </svg>
      <span>我的</span>
    </a>
  </nav>
</body>
</html>
