<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 我的</title>
  <style>
    :root {
      --clay-white: #F7F4EF;
      --clay-brown: #B88B6F;
      --clay-ochre: #A2593B;
      --clay-dark: #3E2F27;
      --clay-gray: #7A6A5C;
      --kiln-green: #6E8078;
      --fire-orange: #E08A52;
      --warn-red: #B84A3E;
      --card-bg: #FFFFFF;
      --surface-khaki: #EBE2D7;
      --border-clay: rgba(162, 89, 59, 0.10);
      --shadow-card: rgba(62, 47, 39, 0.10) 0px 6px 20px -4px;
      --shadow-btn: rgba(162, 89, 59, 0.22) 0px 4px 14px 0px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: #E8E1D8; }
    body {
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--clay-dark);
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: var(--clay-white);
    }
    .page-root { padding-bottom: 84px; }
    .hero {
      background: linear-gradient(165deg, #CBA58C 0%, #B88B6F 45%, #F7F4EF 100%);
      border-radius: 0 0 24px 24px;
      padding: 52px 16px 28px;
      text-align: center;
    }
    .hero-title { font-size: 26px; font-weight: 600; letter-spacing: 0.6px; margin: 0; }
    .hero-subtitle { font-size: 14px; color: var(--clay-gray); margin-top: 6px; }
    .section { padding: 0 16px; margin-top: 24px; }
    .section-title { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; margin: 0 0 12px; }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-clay);
      border-radius: 18px;
      padding: 6px 16px;
      box-shadow: var(--shadow-card);
    }
    .setting-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(162, 89, 59, 0.08);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 15px; font-weight: 500; }
    .setting-desc { font-size: 12px; color: var(--clay-gray); margin-top: 3px; }
    .setting-control {
      display: flex; align-items: center; gap: 8px;
    }
    .setting-input {
      width: 64px; text-align: right;
      background: var(--surface-khaki);
      border: 1px solid rgba(162, 89, 59, 0.15);
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 14px; color: var(--clay-ochre); font-weight: 600;
    }
    .unit { font-size: 13px; color: var(--clay-gray); }
    .switch {
      width: 46px; height: 26px; border-radius: 999px;
      background: var(--clay-ochre); position: relative;
    }
    .switch::after {
      content: "";
      position: absolute; right: 3px; top: 3px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--clay-white);
    }
    .action-row {
      display: flex; gap: 12px;
    }
    .action-card {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--border-clay);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow-card);
      text-align: center;
    }
    .action-card .icon { margin-bottom: 8px; }
    .action-card .title { font-size: 14px; font-weight: 600; }
    .action-card .desc { font-size: 11px; color: var(--clay-gray); margin-top: 3px; }
    .version { text-align: center; font-size: 12px; color: var(--clay-gray); margin-top: 32px; }
    .bottom-tab {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 390px; margin: 0 auto;
      height: 64px;
      background: #5A463A;
      border-top: 1px solid rgba(247, 244, 239, 0.12);
      display: flex; justify-content: space-around; align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: #D9C3A0; font-size: 11px; font-weight: 500;
      text-decoration: none;
    }
    .tab-item.active { color: var(--clay-white); }
    .tab-item svg { opacity: 0.75; }
    .tab-item.active svg { opacity: 1; }
  </style>
</head>
<body data-page-id="profile-page" data-tab-id="tab-profile">
  <div class="page-root">
    <section class="hero">
      <h1 class="hero-title">我的</h1>
      <div class="hero-subtitle">工作室设置与数据管理</div>
    </section>

    <section class="section">
      <h2 class="section-title">工作室信息</h2>
      <div class="card">
        <div class="setting-row">
          <div>
            <div class="setting-label">工作室名称</div>
            <div class="setting-desc">显示在首页标题下方</div>
          </div>
          <div class="setting-control">
            <input class="setting-input" type="text" value="溪山手作" data-ui-id="profile-studio-name" data-event="update-studio-name" />
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">提醒规则</h2>
      <div class="card">
        <div class="setting-row">
          <div>
            <div class="setting-label">沉睡会员阈值</div>
            <div class="setting-desc">超过该天数未互动则提醒</div>
          </div>
          <div class="setting-control">
            <input class="setting-input" type="number" value="30" data-ui-id="profile-sleep-threshold" data-event="update-sleep-threshold" />
            <span class="unit">天</span>
          </div>
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-label">低库存提醒</div>
            <div class="setting-desc">库存低于预警值时首页提醒</div>
          </div>
          <div class="switch"></div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">积分规则</h2>
      <div class="card">
        <div class="setting-row">
          <div>
            <div class="setting-label">签到积分</div>
            <div class="setting-desc">每日签到可获得</div>
          </div>
          <div class="setting-control">
            <input class="setting-input" type="number" value="5" data-ui-id="profile-points-rule-signin" data-event="update-signin-points" />
            <span class="unit">分</span>
          </div>
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-label">消费积分</div>
            <div class="setting-desc">每消费 1 元可获得</div>
          </div>
          <div class="setting-control">
            <input class="setting-input" type="number" value="1" data-ui-id="profile-points-rule-spend" data-event="update-spend-points" />
            <span class="unit">分/元</span>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">数据管理</h2>
      <div class="action-row">
        <div class="action-card" data-ui-id="profile-export-data" data-event="export-data">
          <div class="icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#A2593B" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <title>导出工作室数据</title>
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </div>
          <div class="title">导出数据</div>
          <div class="desc">会员与课程备份</div>
        </div>
        <div class="action-card" data-ui-id="profile-about" data-event="open-about">
          <div class="icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6E8078" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <title>查看关于手作印记</title>
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="16" x2="12" y2="12"/>
              <line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
          </div>
          <div class="title">关于</div>
          <div class="desc">版本与隐私</div>
        </div>
      </div>
    </section>

    <div class="version">手作·印记 v1.0.0</div>
  </div>

  <nav class="bottom-tab">
    <a class="tab-item" href="#" data-tab-id="tab-home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>首页标签</title>
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>首页</span>
    </a>
    <a class="tab-item" href="#" data-tab-id="tab-members">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>会员标签</title>
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>会员</span>
    </a>
    <a class="tab-item" href="#" data-tab-id="tab-courses">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>课程标签</title>
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>课程</span>
    </a>
    <a class="tab-item" href="#" data-tab-id="tab-inventory">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>库存标签</title>
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
        <path d="m3.3 7 8.7 5 8.7-5"/>
        <path d="M12 22V12"/>
      </svg>
      <span>库存</span>
    </a>
    <a class="tab-item active" href="#" data-tab-id="tab-profile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>我的标签</title>
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20v-2a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v2"/>
      </svg>
      <span>我的</span>
    </a>
  </nav>
</body>
</html>
