<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 课程预约</title>
  <style>
    :root {
      --clay-white: #F7F4EF;
      --clay-brown: #B88B6F;
      --clay-ochre: #A2593B;
      --clay-dark: #3E2F27;
      --clay-gray: #7A6A5C;
      --kiln-green: #6E8078;
      --fire-orange: #E08A52;
      --warn-red: #B84A3E;
      --card-bg: #FFFFFF;
      --surface-khaki: #EBE2D7;
      --border-clay: rgba(162, 89, 59, 0.10);
      --shadow-card: rgba(62, 47, 39, 0.10) 0px 6px 20px -4px;
      --shadow-btn: rgba(162, 89, 59, 0.22) 0px 4px 14px 0px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: #E8E1D8; }
    body {
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--clay-dark);
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: var(--clay-white);
    }
    .page-root { padding-bottom: 100px; }
    .top-nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(247, 244, 239, 0.92);
      backdrop-filter: blur(14px);
      padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(162, 89, 59, 0.08);
    }
    .nav-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface-khaki);
      border: 1px solid rgba(162, 89, 59, 0.12);
      display: flex; align-items: center; justify-content: center;
    }
    .nav-title { font-size: 17px; font-weight: 600; }
    .section { padding: 0 16px; margin-top: 20px; }
    .section-title { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; margin: 0 0 12px; }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-clay);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow-card);
    }
    .course-hero {
      background: linear-gradient(165deg, #CBA58C 0%, #B88B6F 45%, #F7F4EF 100%);
      border-radius: 0 0 24px 24px;
      padding: 16px 16px 24px;
    }
    .course-hero-title { font-size: 24px; font-weight: 600; }
    .course-hero-meta { font-size: 14px; color: var(--clay-gray); margin-top: 6px; }
    .course-hero-seats {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(247, 244, 239, 0.85);
      border-radius: 999px;
      padding: 6px 14px;
      margin-top: 14px;
      font-size: 13px;
    }
    .course-hero-seats b { color: var(--clay-ochre); font-size: 16px; }
    .warning-box {
      background: rgba(184, 74, 62, 0.08);
      border: 1px solid rgba(184, 74, 62, 0.20);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .warning-box .title { font-size: 14px; font-weight: 600; color: var(--warn-red); }
    .warning-box .desc { font-size: 12px; color: var(--clay-gray); margin-top: 2px; }
    .picker-label { font-size: 13px; font-weight: 600; color: var(--clay-gray); margin-bottom: 8px; }
    .member-option {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(162, 89, 59, 0.08);
    }
    .member-option:last-child { border-bottom: none; padding-bottom: 0; }
    .radio {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid rgba(162, 89, 59, 0.35);
      display: flex; align-items: center; justify-content: center;
    }
    .radio.checked { border-color: var(--clay-ochre); }
    .radio-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--clay-ochre); }
    .member-option-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #CBA58C 0%, #B88B6F 100%);
      display: flex; align-items: center; justify-content: center;
      color: var(--clay-white); font-size: 14px; font-weight: 600;
    }
    .member-option-info { flex: 1; }
    .member-option-name { font-size: 15px; font-weight: 600; }
    .member-option-points { font-size: 12px; color: var(--clay-gray); }
    .material-list { margin-top: 8px; }
    .material-item {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; padding: 8px 0;
      border-bottom: 1px solid rgba(162, 89, 59, 0.08);
    }
    .material-item:last-child { border-bottom: none; }
    .material-status { font-size: 12px; font-weight: 600; }
    .material-status.ok { color: var(--kiln-green); }
    .material-status.short { color: var(--warn-red); }
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 390px; margin: 0 auto;
      background: var(--card-bg);
      border-top: 1px solid rgba(162, 89, 59, 0.10);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      display: flex; gap: 12px; align-items: center;
      z-index: 100;
    }
    .summary { flex: 1; }
    .summary-label { font-size: 12px; color: var(--clay-gray); }
    .summary-value { font-size: 16px; font-weight: 700; color: var(--clay-ochre); }
    .confirm-btn {
      flex: 1.2;
      background: var(--clay-ochre);
      color: var(--clay-white);
      border: none;
      border-radius: 999px;
      padding: 13px 0;
      font-size: 15px; font-weight: 600;
      box-shadow: var(--shadow-btn);
    }
    .confirm-btn:disabled { background: rgba(162, 89, 59, 0.35); box-shadow: none; }
  </style>
</head>
<body data-page-id="course-booking-page">
  <div class="page-root">
    <header class="top-nav">
      <button class="nav-btn" data-ui-id="course-booking-back" data-event="navigate-back" aria-label="返回">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3E2F27" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>返回上一页</title>
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <div class="nav-title">课程预约</div>
      <div style="width:36px;"></div>
    </header>

    <section class="course-hero">
      <div class="course-hero-title">手捏陶杯入门</div>
      <div class="course-hero-meta">6月23日 周二 · 10:00 - 12:00 · 2小时</div>
      <div class="course-hero-seats" data-ui-id="course-booking-seats-left">
        剩余席位：<b>2</b> / 6
      </div>
    </section>

    <section class="section">
      <div class="warning-box" data-ui-id="course-booking-material-warning">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#B84A3E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <title>耗材库存不足警告</title>
          <path d="M12 2 2 22h20L12 2z" fill="none"/>
          <path d="M12 9v4"/>
          <path d="M12 17h.01"/>
        </svg>
        <div>
          <div class="title">釉下彩颜料库存不足</div>
          <div class="desc">当前库存 1 套，本课程还需 2 套。请先补货或调整耗材配置。</div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">选择会员</h2>
      <div class="card" data-ui-id="course-booking-member-picker">
        <div class="member-option">
          <div class="radio checked">
            <div class="radio-dot"></div>
          </div>
          <div class="member-option-avatar">林</div>
          <div class="member-option-info">
            <div class="member-option-name">林小溪</div>
            <div class="member-option-points">可用积分 286 · 陶艺 · 釉下彩</div>
          </div>
        </div>
        <div class="member-option">
          <div class="radio"></div>
          <div class="member-option-avatar" style="background: linear-gradient(135deg, #7A8B82 0%, #6E8078 100%);">陈</div>
          <div class="member-option-info">
            <div class="member-option-name">陈默</div>
            <div class="member-option-points">可用积分 540 · 皮具</div>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">课程耗材</h2>
      <div class="card">
        <div class="material-list">
          <div class="material-item">
            <span>陶土</span>
            <span class="material-status ok">充足（剩 12kg）</span>
          </div>
          <div class="material-item">
            <span>釉下彩颜料套装</span>
            <span class="material-status short">不足（剩 1套）</span>
          </div>
          <div class="material-item">
            <span>海绵与修坯刀</span>
            <span class="material-status ok">充足（剩 20套）</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="bottom-bar">
    <div class="summary">
      <div class="summary-label">预约后扣除积分</div>
      <div class="summary-value">200 积分</div>
    </div>
    <button class="confirm-btn" data-ui-id="course-booking-confirm" data-event="confirm-booking">确认预约</button>
  </div>
</body>
</html>
