<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手作·印记 - 会员</title>
  <style>
    :root {
      --clay-white: #F7F4EF;
      --clay-brown: #B88B6F;
      --clay-ochre: #A2593B;
      --clay-dark: #3E2F27;
      --clay-gray: #7A6A5C;
      --kiln-green: #6E8078;
      --fire-orange: #E08A52;
      --warn-red: #B84A3E;
      --card-bg: #FFFFFF;
      --surface-khaki: #EBE2D7;
      --border-clay: rgba(162, 89, 59, 0.10);
      --shadow-card: rgba(62, 47, 39, 0.10) 0px 6px 20px -4px;
      --shadow-btn: rgba(162, 89, 59, 0.22) 0px 4px 14px 0px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: #E8E1D8; }
    body {
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--clay-dark);
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: var(--clay-white);
    }
    .page-root { padding-bottom: 84px; }
    .sticky-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(247, 244, 239, 0.92);
      backdrop-filter: blur(14px);
      padding: 14px 16px;
      border-bottom: 1px solid rgba(162, 89, 59, 0.08);
    }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    .page-title { font-size: 26px; font-weight: 600; letter-spacing: 0.6px; margin: 0; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface-khaki);
      border: 1px solid rgba(162, 89, 59, 0.15);
      display: flex; align-items: center; justify-content: center;
    }
    .search-box {
      margin-top: 12px;
      background: var(--surface-khaki);
      border: 1px solid rgba(162, 89, 59, 0.15);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .search-box input {
      border: none; background: transparent; outline: none;
      flex: 1; font-size: 14px; color: var(--clay-dark);
    }
    .search-box input::placeholder { color: rgba(122, 106, 92, 0.65); }
    .chip-row {
      display: flex; gap: 8px;
      margin-top: 12px; overflow-x: auto;
    }
    .chip {
      flex-shrink: 0;
      background: rgba(162, 89, 59, 0.10);
      color: var(--clay-ochre);
      font-size: 12px; font-weight: 500;
      padding: 6px 12px; border-radius: 999px;
      border: none;
    }
    .chip.active { background: var(--clay-ochre); color: var(--clay-white); }
    .section { padding: 0 16px; margin-top: 16px; }
    .member-card {
      background: var(--card-bg);
      border: 1px solid var(--border-clay);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: var(--shadow-card);
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 12px;
    }
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, #CBA58C 0%, #B88B6F 100%);
      display: flex; align-items: center; justify-content: center;
      color: var(--clay-white); font-size: 18px; font-weight: 600;
      flex-shrink: 0;
    }
    .member-body { flex: 1; min-width: 0; }
    .member-name { font-size: 16px; font-weight: 600; }
    .member-meta { font-size: 12px; color: var(--clay-gray); margin-top: 3px; }
    .tag-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .tag {
      background: rgba(162, 89, 59, 0.10);
      color: var(--clay-ochre);
      font-size: 11px; font-weight: 500;
      padding: 3px 8px; border-radius: 999px;
    }
    .points-pill {
      background: var(--surface-khaki);
      border: 1px solid rgba(162, 89, 59, 0.15);
      border-radius: 999px;
      padding: 6px 10px;
      text-align: center;
      min-width: 58px;
    }
    .points-pill .num { font-size: 16px; font-weight: 700; color: var(--clay-ochre); }
    .points-pill .lab { font-size: 10px; color: var(--clay-gray); }
    .fab {
      position: fixed; bottom: 84px; right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--clay-ochre);
      border: none; color: var(--clay-white);
      box-shadow: var(--shadow-btn);
      display: flex; align-items: center; justify-content: center;
      z-index: 90;
    }
    .bottom-tab {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 390px; margin: 0 auto;
      height: 64px;
      background: #5A463A;
      border-top: 1px solid rgba(247, 244, 239, 0.12);
      display: flex; justify-content: space-around; align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: #D9C3A0; font-size: 11px; font-weight: 500;
      text-decoration: none;
    }
    .tab-item.active { color: var(--clay-white); }
    .tab-item svg { opacity: 0.75; }
    .tab-item.active svg { opacity: 1; }
  </style>
</head>
<body data-page-id="members-page" data-tab-id="tab-members">
  <div class="page-root">
    <header class="sticky-header">
      <div class="header-row">
        <h1 class="page-title">会员</h1>
        <button class="icon-btn" aria-label="打开筛选">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3E2F27" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>打开会员筛选</title>
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
          </svg>
        </button>
      </div>
      <div class="search-box" data-ui-id="members-search-input">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7A6A5C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>搜索会员图标</title>
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" placeholder="搜索昵称、手机号或工艺" />
      </div>
      <div class="chip-row" data-ui-id="members-filter-chip">
        <button class="chip active">全部</button>
        <button class="chip">陶艺</button>
        <button class="chip">皮具</button>
        <button class="chip">木作</button>
        <button class="chip">银饰</button>
      </div>
    </header>

    <section class="section" data-ui-id="members-list">
      <div class="member-card" id="members-item-m1" data-ui-id="members-item-m1-detail">
        <div class="avatar">林</div>
        <div class="member-body">
          <div class="member-name">林小溪</div>
          <div class="member-meta">入会 128 天 · 最近互动 3 天前</div>
          <div class="tag-row">
            <span class="tag">陶艺</span>
            <span class="tag">釉下彩</span>
          </div>
        </div>
        <div class="points-pill">
          <div class="num">286</div>
          <div class="lab">积分</div>
        </div>
      </div>

      <div class="member-card" id="members-item-m2" data-ui-id="members-item-m2-detail">
        <div class="avatar" style="background: linear-gradient(135deg, #7A8B82 0%, #6E8078 100%);">陈</div>
        <div class="member-body">
          <div class="member-name">陈默</div>
          <div class="member-meta">入会 256 天 · 最近互动 7 天前</div>
          <div class="tag-row">
            <span class="tag">皮具</span>
            <span class="tag">染色</span>
          </div>
        </div>
        <div class="points-pill">
          <div class="num">540</div>
          <div class="lab">积分</div>
        </div>
      </div>

      <div class="member-card" id="members-item-m3" data-ui-id="members-item-m3-detail">
        <div class="avatar" style="background: linear-gradient(135deg, #E08A52 0%, #D67A3E 100%);">苏</div>
        <div class="member-body">
          <div class="member-name">苏晚</div>
          <div class="member-meta">入会 45 天 · 最近互动 1 天前</div>
          <div class="tag-row">
            <span class="tag">木作</span>
          </div>
        </div>
        <div class="points-pill">
          <div class="num">68</div>
          <div class="lab">积分</div>
        </div>
      </div>
    </section>
  </div>

  <button class="fab" data-ui-id="members-add-button" aria-label="添加会员">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F7F4EF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <title>添加新会员</title>
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <nav class="bottom-tab">
    <a class="tab-item" href="#" data-tab-id="tab-home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>首页标签</title>
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>首页</span>
    </a>
    <a class="tab-item active" href="#" data-tab-id="tab-members">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>会员标签</title>
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>会员</span>
    </a>
    <a class="tab-item" href="#" data-tab-id="tab-courses">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>课程标签</title>
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>课程</span>
    </a>
    <a class="tab-item" href="#" data-tab-id="tab-inventory">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>库存标签</title>
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
        <path d="m3.3 7 8.7 5 8.7-5"/>
        <path d="M12 22V12"/>
      </svg>
      <span>库存</span>
    </a>
    <a class="tab-item" href="#" data-tab-id="tab-profile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <title>我的标签</title>
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20v-2a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v2"/>
      </svg>
      <span>我的</span>
    </a>
  </nav>
</body>
</html>
