<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - Share Card</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: rgba(61,43,31,0.35); color: #3D2B1F; display: flex; justify-content: center;
    }
    .app-shell { width: 100%; max-width: 400px; height: 100%; position: relative; }
    .sheet {
      position: absolute; bottom: 0; left: 0; right: 0; top: 8%;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(18px);
      border-radius: 28px 28px 0 0; box-shadow: 0 -8px 40px rgba(61,43,31,0.12);
      padding: 22px; display: flex; flex-direction: column;
    }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .sheet-title { font-size: 21px; font-weight: 700; }
    .close-button {
      width: 36px; height: 36px; border: none; border-radius: 12px;
      background: #F5EEE6; color: #6B5E52; display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .preview-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px 0; }
    .share-card {
      width: 280px; height: 380px; border-radius: 24px; padding: 28px;
      background: linear-gradient(135deg, #FFE9DE 0%, #FF6B8B 100%);
      box-shadow: 0 18px 44px rgba(61,43,31,0.18); color: #fff;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .share-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .share-card-brand { font-size: 13px; font-weight: 700; opacity: 0.9; }
    .share-card-icon { width: 28px; height: 28px; }
    .share-card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .share-card-label { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
    .share-card-dish { font-size: 36px; font-weight: 700; line-height: 1.2; letter-spacing: -0.6px; }
    .share-card-footer { font-size: 13px; opacity: 0.85; }
    .export-button {
      width: 100%; padding: 17px; border: none; border-radius: 18px;
      background: linear-gradient(135deg, #FF6B4A, #FF8A6D); color: #fff;
      font-size: 16px; font-weight: 700; box-shadow: 0 8px 24px rgba(255,107,74,0.32);
      display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
    }
  </style>
</head>
<body data-page-id="share-card-sheet">
  <div class="app-shell">
    <section class="sheet">
      <header class="sheet-header">
        <h1 class="sheet-title">分享卡片</h1>
        <button class="close-button" data-ui-id="share-card-close-button" type="button" aria-label="关闭">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <title>Close Share Card Sheet</title>
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </header>

      <div class="preview-area">
        <div class="share-card" data-ui-id="share-card-preview">
          <div class="share-card-top">
            <span class="share-card-brand">今天吃什么</span>
            <svg class="share-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>Share Card Decorative Sparkle</title>
              <path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z" />
              <path d="M20 2v4" />
              <path d="M22 4h-4" />
              <circle cx="4" cy="20" r="2" />
            </svg>
          </div>
          <div class="share-card-body">
            <div class="share-card-label">今日美味</div>
            <div class="share-card-dish">番茄鸡蛋面</div>
          </div>
          <div class="share-card-footer">2026/06/20 · 午餐</div>
        </div>
      </div>

      <button class="export-button" data-ui-id="share-card-export-button" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Export Share Card Image</title>
          <path d="M12 15V3" />
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <path d="m7 10 5 5 5-5" />
        </svg>
        保存并分享
      </button>
    </section>
  </div>
</body>
</html>
