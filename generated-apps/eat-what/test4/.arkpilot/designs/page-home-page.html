<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - Home</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #FFF8F0;
      color: #3D2B1F;
      display: flex; justify-content: center;
    }
    .app-shell { width: 100%; max-width: 400px; height: 100%; position: relative; overflow: hidden; }
    .page { position: absolute; inset: 0; overflow-y: auto; padding: 22px 22px 110px; }
    .page-title { font-size: 30px; font-weight: 700; letter-spacing: -0.4px; margin: 8px 0 6px; }
    .page-subtitle { font-size: 15px; color: #9E9185; margin-bottom: 24px; }
    .wheel-card {
      background: #FFFFFF; border-radius: 24px; padding: 24px;
      box-shadow: 0 18px 44px rgba(61,43,31,0.12); text-align: center;
    }
    .wheel-title { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
    .wheel-frame {
      width: 280px; height: 280px; margin: 0 auto; border-radius: 50%;
      background: #FFFFFF; padding: 14px; position: relative;
      box-shadow: inset 0 6px 18px rgba(61,43,31,0.08), 0 18px 44px rgba(61,43,31,0.12);
    }
    .wheel-plate {
      width: 100%; height: 100%; border-radius: 50%;
      background: conic-gradient(
        #FFCC5C 0deg 60deg,
        #3DD9C7 60deg 120deg,
        #FFE9DE 120deg 180deg,
        #FF6B8B 180deg 240deg,
        #C4A8FF 240deg 300deg,
        #FF6B4A 300deg 360deg
      );
      position: relative;
    }
    .wheel-center {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 56px; height: 56px; border-radius: 50%; background: #FFFFFF;
      box-shadow: 0 6px 16px rgba(61,43,31,0.12); display: flex; align-items: center; justify-content: center;
    }
    .wheel-pointer {
      position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent;
      border-top: 22px solid #FF6B4A; filter: drop-shadow(0 4px 8px rgba(255,107,74,0.35));
    }
    .spin-button {
      margin-top: 22px; width: 100%; padding: 16px; border: none; border-radius: 18px;
      background: linear-gradient(135deg, #FF6B4A, #FF8A6D); color: #fff;
      font-size: 16px; font-weight: 700; box-shadow: 0 8px 24px rgba(255,107,74,0.32);
      display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
    }
    .result-card {
      margin-top: 24px; background: #FFFFFF; border-radius: 20px; padding: 20px;
      box-shadow: 0 12px 32px rgba(61,43,31,0.08);
    }
    .result-label { font-size: 13px; font-weight: 600; color: #9E9185; margin-bottom: 6px; }
    .result-dish { font-size: 26px; font-weight: 700; color: #3D2B1F; margin-bottom: 10px; }
    .result-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag-pill {
      background: #F5EEE6; color: #6B5E52; font-size: 12px; font-weight: 600;
      padding: 6px 10px; border-radius: 999px;
    }
    .quick-filters { margin-top: 24px; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .chip-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .chip {
      background: #FFFFFF; border: 1px solid #E8E0D6; color: #6B5E52; font-size: 14px; font-weight: 600;
      padding: 10px 16px; border-radius: 999px; cursor: pointer;
    }
    .chip.active { background: linear-gradient(135deg, #FF6B4A, #FF6B8B); color: #fff; border-color: transparent; box-shadow: 0 4px 12px rgba(255,107,74,0.18); }
    .log-cta {
      margin-top: 24px; width: 100%; padding: 16px; border: none; border-radius: 18px;
      background: #FFFFFF; color: #FF6B4A; border: 1.5px solid #FF6B4A;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto;
      width: 100%; max-width: 400px; height: 80px; background: #FFFFFF;
      border-radius: 24px 24px 0 0; box-shadow: 0 -6px 24px rgba(61,43,31,0.06);
      display: flex; justify-content: space-around; align-items: center; padding-bottom: 14px;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #9E9185; font-size: 11px; font-weight: 600; text-decoration: none; }
    .tab-item.active { color: #FF6B4A; }
    .tab-item svg { width: 24px; height: 24px; stroke-width: 2; }
  </style>
</head>
<body data-page-id="home-page" data-tab-id="tab-home">
  <div class="app-shell">
    <main class="page">
      <h1 class="page-title">今天吃什么？</h1>
      <p class="page-subtitle">转一转，让命运决定下一顿</p>

      <section class="wheel-card" data-ui-id="home-wheel">
        <div class="wheel-title">幸运转盘</div>
        <div class="wheel-frame">
          <div class="wheel-pointer" aria-hidden="true"></div>
          <div class="wheel-plate">
            <div class="wheel-center">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FF6B4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>Spin Wheel Center Decoration</title>
                <path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8" />
                <path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7" />
                <path d="m2.1 21.8 6.4-6.3" />
                <path d="m19 5-7 7" />
              </svg>
            </div>
          </div>
        </div>
        <button class="spin-button" data-ui-id="home-spin-button" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Start Wheel Spin Icon</title>
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
            <path d="M16 16h5v5" />
          </svg>
          开始转转
        </button>
      </section>

      <section class="result-card" data-ui-id="home-dish-card">
        <div class="result-label">转盘结果</div>
        <div class="result-dish" data-ui-id="home-dish-result">番茄鸡蛋面</div>
        <div class="result-meta">
          <span class="tag-pill">15 分钟</span>
          <span class="tag-pill">家常</span>
          <span class="tag-pill">暖心</span>
        </div>
      </section>

      <section class="quick-filters">
        <h2 class="section-title">快速筛选</h2>
        <div class="chip-row">
          <button class="chip active" data-ui-id="home-filter-mood" type="button">想吃好的</button>
          <button class="chip" data-ui-id="home-filter-mood" type="button">清淡</button>
          <button class="chip" data-ui-id="home-filter-mood" type="button">重口味</button>
          <button class="chip active" data-ui-id="home-filter-time" type="button">晚餐</button>
          <button class="chip" data-ui-id="home-filter-time" type="button">夜宵</button>
        </div>
      </section>

      <button class="log-cta" data-ui-id="home-log-button" type="button">记录这顿</button>
    </main>

    <nav class="tab-bar">
      <a class="tab-item active" href="page-home-page.html" aria-label="首页">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Home Tab Icon</title><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>首页</span>
      </a>
      <a class="tab-item" href="page-fridge-page.html" aria-label="冰箱">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Fridge Tab Icon</title><path d="M5 6a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6Z"/><path d="M5 10h14"/><path d="M15 7v6"/></svg>
        <span>冰箱</span>
      </a>
      <a class="tab-item" href="page-mood-page.html" aria-label="心情">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Mood Tab Icon</title><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></svg>
        <span>心情</span>
      </a>
      <a class="tab-item" href="page-log-page.html" aria-label="记录">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Log Tab Icon</title><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        <span>记录</span>
      </a>
    </nav>
  </div>
</body>
</html>
