<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - Fridge</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #FFF8F0; color: #3D2B1F; display: flex; justify-content: center;
    }
    .app-shell { width: 100%; max-width: 400px; height: 100%; position: relative; overflow: hidden; }
    .page { position: absolute; inset: 0; overflow-y: auto; padding: 22px 22px 110px; }
    .page-title { font-size: 30px; font-weight: 700; letter-spacing: -0.4px; margin: 8px 0 6px; }
    .page-subtitle { font-size: 15px; color: #9E9185; margin-bottom: 24px; }
    .input-card {
      background: #FFFFFF; border-radius: 20px; padding: 18px;
      box-shadow: 0 12px 32px rgba(61,43,31,0.08);
    }
    .input-row { display: flex; gap: 10px; }
    .input-field {
      flex: 1; background: #F5EEE6; border: 1px solid transparent; border-radius: 14px;
      padding: 13px 16px; font-size: 15px; color: #3D2B1F; outline: none;
    }
    .input-field::placeholder { color: #9E9185; }
    .add-button {
      width: 48px; height: 48px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, #FF6B4A, #FF8A6D); color: #fff;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: 0 6px 16px rgba(255,107,74,0.28);
    }
    .ingredient-area { margin-top: 18px; }
    .section-title { font-size: 18px; font-weight: 700; margin: 0 0 12px; }
    .chip-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .ingredient-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: #E5F9F6; color: #1F7A71; font-size: 14px; font-weight: 600;
      padding: 9px 14px; border-radius: 999px;
    }
    .ingredient-chip button {
      background: transparent; border: none; color: #1F7A71; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .empty-state {
      text-align: center; padding: 28px 12px; color: #9E9185; font-size: 14px;
    }
    .recommend-cta {
      margin-top: 22px; width: 100%; padding: 16px; border: none; border-radius: 18px;
      background: linear-gradient(135deg, #FF6B4A, #FF8A6D); color: #fff;
      font-size: 16px; font-weight: 700; box-shadow: 0 8px 24px rgba(255,107,74,0.32);
      cursor: pointer;
    }
    .recommendation-list { margin-top: 26px; }
    .dish-card {
      background: #FFFFFF; border-radius: 20px; padding: 18px; margin-bottom: 14px;
      box-shadow: 0 12px 32px rgba(61,43,31,0.08); position: relative; overflow: hidden;
    }
    .dish-card::before {
      content: ''; position: absolute; left: 0; top: 18px; bottom: 18px; width: 4px;
      background: linear-gradient(180deg, #FF6B4A, #FF6B8B); border-radius: 0 4px 4px 0;
    }
    .dish-header { display: flex; justify-content: space-between; align-items: flex-start; padding-left: 12px; }
    .dish-name { font-size: 18px; font-weight: 700; }
    .match-badge {
      background: linear-gradient(135deg, #FF6B4A, #FF8A6D); color: #fff;
      font-size: 12px; font-weight: 700; padding: 5px 10px; border-radius: 999px;
    }
    .dish-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; padding-left: 12px; }
    .tag-pill { background: #F5EEE6; color: #6B5E52; font-size: 12px; font-weight: 600; padding: 5px 9px; border-radius: 999px; }
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto;
      width: 100%; max-width: 400px; height: 80px; background: #FFFFFF;
      border-radius: 24px 24px 0 0; box-shadow: 0 -6px 24px rgba(61,43,31,0.06);
      display: flex; justify-content: space-around; align-items: center; padding-bottom: 14px;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #9E9185; font-size: 11px; font-weight: 600; text-decoration: none; }
    .tab-item.active { color: #FF6B4A; }
    .tab-item svg { width: 24px; height: 24px; stroke-width: 2; }
  </style>
</head>
<body data-page-id="fridge-page" data-tab-id="tab-fridge">
  <div class="app-shell">
    <main class="page">
      <h1 class="page-title">我的冰箱</h1>
      <p class="page-subtitle">告诉它你有的食材，让它帮你搭配</p>

      <section class="input-card">
        <div class="input-row">
          <input class="input-field" type="text" placeholder="输入食材，如鸡蛋、番茄…" data-ui-id="fridge-ingredient-input" />
          <button class="add-button" data-ui-id="fridge-add-button" type="button" aria-label="添加食材">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <title>Add Ingredient Button Icon</title>
              <path d="M5 12h14" />
              <path d="M12 5v14" />
            </svg>
          </button>
        </div>

        <div class="ingredient-area">
          <h2 class="section-title">已选食材</h2>
          <div class="chip-row" data-ui-id="fridge-ingredient-list">
            <div class="ingredient-chip" data-ui-id="fridge-ingredient-egg">
              鸡蛋
              <button type="button" aria-label="移除鸡蛋">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <title>Remove Egg Ingredient</title>
                  <path d="M5 12h14" />
                </svg>
              </button>
            </div>
            <div class="ingredient-chip" data-ui-id="fridge-ingredient-tomato">
              番茄
              <button type="button" aria-label="移除番茄">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <title>Remove Tomato Ingredient</title>
                  <path d="M5 12h14" />
                </svg>
              </button>
            </div>
            <div class="ingredient-chip" data-ui-id="fridge-ingredient-scallion">
              小葱
              <button type="button" aria-label="移除小葱">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <title>Remove Scallion Ingredient</title>
                  <path d="M5 12h14" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </section>

      <button class="recommend-cta" data-ui-id="fridge-recommend-button" type="button">推荐菜品</button>

      <section class="recommendation-list" data-ui-id="fridge-recommendation-list">
        <h2 class="section-title">为你推荐</h2>

        <article class="dish-card" data-ui-id="fridge-recommendation-1">
          <div class="dish-header">
            <div class="dish-name">番茄炒蛋</div>
            <span class="match-badge">100% 匹配</span>
          </div>
          <div class="dish-meta">
            <span class="tag-pill">10 分钟</span>
            <span class="tag-pill">家常</span>
            <span class="tag-pill">清淡</span>
          </div>
        </article>

        <article class="dish-card" data-ui-id="fridge-recommendation-2">
          <div class="dish-header">
            <div class="dish-name">小葱鸡蛋饼</div>
            <span class="match-badge">85% 匹配</span>
          </div>
          <div class="dish-meta">
            <span class="tag-pill">20 分钟</span>
            <span class="tag-pill">早餐</span>
            <span class="tag-pill">想吃好的</span>
          </div>
        </article>
      </section>
    </main>

    <nav class="tab-bar">
      <a class="tab-item" href="page-home-page.html" aria-label="首页">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Home Tab Icon</title><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>首页</span>
      </a>
      <a class="tab-item active" href="page-fridge-page.html" aria-label="冰箱">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Fridge Tab Icon</title><path d="M5 6a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6Z"/><path d="M5 10h14"/><path d="M15 7v6"/></svg>
        <span>冰箱</span>
      </a>
      <a class="tab-item" href="page-mood-page.html" aria-label="心情">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Mood Tab Icon</title><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></svg>
        <span>心情</span>
      </a>
      <a class="tab-item" href="page-log-page.html" aria-label="记录">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Log Tab Icon</title><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        <span>记录</span>
      </a>
    </nav>
  </div>
</body>
</html>
