<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - Log</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #FFF8F0; color: #3D2B1F; display: flex; justify-content: center;
    }
    .app-shell { width: 100%; max-width: 400px; height: 100%; position: relative; overflow: hidden; }
    .page { position: absolute; inset: 0; overflow-y: auto; padding: 22px 22px 110px; }
    .page-title { font-size: 30px; font-weight: 700; letter-spacing: -0.4px; margin: 8px 0 6px; }
    .page-subtitle { font-size: 15px; color: #9E9185; margin-bottom: 24px; }
    .summary-card {
      background: linear-gradient(135deg, #FF6B4A, #FF8A6D); border-radius: 24px;
      padding: 24px; color: #fff; box-shadow: 0 12px 32px rgba(255,107,74,0.28);
      margin-bottom: 24px;
    }
    .summary-label { font-size: 13px; font-weight: 600; opacity: 0.9; }
    .summary-count { font-size: 42px; font-weight: 700; margin: 6px 0; }
    .summary-hint { font-size: 14px; opacity: 0.9; }
    .section-title { font-size: 18px; font-weight: 700; margin: 0 0 12px; }
    .entry-list { margin-top: 6px; }
    .entry-card {
      background: #FFFFFF; border-radius: 18px; padding: 16px; margin-bottom: 12px;
      box-shadow: 0 12px 32px rgba(61,43,31,0.08); display: flex; align-items: center; gap: 14px;
    }
    .time-pill {
      background: #F5EEE6; color: #6B5E52; font-size: 12px; font-weight: 700;
      padding: 8px 10px; border-radius: 12px; min-width: 44px; text-align: center;
    }
    .entry-body { flex: 1; }
    .entry-dish { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .entry-note { font-size: 13px; color: #9E9185; }
    .share-button {
      width: 38px; height: 38px; border: none; border-radius: 12px;
      background: #FFF0EC; color: #FF6B4A; display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .empty-state {
      text-align: center; padding: 40px 20px; background: #FFFFFF; border-radius: 20px;
      box-shadow: 0 12px 32px rgba(61,43,31,0.08);
    }
    .empty-state svg { margin-bottom: 12px; }
    .empty-state p { color: #9E9185; font-size: 14px; margin: 0 0 16px; }
    .empty-cta {
      padding: 12px 24px; border: none; border-radius: 16px;
      background: linear-gradient(135deg, #FF6B4A, #FF8A6D); color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto;
      width: 100%; max-width: 400px; height: 80px; background: #FFFFFF;
      border-radius: 24px 24px 0 0; box-shadow: 0 -6px 24px rgba(61,43,31,0.06);
      display: flex; justify-content: space-around; align-items: center; padding-bottom: 14px;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #9E9185; font-size: 11px; font-weight: 600; text-decoration: none; }
    .tab-item.active { color: #FF6B4A; }
    .tab-item svg { width: 24px; height: 24px; stroke-width: 2; }
  </style>
</head>
<body data-page-id="log-page" data-tab-id="tab-log">
  <div class="app-shell">
    <main class="page">
      <h1 class="page-title">饮食记录</h1>
      <p class="page-subtitle">记录每一顿，见证今天的小确幸</p>

      <section class="summary-card">
        <div class="summary-label">今天已记录</div>
        <div class="summary-count" data-ui-id="log-today-count">2</div>
        <div class="summary-hint">再记录 1 顿即可达成今日小目标</div>
      </section>

      <section class="entry-list" data-ui-id="log-entry-list">
        <h2 class="section-title">今日时间线</h2>

        <article class="entry-card" data-ui-id="log-entry-1">
          <div class="time-pill">午餐</div>
          <div class="entry-body">
            <div class="entry-dish">番茄鸡蛋面</div>
            <div class="entry-note">加了点辣椒油，很香</div>
          </div>
          <button class="share-button" data-ui-id="log-share-button" type="button" aria-label="分享这顿">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>Open Share Card for This Entry</title>
              <path d="M12 2v13" />
              <path d="m16 6-4-4-4 4" />
              <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
            </svg>
          </button>
        </article>

        <article class="entry-card" data-ui-id="log-entry-2">
          <div class="time-pill">早餐</div>
          <div class="entry-body">
            <div class="entry-dish">小葱鸡蛋饼</div>
            <div class="entry-note">配豆浆</div>
          </div>
          <button class="share-button" data-ui-id="log-share-button" type="button" aria-label="分享这顿">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>Open Share Card for This Entry</title>
              <path d="M12 2v13" />
              <path d="m16 6-4-4-4 4" />
              <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
            </svg>
          </button>
        </article>
      </section>
    </main>

    <nav class="tab-bar">
      <a class="tab-item" href="page-home-page.html" aria-label="首页">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Home Tab Icon</title><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>首页</span>
      </a>
      <a class="tab-item" href="page-fridge-page.html" aria-label="冰箱">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Fridge Tab Icon</title><path d="M5 6a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6Z"/><path d="M5 10h14"/><path d="M15 7v6"/></svg>
        <span>冰箱</span>
      </a>
      <a class="tab-item" href="page-mood-page.html" aria-label="心情">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Mood Tab Icon</title><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></svg>
        <span>心情</span>
      </a>
      <a class="tab-item active" href="page-log-page.html" aria-label="记录">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Log Tab Icon</title><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        <span>记录</span>
      </a>
    </nav>
  </div>
</body>
</html>
