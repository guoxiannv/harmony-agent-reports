<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - Mood</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #FFF8F0; color: #3D2B1F; display: flex; justify-content: center;
    }
    .app-shell { width: 100%; max-width: 400px; height: 100%; position: relative; overflow: hidden; }
    .page { position: absolute; inset: 0; overflow-y: auto; padding: 22px 22px 110px; }
    .hero {
      margin: -22px -22px 24px; padding: 32px 22px 28px;
      background: linear-gradient(180deg, #FFE9DE 0%, #FFF8F0 100%);
      border-radius: 0 0 28px 28px;
    }
    .page-title { font-size: 30px; font-weight: 700; letter-spacing: -0.4px; margin: 0 0 6px; }
    .page-subtitle { font-size: 15px; color: #9E9185; margin: 0; }
    .section-title { font-size: 18px; font-weight: 700; margin: 0 0 12px; }
    .filter-card {
      background: #FFFFFF; border-radius: 20px; padding: 20px;
      box-shadow: 0 12px 32px rgba(61,43,31,0.08); margin-bottom: 22px;
    }
    .chip-grid { display: flex; gap: 10px; flex-wrap: wrap; }
    .chip {
      background: #FFFFFF; border: 1px solid #E8E0D6; color: #6B5E52; font-size: 14px; font-weight: 600;
      padding: 10px 16px; border-radius: 999px; cursor: pointer;
    }
    .chip.active { background: linear-gradient(135deg, #FF6B4A, #FF6B8B); color: #fff; border-color: transparent; box-shadow: 0 4px 12px rgba(255,107,74,0.18); }
    .time-segment {
      display: flex; background: #F5EEE6; border-radius: 14px; padding: 4px;
    }
    .time-option {
      flex: 1; text-align: center; padding: 10px 0; border-radius: 11px;
      font-size: 14px; font-weight: 600; color: #6B5E52; cursor: pointer;
    }
    .time-option.active { background: #FFFFFF; color: #FF6B4A; box-shadow: 0 2px 8px rgba(61,43,31,0.06); }
    .apply-button {
      width: 100%; margin-top: 18px; padding: 16px; border: none; border-radius: 18px;
      background: linear-gradient(135deg, #FF6B4A, #FF8A6D); color: #fff;
      font-size: 16px; font-weight: 700; box-shadow: 0 8px 24px rgba(255,107,74,0.32);
      cursor: pointer;
    }
    .dish-list { margin-top: 6px; }
    .dish-card {
      background: #FFFFFF; border-radius: 20px; padding: 18px; margin-bottom: 14px;
      box-shadow: 0 12px 32px rgba(61,43,31,0.08); position: relative; overflow: hidden;
    }
    .dish-card::before {
      content: ''; position: absolute; left: 0; top: 18px; bottom: 18px; width: 4px;
      background: linear-gradient(180deg, #3DD9C7, #4ECDC4); border-radius: 0 4px 4px 0;
    }
    .dish-header { display: flex; justify-content: space-between; align-items: flex-start; padding-left: 12px; }
    .dish-name { font-size: 18px; font-weight: 700; }
    .log-mini {
      background: #FFF0EC; color: #FF6B4A; border: none; border-radius: 10px;
      padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .dish-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; padding-left: 12px; }
    .tag-pill { background: #F5EEE6; color: #6B5E52; font-size: 12px; font-weight: 600; padding: 5px 9px; border-radius: 999px; }
    .empty-state { text-align: center; padding: 36px 12px; color: #9E9185; font-size: 14px; }
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; margin: 0 auto;
      width: 100%; max-width: 400px; height: 80px; background: #FFFFFF;
      border-radius: 24px 24px 0 0; box-shadow: 0 -6px 24px rgba(61,43,31,0.06);
      display: flex; justify-content: space-around; align-items: center; padding-bottom: 14px;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #9E9185; font-size: 11px; font-weight: 600; text-decoration: none; }
    .tab-item.active { color: #FF6B4A; }
    .tab-item svg { width: 24px; height: 24px; stroke-width: 2; }
  </style>
</head>
<body data-page-id="mood-page" data-tab-id="tab-mood">
  <div class="app-shell">
    <main class="page">
      <header class="hero">
        <h1 class="page-title">心情厨房</h1>
        <p class="page-subtitle">今天想怎么吃，按心情来选</p>
      </header>

      <section class="filter-card">
        <h2 class="section-title">现在的心情</h2>
        <div class="chip-grid" data-ui-id="mood-mood-selector">
          <button class="chip active" type="button">想吃好的</button>
          <button class="chip" type="button">清淡</button>
          <button class="chip" type="button">重口味</button>
          <button class="chip" type="button">赶时间</button>
          <button class="chip" type="button">治愈系</button>
          <button class="chip" type="button">想尝鲜</button>
        </div>
      </section>

      <section class="filter-card">
        <h2 class="section-title">用餐时间</h2>
        <div class="time-segment" data-ui-id="mood-time-selector">
          <button class="time-option" type="button">早餐</button>
          <button class="time-option active" type="button">午餐</button>
          <button class="time-option" type="button">晚餐</button>
          <button class="time-option" type="button">夜宵</button>
        </div>
        <button class="apply-button" data-ui-id="mood-apply-button" type="button">应用筛选</button>
      </section>

      <section class="dish-list" data-ui-id="mood-dish-list">
        <h2 class="section-title">匹配结果</h2>

        <article class="dish-card" data-ui-id="mood-dish-1">
          <div class="dish-header">
            <div class="dish-name">红烧肉</div>
            <button class="log-mini" data-ui-id="mood-log-button" type="button">记录</button>
          </div>
          <div class="dish-meta">
            <span class="tag-pill">45 分钟</span>
            <span class="tag-pill">想吃好的</span>
            <span class="tag-pill">晚餐</span>
          </div>
        </article>

        <article class="dish-card" data-ui-id="mood-dish-2">
          <div class="dish-header">
            <div class="dish-name">麻婆豆腐</div>
            <button class="log-mini" data-ui-id="mood-log-button" type="button">记录</button>
          </div>
          <div class="dish-meta">
            <span class="tag-pill">20 分钟</span>
            <span class="tag-pill">重口味</span>
            <span class="tag-pill">午餐</span>
          </div>
        </article>
      </section>
    </main>

    <nav class="tab-bar">
      <a class="tab-item" href="page-home-page.html" aria-label="首页">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Home Tab Icon</title><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>首页</span>
      </a>
      <a class="tab-item" href="page-fridge-page.html" aria-label="冰箱">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Fridge Tab Icon</title><path d="M5 6a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6Z"/><path d="M5 10h14"/><path d="M15 7v6"/></svg>
        <span>冰箱</span>
      </a>
      <a class="tab-item active" href="page-mood-page.html" aria-label="心情">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Mood Tab Icon</title><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></svg>
        <span>心情</span>
      </a>
      <a class="tab-item" href="page-log-page.html" aria-label="记录">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Log Tab Icon</title><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        <span>记录</span>
      </a>
    </nav>
  </div>
</body>
</html>
