<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 今日决策</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'HarmonyOS Sans SC', 'PingFang SC', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #FAF8F5;
      color: #1A1A1A;
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      padding-bottom: 80px;
    }
    .hero {
      background: linear-gradient(160deg, #1C1C1E 0%, #0F0F0F 100%);
      border-radius: 0 0 28px 28px;
      padding: 48px 20px 28px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      top: -60px; right: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(255,107,53,0.22) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-date { font-size: 13px; color: rgba(255,255,255,0.72); margin-bottom: 6px; }
    .hero-title { font-size: 28px; font-weight: 700; line-height: 1.2; letter-spacing: -0.3px; margin-bottom: 20px; }
    .hero-actions { display: flex; gap: 12px; align-items: center; }
    .btn-primary {
      background: linear-gradient(135deg, #FF6B35 0%, #FF8A5B 100%);
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(255,107,53,0.32);
      display: inline-flex; align-items: center; gap: 8px;
      cursor: pointer;
    }
    .btn-icon {
      width: 44px; height: 44px;
      border-radius: 14px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
    .section { padding: 24px 20px 0; }
    .section-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
    .section-title { font-size: 20px; font-weight: 700; }
    .section-more { font-size: 13px; color: #8A8A8A; }
    .card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.06);
    }
    .status-row { display: flex; align-items: center; justify-content: space-between; }
    .status-label { font-size: 15px; color: #4A4A4A; }
    .status-badge {
      background: rgba(77,217,192,0.12);
      color: #3DD9C0;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 600;
    }
    .dish-list { display: flex; flex-direction: column; gap: 12px; }
    .dish-item {
      display: flex; gap: 14px; align-items: center;
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .dish-thumb {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, #FFC93D 0%, #FF8A5B 100%);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .dish-thumb svg { width: 28px; height: 28px; color: #fff; }
    .dish-info { flex: 1; }
    .dish-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .dish-meta { font-size: 12px; color: #8A8A8A; display: flex; gap: 8px; }
    .tag { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: rgba(0,0,0,0.04); color: #4A4A4A; }
    .tag.orange { background: rgba(255,107,53,0.10); color: #FF6B35; }
    .empty-state {
      text-align: center;
      padding: 32px 20px;
      color: #8A8A8A;
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; color: #D4D0CA; }
    .empty-title { font-size: 15px; color: #4A4A4A; margin-bottom: 6px; }
    .empty-desc { font-size: 13px; }
    .bottom-tab {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 390px;
      margin: 0 auto;
      height: 64px;
      background: rgba(255, 248, 245, 0.86);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8A8A8A; font-size: 11px; font-weight: 600; }
    .tab-item.active { color: #FF6B35; }
    .tab-item svg { width: 24px; height: 24px; }
    .floating-record {
      position: fixed;
      bottom: 84px;
      right: 20px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF6B35 0%, #FF8A5B 100%);
      color: #fff;
      border: none;
      box-shadow: 0 8px 24px rgba(255,107,53,0.32);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
  </style>
</head>
<body data-page-id="home" data-tab-id="tab-home">
  <header class="hero">
    <div class="hero-date" data-ui-id="home-title">6月20日 星期五</div>
    <h1 class="hero-title">晚上好，<br>今晚想吃点什么？</h1>
    <div class="hero-actions">
      <button class="btn-primary" data-ui-id="home-quick-wheel-button" aria-label="打开随机转盘">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <title>开始随机转盘抽取菜品</title>
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
        </svg>
        转一转
      </button>
      <button class="btn-icon" data-ui-id="home-filter-button" aria-label="打开筛选条件">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打开心情时间餐别筛选</title>
          <path d="M10 20a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341L21.74 4.67A1 1 0 0 0 21 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14z"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="card">
        <div class="status-row">
          <span class="status-label">今日打卡</span>
          <span class="status-badge" data-ui-id="home-today-record-status">已记录午餐</span>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">为你推荐</h2>
        <span class="section-more">基于当前筛选</span>
      </div>
      <div class="card">
        <div class="dish-list" data-ui-id="home-recommend-list">
          <div class="dish-item" data-ui-id="home-dish-1">
            <div class="dish-thumb">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>番茄鸡蛋菜品图标</title>
                <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
                <path d="M7 2v20"/>
                <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
              </svg>
            </div>
            <div class="dish-info">
              <div class="dish-name">番茄炒蛋</div>
              <div class="dish-meta">
                <span>15 分钟</span>
                <span class="tag orange">家常</span>
                <span class="tag">晚餐</span>
              </div>
            </div>
          </div>
          <div class="dish-item" data-ui-id="home-dish-2">
            <div class="dish-thumb" style="background: linear-gradient(135deg, #3DD9C0 0%, #7EE8D8 100%);">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>清蒸鱼菜品图标</title>
                <path d="M6.5 12c.94-3.07 4.06-5.5 8.5-5.5"/>
                <path d="M2 16s1-1 3-1c2.5 0 4 2 7 2s4.5-2 7-2c2 0 3 1 3 1"/>
                <path d="M12 6.5c2.5-2 5.5-2 7.5 0"/>
              </svg>
            </div>
            <div class="dish-info">
              <div class="dish-name">清蒸鲈鱼</div>
              <div class="dish-meta">
                <span>25 分钟</span>
                <span class="tag orange">清淡</span>
                <span class="tag">晚餐</span>
              </div>
            </div>
          </div>
          <div class="dish-item" data-ui-id="home-dish-3">
            <div class="dish-thumb" style="background: linear-gradient(135deg, #FF4D6D 0%, #FF7A8F 100%);">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>麻婆豆腐菜品图标</title>
                <rect width="18" height="18" x="3" y="3" rx="2"/>
                <path d="M3 9h18"/>
                <path d="M9 16h.01"/>
                <path d="M15 13h.01"/>
              </svg>
            </div>
            <div class="dish-info">
              <div class="dish-name">麻婆豆腐</div>
              <div class="dish-meta">
                <span>20 分钟</span>
                <span class="tag orange">下饭</span>
                <span class="tag">晚餐</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">快速打卡</h2>
      </div>
      <div class="card empty-state" data-ui-id="home-empty-recommendations" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <title>无推荐结果空状态</title>
          <circle cx="12" cy="12" r="10"/>
          <path d="M16 16s-1.5-2-4-2-4 2-4 2"/>
          <line x1="9" x2="9.01" y1="9" y2="9"/>
          <line x1="15" x2="15.01" y1="9" y2="9"/>
        </svg>
        <div class="empty-title">暂无推荐</div>
        <div class="empty-desc">添加冰箱食材或调整筛选，发现更多美味</div>
      </div>
      <p style="font-size:13px;color:#8A8A8A;padding:0 4px;">记录今天吃了什么，养成健康饮食小习惯。</p>
    </section>
  </main>

  <button class="floating-record" data-ui-id="home-add-record-button" aria-label="新增打卡记录">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <title>新增今日饮食打卡</title>
      <path d="M5 12h14"/>
      <path d="M12 5v14"/>
    </svg>
  </button>

  <nav class="bottom-tab">
    <div class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>今日首页导航</title>
        <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
        <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      </svg>
      今日
    </div>
    <div class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>冰箱食材导航</title>
        <path d="M5 6a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6Z"/>
        <path d="M5 10h14"/>
        <path d="M15 7v6"/>
      </svg>
      食材
    </div>
    <div class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>饮食打卡导航</title>
        <path d="M8 2v4"/>
        <path d="M16 2v4"/>
        <rect width="18" height="18" x="3" y="4" rx="2"/>
        <path d="M3 10h18"/>
      </svg>
      打卡
    </div>
  </nav>
</body>
</html>
