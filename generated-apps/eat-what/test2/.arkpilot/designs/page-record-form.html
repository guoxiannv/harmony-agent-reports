<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 打卡表单</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'HarmonyOS Sans SC', 'PingFang SC', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #FAF8F5;
      color: #1A1A1A;
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      padding-bottom: 100px;
    }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 48px 20px 20px;
    }
    .back-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.06);
      color: #1A1A1A;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .page-title { font-size: 20px; font-weight: 700; }
    .section { padding: 0 20px 18px; }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.06);
    }
    .form-row { margin-bottom: 18px; }
    .form-row:last-child { margin-bottom: 0; }
    .form-label { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: block; }
    .form-input, .form-textarea {
      width: 100%;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      font-family: inherit;
    }
    .form-input:focus, .form-textarea:focus { border-color: #FF6B35; }
    .form-textarea { min-height: 90px; resize: none; }
    .chip-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip {
      background: rgba(0,0,0,0.03);
      border: 1px solid transparent;
      border-radius: 18px;
      padding: 9px 16px;
      font-size: 14px;
      color: #4A4A4A;
      cursor: pointer;
    }
    .chip.active { background: rgba(255,107,53,0.10); color: #FF6B35; border-color: #FF6B35; font-weight: 600; }
    .chip.meal.active { background: #FF6B35; color: #fff; border-color: #FF6B35; }
    .stars { display: flex; gap: 8px; }
    .star {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.04);
      border: none;
      color: #8A8A8A;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .star.active { background: #FFC93D; color: #fff; }
    .bottom-actions {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 390px;
      margin: 0 auto;
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0));
      background: #fff;
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex; gap: 12px;
    }
    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, #FF6B35 0%, #FF8A5B 100%);
      color: #fff;
      border: none;
      padding: 14px 0;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(255,107,53,0.24);
      cursor: pointer;
    }
    .btn-secondary {
      width: 100px;
      background: #fff;
      color: #1A1A1A;
      border: 1px solid rgba(0,0,0,0.08);
      padding: 14px 0;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body data-page-id="record-form">
  <header class="top-bar">
    <button class="back-btn" data-ui-id="record-form-cancel-button" aria-label="取消打卡">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>取消并返回</title>
        <path d="M18 6 6 18"/>
        <path d="m6 6 12 12"/>
      </svg>
    </button>
    <div class="page-title">记录这一餐</div>
    <div style="width:40px;"></div>
  </header>

  <main>
    <section class="section">
      <div class="card">
        <div class="form-row">
          <label class="form-label">日期</label>
          <input type="date" class="form-input" data-ui-id="record-form-date-picker" value="2026-06-20" />
        </div>
        <div class="form-row">
          <label class="form-label">餐别</label>
          <div class="chip-group" data-ui-id="record-form-meal-group">
            <button class="chip meal">早餐</button>
            <button class="chip meal">午餐</button>
            <button class="chip meal active">晚餐</button>
            <button class="chip meal">夜宵</button>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">吃了什么</label>
          <input type="text" class="form-input" data-ui-id="record-form-dish-input" placeholder="菜名，如番茄炒蛋" />
        </div>
        <div class="form-row">
          <label class="form-label">满意度</label>
          <div class="stars" data-ui-id="record-form-rating">
            <button class="star active">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
                <title>一星评分</title>
                <path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/>
              </svg>
            </button>
            <button class="star active">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
                <title>二星评分</title>
                <path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/>
              </svg>
            </button>
            <button class="star active">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
                <title>三星评分</title>
                <path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/>
              </svg>
            </button>
            <button class="star active">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
                <title>四星评分</title>
                <path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/>
              </svg>
            </button>
            <button class="star">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <title>五星评分未选中</title>
                <path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">备注</label>
          <textarea class="form-textarea" data-ui-id="record-form-note-input" placeholder="记录心情、口味或做法..."></textarea>
        </div>
      </div>
    </section>
  </main>

  <footer class="bottom-actions">
    <button class="btn-secondary" data-ui-id="record-form-cancel-button">取消</button>
    <button class="btn-primary" data-ui-id="record-form-save-button">保存打卡</button>
  </footer>
</body>
</html>
