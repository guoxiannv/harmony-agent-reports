<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 饮食打卡</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'HarmonyOS Sans SC', 'PingFang SC', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #FAF8F5;
      color: #1A1A1A;
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      padding-bottom: 80px;
    }
    .page-header {
      padding: 48px 20px 16px;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .page-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .page-subtitle { font-size: 14px; color: #8A8A8A; }
    .add-btn {
      width: 44px; height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, #FF6B35 0%, #FF8A5B 100%);
      border: none;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,107,53,0.24);
    }
    .calendar-card {
      background: #fff;
      border-radius: 20px;
      margin: 0 20px 20px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.06);
    }
    .calendar-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .calendar-month { font-size: 16px; font-weight: 700; }
    .calendar-nav { display: flex; gap: 8px; }
    .calendar-nav button {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.06);
      background: #fff;
      color: #4A4A4A;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: #8A8A8A; margin-bottom: 10px; }
    .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
    .day {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      margin: 0 auto;
      position: relative;
    }
    .day.active { background: #FF6B35; color: #fff; }
    .day.dotted::after {
      content: '';
      position: absolute; bottom: 4px;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #3DD9C0;
    }
    .section { padding: 0 20px 16px; }
    .section-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
    .section-title { font-size: 18px; font-weight: 700; }
    .section-more { font-size: 13px; color: #8A8A8A; }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.06);
    }
    .record-item {
      display: flex; gap: 14px; align-items: flex-start;
    }
    .record-thumb {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, #FFC93D 0%, #FF8A5B 100%);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .record-thumb svg { width: 26px; height: 26px; color: #fff; }
    .record-info { flex: 1; }
    .record-header { display: flex; justify-content: space-between; align-items: baseline; }
    .record-dish { font-size: 16px; font-weight: 600; }
    .record-meal { font-size: 12px; color: #8A8A8A; }
    .record-note { font-size: 13px; color: #4A4A4A; margin-top: 4px; }
    .record-stars { display: flex; gap: 2px; margin-top: 6px; }
    .record-stars svg { width: 14px; height: 14px; color: #FFC93D; fill: #FFC93D; }
    .record-share {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(255,107,53,0.08);
      border: none;
      color: #FF6B35;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      margin-top: 4px;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #8A8A8A;
    }
    .empty-state svg { width: 52px; height: 52px; margin-bottom: 14px; color: #D4D0CA; }
    .empty-title { font-size: 15px; color: #4A4A4A; margin-bottom: 6px; }
    .bottom-tab {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 390px;
      margin: 0 auto;
      height: 64px;
      background: rgba(255, 248, 245, 0.86);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #8A8A8A; font-size: 11px; font-weight: 600; }
    .tab-item.active { color: #FF6B35; }
    .tab-item svg { width: 24px; height: 24px; }
  </style>
</head>
<body data-page-id="records" data-tab-id="tab-records">
  <header class="page-header">
    <div>
      <h1 class="page-title" data-ui-id="records-title">饮食打卡</h1>
      <p class="page-subtitle">记录每一餐的小确幸</p>
    </div>
    <button class="add-btn" data-ui-id="records-add-button" aria-label="新增打卡">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <title>新增今日饮食打卡</title>
        <path d="M5 12h14"/>

  <main>
    <section class="calendar-card">

        <div class="calendar-nav">

          <button aria-label="下个月">

              <path d="m9 18 6-6-6-6"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="weekdays">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div class="days" data-ui-id="records-calendar">
        <span class="day">1</span>
        <span class="day dotted">2</span>
        <span class="day">3</span>
        <span class="day dotted">4</span>
        <span class="day">5</span>
        <span class="day">6</span>
        <span class="day">7</span>
        <span class="day dotted">8</span>
        <span class="day">9</span>
        <span class="day">10</span>
        <span class="day">11</span>
        <span class="day">12</span>
        <span class="day">13</span>
        <span class="day">14</span>
        <span class="day">15</span>
        <span class="day">16</span>
        <span class="day">17</span>
        <span class="day">18</span>
        <span class="day">19</span>
        <span class="day active dotted">20</span>
        <span class="day">21</span>
        <span class="day">22</span>
        <span class="day">23</span>
        <span class="day">24</span>
        <span class="day">25</span>
        <span class="day">26</span>
        <span class="day">27</span>
        <span class="day">28</span>
        <span class="day">29</span>
        <span class="day">30</span>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">今日记录</h2>
        <span class="section-more">6月20日</span>
      </div>
      <div data-ui-id="records-list">
        <div class="card">
          <div class="record-item">
            <div class="record-thumb">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>番茄鸡蛋菜品图标</title>
                <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
                <path d="M7 2v20"/>
                <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
              </svg>
            </div>
            <div class="record-info">
              <div class="record-header">
                <span class="record-dish">番茄炒蛋 + 米饭</span>
                <span class="record-meal">午餐</span>
              </div>
              <div class="record-note">妈妈的味道，今天做得有点咸</div>
              <div class="record-stars">
                <svg viewBox="0 0 24 24"><title>四星满意度</title><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
                <svg viewBox="0 0 24 24"><title>四星满意度</title><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
                <svg viewBox="0 0 24 24"><title>四星满意度</title><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
                <svg viewBox="0 0 24 24"><title>四星满意度</title><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><title>未点亮满意度星标</title><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
              </div>
            </div>
            <button class="record-share" data-ui-id="record-share-button" aria-label="分享这条打卡">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>生成这条打卡的分享卡片</title>
                <path d="M12 2v13"/>
                <path d="m16 6-4-4-4 4"/>
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div class="card empty-state" data-ui-id="records-empty-state" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <title>无打卡记录空状态</title>
          <rect width="18" height="18" x="3" y="4" rx="2"/>
          <path d="M16 2v4"/>
          <path d="M8 2v4"/>
          <path d="M3 10h18"/>
        </svg>
        <div class="empty-title">还没有打卡记录</div>
        <div>记录每一餐，养成健康饮食好习惯</div>
      </div>
    </section>
  </main>

  <nav class="bottom-tab">
    <div class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>今日首页导航</title>

        <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>

        <path d="M15 7v6"/>

    <div class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>饮食打卡导航</title>
        <path d="M8 2v4"/>

        <rect width="18" height="18" x="3" y="4" rx="2"/>

</body>
