<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>今天吃什么 - 发现</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #FDF8F3;
      color: #1A1A1A;
      min-height: 100vh;
      padding-bottom: 90px;
    }
    .container { max-width: 390px; margin: 0 auto; padding: 0 20px; }
    header { padding-top: 56px; margin-bottom: 20px; }
    .page-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .subtitle { font-size: 15px; color: #A8A29E; margin-top: 4px; }
    .filter-card {
      background: #FFFFFF;
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(217, 119, 54, 0.08);
      margin-bottom: 18px;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .filter-row:last-child { margin-bottom: 0; }
    .filter-label {
      width: 100%;
      font-size: 12px;
      font-weight: 700;
      color: #A8A29E;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .chip {
      padding: 8px 16px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: #FFF5ED;
      color: #B85C25;
      transition: all 0.2s ease;
    }
    .chip.selected { background: #D97736; color: #FFFFFF; box-shadow: 0 4px 14px rgba(217, 119, 54, 0.28); }
    .chip.green { background: #E3F3F0; color: #147A6B; }
    .chip.green.selected { background: #4A9B8E; color: #FFFFFF; }
    .chip.purple { background: #F0EBFF; color: #6B5BAB; }
    .chip.purple.selected { background: #8B7EC8; color: #FFFFFF; }
    .chip.red { background: #FBE8E6; color: #A8483C; }
    .chip.red.selected { background: #C65D4F; color: #FFFFFF; }
    .chip.yellow { background: #FFF6D6; color: #A67C1A; }
    .chip.yellow.selected { background: #E4B84A; color: #FFFFFF; }
    .filter-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }
    .text-btn {
      font-size: 13px;
      font-weight: 700;
      color: #A8A29E;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .dish-tile {
      background: #FFFFFF;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }
    .tile-cover {
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFFFFF;
    }
    .tile-cover.orange { background: linear-gradient(145deg, #F2A864 0%, #D97736 100%); }
    .tile-cover.green { background: linear-gradient(145deg, #5EB69D 0%, #4A9B8E 100%); }
    .tile-cover.purple { background: linear-gradient(145deg, #A89BD8 0%, #8B7EC8 100%); }
    .tile-body { padding: 12px; }
    .tile-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .tile-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .tile-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 8px;
      background: #F5EFE9;
      color: #A8A29E;
    }
    .tile-cal { font-size: 12px; color: #A8A29E; font-weight: 600; }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 20px;
      color: #A8A29E;
    }
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      height: 72px;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: saturate(200%) blur(28px);
      border-top: 1px solid rgba(0,0,0,0.03);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 10px;
      z-index: 10;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #A8A29E;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
    }
    .tab-item.active { color: #D97736; font-weight: 700; }
    .tab-item.active::before {
      content: '';
      position: absolute;
      top: -6px;
      width: 4px;
      height: 4px;
      background: #D97736;
      border-radius: 50%;
    }
    .tab-item svg { width: 26px; height: 26px; }
  </style>
</head>
<body data-page-id="discover-page" data-tab-id="tab-discover">
  <div class="container">
    <header>
      <h1 class="page-title">发现</h1>
      <p class="subtitle">按心情和时段，找到对胃口的菜</p>
    </header>

    <section class="filter-card">
      <div class="filter-row" data-ui-id="discover-mood-filter">
        <span class="filter-label">心情</span>
        <button class="chip green selected">想吃清淡</button>
        <button class="chip red">重口味</button>
        <button class="chip yellow selected">快手菜</button>
        <button class="chip green">健康减脂</button>
        <button class="chip purple">放纵一下</button>
        <button class="chip red">治愈系</button>
      </div>
      <div class="filter-row" data-ui-id="discover-time-filter">
        <span class="filter-label">时段</span>
        <button class="chip yellow selected">早餐</button>
        <button class="chip green">午餐</button>
        <button class="chip red">晚餐</button>
        <button class="chip purple">夜宵</button>
      </div>
      <div class="filter-actions">
        <button class="text-btn" data-ui-id="discover-reset-button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>重置筛选条件</title>
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          重置
        </button>
      </div>
    </section>

    <section class="result-grid" data-ui-id="discover-result-list">
      <article class="dish-tile">
        <div class="tile-cover green">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <title>清淡菜品图标</title>
            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
            <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
          </svg>
        </div>
        <div class="tile-body">
          <div class="tile-name">蔬菜燕麦粥</div>
          <div class="tile-tags">
            <span class="tile-tag">早餐</span>
            <span class="tile-tag">清淡</span>
          </div>
          <div class="tile-cal">220 kcal</div>
        </div>
      </article>

      <article class="dish-tile">
        <div class="tile-cover yellow">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <title>快手菜图标</title>
            <path d="M10 2v2"/>
            <path d="M14 2v2"/>
            <path d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h14a4 4 0 1 1 0 8h-1"/>
            <path d="M6 2v2"/>
          </svg>
        </div>
        <div class="tile-body">
          <div class="tile-name">鸡蛋三明治</div>
          <div class="tile-tags">
            <span class="tile-tag">早餐</span>
            <span class="tile-tag">快手</span>
          </div>
          <div class="tile-cal">280 kcal</div>
        </div>
      </article>

      <article class="dish-tile">
        <div class="tile-cover orange">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <title>家常菜品图标</title>
            <path d="M17 21a1 1 0 0 0 1-1v-5.35c0-.457.316-.844.727-1.041a4 4 0 0 0-2.134-7.589 5 5 0 0 0-9.186 0 4 4 0 0 0-2.134 7.588c.411.198.727.585.727 1.041V20a1 1 0 0 0 1 1Z"/>
            <path d="M6 17h12"/>
          </svg>
        </div>
        <div class="tile-body">
          <div class="tile-name">番茄鸡蛋面</div>
          <div class="tile-tags">
            <span class="tile-tag">早餐</span>
            <span class="tile-tag">快手</span>
          </div>
          <div class="tile-cal">320 kcal</div>
        </div>
      </article>
    </section>

    <div class="empty-state" style="display:none;" data-ui-id="discover-empty-state">
      <div style="font-size: 16px; font-weight: 700; color: #1A1A1A; margin-bottom: 6px;">没有匹配的菜品</div>
      <div>换个组合试试，也许会有惊喜</div>
    </div>
  </div>

  <nav class="tab-bar">
    <div class="tab-item" data-tab-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>首页标签</title>
        <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
        <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      </svg>
      <span>首页</span>
    </div>
    <div class="tab-item" data-tab-id="tab-ingredients">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>食材推荐标签</title>
        <path d="M5 6a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6Z"/>
        <path d="M5 10h14"/>
        <path d="M15 7v6"/>
      </svg>
      <span>食材</span>
    </div>
    <div class="tab-item active" data-tab-id="tab-discover">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>发现标签</title>
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.34-4.34"/>
      </svg>
      <span>发现</span>
    </div>
    <div class="tab-item" data-tab-id="tab-checkin">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>打卡标签</title>
        <path d="M8 2v4"/>
        <path d="M16 2v4"/>
        <rect width="18" height="18" x="3" y="4" rx="2"/>
        <path d="M3 10h18"/>
        <path d="m9 16 2 2 4-4"/>
      </svg>
      <span>打卡</span>
    </div>
    <div class="tab-item" data-tab-id="tab-profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>我的标签</title>
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </div>
  </nav>
</body>
</html>
