<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>今天吃什么 - 我的</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #FDF8F3;
      color: #1A1A1A;
      min-height: 100vh;
      padding-bottom: 90px;
    }
    .container { max-width: 390px; margin: 0 auto; padding: 0 20px; }
    header { padding-top: 56px; margin-bottom: 20px; }
    .page-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .profile-card {
      background: linear-gradient(135deg, #F2A864 0%, #D97736 100%);
      border-radius: 26px;
      padding: 24px;
      color: #FFFFFF;
      box-shadow: 0 14px 36px rgba(217, 119, 54, 0.28);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 22px;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar svg { width: 32px; height: 32px; }
    .profile-info { flex: 1; }
    .profile-name { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .profile-sub { font-size: 13px; opacity: 0.9; }
    .section { margin-bottom: 24px; }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .section-title { font-size: 18px; font-weight: 700; }
    .add-link {
      font-size: 13px;
      font-weight: 700;
      color: #D97736;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .list-card {
      background: #FFFFFF;
      border-radius: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      border-bottom: 1px solid #F5EFE9;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item-name { font-size: 15px; font-weight: 600; }
    .delete-btn {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      border: none;
      background: #FBE8E6;
      color: #C65D4F;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .empty-state {
      text-align: center;
      padding: 32px 20px;
      color: #A8A29E;
      font-size: 14px;
    }
    .danger-zone {
      background: #FFFFFF;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }
    .danger-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .danger-label {
      font-size: 15px;
      font-weight: 600;
      color: #C65D4F;
    }
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      height: 72px;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: saturate(200%) blur(28px);
      border-top: 1px solid rgba(0,0,0,0.03);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 10px;
      z-index: 10;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #A8A29E;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
    }
    .tab-item.active { color: #D97736; font-weight: 700; }
    .tab-item.active::before {
      content: '';
      position: absolute;
      top: -6px;
      width: 4px;
      height: 4px;
      background: #D97736;
      border-radius: 50%;
    }
    .tab-item svg { width: 26px; height: 26px; }
  </style>
</head>
<body data-page-id="profile-page" data-tab-id="tab-profile">
  <div class="container">
    <header>
      <h1 class="page-title">我的</h1>
    </header>

    <section class="profile-card">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>用户头像</title>
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="profile-info">
        <div class="profile-name">美食探险家</div>
        <div class="profile-sub">已坚持打卡 7 天</div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <span class="section-title">转盘自定义菜品</span>
        <button class="add-link" data-ui-id="profile-add-custom-dish-button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <title>添加自定义菜品</title>
            <path d="M5 12h14"/>
            <path d="M12 5v14"/>
          </svg>
          添加
        </button>
      </div>
      <div class="list-card" data-ui-id="profile-custom-dishes-list">
        <div class="list-item">
          <span class="list-item-name">红烧肉</span>
          <button class="delete-btn" aria-label="删除自定义菜品">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>删除此自定义菜品</title>
              <path d="M10 11v6"/>
              <path d="M14 11v6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
              <path d="M3 6h18"/>
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>
        <div class="list-item">
          <span class="list-item-name">酸菜鱼</span>
          <button class="delete-btn" aria-label="删除自定义菜品">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>删除此自定义菜品</title>
              <path d="M10 11v6"/>
              <path d="M14 11v6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
              <path d="M3 6h18"/>
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="empty-state" style="display:none;" data-ui-id="profile-custom-dishes-empty-state">
        还没有自定义菜品，点击右上角添加
      </div>
    </section>

    <section class="danger-zone">
      <div class="danger-item" data-ui-id="profile-clear-data-button">
        <span class="danger-label">清空所有数据</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #A8A29E;">
          <title>进入清空数据</title>
          <path d="m9 18 6-6-6-6"/>
        </svg>
      </div>
    </section>
  </div>

  <nav class="tab-bar">
    <div class="tab-item" data-tab-id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>首页标签</title>
        <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
        <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      </svg>
      <span>首页</span>
    </div>
    <div class="tab-item" data-tab-id="tab-ingredients">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>食材推荐标签</title>
        <path d="M5 6a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6Z"/>
        <path d="M5 10h14"/>
        <path d="M15 7v6"/>
      </svg>
      <span>食材</span>
    </div>
    <div class="tab-item" data-tab-id="tab-discover">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>发现标签</title>
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.34-4.34"/>
      </svg>
      <span>发现</span>
    </div>
    <div class="tab-item" data-tab-id="tab-checkin">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>打卡标签</title>
        <path d="M8 2v4"/>
        <path d="M16 2v4"/>
        <rect width="18" height="18" x="3" y="4" rx="2"/>
        <path d="M3 10h18"/>
        <path d="m9 16 2 2 4-4"/>
      </svg>
      <span>打卡</span>
    </div>
    <div class="tab-item active" data-tab-id="tab-profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>我的标签</title>
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </div>
  </nav>
</body>
</html>
