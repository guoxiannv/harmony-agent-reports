<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>今天吃什么 - 转盘设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: rgba(26, 26, 26, 0.45);
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .sheet {
      width: 100%;
      max-width: 390px;
      background: #FDF8F3;
      border-radius: 32px 32px 0 0;
      padding: 22px 20px 34px;
      animation: slideUp 0.35s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }
    .sheet-title { font-size: 20px; font-weight: 800; }
    .close-btn {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: #F5EFE9;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #A8A29E;
      cursor: pointer;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }
    .text-input {
      flex: 1;
      height: 52px;
      background: #F5EFE9;
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 0 16px;
      font-size: 15px;
      outline: none;
    }
    .text-input:focus { border-color: #D97736; background: #FFFFFF; }
    .add-btn {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(145deg, #F2A864 0%, #D97736 100%);
      border: none;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(217, 119, 54, 0.28);
    }
    .list-card {
      background: #FFFFFF;
      border-radius: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      overflow: hidden;
      margin-bottom: 14px;
    }
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      border-bottom: 1px solid #F5EFE9;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item-name { font-size: 15px; font-weight: 600; }
    .delete-btn {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      border: none;
      background: #FBE8E6;
      color: #C65D4F;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .empty-state {
      text-align: center;
      padding: 32px 20px;
      color: #A8A29E;
      font-size: 14px;
    }
    .reset-link {
      font-size: 14px;
      font-weight: 700;
      color: #A8A29E;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body data-page-id="wheel-settings-sheet">
  <div class="sheet">
    <div class="sheet-header">
      <h1 class="sheet-title">转盘设置</h1>
      <button class="close-btn" aria-label="关闭">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>关闭转盘设置</title>
          <path d="M18 6 6 18"/>
          <path d="m6 6 12 12"/>
        </svg>
      </button>
    </div>

    <div class="input-row">
      <input type="text" class="text-input" placeholder="输入自定义菜品" data-ui-id="wheel-settings-input" />
      <button class="add-btn" data-ui-id="wheel-settings-add-button" aria-label="添加菜品">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <title>添加自定义转盘菜品</title>
          <path d="M5 12h14"/>
          <path d="M12 5v14"/>
        </svg>
      </button>
    </div>

    <div class="list-card" data-ui-id="wheel-settings-list">
      <div class="list-item">
        <span class="list-item-name">红烧肉</span>
        <button class="delete-btn" aria-label="删除菜品">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>删除此转盘菜品</title>
            <path d="M10 11v6"/>
            <path d="M14 11v6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
            <path d="M3 6h18"/>
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
      <div class="list-item">
        <span class="list-item-name">酸菜鱼</span>
        <button class="delete-btn" aria-label="删除菜品">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>删除此转盘菜品</title>
            <path d="M10 11v6"/>
            <path d="M14 11v6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
            <path d="M3 6h18"/>
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="empty-state" style="display:none;" data-ui-id="wheel-settings-empty-state">
      还没有自定义菜品
    </div>

    <button class="reset-link" data-ui-id="wheel-settings-reset-button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <title>恢复默认转盘菜品</title>
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      恢复默认
    </button>
  </div>
</body>
</html>
