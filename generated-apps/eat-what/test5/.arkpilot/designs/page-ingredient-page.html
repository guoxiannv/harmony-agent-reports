<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 食材推荐</title>
  <style>
    :root {
      --paper: #FFFCFA; --cream: #FFF5ED; --dark: #2E2A25; --warm-gray: #7A746E; --light-gray: #F5F0EB; --border: #E9E3DD;
      --orange: #FF8C42; --orange-deep: #FF7043; --orange-dark: #E86A2E; --green: #4ECB9C; --olive: #5A6B58; --sage: #8FA897;
      --shadow-card: 0 2px 10px rgba(46, 42, 37, 0.05), 0 6px 20px rgba(46, 42, 37, 0.04);
      --shadow-button: 0 6px 20px rgba(255, 140, 66, 0.28);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--paper); color: var(--dark); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif; }
    body { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; }
    .page { padding: 20px 22px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .back-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--light-gray); display: flex; align-items: center; justify-content: center; border: none; color: var(--dark); }
    .page-title { font-size: 30px; font-weight: 700; line-height: 1.18; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
    .input-card { background: var(--paper); border-radius: 22px; padding: 20px; box-shadow: var(--shadow-card); margin-bottom: 20px; }
    .input-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .text-input { flex: 1; background: var(--paper); border: 1.5px solid var(--border); border-radius: 16px; padding: 14px 16px; font-size: 15px; outline: none; }
    .text-input:focus { border-color: var(--orange); box-shadow: 0 0 0 4px rgba(255,140,66,0.12); }
    .add-btn { width: 48px; height: 48px; border-radius: 16px; background: linear-gradient(135deg, var(--orange) 0%, var(--orange-deep) 100%); border: none; color: white; display: flex; align-items: center; justify-content: center; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .ingredient-tag { background: #E8F5F1; color: #1E7A63; border-radius: 20px; padding: 9px 14px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .ingredient-tag .del { width: 20px; height: 20px; border-radius: 50%; background: #D1E8E1; display: flex; align-items: center; justify-content: center; color: #1E7A63; }
    .clear-link { background: transparent; border: none; color: var(--warm-gray); font-size: 14px; }
    .recommend-btn { width: 100%; background: linear-gradient(135deg, var(--orange) 0%, var(--orange-deep) 55%, var(--orange-dark) 100%); color: white; border: none; border-radius: 18px; padding: 16px; font-size: 16px; font-weight: 600; box-shadow: var(--shadow-button); margin-bottom: 28px; }
    .result-list { display: flex; flex-direction: column; gap: 12px; }
    .dish-card { background: var(--paper); border-radius: 20px; padding: 18px; box-shadow: var(--shadow-card); display: flex; gap: 14px; align-items: center; }
    .dish-icon { width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .dish-icon.orange { background: #FFF0E6; color: var(--orange); }
    .dish-icon.green { background: #E8F5F1; color: var(--green); }
    .dish-icon.olive { background: #E8EEE6; color: var(--olive); }
    .dish-info { flex: 1; }
    .dish-name { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .dish-meta { font-size: 13px; color: var(--warm-gray); }
    .empty-state { text-align: center; padding: 40px 20px; }
    .empty-icon { width: 80px; height: 80px; border-radius: 50%; background: var(--light-gray); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; color: var(--sage); }
    .empty-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .empty-desc { font-size: 14px; color: var(--warm-gray); }
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; max-width: 420px; margin: 0 auto; height: 68px;
      background: rgba(255, 252, 250, 0.92); backdrop-filter: blur(24px) saturate(160%); border-top: 1px solid rgba(233,227,221,0.6);
      display: flex; justify-content: space-around; align-items: center;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #A8A29C; font-size: 11px; font-weight: 500; }
    .tab-item.active { color: var(--orange); }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--orange); margin-top: 2px; }
  </style>
</head>
<body data-page-id="ingredient-page">
  <div class="page">
    <header class="header">
      <button class="back-btn" aria-label="返回">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Go Back</title>
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <div class="page-title">我的冰箱</div>
    </header>

    <div class="input-card">
      <div class="section-title">添加食材</div>
      <div class="input-row">
        <input class="text-input" type="text" placeholder="输入食材，如：番茄、鸡蛋" data-ui-id="ingredient-input" />
        <button class="add-btn" data-ui-id="ingredient-add-button">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Add Ingredient</title>
            <path d="M5 12h14"/><path d="M12 5v14"/>
          </svg>
        </button>
      </div>
      <div class="tag-list" data-ui-id="ingredient-tag-list">
        <div class="ingredient-tag" data-ui-id="ingredient-tag-1">番茄<span class="del"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>Remove Ingredient</title><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span></div>
        <div class="ingredient-tag" data-ui-id="ingredient-tag-2">鸡蛋<span class="del"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>Remove Ingredient</title><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span></div>
        <div class="ingredient-tag" data-ui-id="ingredient-tag-3">牛肉<span class="del"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>Remove Ingredient</title><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span></div>
      </div>
      <button class="clear-link" data-ui-id="ingredient-clear-button">清空全部</button>
    </div>

    <button class="recommend-btn" data-ui-id="ingredient-recommend-button">开始推荐</button>

    <div class="section-title">推荐菜品</div>
    <div class="result-list" data-ui-id="ingredient-result-list">
      <div class="dish-card" data-ui-id="ingredient-result-1">
        <div class="dish-icon orange">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Recommended Dish</title>
            <path d="M2 12h20"/><path d="M20 12v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8"/><path d="m4 8 16-4"/>
          </svg>
        </div>
        <div class="dish-info">
          <div class="dish-name">番茄炒蛋</div>
          <div class="dish-meta">需要：番茄、鸡蛋 · 15分钟</div>
        </div>
      </div>
      <div class="dish-card" data-ui-id="ingredient-result-2">
        <div class="dish-icon green">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Recommended Dish</title>
            <path d="M16.4 13.7A6.5 6.5 0 1 0 6.28 6.6c-1.1 3.13-.78 3.9-3.18 6.08A3 3 0 0 0 5 18c4 0 8.4-1.8 11.4-4.3"/>
            <circle cx="12.5" cy="8.5" r="2.5"/>
          </svg>
        </div>
        <div class="dish-info">
          <div class="dish-name">番茄牛腩</div>
          <div class="dish-meta">需要：番茄、牛肉 · 60分钟</div>
        </div>
      </div>
      <div class="dish-card" data-ui-id="ingredient-result-3">
        <div class="dish-icon olive">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Recommended Dish</title>
            <circle cx="11.5" cy="12.5" r="3.5"/>
            <path d="M3 8c0-3.5 2.5-6 6.5-6 5 0 4.83 3 7.5 5s5 2 5 6c0 4.5-2.5 6.5-7 6.5-2.5 0-2.5 2.5-6 2.5s-7-2-7-5.5c0-3 1.5-3 1.5-5C3.5 10 3 9 3 8Z"/>
          </svg>
        </div>
        <div class="dish-info">
          <div class="dish-name">滑蛋牛肉</div>
          <div class="dish-meta">需要：鸡蛋、牛肉 · 20分钟</div>
        </div>
      </div>
    </div>
  </div>

  <nav class="tab-bar">
    <div class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Home Tab</title><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>首页</span></div>
    <div class="tab-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Recommend Tab</title><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg><span>推荐</span><div class="tab-dot"></div></div>
    <div class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Check-in Tab</title><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg><span>打卡</span></div>
    <div class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Profile Tab</title><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span></div>
  </nav>
</body>
</html>
