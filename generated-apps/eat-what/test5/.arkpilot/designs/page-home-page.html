<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 首页</title>
  <style>
    :root {
      --paper: #FFFCFA;
      --cream: #FFF5ED;
      --vanilla: #F8EFE6;
      --dark: #2E2A25;
      --warm-gray: #7A746E;
      --light-gray: #F5F0EB;
      --border: #E9E3DD;
      --orange: #FF8C42;
      --orange-deep: #FF7043;
      --orange-dark: #E86A2E;
      --green: #4ECB9C;
      --olive: #5A6B58;
      --sage: #8FA897;
      --shadow-card: 0 2px 10px rgba(46, 42, 37, 0.05), 0 6px 20px rgba(46, 42, 37, 0.04);
      --shadow-button: 0 6px 20px rgba(255, 140, 66, 0.28);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--paper); color: var(--dark); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif; }
    body { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; }
    .page { padding: 20px 22px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .greeting { font-size: 13px; color: var(--warm-gray); margin-bottom: 4px; }
    .page-title { font-size: 30px; font-weight: 700; line-height: 1.18; }
    .icon-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--light-gray); display: flex; align-items: center; justify-content: center; border: none; color: var(--dark); }
    .today-card {
      background: linear-gradient(135deg, #FFF5ED 0%, #FFE8D6 100%);
      border-radius: 26px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-card);
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .today-card::after {
      content: "";
      position: absolute;
      top: -40px; right: -40px;
      width: 140px; height: 140px;
      background: radial-gradient(circle, rgba(255,140,66,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }
    .today-text { max-width: 60%; }
    .today-label { font-size: 13px; color: var(--orange-dark); font-weight: 600; margin-bottom: 8px; }
    .today-title { font-size: 22px; font-weight: 700; line-height: 1.25; margin-bottom: 10px; }
    .today-desc { font-size: 14px; color: var(--warm-gray); line-height: 1.45; }
    .today-action {
      margin-top: 14px;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-deep) 55%, var(--orange-dark) 100%);
      color: white;
      border: none;
      border-radius: 18px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      box-shadow: var(--shadow-button);
    }
    .chef-icon { width: 80px; height: 80px; color: var(--orange); flex-shrink: 0; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 14px; }
    .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
    .feature-card {
      background: var(--paper);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .feature-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
    .feature-icon.orange { background: #FFF0E6; color: var(--orange); }
    .feature-icon.green { background: #E8F5F1; color: var(--green); }
    .feature-icon.sage { background: #F0F4F2; color: var(--sage); }
    .feature-icon.olive { background: #E8EEE6; color: var(--olive); }
    .feature-title { font-size: 16px; font-weight: 600; }
    .feature-desc { font-size: 12px; color: var(--warm-gray); line-height: 1.4; }
    .recent-list { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; }
    .recent-card {
      flex: 0 0 140px;
      background: var(--paper);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow-card);
    }
    .recent-meal { font-size: 12px; color: var(--warm-gray); margin-bottom: 6px; }
    .recent-dish { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .recent-date { font-size: 11px; color: var(--sage); font-weight: 500; }
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 420px;
      margin: 0 auto;
      height: 68px;
      background: rgba(255, 252, 250, 0.92);
      backdrop-filter: blur(24px) saturate(160%);
      border-top: 1px solid rgba(233, 227, 221, 0.6);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #A8A29C; font-size: 11px; font-weight: 500; }
    .tab-item.active { color: var(--orange); }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--orange); margin-top: 2px; }
  </style>
</head>
<body data-page-id="home-page" data-tab-id="tab-home">
  <div class="page">
    <header class="header">
      <div>
        <div class="greeting">早上好，今天想吃点什么？</div>
        <div class="page-title">今天吃什么</div>
      </div>
      <button class="icon-btn" data-ui-id="profile-settings-button" aria-label="打开设置">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Open Settings</title>
          <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </header>

    <section class="today-card" data-ui-id="home-today-status-card">
      <div class="today-text">
        <div class="today-label">今日状态</div>
        <div class="today-title">还没决定<br>今天吃什么？</div>
        <div class="today-desc">转一转，让命运决定今日美味。</div>
        <button class="today-action" data-ui-id="home-spin-wheel-button">去转盘</button>
      </div>
      <svg class="chef-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" data-decoration="chef-hat-illustration">
        <title>Chef Hat Decoration</title>
        <path d="M17 21a1 1 0 0 0 1-1v-5.35c0-.457.316-.844.727-1.041a4 4 0 0 0-2.134-7.589 5 5 0 0 0-9.186 0 4 4 0 0 0-2.134 7.588c.411.198.727.585.727 1.041V20a1 1 0 0 0 1 1Z"/>
        <path d="M6 17h12"/>
      </svg>
    </section>

    <div class="section-title">快捷入口</div>
    <div class="quick-grid">
      <div class="feature-card" data-ui-id="home-spin-wheel-button">
        <div class="feature-icon orange">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Spin Wheel</title>
            <rect width="12" height="12" x="2" y="10" rx="2" ry="2"/>
            <path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"/>
            <path d="M6 18h.01"/><path d="M10 14h.01"/><path d="M15 6h.01"/><path d="M18 9h.01"/>
          </svg>
        </div>
        <div class="feature-title">转盘抽菜</div>
        <div class="feature-desc">随机决定今天吃什么</div>
      </div>
      <div class="feature-card" data-ui-id="home-ingredient-button">
        <div class="feature-icon green">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Ingredient Recommendation</title>
            <path d="M2.27 21.7s9.87-3.5 12.73-6.36a4.5 4.5 0 0 0-6.36-6.37C5.77 11.84 2.27 21.7 2.27 21.7zM8.64 14l-2.05-2.04M15.34 15l-2.46-2.46"/>
            <path d="M22 9s-1.33-2-3.5-2C16.86 7 15 9 15 9s1.33 2 3.5 2S22 9 22 9z"/>
            <path d="M15 2s-2 1.33-2 3.5S15 9 15 9s2-1.84 2-3.5C17 3.33 15 2 15 2z"/>
          </svg>
        </div>
        <div class="feature-title">冰箱食材</div>
        <div class="feature-desc">看看能做什么菜</div>
      </div>
      <div class="feature-card" data-ui-id="home-filter-button">
        <div class="feature-icon sage">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Filter Dishes</title>
            <path d="M10 20a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341L21.74 4.67A1 1 0 0 0 21 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14z"/>
          </svg>
        </div>
        <div class="feature-title">心情筛选</div>
        <div class="feature-desc">按心情和时段选菜</div>
      </div>
      <div class="feature-card" data-ui-id="home-checkin-button">
        <div class="feature-icon olive">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Daily Check-in</title>
            <path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>
          </svg>
        </div>
        <div class="feature-title">每日打卡</div>
        <div class="feature-desc">记录每一餐</div>
      </div>
    </div>

    <div class="section-title">最近打卡</div>
    <div class="recent-list" data-ui-id="home-recent-checkin-list">
      <div class="recent-card" data-ui-id="home-checkin-1">
        <div class="recent-meal">晚餐</div>
        <div class="recent-dish">番茄牛腩</div>
        <div class="recent-date">昨天 18:30</div>
      </div>
      <div class="recent-card" data-ui-id="home-checkin-2">
        <div class="recent-meal">午餐</div>
        <div class="recent-dish">蒜香虾仁</div>
        <div class="recent-date">昨天 12:15</div>
      </div>
      <div class="recent-card" data-ui-id="home-checkin-3">
        <div class="recent-meal">早餐</div>
        <div class="recent-dish">牛油果吐司</div>
        <div class="recent-date">今天 08:00</div>
      </div>
    </div>
  </div>

  <nav class="tab-bar">
    <div class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Home Tab</title><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>首页</span>
      <div class="tab-dot"></div>
    </div>
    <div class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Recommend Tab</title><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
      <span>推荐</span>
    </div>
    <div class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Check-in Tab</title><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
      <span>打卡</span>
    </div>
    <div class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Profile Tab</title><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </div>
  </nav>
</body>
</html>
