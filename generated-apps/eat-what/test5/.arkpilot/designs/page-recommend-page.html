<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 推荐</title>
  <style>
    :root {
      --paper: #FFFCFA; --cream: #FFF5ED; --dark: #2E2A25; --warm-gray: #7A746E; --light-gray: #F5F0EB; --border: #E9E3DD;
      --orange: #FF8C42; --orange-deep: #FF7043; --orange-dark: #E86A2E; --green: #4ECB9C; --olive: #5A6B58; --sage: #8FA897;
      --shadow-card: 0 2px 10px rgba(46, 42, 37, 0.05), 0 6px 20px rgba(46, 42, 37, 0.04);
      --shadow-button: 0 6px 20px rgba(255, 140, 66, 0.28);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--paper); color: var(--dark); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif; }
    body { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; }
    .page { padding: 20px 22px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 30px; font-weight: 700; line-height: 1.18; }
    .icon-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--light-gray); display: flex; align-items: center; justify-content: center; border: none; color: var(--dark); }
    .segment { display: flex; background: var(--light-gray); border-radius: 18px; padding: 4px; margin-bottom: 24px; }
    .segment-item { flex: 1; text-align: center; padding: 12px 0; border-radius: 14px; font-size: 15px; font-weight: 500; color: var(--warm-gray); cursor: pointer; }
    .segment-item.active { background: var(--dark); color: white; box-shadow: 0 4px 12px rgba(46,42,37,0.14); }
    .panel-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .panel-subtitle { font-size: 14px; color: var(--warm-gray); margin-bottom: 24px; }
    .wheel-container { display: flex; justify-content: center; margin-bottom: 24px; position: relative; }
    .wheel { width: 300px; height: 300px; border-radius: 50%; position: relative; box-shadow: 0 16px 56px rgba(46,42,37,0.12); overflow: hidden; }
    .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 88px; height: 88px; border-radius: 50%; background: radial-gradient(circle, var(--paper) 0%, var(--cream) 100%); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(46,42,37,0.1); z-index: 2; }
    .wheel-go { width: 72px; height: 72px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--orange) 0%, var(--orange-deep) 55%, var(--orange-dark) 100%); color: white; font-size: 18px; font-weight: 700; box-shadow: var(--shadow-button); }
    .wheel-pointer { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 28px; height: 36px; z-index: 3; color: var(--orange); filter: drop-shadow(0 2px 4px rgba(232,106,46,0.3)); }
    .candidate-section { background: var(--paper); border-radius: 22px; padding: 20px; box-shadow: var(--shadow-card); margin-bottom: 16px; }
    .input-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .text-input { flex: 1; background: var(--paper); border: 1.5px solid var(--border); border-radius: 16px; padding: 14px 16px; font-size: 15px; outline: none; }
    .text-input:focus { border-color: var(--orange); box-shadow: 0 0 0 4px rgba(255,140,66,0.12); }
    .add-btn { width: 48px; height: 48px; border-radius: 16px; background: linear-gradient(135deg, var(--orange) 0%, var(--orange-deep) 100%); border: none; color: white; display: flex; align-items: center; justify-content: center; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .tag { background: var(--light-gray); color: var(--dark); border-radius: 20px; padding: 8px 14px; font-size: 14px; display: flex; align-items: center; gap: 6px; }
    .tag .del { width: 18px; height: 18px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; }
    .clear-btn { background: transparent; border: none; color: var(--warm-gray); font-size: 14px; margin-top: 12px; }
    .result-sheet {
      position: fixed; bottom: 0; left: 0; right: 0; max-width: 420px; margin: 0 auto;
      background: rgba(255, 252, 250, 0.94); backdrop-filter: blur(24px) saturate(160%);
      border-top-left-radius: 28px; border-top-right-radius: 28px;
      padding: 28px 24px 32px; box-shadow: 0 -6px 32px rgba(46,42,37,0.1);
    }
    .result-title { font-size: 14px; color: var(--warm-gray); text-align: center; margin-bottom: 8px; }
    .result-dish { font-size: 36px; font-weight: 700; text-align: center; margin-bottom: 20px; color: var(--orange-dark); }
    .result-actions { display: flex; gap: 12px; }
    .btn-primary { flex: 1; background: linear-gradient(135deg, var(--orange) 0%, var(--orange-deep) 55%, var(--orange-dark) 100%); color: white; border: none; border-radius: 18px; padding: 16px; font-size: 15px; font-weight: 600; box-shadow: var(--shadow-button); }
    .btn-secondary { flex: 1; background: var(--paper); border: 1.5px solid var(--border); border-radius: 18px; padding: 16px; font-size: 15px; font-weight: 500; }
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; max-width: 420px; margin: 0 auto; height: 68px;
      background: rgba(255, 252, 250, 0.92); backdrop-filter: blur(24px) saturate(160%); border-top: 1px solid rgba(233,227,221,0.6);
      display: flex; justify-content: space-around; align-items: center;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #A8A29C; font-size: 11px; font-weight: 500; }
    .tab-item.active { color: var(--orange); }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--orange); margin-top: 2px; }
  </style>
</head>
<body data-page-id="recommend-page" data-tab-id="tab-recommend">
  <div class="page">
    <header class="header">
      <div class="page-title">推荐</div>
      <button class="icon-btn" aria-label="菜品库">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Dish Library</title>
          <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>
        </svg>
      </button>
    </header>

    <div class="segment">
      <div class="segment-item active" data-ui-id="recommend-segment-wheel">转盘</div>
      <div class="segment-item" data-ui-id="recommend-segment-ingredient">食材</div>
      <div class="segment-item" data-ui-id="recommend-segment-filter">筛选</div>
    </div>

    <div class="panel-title">交给命运</div>
    <div class="panel-subtitle">添加候选菜品，点击转盘开始抽取</div>

    <div class="wheel-container">
      <svg class="wheel-pointer" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <title>Wheel Pointer</title>
        <path d="M12 0L4 20h16L12 0z"/>
      </svg>
      <div class="wheel" data-ui-id="wheel-canvas">
        <svg viewBox="0 0 300 300" width="300" height="300">
          <title>Spinning Wheel</title>
          <g transform="translate(150,150)">
            <path d="M0,0 L150,-28 A150,150 0 0,1 127,-76 Z" fill="#FF8C42"/>
            <path d="M0,0 L127,-76 A150,150 0 0,1 76,-127 Z" fill="#4ECB9C"/>
            <path d="M0,0 L76,-127 A150,150 0 0,1 0,-150 Z" fill="#8FA897"/>
            <path d="M0,0 L0,-150 A150,150 0 0,1 -76,-127 Z" fill="#FFE8D6"/>
            <path d="M0,0 L-76,-127 A150,150 0 0,1 -127,-76 Z" fill="#FF8C42"/>
            <path d="M0,0 L-127,-76 A150,150 0 0,1 -150,-28 Z" fill="#4ECB9C"/>
            <path d="M0,0 L-150,-28 A150,150 0 0,1 -150,28 Z" fill="#8FA897"/>
            <path d="M0,0 L-150,28 A150,150 0 0,1 -127,76 Z" fill="#FFE8D6"/>
            <path d="M0,0 L-127,76 A150,150 0 0,1 -76,127 Z" fill="#FF8C42"/>
            <path d="M0,0 L-76,127 A150,150 0 0,1 0,150 Z" fill="#4ECB9C"/>
            <path d="M0,0 L0,150 A150,150 0 0,1 76,127 Z" fill="#8FA897"/>
            <path d="M0,0 L76,127 A150,150 0 0,1 150,28 Z" fill="#FFE8D6"/>
            <circle r="2" fill="white"/>
          </g>
        </svg>
        <div class="wheel-center">
          <button class="wheel-go" data-ui-id="wheel-spin-button">GO</button>
        </div>
      </div>
    </div>

    <div class="candidate-section">
      <div class="input-row">
        <input class="text-input" type="text" placeholder="输入菜品名称，如：麻婆豆腐" data-ui-id="wheel-add-candidate-input" />
        <button class="add-btn" data-ui-id="wheel-add-candidate-button">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>Add Candidate Dish</title>
            <path d="M5 12h14"/><path d="M12 5v14"/>
          </svg>
        </button>
      </div>
      <div class="tag-list" data-ui-id="wheel-candidate-list">
        <div class="tag" data-ui-id="wheel-candidate-1">番茄炒蛋<span class="del"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>Remove Candidate</title><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span></div>
        <div class="tag" data-ui-id="wheel-candidate-2">红烧肉<span class="del"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>Remove Candidate</title><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span></div>
        <div class="tag" data-ui-id="wheel-candidate-3">蒜蓉西兰花<span class="del"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>Remove Candidate</title><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span></div>
        <div class="tag" data-ui-id="wheel-candidate-4">酸菜鱼<span class="del"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><title>Remove Candidate</title><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span></div>
      </div>
      <button class="clear-btn" data-ui-id="wheel-clear-candidates-button">清空候选</button>
    </div>
  </div>

  <div class="result-sheet" data-ui-id="wheel-result-panel">
    <div class="result-title">今天的选择是</div>
    <div class="result-dish">番茄炒蛋</div>
    <div class="result-actions">
      <button class="btn-secondary">再转一次</button>
      <button class="btn-primary" data-ui-id="wheel-go-checkin-button">去打卡</button>
    </div>
  </div>

  <nav class="tab-bar">
    <div class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Home Tab</title><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>首页</span></div>
    <div class="tab-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Recommend Tab</title><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg><span>推荐</span><div class="tab-dot"></div></div>
    <div class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Check-in Tab</title><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg><span>打卡</span></div>
    <div class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Profile Tab</title><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span></div>
  </nav>
</body>
</html>
