<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 分享卡片</title>
  <style>
    :root {
      --paper: #FFFCFA; --cream: #FFF5ED; --dark: #2E2A25; --warm-gray: #7A746E; --light-gray: #F5F0EB; --border: #E9E3DD;
      --orange: #FF8C42; --orange-deep: #FF7043; --orange-dark: #E86A2E; --green: #4ECB9C; --olive: #5A6B58; --sage: #8FA897;
      --shadow-card: 0 2px 10px rgba(46, 42, 37, 0.05), 0 6px 20px rgba(46, 42, 37, 0.04);
      --shadow-button: 0 6px 20px rgba(255, 140, 66, 0.28);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--paper); color: var(--dark); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif; }
    body { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; }
    .page { padding: 20px 22px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .back-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--light-gray); display: flex; align-items: center; justify-content: center; border: none; color: var(--dark); }
    .page-title { font-size: 30px; font-weight: 700; line-height: 1.18; }
    .template-section { margin-bottom: 24px; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 14px; }
    .template-list { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; }
    .template-thumb { flex: 0 0 72px; height: 96px; border-radius: 14px; border: 2px solid transparent; }
    .template-thumb.active { border-color: var(--orange); }
    .template-thumb.orange { background: linear-gradient(160deg, var(--orange) 0%, #FFD7A8 100%); }
    .template-thumb.green { background: linear-gradient(160deg, var(--olive) 0%, var(--sage) 100%); }
    .template-thumb.cream { background: linear-gradient(160deg, var(--cream) 0%, #FFE0CC 100%); }
    .preview-area { display: flex; justify-content: center; margin-bottom: 24px; }
    .share-card {
      width: 320px; height: 480px; border-radius: 28px; padding: 32px;
      background: linear-gradient(165deg, var(--orange) 0%, #FFD7A8 100%);
      box-shadow: 0 16px 56px rgba(46,42,37,0.16);
      display: flex; flex-direction: column; justify-content: space-between; color: white;
      position: relative; overflow: hidden;
    }
    .share-card::before {
      content: ""; position: absolute; top: -60px; right: -60px; width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 70%); border-radius: 50%;
    }
    .share-card::after {
      content: ""; position: absolute; bottom: -80px; left: -80px; width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 70%); border-radius: 50%;
    }
    .share-top { position: relative; z-index: 1; }
    .share-date { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
    .share-label { font-size: 13px; opacity: 0.85; text-transform: uppercase; letter-spacing: 1px; }
    .share-dish { font-size: 44px; font-weight: 700; line-height: 1.1; margin-top: 16px; word-break: break-word; }
    .share-bottom { position: relative; z-index: 1; }
    .share-caption { font-size: 16px; line-height: 1.5; opacity: 0.95; margin-bottom: 20px; }
    .share-brand { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; opacity: 0.9; }
    .caption-section { margin-bottom: 24px; }
    .text-input { width: 100%; background: var(--paper); border: 1.5px solid var(--border); border-radius: 16px; padding: 14px 16px; font-size: 15px; outline: none; }
    .text-input:focus { border-color: var(--orange); box-shadow: 0 0 0 4px rgba(255,140,66,0.12); }
    .action-row { display: flex; gap: 12px; }
    .btn-primary { flex: 1; background: linear-gradient(135deg, var(--orange) 0%, var(--orange-deep) 55%, var(--orange-dark) 100%); color: white; border: none; border-radius: 18px; padding: 16px; font-size: 16px; font-weight: 600; box-shadow: var(--shadow-button); display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-secondary { flex: 1; background: var(--dark); color: white; border: none; border-radius: 18px; padding: 16px; font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; max-width: 420px; margin: 0 auto; height: 68px;
      background: rgba(255, 252, 250, 0.92); backdrop-filter: blur(24px) saturate(160%); border-top: 1px solid rgba(233,227,221,0.6);
      display: flex; justify-content: space-around; align-items: center;
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #A8A29C; font-size: 11px; font-weight: 500; }
    .tab-item.active { color: var(--orange); }
    .tab-item svg { width: 24px; height: 24px; }
    .tab-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--orange); margin-top: 2px; }
  </style>
</head>
<body data-page-id="share-page">
  <div class="page">
    <header class="header">
      <button class="back-btn" aria-label="返回">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Go Back</title>
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
      <div class="page-title">分享卡片</div>
    </header>

    <div class="template-section">
      <div class="section-title">选择模板</div>
      <div class="template-list" data-ui-id="share-template-list">
        <div class="template-thumb orange active" data-ui-id="share-template-1"></div>
        <div class="template-thumb green" data-ui-id="share-template-2"></div>
        <div class="template-thumb cream" data-ui-id="share-template-3"></div>
      </div>
    </div>

    <div class="preview-area">
      <div class="share-card" data-ui-id="share-card-preview">
        <div class="share-top">
          <div class="share-label">TODAY'S MEAL</div>
          <div class="share-dish">番茄<br>炒蛋</div>
        </div>
        <div class="share-bottom">
          <div class="share-caption">"简单的一餐，也是幸福的一天。"</div>
          <div class="share-date">2026.06.23 午餐</div>
          <div class="share-brand">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>App Brand Icon</title><path d="M17 21a1 1 0 0 0 1-1v-5.35c0-.457.316-.844.727-1.041a4 4 0 0 0-2.134-7.589 5 5 0 0 0-9.186 0 4 4 0 0 0-2.134 7.588c.411.198.727.585.727 1.041V20a1 1 0 0 0 1 1Z"/><path d="M6 17h12"/></svg>
            今天吃什么
          </div>
        </div>
      </div>
    </div>

    <div class="caption-section">
      <div class="section-title">卡片文案</div>
      <input class="text-input" type="text" value="简单的一餐，也是幸福的一天。" data-ui-id="share-caption-input" />
    </div>

    <div class="action-row">
      <button class="btn-primary" data-ui-id="share-save-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>Save to Album</title>
          <path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/>
        </svg>
        保存到相册
      </button>
      <button class="btn-secondary" data-ui-id="share-system-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>System Share</title>
          <path d="M12 2v13"/><path d="m16 6-4-4-4 4"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        </svg>
        分享
      </button>
    </div>
  </div>

  <nav class="tab-bar">
    <div class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Home Tab</title><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>首页</span></div>
    <div class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Recommend Tab</title><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg><span>推荐</span></div>
    <div class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Check-in Tab</title><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg><span>打卡</span></div>
    <div class="tab-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>Profile Tab</title><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span><div class="tab-dot"></div></div>
  </nav>
</body>
</html>
