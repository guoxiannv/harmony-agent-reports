<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 分享卡片</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #FFF8F0;
      color: #2E2B28;
    }
    .app {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 22px 110px;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }
    .back-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      border: none;
      background: #F3ECE1;
      color: #2E2B28;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .page-title { font-size: 22px; font-weight: 700; }
    .preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0 24px;
    }
    .share-card {
      width: 330px;
      border-radius: 28px;
      padding: 32px 28px;
      background: linear-gradient(135deg, #E85D4E 0%, #D64F42 100%);
      color: #FFFFFF;
      box-shadow: rgba(232,93,78,0.3) 0 16px 40px;
      position: relative;
      overflow: hidden;
    }
    .share-card::before {
      content: "";
      position: absolute;
      top: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    .share-card::after {
      content: "";
      position: absolute;
      bottom: -40px;
      left: -40px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .card-date {
      display: inline-flex;
      height: 30px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      font-size: 12px;
      font-weight: 600;
      align-items: center;
      margin-bottom: 22px;
      position: relative;
      z-index: 1;
    }
    .card-dish {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    .card-mood {
      display: inline-flex;
      height: 30px;
      padding: 0 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      font-size: 13px;
      font-weight: 600;
      align-items: center;
      margin-bottom: 22px;
      position: relative;
      z-index: 1;
    }
    .card-quote {
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.92;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }
    .card-footer {
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .card-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0.9;
    }
    .card-logo {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
    }
    .bottom-actions {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      margin: 0 auto;
      max-width: 390px;
      padding: 14px 22px 28px;
      background: #FFF8F0;
      display: flex;
      gap: 12px;
      z-index: 50;
    }
    .btn-primary {
      flex: 1;
      height: 54px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(180deg, #E85D4E 0%, #D64F42 100%);
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 600;
      box-shadow: rgba(232,93,78,0.28) 0 10px 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-secondary {
      flex: 1;
      height: 54px;
      border-radius: 18px;
      border: 1.5px solid #E8DDD1;
      background: #FFFFFF;
      color: #2E2B28;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
  </style>
</head>
<body data-page-id="share-card-page">
  <div class="app">
    <header class="top-bar">
      <button class="back-btn" data-ui-id="share-back-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>返回上一页图标</title>
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1 class="page-title">分享卡片</h1>
    </header>

    <section class="preview-area">
      <article class="share-card" data-ui-id="share-card-preview">
        <div class="card-date">2026.06.23 周一</div>
        <div class="card-dish">番茄炒蛋</div>
        <div class="card-mood">快手 · 午餐</div>
        <p class="card-quote">“番茄炒蛋是中国人冰箱里永远的安全牌。酸甜开胃，十分钟上桌，配米饭能吃两大碗。”</p>
        <div class="card-footer">
          <div class="card-brand">
            <div class="card-logo">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <title>应用 Logo 小图标</title>
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
              </svg>
            </div>
            今天吃什么
          </div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>装饰餐具图标</title>
            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
            <path d="M7 2v20"/>
            <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/>
          </svg>
        </div>
      </article>
    </section>

    <section class="bottom-actions">
      <button class="btn-secondary" data-ui-id="share-save-button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>保存到相册图标</title>
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        保存图片
      </button>
      <button class="btn-primary" data-ui-id="share-system-button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>系统分享图标</title>
          <circle cx="18" cy="5" r="3"/>
          <circle cx="6" cy="12" r="3"/>
          <circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        分享
      </button>
    </section>
  </div>
</body>
</html>
