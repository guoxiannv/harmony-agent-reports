<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 决策</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #FFF8F0;
      color: #2E2B28;
    }
    .app {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 22px 120px;
      position: relative;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin: 0;
    }
    .date-pill {
      background: #F3ECE1;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 500;
      color: #6D6761;
    }
    .filter-section {
      margin-bottom: 16px;
    }
    .filter-label {
      font-size: 12px;
      font-weight: 600;
      color: #A9A29B;
      margin-bottom: 10px;
      display: block;
    }
    .mood-scroll, .time-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .mood-scroll::-webkit-scrollbar, .time-scroll::-webkit-scrollbar { display: none; }
    .mood-tag {
      flex: 0 0 auto;
      height: 38px;
      padding: 0 18px;
      border-radius: 14px;
      border: 1px solid #E8DDD1;
      background: #FFFFFF;
      color: #6D6761;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .mood-tag.active {
      border: none;
      color: #9C5A36;
      background: #FFE8D6;
    }
    .time-chip {
      flex: 0 0 auto;
      height: 38px;
      padding: 0 20px;
      border-radius: 999px;
      border: 1px solid #E8DDD1;
      background: #FFFFFF;
      color: #5C5753;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .time-chip.active {
      background: #2E2B28;
      color: #FFF8F0;
      border: none;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
    }
    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 10px 0 24px;
    }
    .wheel-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
    }
    .wheel-pointer {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 34px;
      z-index: 10;
      filter: drop-shadow(0 4px 8px rgba(232,93,78,0.3));
    }
    .wheel {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: conic-gradient(
        #E85D4E 0deg 45deg,
        #7CAE7A 45deg 90deg,
        #F2B134 90deg 135deg,
        #C47D4C 135deg 180deg,
        #A68CC6 180deg 225deg,
        #7DD3C0 225deg 270deg,
        #D67A94 270deg 315deg,
        #D6C6B3 315deg 360deg
      );
      box-shadow: rgba(46,43,40,0.12) 0 14px 40px;
      position: relative;
    }
    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: #FFFFFF;
      border: 3px solid #E85D4E;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #E85D4E;
      box-shadow: rgba(46,43,40,0.1) 0 6px 20px;
      z-index: 5;
    }
    .wheel-labels {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }
    .wheel-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: 0 0;
      font-size: 11px;
      font-weight: 600;
      color: #FFFFFF;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
      white-space: nowrap;
    }
    .result-area {
      text-align: center;
      margin-bottom: 22px;
      min-height: 90px;
    }
    .result-hint {
      font-size: 14px;
      color: #A9A29B;
      margin-bottom: 8px;
    }
    .result-name {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.5px;
      color: #2E2B28;
      margin-bottom: 10px;
    }
    .result-tag {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 14px;
      border-radius: 10px;
      background: #FFE8D6;
      color: #9C5A36;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .result-detail-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #E85D4E;
      cursor: pointer;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn-primary {
      width: 100%;
      height: 54px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(180deg, #E85D4E 0%, #D64F42 100%);
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 600;
      box-shadow: rgba(232,93,78,0.28) 0 10px 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-secondary {
      width: 100%;
      height: 50px;
      border-radius: 18px;
      border: 1.5px solid #E8DDD1;
      background: #FFFFFF;
      color: #2E2B28;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      margin: 0 auto;
      max-width: 390px;
      height: 80px;
      background: rgba(255,248,240,0.94);
      backdrop-filter: blur(24px);
      border-radius: 28px 28px 0 0;
      box-shadow: rgba(46,43,40,0.08) 0 -6px 24px;
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 12px;
      z-index: 100;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #A9A29B;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
    }
    .tab-item.active { color: #E85D4E; }
    .tab-item svg { width: 24px; height: 24px; }
  </style>
</head>
<body data-page-id="home-page" data-tab-id="tab-home">
  <div class="app">
    <header class="header">
      <h1 class="title">今天吃什么</h1>
      <div class="date-pill">6月23日 周一</div>
    </header>

    <section class="filter-section">
      <span class="filter-label">心情</span>
      <div class="mood-scroll" data-ui-id="home-mood-filter">
        <div class="mood-tag active">全部</div>
        <div class="mood-tag">放纵</div>
        <div class="mood-tag">健康</div>
        <div class="mood-tag">快手</div>
        <div class="mood-tag">治愈</div>
        <div class="mood-tag">清爽</div>
        <div class="mood-tag">解馋</div>
      </div>
    </section>

    <section class="filter-section">
      <span class="filter-label">时间</span>
      <div class="time-scroll" data-ui-id="home-time-filter">
        <div class="time-chip active">全部</div>
        <div class="time-chip">早餐</div>
        <div class="time-chip">午餐</div>
        <div class="time-chip">晚餐</div>
        <div class="time-chip">夜宵</div>
      </div>
    </section>

    <section class="wheel-section">
      <div class="wheel-wrapper">
        <svg class="wheel-pointer" viewBox="0 0 28 34" aria-hidden="true">
          <title>转盘指针</title>
          <path d="M14 34L2 8a6 6 0 0 1 12-2 6 6 0 0 1 12 2L14 34z" fill="#E85D4E"/>
        </svg>
        <div class="wheel" aria-label="菜品转盘">
          <div class="wheel-labels">
            <span class="wheel-label" style="transform: rotate(22.5deg) translate(108px) rotate(-22.5deg)">番茄炒蛋</span>
            <span class="wheel-label" style="transform: rotate(67.5deg) translate(108px) rotate(-67.5deg)">牛油果沙拉</span>
            <span class="wheel-label" style="transform: rotate(112.5deg) translate(108px) rotate(-112.5deg)">蛋炒饭</span>
            <span class="wheel-label" style="transform: rotate(157.5deg) translate(108px) rotate(-157.5deg)">红烧肉</span>
            <span class="wheel-label" style="transform: rotate(202.5deg) translate(108px) rotate(-202.5deg)">紫薯粥</span>
            <span class="wheel-label" style="transform: rotate(247.5deg) translate(108px) rotate(-247.5deg)">薄荷拌面</span>
            <span class="wheel-label" style="transform: rotate(292.5deg) translate(108px) rotate(-292.5deg)">草莓松饼</span>
            <span class="wheel-label" style="transform: rotate(337.5deg) translate(108px) rotate(-337.5deg)">牛肉面</span>
          </div>
          <div class="wheel-center">开始</div>
        </div>
      </div>
    </section>

    <section class="result-area" data-ui-id="home-wheel-result">
      <div class="result-hint">点击按钮，让转盘决定今天的美味</div>
      <div class="result-name">番茄炒蛋</div>
      <div class="result-tag">快手</div>
      <div class="result-detail-btn" data-ui-id="home-result-detail-button">
        查看详情
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <title>查看菜品详情箭头</title>
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </div>
    </section>

    <section class="actions">
      <button class="btn-primary" data-ui-id="home-spin-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <title>开始转盘图标</title>
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        开始转盘
      </button>
      <button class="btn-secondary" data-ui-id="home-quick-pantry-button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <title>冰箱食材推荐图标</title>
          <path d="M5 10a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V10z"/>
          <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
        </svg>
        冰箱食材推荐
      </button>
    </section>

    <nav class="tab-bar">
      <div class="tab-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>决策标签页图标</title>
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <span>决策</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>食材标签页图标</title>
          <path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/>
          <path d="M8 9V5a2 2 0 0 1 4 0v4"/>
        </svg>
        <span>食材</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打卡标签页图标</title>
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span>打卡</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>我的标签页图标</title>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>我的</span>
      </div>
    </nav>
  </div>
</body>
</html>
