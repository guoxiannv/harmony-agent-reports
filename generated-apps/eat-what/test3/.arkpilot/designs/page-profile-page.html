<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 我的</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #FFF8F0;
      color: #2E2B28;
    }
    .app {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 22px 120px;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #F3ECE1;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar svg { color: #A9A29B; }
    .profile-meta {}
    .profile-name { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 26px;
      padding: 0 10px;
      border-radius: 10px;
      background: #FFE8D6;
      color: #9C5A36;
      font-size: 12px;
      font-weight: 600;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 18px;
      box-shadow: rgba(46,43,40,0.08) 0 10px 32px;
    }
    .stat-card-value {
      font-size: 28px;
      font-weight: 800;
      color: #2E2B28;
      margin-bottom: 6px;
    }
    .stat-card-value.accent { color: #E85D4E; }
    .stat-card-label { font-size: 13px; color: #A9A29B; font-weight: 500; }
    .menu-card {
      background: #FFFFFF;
      border-radius: 24px;
      box-shadow: rgba(46,43,40,0.08) 0 10px 32px;
      overflow: hidden;
    }
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid #F3ECE1;
      cursor: pointer;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item-left {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 500;
    }
    .menu-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: #F3ECE1;
      display: flex; align-items: center; justify-content: center;
      color: #6D6761;
    }
    .menu-arrow { color: #A9A29B; }
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      margin: 0 auto;
      max-width: 390px;
      height: 80px;
      background: rgba(255,248,240,0.94);
      backdrop-filter: blur(24px);
      border-radius: 28px 28px 0 0;
      box-shadow: rgba(46,43,40,0.08) 0 -6px 24px;
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 12px;
      z-index: 100;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: #A9A29B; font-size: 11px; font-weight: 500; cursor: pointer;
    }
    .tab-item.active { color: #E85D4E; }
    .tab-item svg { width: 24px; height: 24px; }
  </style>
</head>
<body data-page-id="profile-page" data-tab-id="tab-profile">
  <div class="app">
    <header class="profile-header">
      <div class="avatar">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>用户头像占位图标</title>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="profile-meta">
        <div class="profile-name">美食探险家</div>
        <div class="profile-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>连续打卡徽章图标</title>
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M4 22h16"/>
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
          </svg>
          连续打卡 5 天
        </div>
      </div>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-value accent" data-ui-id="profile-streak-count">5</div>
        <div class="stat-card-label">连续打卡</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-value" data-ui-id="profile-total-check-ins">23</div>
        <div class="stat-card-label">总打卡数</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-value">番茄炒蛋</div>
        <div class="stat-card-label">本月最爱</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-value">12</div>
        <div class="stat-card-label">本周菜品</div>
      </div>
    </section>

    <section class="menu-card">
      <div class="menu-item" data-ui-id="profile-settings-button">
        <div class="menu-item-left">
          <div class="menu-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>设置菜单图标</title>
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
          设置
        </div>
        <svg class="menu-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>进入设置箭头</title>
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </div>
      <div class="menu-item">
        <div class="menu-item-left">
          <div class="menu-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <title>关于菜单图标</title>
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 16v-4M12 8h.01"/>
            </svg>
          </div>
          关于
        </div>
        <svg class="menu-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>进入关于箭头</title>
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </div>
    </section>

    <nav class="tab-bar">
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>决策标签页图标</title>
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <span>决策</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>食材标签页图标</title>
          <path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/>
          <path d="M8 9V5a2 2 0 0 1 4 0v4"/>
        </svg>
        <span>食材</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打卡标签页图标</title>
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span>打卡</span>
      </div>
      <div class="tab-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>我的标签页图标</title>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>我的</span>
      </div>
    </nav>
  </div>
</body>
</html>
