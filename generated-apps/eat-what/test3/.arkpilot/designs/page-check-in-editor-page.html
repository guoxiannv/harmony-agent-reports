<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 记录打卡</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #FFF8F0;
      color: #2E2B28;
    }
    .app {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 22px 100px;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }
    .back-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      border: none;
      background: #F3ECE1;
      color: #2E2B28;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .page-title { font-size: 22px; font-weight: 700; }
    .form {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .form-group {}
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #6D6761;
      margin-bottom: 10px;
    }
    .text-input {
      width: 100%;
      height: 54px;
      border-radius: 16px;
      border: none;
      background: #F3ECE1;
      padding: 0 18px;
      font-size: 16px;
      color: #2E2B28;
      outline: none;
    }
    .text-input::placeholder { color: #A9A29B; }
    .text-input:focus {
      box-shadow: 0 0 0 2px #E85D4E, 0 0 0 6px rgba(232,93,78,0.08);
    }
    .date-picker {
      width: 100%;
      height: 54px;
      border-radius: 16px;
      border: none;
      background: #F3ECE1;
      padding: 0 18px;
      font-size: 16px;
      color: #2E2B28;
      outline: none;
    }
    .meal-selector {
      display: flex;
      gap: 10px;
    }
    .meal-chip {
      flex: 1;
      height: 44px;
      border-radius: 14px;
      border: 1px solid #E8DDD1;
      background: #FFFFFF;
      color: #6D6761;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .meal-chip.active {
      background: #2E2B28;
      color: #FFF8F0;
      border: none;
    }
    .mood-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .mood-chip {
      height: 40px;
      padding: 0 18px;
      border-radius: 14px;
      border: 1px solid #E8DDD1;
      background: #FFFFFF;
      color: #6D6761;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .mood-chip.active {
      border: none;
      color: #9C5A36;
      background: #FFE8D6;
    }
    .textarea {
      width: 100%;
      height: 100px;
      border-radius: 16px;
      border: none;
      background: #F3ECE1;
      padding: 14px 18px;
      font-size: 16px;
      color: #2E2B28;
      outline: none;
      resize: none;
      line-height: 1.5;
    }
    .textarea::placeholder { color: #A9A29B; }
    .btn-primary {
      width: 100%;
      height: 54px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(180deg, #E85D4E 0%, #D64F42 100%);
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 600;
      box-shadow: rgba(232,93,78,0.28) 0 10px 24px;
      cursor: pointer;
      margin-top: auto;
    }
  </style>
</head>
<body data-page-id="check-in-editor-page">
  <div class="app">
    <header class="top-bar">
      <button class="back-btn" data-ui-id="editor-back-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>返回上一页图标</title>
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1 class="page-title">记录这一餐</h1>
    </header>

    <form class="form">
      <div class="form-group">
        <label class="form-label">日期</label>
        <input type="date" class="date-picker" value="2026-06-23" data-ui-id="editor-date-picker" />
      </div>

      <div class="form-group">
        <label class="form-label">餐别</label>
        <div class="meal-selector" data-ui-id="editor-meal-picker">
          <div class="meal-chip">早餐</div>
          <div class="meal-chip active">午餐</div>
          <div class="meal-chip">晚餐</div>
          <div class="meal-chip">夜宵</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">菜品</label>
        <input type="text" class="text-input" value="番茄炒蛋" placeholder="输入菜品名称" data-ui-id="editor-dish-input" />
      </div>

      <div class="form-group">
        <label class="form-label">心情</label>
        <div class="mood-selector" data-ui-id="editor-mood-picker">
          <div class="mood-chip">放纵</div>
          <div class="mood-chip">健康</div>
          <div class="mood-chip active">快手</div>
          <div class="mood-chip">治愈</div>
          <div class="mood-chip">清爽</div>
          <div class="mood-chip">解馋</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">备注</label>
        <textarea class="textarea" placeholder="记录一下这顿饭的感受..." data-ui-id="editor-note-input"></textarea>
      </div>

      <button type="button" class="btn-primary" data-ui-id="editor-save-button">保存打卡</button>
    </form>
  </div>
</body>
</html>
