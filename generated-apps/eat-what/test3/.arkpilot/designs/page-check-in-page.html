<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 打卡</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #FFF8F0;
      color: #2E2B28;
    }
    .app {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 22px 120px;
    }
    .header { margin-bottom: 18px; }
    .title { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; margin: 0; }
    .stats-card {
      background: #FFFFFF;
      border-radius: 24px;
      padding: 22px;
      box-shadow: rgba(46,43,40,0.08) 0 10px 32px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .stat {
      flex: 1;
      text-align: center;
    }
    .stat:not(:last-child) { border-right: 1px solid #F3ECE1; }
    .stat-value {
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      color: #E85D4E;
      margin-bottom: 6px;
    }
    .stat-value.secondary { color: #2E2B28; }
    .stat-label { font-size: 12px; color: #A9A29B; font-weight: 500; }
    .date-header {
      background: #F3ECE1;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #6D6761;
      margin: 0 0 12px;
      position: sticky;
      top: 10px;
    }
    .record-list { display: flex; flex-direction: column; gap: 12px; }
    .record-item {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 16px;
      box-shadow: rgba(46,43,40,0.06) 0 6px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .record-bar {
      width: 4px;
      height: 44px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .record-main { flex: 1; }
    .record-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .record-meal { font-size: 12px; font-weight: 600; color: #A9A29B; }
    .record-name { font-size: 17px; font-weight: 700; color: #2E2B28; }
    .record-mood {
      height: 26px;
      padding: 0 10px;
      border-radius: 8px;
      background: #E2F0E1;
      color: #4D7A4B;
      font-size: 11px;
      font-weight: 600;
      display: flex; align-items: center;
    }
    .record-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .record-actions button {
      width: 34px; height: 34px;
      border-radius: 10px;
      border: none;
      background: #F3ECE1;
      color: #6D6761;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .fab {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(142px);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(180deg, #E85D4E 0%, #D64F42 100%);
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: rgba(232,93,78,0.3) 0 8px 20px;
      cursor: pointer;
      z-index: 90;
    }
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      margin: 0 auto;
      max-width: 390px;
      height: 80px;
      background: rgba(255,248,240,0.94);
      backdrop-filter: blur(24px);
      border-radius: 28px 28px 0 0;
      box-shadow: rgba(46,43,40,0.08) 0 -6px 24px;
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 12px;
      z-index: 100;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: #A9A29B; font-size: 11px; font-weight: 500; cursor: pointer;
    }
    .tab-item.active { color: #E85D4E; }
    .tab-item svg { width: 24px; height: 24px; }
  </style>
</head>
<body data-page-id="check-in-page" data-tab-id="tab-check-in">
  <div class="app">
    <header class="header">
      <h1 class="title">饮食打卡</h1>
    </header>

    <section class="stats-card">
      <div class="stat">
        <div class="stat-value" data-ui-id="profile-streak-count">5</div>
        <div class="stat-label">连续打卡</div>
      </div>
      <div class="stat">
        <div class="stat-value secondary" data-ui-id="profile-total-check-ins">23</div>
        <div class="stat-label">总次数</div>
      </div>
    </section>

    <section data-ui-id="check-in-list">
      <div class="date-header">今天 · 6月23日 周一</div>
      <div class="record-list">
        <article class="record-item" data-ui-id="check-in-record-1">
          <div class="record-bar" style="background:#F2B134"></div>
          <div class="record-main">
            <div class="record-top">
              <span class="record-meal">早餐</span>
              <span class="record-mood">快手</span>
            </div>
            <div class="record-name">牛油果吐司</div>
          </div>
          <div class="record-actions">
            <button data-ui-id="check-in-share-button">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>生成分享卡片图标</title>
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                <polyline points="16 6 12 2 8 6"/>
                <line x1="12" y1="2" x2="12" y2="15"/>
              </svg>
            </button>
            <button data-ui-id="check-in-delete-button">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>删除该打卡记录图标</title>
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
          </div>
        </article>
      </div>

      <div class="date-header" style="margin-top:22px">昨天 · 6月22日 周日</div>
      <div class="record-list">
        <article class="record-item" data-ui-id="check-in-record-2">
          <div class="record-bar" style="background:#E85D4E"></div>
          <div class="record-main">
            <div class="record-top">
              <span class="record-meal">晚餐</span>
              <span class="record-mood">放纵</span>
            </div>
            <div class="record-name">麻辣小龙虾</div>
          </div>
          <div class="record-actions">
            <button data-ui-id="check-in-share-button">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>生成分享卡片图标</title>
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                <polyline points="16 6 12 2 8 6"/>
                <line x1="12" y1="2" x2="12" y2="15"/>
              </svg>
            </button>
            <button data-ui-id="check-in-delete-button">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>删除该打卡记录图标</title>
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
          </div>
        </article>
      </div>
    </section>

    <button class="fab" data-ui-id="check-in-add-button">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <title>补录打卡图标</title>
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </button>

    <nav class="tab-bar">
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>决策标签页图标</title>
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <span>决策</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>食材标签页图标</title>
          <path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/>
          <path d="M8 9V5a2 2 0 0 1 4 0v4"/>
        </svg>
        <span>食材</span>
      </div>
      <div class="tab-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>打卡标签页图标</title>
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span>打卡</span>
      </div>
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>我的标签页图标</title>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>我的</span>
      </div>
    </nav>
  </div>
</body>
</html>
