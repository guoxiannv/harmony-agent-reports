<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么 - 结果详情</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #2E2B28;
      color: #FFF8F0;
    }
    .app {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .hero {
      flex: 0 0 55%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 22px;
      background: linear-gradient(180deg, #3A3632 0%, #2E2B28 100%);
      position: relative;
    }
    .back-btn {
      position: absolute;
      top: 18px;
      left: 18px;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255,248,240,0.12);
      border: none;
      color: #FFF8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
    .hero-badge {
      height: 30px;
      padding: 0 14px;
      border-radius: 10px;
      background: rgba(232,93,78,0.2);
      color: #FF9E94;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      margin-bottom: 18px;
    }
    .dish-name {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.5px;
      margin-bottom: 18px;
    }
    .hero-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .hero-tag {
      height: 32px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255,248,240,0.12);
      color: #FFF8F0;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-sheet {
      flex: 1;
      background: #FFF8F0;
      border-radius: 28px 28px 0 0;
      margin-top: -24px;
      padding: 28px 22px 100px;
      color: #2E2B28;
      overflow-y: auto;
    }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ingredient-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }
    .ingredient-tag {
      height: 36px;
      padding: 0 14px;
      border-radius: 12px;
      background: #F3ECE1;
      color: #4D7A4B;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .quote-card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 20px;
      box-shadow: rgba(46,43,40,0.06) 0 8px 24px;
      margin-bottom: 24px;
    }
    .quote-text {
      font-size: 16px;
      line-height: 1.6;
      color: #6D6761;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .info-item {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 16px;
      box-shadow: rgba(46,43,40,0.06) 0 6px 18px;
    }
    .info-label { font-size: 12px; color: #A9A29B; margin-bottom: 6px; font-weight: 500; }
    .info-value { font-size: 16px; font-weight: 700; color: #2E2B28; }
    .bottom-actions {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      margin: 0 auto;
      max-width: 390px;
      padding: 14px 22px 28px;
      background: #FFF8F0;
      display: flex;
      gap: 12px;
      z-index: 50;
    }
    .btn-primary {
      flex: 1;
      height: 54px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(180deg, #E85D4E 0%, #D64F42 100%);
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 600;
      box-shadow: rgba(232,93,78,0.28) 0 10px 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-secondary {
      flex: 1;
      height: 54px;
      border-radius: 18px;
      border: 1.5px solid #E8DDD1;
      background: #FFFFFF;
      color: #2E2B28;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
  </style>
</head>
<body data-page-id="result-page">
  <div class="app">
    <section class="hero">
      <button class="back-btn" data-ui-id="result-back-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>返回上一页图标</title>
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="hero-badge">为你选中</div>
      <h1 class="dish-name" data-ui-id="result-dish-name">番茄炒蛋</h1>
      <div class="hero-tags" data-ui-id="result-dish-tags">
        <span class="hero-tag">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>快手标签图标</title>
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          快手
        </span>
        <span class="hero-tag">午餐</span>
      </div>
    </section>

    <section class="detail-sheet">
      <h2 class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7CAE7A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>食材清单图标</title>
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        所需食材
      </h2>
      <div class="ingredient-list">
        <span class="ingredient-tag">番茄</span>
        <span class="ingredient-tag">鸡蛋</span>
        <span class="ingredient-tag">小葱</span>
        <span class="ingredient-tag">盐</span>
        <span class="ingredient-tag">食用油</span>
      </div>

      <div class="quote-card">
        <p class="quote-text">“番茄炒蛋是中国人冰箱里永远的安全牌。酸甜开胃，十分钟上桌，配米饭能吃两大碗。”</p>
      </div>

      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">预计时间</div>
          <div class="info-value">10 分钟</div>
        </div>
        <div class="info-item">
          <div class="info-label">难度</div>
          <div class="info-value">零失败</div>
        </div>
      </div>
    </section>

    <section class="bottom-actions">
      <button class="btn-primary" data-ui-id="result-check-in-button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>记录打卡图标</title>
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        记录打卡
      </button>
      <button class="btn-secondary" data-ui-id="result-share-button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <title>生成分享卡片图标</title>
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
        分享卡片
      </button>
    </section>
  </div>
</body>
</html>
